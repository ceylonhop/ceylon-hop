<style>
  .srch-err{display:flex;align-items:center;gap:.45rem;margin:12px 0 0;color:#b13b22;background:#fdeee9;border:1px solid #f4c9bb;border-radius:10px;padding:.55rem .8rem;font-size:.86rem;font-weight:600}
  .srch-err[hidden]{display:none}
  body{background:transparent}

  /* search bar */
  .srch-top{background:var(--paper);border-bottom:1px solid var(--line)}
  .srch-top .wrap{padding-top:18px;padding-bottom:20px}
  .srch-top .back-link{background:none;border:none;color:var(--ink-soft);font-weight:600;font-size:.9rem;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:14px;white-space:nowrap}
  .srch-top .back-link:hover{color:var(--ink)}
  .srch-bar{display:grid;grid-template-columns:1fr auto 1fr .9fr .9fr auto;gap:10px;align-items:end;background:var(--cream-deep);border-radius:var(--r);padding:14px}
  .srch-bar[hidden]{display:none}
  .srch-bar .field{margin:0}
  .srch-bar label{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:.3rem}
  .srch-bar select,.srch-bar input{width:100%;padding:.7rem .8rem;border:1.5px solid var(--line);border-radius:10px;background:var(--white);font-family:inherit;font-size:.92rem;color:var(--ink)}
  .srch-bar .swap2{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);background:var(--white);color:var(--accent-deep);display:grid;place-items:center;margin-bottom:1px}
  .srch-bar .swap2 svg{width:16px;height:16px}
  .srch-actions{display:flex;align-items:center;gap:10px}
  .srch-bar .go{height:42px;white-space:nowrap}
  @media(max-width:860px){.srch-bar{grid-template-columns:1fr 1fr;gap:10px}.srch-bar .swap2{display:none}.srch-actions{grid-column:1/-1}.srch-bar .go{flex:1}}
  /* locked summary (Kayak/Expedia pattern): the chosen search shows read-only until you click Edit */
  .srch-locked{display:flex;align-items:center;gap:16px;background:var(--cream-deep);border-radius:var(--r);padding:14px 18px;flex-wrap:wrap}
  .srch-locked[hidden]{display:none}
  .srch-locked .sl-main{flex:1;min-width:200px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .srch-locked .sl-route{font-weight:700;font-size:1rem;color:var(--ink);display:inline-flex;align-items:center;gap:.5rem}
  .srch-locked .sl-route .arr{color:var(--accent-deep);display:inline-flex}
  .srch-locked .sl-route .arr svg{width:18px;height:18px}
  .srch-locked .sl-dot{color:var(--ink-soft)}
  .srch-locked .sl-meta{color:var(--ink-soft);font-size:.9rem;font-weight:600}
  .srch-locked .sl-edit{background:var(--white);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:.6rem 1.1rem;font:inherit;font-weight:600;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem;white-space:nowrap}
  .srch-locked .sl-edit:hover{border-color:var(--accent-deep);color:var(--accent-deep)}
  .srch-locked .sl-edit svg{width:15px;height:15px}
  .sl-cancel{background:none;border:none;color:var(--ink-soft);font-weight:600;font-size:.88rem;cursor:pointer;padding:.5rem .2rem;text-decoration:underline;white-space:nowrap}
  .sl-cancel:hover{color:var(--ink)}
  .sl-cancel[hidden]{display:none}
  @media(max-width:640px){
    .srch-top .wrap{padding-top:14px;padding-bottom:14px}
    .srch-top .back-link{margin-bottom:10px}
    .srch-locked{gap:12px;padding:13px 14px;border-radius:16px}
    .srch-locked .sl-main{display:grid;grid-template-columns:1fr;gap:8px;min-width:0}
    .srch-locked .sl-route{font-size:1rem;line-height:1.25}
    .srch-locked .sl-meta{font-size:.86rem;line-height:1.4}
    .srch-locked .sl-dot{display:none}
    .srch-locked .sl-edit{width:100%;justify-content:center}
  }

  /* route head */
  .route-head{margin-bottom:8px}
  .route-head h1{font-size:clamp(1.9rem,3.4vw,2.7rem);display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
  .route-head .arr{color:var(--accent);display:inline-flex}.route-head .arr svg{width:30px;height:30px}
  .route-meta{color:var(--ink-soft);font-size:1rem;margin-top:.5rem;display:flex;gap:18px;flex-wrap:wrap}
  .route-meta span{display:inline-flex;align-items:center;gap:.45rem}
  .route-meta svg{width:16px;height:16px;color:var(--teal-deep)}
  .add-stops{display:inline-flex;align-items:center;gap:.45rem;margin-top:12px;font-size:.92rem;font-weight:700;color:var(--accent-deep)}
  .add-stops:hover{text-decoration:underline}
  .add-stops svg{width:15px;height:15px}
  .add-stops[hidden]{display:none}
  .complex-route{margin-top:14px;font-size:.9rem;color:var(--ink-soft);max-width:56ch;line-height:1.5}
  .complex-route a{color:var(--accent-deep);font-weight:700;text-decoration:none}
  .complex-route a:hover{text-decoration:underline}
  @media(max-width:640px){
    body[data-page="search"] .section{padding-top:16px!important}
    .route-head{margin-bottom:18px}
    .route-head h1,.route-meta{display:none}
    .add-stops{margin-top:0;font-size:.9rem}
    .opt-grid{margin-top:16px}
  }

  /* option cards */
  .opt-grid{display:grid;grid-template-columns:1.25fr 1fr;gap:24px;margin-top:30px;align-items:start}
  .opt-grid.solo{grid-template-columns:1fr;max-width:640px}
  @media(max-width:820px){.opt-grid{grid-template-columns:1fr}}
  .opt{background:var(--paper);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:26px 26px 24px;position:relative;display:flex;flex-direction:column;border:1.5px solid transparent}
  .opt.opt-private{border-color:rgba(10,185,182,.35)}
  .opt .tag-top{position:absolute;top:-12px;left:24px;font-family:var(--body);font-weight:700;font-size:.74rem;letter-spacing:.02em;padding:.4rem .8rem;border-radius:999px;color:#fff;white-space:nowrap}
  .opt-private .tag-top{background:var(--teal)}
  .opt-shared .tag-top{background:var(--saffron)}
  .opt .o-head{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.5rem}
  .opt .o-ico{width:48px;height:48px;border-radius:14px;flex:none;display:grid;place-items:center;color:#fff}
  .opt-private .o-ico{background:var(--teal)}
  .opt-shared .o-ico{background:var(--saffron)}
  .opt .o-ico svg{width:26px;height:26px}
  .opt h2{font-size:1.4rem;line-height:1.1}
  .opt .o-sub{font-size:.82rem;color:var(--ink-soft);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
  .opt .o-desc{color:var(--ink-soft);font-size:.95rem;margin:.4rem 0 1rem}

  /* vehicle rows (private) */
  .veh{display:grid;gap:12px;margin-bottom:8px}
  .veh-row{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;transition:.15s}
  .veh-row:hover{border-color:var(--accent)}
  .veh-row .v-ico{width:42px;height:42px;border-radius:10px;background:var(--cream-deep);display:grid;place-items:center;flex:none;color:var(--ink)}
  .veh-row .v-ico svg{width:24px;height:24px}
  .veh-row .v-info b{display:block;font-size:1rem}
  .veh-row .v-info small{color:var(--ink-soft);font-size:.82rem}
  .veh-row .v-price{margin-left:auto;text-align:right}
  .veh-row .v-price .amt{font-family:var(--display);font-size:1.5rem;font-weight:700;line-height:1}
  .veh-row .v-price small{display:block;color:var(--ink-soft);font-size:.72rem}
  .veh-row .btn{flex:none}

  /* shared block */
  .shared-price{display:flex;align-items:baseline;gap:.5rem;margin:.2rem 0 .2rem}
  .shared-price .amt{font-family:var(--display);font-size:2.6rem;font-weight:800;line-height:1}
  .shared-price .per{color:var(--ink-soft);font-weight:600}
  .shared-save{display:inline-flex;align-items:center;gap:.4rem;background:rgba(10,185,182,.12);color:var(--teal-deep);font-weight:700;font-size:.82rem;padding:.35rem .7rem;border-radius:999px;margin-bottom:14px}
  .shared-save svg{width:15px;height:15px;flex:none}
  .shared-meta{display:grid;gap:10px;margin:6px 0 18px}
  .shared-meta .sm{display:flex;align-items:center;gap:.6rem;font-size:.9rem}
  .shared-meta .sm svg{width:17px;height:17px;color:var(--teal-deep);flex:none}
  .shared-meta .sm .low{color:#bb2c1a;font-weight:700}

  .incl{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:16px}
  .incl .chip{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:600;color:var(--ink-soft);background:var(--cream-deep);padding:.35rem .7rem;border-radius:999px}
  .incl .chip svg{width:13px;height:13px;color:var(--teal-deep)}

  .opt .o-cta{margin-top:18px}

  /* no-shared note */
  .noshare{background:var(--paper);border:1.5px dashed var(--line);border-radius:var(--r-lg);padding:24px;display:flex;gap:16px;align-items:flex-start}
  .noshare .ns-ico{width:42px;height:42px;border-radius:50%;background:var(--cream-deep);display:grid;place-items:center;flex:none;color:var(--ink-soft)}
  .noshare .ns-ico svg{width:22px;height:22px}
  .noshare b{display:block;margin-bottom:.2rem}
  .noshare p{font-size:.92rem;color:var(--ink-soft);margin:0}

  .reassure{display:flex;gap:26px;flex-wrap:wrap;margin-top:38px;padding-top:26px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:.9rem;font-weight:500}
  .reassure .ra{display:flex;align-items:center;gap:.5rem}
  .reassure svg{width:17px;height:17px;color:var(--teal-deep)}

  /* whatsapp help card */
  .srch-help{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:30px;padding:18px 22px;
    background:#25d3660d;border:1.5px solid #25d36633;border-radius:var(--r-lg)}
  .srch-help .help-ico{width:46px;height:46px;border-radius:50%;background:#25D366;color:#fff;display:grid;place-items:center;flex:none}
  .srch-help .help-ico svg{width:24px;height:24px}
  .srch-help .help-txt{flex:1;min-width:200px}
  .srch-help .help-txt b{display:block;font-size:1rem}
  .srch-help .help-txt p{margin:2px 0 0;font-size:.88rem;color:var(--ink-soft)}
  @media(max-width:560px){.srch-help .btn{width:100%;justify-content:center}}
</style>
</head>

<section class="srch-top">
  <div class="wrap">
    <a class="back-link" href="index.html"><svg viewBox="0 0 24 24" width="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Start a new search</a>
    <div class="srch-locked" id="srch-locked">
      <div class="sl-main">
        <span class="sl-route" id="sl-route"></span>
        <span class="sl-dot" aria-hidden="true">·</span>
        <span class="sl-meta" id="sl-meta"></span>
      </div>
      <button type="button" class="sl-edit" id="sl-edit" onclick="editSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> Edit search</button>
    </div>
    <form class="srch-bar" id="srch-bar" hidden onsubmit="return updateSearch(event)">
      <div class="field place-field"><label for="e-from">Pick-up</label><input id="e-from" required placeholder="Where from?" autocomplete="off"></div>
      <button type="button" class="swap2" id="e-swap" aria-label="Swap pick-up and drop-off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4v16M7 20l-3-3M7 20l3-3M17 20V4M17 4l-3 3M17 4l3 3"/></svg></button>
      <div class="field place-field"><label for="e-to">Drop-off</label><input id="e-to" required placeholder="Where to?" autocomplete="off"></div>
      <div class="field"><label for="e-date">Date</label><input type="date" id="e-date" data-datepicker data-placeholder="Any date" aria-label="Travel date"></div>
      <div class="field"><label for="e-pax">Travelers</label><select id="e-pax"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6+</option></select></div>
      <div class="srch-actions">
        <button class="btn btn-primary go" type="submit">Update</button>
        <button type="button" class="sl-cancel" id="sl-cancel" hidden onclick="cancelEdit()">Cancel</button>
      </div>
    </form>
    <p class="srch-err" id="srch-err" role="alert" hidden></p>
  </div>
</section>

<section class="section" style="padding-top:clamp(34px,4vw,52px)">
  <div class="wrap">
    <div class="route-head">
      <h1 id="route-title"></h1>
      <div class="route-meta" id="route-meta"></div>
      <a class="add-stops" id="add-stops" hidden></a>
      <p class="complex-route">Want a stop along the way, a day trip and back, or a longer route? <a href="https://wa.me/94779669662?text=Hi%20Ceylon%20Hop%2C%20I%27d%20like%20a%20quote%20for%20a%20custom%20route%20with%20a%20few%20stops." target="_blank" rel="noopener">Message us</a> — we'll price it in minutes.</p>
    </div>
    <div id="results"></div>
    <div class="srch-help" id="srch-help"></div>
    <div class="reassure">
      <div class="ra"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5l-8-3z"/></svg> Fully insured, vetted drivers</div>
      <div class="ra"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 5 5L20 7"/></svg> Free cancellation up to 24 hours before</div>
      <div class="ra"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> WhatsApp support, 7 days</div>
    </div>
  </div>
</section>

<div data-footer></div>
