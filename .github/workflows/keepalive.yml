name: keep-alive

# Pings the Render free instance so it doesn't spin down (which causes ~50s cold starts
# and, on the first request after idle, can make a booking fail). Best-effort: GitHub's
# scheduler is not exact and pauses after 60 days of repo inactivity.
on:
  schedule:
    - cron: '*/13 * * * *' # every 13 min (free instance sleeps after ~15 min idle)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -fsS --max-time 90 https://ceylon-hop-api.onrender.com/health || true
