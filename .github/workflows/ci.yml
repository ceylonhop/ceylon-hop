name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-check:
    name: api typecheck / lint / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ceylonhop_test
        ports: ['5432:5432']
        # Probe as the real role against the real DB. The default `pg_isready` runs as the
        # container's root user, which makes Postgres log a misleading `role "root" does not
        # exist` — noise, since the probe still passes, but it hides the real signal.
        options: >-
          --health-cmd "pg_isready -U postgres -d ceylonhop_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/ceylonhop_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: detect api/
        id: guard
        run: |
          if [ -f api/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No api/ yet — skipping API checks."
          fi
      - name: install api deps
        if: steps.guard.outputs.present == 'true'
        run: cd api && npm ci
      # The service health check can pass during Postgres's init double-start (it briefly
      # listens on an in-container socket to create the DB, is marked healthy, then restarts to
      # bind the mapped TCP port). Wait here for a real TCP connection from the runner so tests
      # never race a not-yet-listening server (the flaky `connection refused` + half-applied
      # migrations that surface as bogus assertion failures).
      - name: wait for postgres (real TCP connection from the runner)
        if: steps.guard.outputs.present == 'true'
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres -d ceylonhop_test >/dev/null 2>&1; then
              echo "postgres is accepting TCP connections"
              exit 0
            fi
            echo "waiting for postgres over TCP… ($i/30)"
            sleep 2
          done
          echo "::error::postgres never accepted a TCP connection — aborting before tests"
          exit 1
      # Apply the schema up front and fail loudly if it doesn't, so a migration failure is an
      # obvious red step, not a mystery `relation "…" does not exist` inside the test run.
      - name: migrate the test DB
        if: steps.guard.outputs.present == 'true'
        run: cd api && npm run migrate:test
      - name: api checks (typecheck + lint + test)
        if: steps.guard.outputs.present == 'true'
        run: cd api && npm run check

  web-tests:
    name: web-tests unit (SEO codegen + invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run web-tests unit suite (no browser)
        run: |
          if [ -f web-tests/package.json ]; then
            cd web-tests && npm ci && npm run test:unit
          else
            echo "No web-tests/ — skipping."
          fi

  codegen-fresh:
    name: generated files in sync with the backend rate card
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # `npm run generate` reads the backend rate card via api's dump:pricing (tsx), so the
      # generators need api deps installed. No DB is required — rateCard.ts is a static constant.
      - name: install api deps (generators read the rate card via api)
        run: |
          if [ -f api/package.json ]; then cd api && npm ci; fi
      - name: regenerate and fail if any committed generated file drifted
        run: |
          npm run generate
          if ! git diff --quiet; then
            echo "::error::Generated files are stale — run 'npm run generate' and commit the result. Prices/route pages must never ship out of sync with rateCard.ts."
            git --no-pager diff --stat
            exit 1
          fi
          echo "✓ generated files (routes / pricing / static / redirects) are in sync with the backend"
