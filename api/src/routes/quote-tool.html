<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ceylon Hop · Ops · Quote Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* Ceylon Hop Ops — base + layout + components CSS */
:root {
  --blue: #63BFD6;
  --blue-d: #3da6c0;
  --black: #3A3739;
  --cream: #F0EEE5;
  --cream-d: #e6e3d6;
  --orange: #F9A429;
  --red: #EC3A24;
  --teal: #0AB9B6;
  --teal-d: #089a97;

  --paper: #ffffff;
  --ink: #3A3739;
  --muted: #8b8780;
  --muted-2: #b4afa6;
  --line: #e7e3d8;
  --line-soft: #efece2;

  --r-lg: 18px;
  --r-md: 13px;
  --r-sm: 9px;
  --shadow-card: 0 1px 2px rgba(58,55,57,.04), 0 8px 24px rgba(58,55,57,.06);
  --shadow-pop: 0 12px 40px rgba(58,55,57,.16);
  --serif: "Bodoni Moda", "Didot", Georgia, serif;
  --sans: "Poppins", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--cream);
  background-image: radial-gradient(circle at 18% -8%, rgba(99,191,214,.10), transparent 42%),
                    radial-gradient(circle at 100% 0%, rgba(249,164,41,.07), transparent 38%);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.45;
}
h1, h2, h3 { margin: 0; font-weight: 600; }
input, select, textarea, button { font-family: inherit; }

/* ---------- App shell ---------- */
.ch-app { min-height: 100vh; padding-bottom: 64px; }
.ch-container { max-width: 1340px; margin: 0 auto; padding: 0 22px; }

/* ---------- Header ---------- */
.ch-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,.82);
  backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--line);
}
.ch-header-in { max-width: 1340px; margin: 0 auto; padding: 12px 22px; display: flex; align-items: center; gap: 18px; }
.ch-brand { display: flex; align-items: center; gap: 11px; }
.ch-mark {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: grid; place-items: center;
  font-family: var(--serif); font-weight: 700; font-size: 18px;
  box-shadow: 0 3px 0 var(--blue-d);
}
.ch-brand-txt { line-height: 1.05; }
.ch-brand-txt b { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: .2px; display: block; }
.ch-brand-txt span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 2.2px; color: var(--muted); }
.ch-header-spacer { flex: 1; }
.ch-header-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

/* ---------- Status select ---------- */
.ch-status {
  display: inline-flex; align-items: center; gap: 7px;
  border-radius: 999px; padding: 5px 6px 5px 12px;
  border: 1px solid var(--line); background: #fff;
  font-size: 12.5px; font-weight: 500;
}
.ch-status .dot { width: 9px; height: 9px; border-radius: 50%; }
.ch-status select { border: none; background: none; font-weight: 600; font-size: 12.5px; outline: none; cursor: pointer; color: var(--ink); }

/* ---------- Layout grid ---------- */
.ch-main { padding-top: 22px; display: grid; grid-template-columns: minmax(0, 1.62fr) minmax(320px, .92fr); gap: 20px; align-items: start; }
.ch-col-l { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.ch-col-r { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 86px; }
.ch-output-wrap { margin-top: 20px; }
@media (max-width: 1080px) {
  .ch-main { grid-template-columns: 1fr; }
  .ch-col-r { position: static; }
}

/* ---------- Card ---------- */
.ch-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-card); overflow: hidden; }
.ch-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--line-soft); }
.ch-card-head-l { display: flex; align-items: center; gap: 11px; }
.ch-card-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
.ch-card-head-l { min-width: 0; }
.ch-card-icon { width: 26px; height: 26px; border-radius: 8px; background: var(--black); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 600; opacity: .92; }
.ch-card-head-r { display: flex; align-items: center; gap: 10px; }
.ch-chev { font-size: 19px; color: var(--muted); transition: transform .2s; line-height: 1; }
.ch-chev.open { transform: rotate(180deg); }
.ch-card-body { padding: 18px; }
.ch-card-body.nopad { padding: 0; }
.ch-head-tools { display: flex; align-items: center; gap: 8px; }

/* ---------- Fields ---------- */
.ch-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
.ch-row:last-child { margin-bottom: 0; }
.ch-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0; }
.ch-field-label { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: flex; align-items: center; gap: 3px; }
.ch-field-label .req { color: var(--red); font-style: normal; }
.ch-field-hint { font-size: 11px; color: var(--red); }
.ch-card-body > .ch-field { margin-top: 14px; }

.ch-input-wrap { display: flex; align-items: center; gap: 0; background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-sm); padding: 0 10px; transition: border-color .15s, box-shadow .15s; }
.ch-input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }
.ch-input-wrap.invalid { border-color: var(--red); }
.ch-input { width: 100%; border: none; background: none; outline: none; padding: 9px 0; font-size: 14px; color: var(--ink); min-width: 0; }
.ch-input::placeholder { color: var(--muted-2); }
.ch-input-prefix, .ch-input-suffix { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
.ch-input-prefix { padding-right: 6px; }
.ch-input-suffix { padding-left: 6px; }
.ch-textarea { padding: 9px 10px; resize: vertical; border: 1.5px solid var(--line); border-radius: var(--r-sm); line-height: 1.5; }
.ch-textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }

.ch-select-wrap { position: relative; padding-right: 0; }
.ch-select { appearance: none; padding-right: 26px; cursor: pointer; background: none; }
.ch-select-chev { position: absolute; right: 10px; pointer-events: none; color: var(--muted); font-size: 15px; }

/* ---------- Segmented ---------- */
.ch-seg { display: inline-flex; background: var(--cream); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 3px; gap: 3px; width: 100%; }
.ch-seg-btn { flex: 1; border: none; background: none; padding: 7px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.ch-seg-btn.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }
.ch-seg.sm .ch-seg-btn { padding: 5px 8px; font-size: 12px; }

/* ---------- Toggle ---------- */
.ch-toggle-row { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
.ch-toggle { width: 38px; height: 22px; border-radius: 999px; background: var(--cream-d); position: relative; transition: background .18s; flex: none; border: 1px solid var(--line); }
.ch-toggle.on[data-tone="blue"] { background: var(--blue); border-color: var(--blue); }
.ch-toggle.on[data-tone="teal"] { background: var(--teal); border-color: var(--teal); }
.ch-toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .18s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.ch-toggle.on .ch-toggle-knob { transform: translateX(16px); }
.ch-toggle-label { font-size: 12.5px; font-weight: 600; color: var(--ink); }

/* ---------- Check ---------- */
.ch-check { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--ink); }
.ch-check input { display: none; }
.ch-check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line); display: grid; place-items: center; color: #fff; font-size: 12px; background: #fff; transition: all .15s; }
.ch-check input:checked + .ch-check-box { background: var(--blue); border-color: var(--blue); }

/* ---------- Buttons ---------- */
.ch-btn { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.ch-btn:disabled { opacity: .45; cursor: not-allowed; }
.ch-btn-icon { font-size: 13px; line-height: 1; }
.ch-btn-sm { padding: 6px 10px; font-size: 12px; }
.ch-btn-primary { background: var(--blue); color: #fff; box-shadow: 0 2px 0 var(--blue-d); }
.ch-btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
.ch-btn-teal { background: var(--teal); color: #fff; box-shadow: 0 2px 0 var(--teal-d); }
.ch-btn-dark { background: var(--black); color: #fff; }
.ch-btn-dark:hover { filter: brightness(1.2); }
.ch-btn-outline { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
.ch-btn-outline:hover { border-color: var(--blue); color: var(--blue-d); }
.ch-btn-ghost { background: var(--cream); color: var(--ink); }
.ch-btn-ghost:hover { background: var(--cream-d); }
.ch-btn-ghostdanger { background: none; color: var(--muted); padding: 6px 9px; }
.ch-btn-ghostdanger:hover { background: rgba(236,58,36,.1); color: var(--red); }
.ch-btn-dashed { background: #fff; color: var(--muted); border: 1.5px dashed var(--line); }
.ch-btn-dashed:hover { border-color: var(--orange); color: var(--orange); background: #fffdf8; }

/* ---------- Badge ---------- */
.ch-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.ch-badge.tone-slate { background: var(--cream); color: var(--muted); }
.ch-badge.tone-blue { background: rgba(99,191,214,.16); color: var(--blue-d); }
.ch-badge.tone-teal { background: rgba(10,185,182,.14); color: var(--teal-d); }
.ch-badge.tone-orange { background: rgba(249,164,41,.16); color: #c47d12; }
.ch-badge.tone-red { background: rgba(236,58,36,.13); color: var(--red); }

/* ---------- Rate settings ---------- */
.ch-lock-note { background: var(--cream); border-radius: var(--r-md); padding: 11px 14px; font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
.ch-rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
.ch-rate-grid.disabled { opacity: .55; pointer-events: none; }
.ch-rate-col { display: flex; flex-direction: column; gap: 3px; }
.ch-rate-group-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue-d); margin: 12px 0 4px; }
.ch-rate-col .ch-rate-group-title:first-child { margin-top: 0; }
.ch-rate-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 0; }
.ch-rate-label { font-size: 13px; font-weight: 500; display: flex; flex-direction: column; }
.ch-rate-hint { font-size: 10.5px; color: var(--muted-2); }
.ch-rate-control { width: 132px; flex: none; }
@media (max-width: 620px) { .ch-rate-grid { grid-template-columns: 1fr; gap: 8px; } }

/* ---------- Itinerary (premium timeline) ---------- */
.ch-empty { padding: 48px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.ch-empty-icon { font-size: 34px; }
.ch-empty-title { color: var(--muted); font-size: 14px; }

.ch-timeline-wrap { padding: 22px 24px 8px; }
.ch-timeline { position: relative; }

.ch-tl-item { position: relative; display: grid; grid-template-columns: 30px 1fr; gap: 16px; }
.ch-tl-rail { position: relative; display: flex; justify-content: center; }
/* continuous line down the rail */
.ch-tl-item:not(:last-child) .ch-tl-rail::before { content: ''; position: absolute; top: 6px; bottom: -6px; left: 50%; transform: translateX(-50%); width: 2px; border-left: 2px dotted var(--muted-2); opacity: .55; }
.ch-marker { position: relative; z-index: 1; width: 18px; height: 18px; border-radius: 50%; margin-top: 4px; display: grid; place-items: center; font-size: 9px; color: #fff; box-shadow: 0 0 0 4px var(--paper); flex: none; }
.ch-marker.tone-teal { background: var(--teal); }
.ch-marker.tone-red { background: var(--red); }
.ch-marker.tone-blue { background: var(--blue); }
.ch-marker.ring { background: #fff; border: 2.5px solid var(--blue); }
.ch-marker.stay { background: #fff; border: 2px dashed var(--muted-2); color: var(--muted); }

.ch-tl-body { min-width: 0; padding-bottom: 8px; }

/* card */
.ch-tl-card { background: var(--paper); border: 1.5px solid var(--line); border-radius: 16px; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; transition: border-color .15s, box-shadow .15s; }
.ch-tl-card:hover { border-color: var(--cream-d); box-shadow: var(--shadow-card); }
.ch-tl-card.tone-teal { border-top: 3px solid var(--teal); }
.ch-tl-card.tone-red { border-top: 3px solid var(--red); }
.ch-tl-card.tone-blue { border-top: 3px solid var(--blue); }

.ch-tl-head { display: flex; align-items: center; gap: 10px; }
.ch-tl-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px; padding: 4px 10px; border-radius: 999px; flex: none; }
.ch-tl-tag.tone-teal { background: rgba(10,185,182,.13); color: var(--teal-d); }
.ch-tl-tag.tone-red { background: rgba(236,58,36,.11); color: var(--red); }
.ch-tl-tag.tone-blue { background: rgba(99,191,214,.16); color: var(--blue-d); }
.ch-tl-cat { width: 175px; }
.ch-tl-cat .ch-input-wrap { padding: 0 10px; }
.ch-tl-cat .ch-input { padding: 6px 0; font-size: 12.5px; font-weight: 500; }
.ch-tl-actions { margin-left: auto; display: flex; gap: 6px; }
.ch-icon-btn { width: 30px; height: 30px; border: 1.5px solid var(--line); background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); display: grid; place-items: center; transition: all .15s; }
.ch-icon-btn:hover { border-color: var(--blue); color: var(--blue-d); }
.ch-icon-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(236,58,36,.06); }

.ch-tl-title-field { display: flex; flex-direction: column; gap: 4px; }
.ch-tl-title-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); }
.ch-tl-route { display: flex; align-items: flex-end; gap: 12px; }
.ch-tl-route .ch-tl-title-field { flex: 1 1 0; min-width: 0; }
.ch-route-sep { font-size: 22px; color: var(--muted-2); padding-bottom: 9px; flex: none; }
@media (max-width: 560px) { .ch-tl-route { flex-direction: column; align-items: stretch; gap: 8px; } .ch-route-sep { display: none; } }

/* place autocomplete */
.ch-ac { position: relative; }
.ch-tl-title-field .ch-ac { width: 100%; }
.ch-ac-menu { position: absolute; top: calc(100% + 5px); left: 0; right: 0; min-width: 230px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-pop); padding: 6px; z-index: 60; max-height: 264px; overflow-y: auto; }
.ch-ac-item { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: none; padding: 9px 10px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; color: var(--ink); font-family: var(--sans); }
.ch-ac-item:hover, .ch-ac-item.hi { background: var(--cream); }
.ch-ac-pin { font-size: 13px; flex: none; opacity: .85; }
.ch-ac-name { font-weight: 400; color: var(--muted); }
.ch-ac-name b { font-weight: 700; color: var(--ink); }
.ch-tl-title { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); border: 1.5px solid var(--line); background: #fff; outline: none; padding: 7px 12px; border-radius: 10px; width: 100%; line-height: 1.2; transition: border-color .15s, box-shadow .15s; }
.ch-tl-title:hover { border-color: var(--cream-d); }
.ch-tl-title:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }
.ch-tl-title::placeholder { color: var(--muted-2); font-style: italic; font-weight: 600; }

.ch-tl-from { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: -4px; }
.ch-from-lbl { font-size: 12px; color: var(--muted); }
.ch-from-in { border: none; border-bottom: 1.5px solid var(--line); background: none; padding: 2px 2px; font-size: 13.5px; font-weight: 500; color: var(--ink); outline: none; min-width: 80px; max-width: 180px; }
.ch-from-in:focus { border-bottom-color: var(--blue); }
.ch-from-in::placeholder { color: var(--muted-2); font-weight: 400; }

.ch-tl-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.ch-meta-date { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 999px; padding: 5px 12px; font-size: 12.5px; }
.ch-meta-date .ch-meta-ic { font-size: 12px; opacity: .8; }
.ch-meta-date input { border: none; background: none; outline: none; font-family: inherit; font-size: 12.5px; color: var(--ink); font-weight: 500; }
.ch-meta-dist { display: flex; align-items: center; }
.ch-dist-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 500; padding: 5px 12px; border-radius: 999px; background: var(--cream); color: var(--ink); }
.ch-dist-pill.auto { background: rgba(99,191,214,.12); color: var(--blue-d); }
.ch-dist-pill.warn { background: rgba(249,164,41,.13); color: #b9760f; }
.ch-dist-manual { display: flex; align-items: center; gap: 7px; }
.ch-link { border: none; background: none; color: currentColor; font-size: 11px; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; opacity: .75; }
.ch-link:hover { opacity: 1; }
.ch-meta-price { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; flex: none; }
.ch-price-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); white-space: nowrap; }
.ch-price-val { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); }

/* driver / car stay toggles */
.ch-tl-stays { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--line-soft); }
.ch-stay-toggle { display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid var(--line); background: #fff; border-radius: 10px; padding: 7px 12px; cursor: pointer; transition: all .15s; }
.ch-stay-toggle:hover { border-color: var(--muted-2); }
.ch-stay-ic { font-size: 15px; filter: grayscale(.4); opacity: .7; }
.ch-stay-lb { font-size: 13px; font-weight: 600; color: var(--muted); }
.ch-stay-state { font-size: 9px; font-weight: 800; letter-spacing: .6px; color: var(--muted-2); background: var(--cream); border-radius: 5px; padding: 2px 5px; }
.ch-stay-toggle.on { background: #fff; }
.ch-stay-toggle.on .ch-stay-ic { filter: none; opacity: 1; }
.ch-stay-toggle.on .ch-stay-lb { color: var(--ink); }
.ch-stay-toggle.on.tone-teal { border-color: var(--teal); background: rgba(10,185,182,.07); }
.ch-stay-toggle.on.tone-teal .ch-stay-state { background: var(--teal); color: #fff; }
.ch-stay-toggle.on.tone-blue { border-color: var(--blue); background: rgba(99,191,214,.08); }
.ch-stay-toggle.on.tone-blue .ch-stay-state { background: var(--blue); color: #fff; }
.ch-stays-note { font-size: 11.5px; color: var(--teal-d); font-weight: 600; }

.ch-tl-fees { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.ch-fee { display: inline-flex; align-items: center; gap: 9px; }
.ch-note-in { border: 1px solid var(--line); background: #fcfbf7; border-radius: var(--r-sm); padding: 8px 11px; font-size: 12.5px; outline: none; font-family: inherit; color: var(--ink); width: 100%; }
.ch-note-in:focus { border-color: var(--blue); background: #fff; }

.ch-timeline-add { display: flex; gap: 10px; padding: 6px 0 4px 46px; flex-wrap: wrap; }
.ch-timeline-hint { padding: 12px 24px 18px 46px; font-size: 12px; color: var(--muted); }
.ch-timeline-hint b { color: var(--ink); font-weight: 600; }

.ch-cur-toggle { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--muted); font-weight: 500; }
.ch-cur-toggle .ch-seg { width: 100px; }

/* ---------- Summary ---------- */
/* .ch-km base kept — the money-pane km line reuses .ch-km.hero (overridden there). */
.ch-km b { font-family: var(--serif); font-weight: 700; line-height: 1; }
.ch-line { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 4px 0; font-size: 13px; }
.ch-line-label { color: var(--muted); white-space: nowrap; }
.ch-line-label i { font-style: normal; color: var(--muted-2); font-size: 11.5px; }
.ch-line-val { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.ch-line.strong { border-top: 1px solid var(--line); margin-top: 5px; padding-top: 9px; }
.ch-line.strong .ch-line-label { color: var(--ink); font-weight: 600; }
.ch-line.strong .ch-line-val { font-family: var(--serif); font-size: 21px; font-weight: 700; }
/* USD-primary display: small muted LKR reference under a value */
.ch-val-sub { display: block; font-size: 10.5px; font-weight: 400; color: var(--muted-2); font-family: var(--sans); line-height: 1.3; text-align: right; }
.ch-margin { font-size: 11.5px; color: var(--teal-d); text-align: right; margin-top: 3px; font-weight: 600; }
.ch-tip { background: rgba(99,191,214,.1); border-radius: var(--r-md); padding: 11px 13px; font-size: 12.5px; color: var(--black); margin-top: 13px; line-height: 1.5; }
.ch-tip b { color: var(--blue-d); }

/* ---------- Flags ---------- */
.ch-flags-clear { color: var(--teal-d); font-size: 13px; font-weight: 500; padding: 4px 0; }
.ch-flags { display: flex; flex-direction: column; gap: 9px; }
.ch-flag { display: flex; gap: 11px; padding: 11px 13px; border-radius: var(--r-md); }
.ch-flag-mark { font-size: 13px; line-height: 1.4; flex: none; }
.ch-flag.tone-red { background: rgba(236,58,36,.08); }
.ch-flag.tone-red .ch-flag-mark { color: var(--red); }
.ch-flag.tone-orange { background: rgba(249,164,41,.1); }
.ch-flag.tone-orange .ch-flag-mark { color: var(--orange); }
.ch-flag.tone-blue { background: rgba(99,191,214,.1); }
.ch-flag.tone-blue .ch-flag-mark { color: var(--blue-d); }
.ch-flag-title { font-weight: 600; font-size: 13px; }
.ch-flag-detail { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 2px; }

/* ---------- Output ---------- */
.ch-tabs { display: flex; gap: 4px; background: var(--cream); padding: 4px; border-radius: var(--r-md); margin-bottom: 14px; }
.ch-tab { flex: 1; border: none; background: none; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.ch-tab.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }
.ch-output-body { min-height: 120px; }
.ch-pre { font-family: var(--sans); font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--cream); border-radius: var(--r-md); padding: 16px 18px; margin: 0; color: var(--ink); }
.ch-pre.mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; }
.ch-email-subject { font-size: 13px; margin-bottom: 10px; padding: 10px 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--r-sm); }
.ch-email-subject span { font-size: 10.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted-2); margin-right: 8px; }
.ch-internal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.ch-internal-grid > div { background: var(--cream); border-radius: var(--r-sm); padding: 9px 11px; }
.ch-internal-grid span { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted-2); display: block; }
.ch-internal-grid b { font-size: 13.5px; }
.ch-itable { width: 100%; border-collapse: collapse; }
.ch-itable td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--line-soft); }
.ch-itable td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.ch-itable tr.sec td { color: var(--muted); }
.ch-itable tr.hi td { font-weight: 700; }
.ch-itable tr.hi.blue td:last-child { color: var(--blue-d); }
.ch-itable tr.hi.teal td:last-child { color: var(--teal-d); }
.ch-internal-note { font-size: 11.5px; color: var(--muted-2); margin-top: 12px; font-style: italic; }
@media (max-width: 520px) { .ch-internal-grid { grid-template-columns: repeat(2, 1fr); } }

/* ---------- Toast ---------- */
.ch-toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: #fff; padding: 12px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-pop); opacity: 0; pointer-events: none; transition: all .25s; z-index: 100; display: flex; align-items: center; gap: 8px; }
.ch-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.ch-toast .tick { color: var(--teal); }

/* ---------- Recent quotes ---------- */
.ch-recent-panel { margin-top: 18px; }
.ch-recent-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted-2); margin-bottom: 8px; }
.ch-recent-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); flex-wrap: wrap; }
.ch-recent-row:last-child { border-bottom: none; }
.ch-recent-ref { font-size: 12px; font-weight: 700; color: var(--teal-d); min-width: 70px; cursor: pointer; }
.ch-recent-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 80px; }
.ch-recent-total { font-size: 12.5px; font-weight: 600; color: var(--muted); min-width: 90px; text-align: right; }

/* ══════════════════════════════════════════════════════════════════════════
   COCKPIT LAYOUT (two-pane) — reuses every brand token above
   ══════════════════════════════════════════════════════════════════════════ */

/* header extras */
.ch-header-tools .ch-btn-sm { padding: 7px 11px; }

/* two-pane grid */
.ch-cockpit { padding-top: 20px; display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 20px; align-items: start; }
.ch-editor { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.ch-money { position: sticky; top: 84px; display: flex; flex-direction: column; gap: 0; }
@media (max-width: 960px) {
  .ch-cockpit { grid-template-columns: 1fr; }
  .ch-money { position: static; }
}

/* section micro-label (matches the customer-strip label style — no serif floaters) */
.ch-sec { }
.ch-sec-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 6px 0 10px; }
.ch-sec-head h2 { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.ch-sec-head-r { display: flex; align-items: center; gap: 8px; }

/* ---------- Customer strip (one compact row) ---------- */
.ch-cust-strip { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-card); padding: 12px 14px; }
.ch-cust-grid { display: grid; grid-template-columns: minmax(120px, 1.4fr) minmax(120px, 1.4fr) 84px 84px minmax(140px, 1fr); gap: 12px; align-items: end; }
.ch-cust-grid .ch-field { gap: 4px; }
.ch-cust-grid .ch-field-label { font-size: 10px; letter-spacing: .5px; }
.ch-cust-grid .ch-input { padding: 7px 0; }
@media (max-width: 720px) { .ch-cust-grid { grid-template-columns: 1fr 1fr; } }

/* ---------- Dense itinerary rows ---------- */
.ch-legs { display: flex; flex-direction: column; gap: 8px; container-type: inline-size; container-name: legs; }
/* .ch-leg also carries .ch-tl-item (e2e hook) whose legacy timeline rule sets
   display:grid — override it back to a plain block so the two rows stack. */
.ch-leg.ch-tl-item { display: block; grid-template-columns: none; gap: 0; }
.ch-leg { position: relative; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-card); overflow: visible; transition: border-color .15s, box-shadow .15s; }
.ch-leg:hover { border-color: var(--cream-d); }
.ch-leg.tone-teal { border-left: 3px solid var(--teal); }
.ch-leg.tone-red { border-left: 3px solid var(--red); }
.ch-leg.tone-blue { border-left: 3px solid var(--blue); }
.ch-leg.tone-stay { border-left: 3px dashed var(--muted-2); }

/* main compact row (~56px) */
.ch-leg-main { display: flex; align-items: center; gap: 10px; padding: 9px 12px; min-height: 56px; }
.ch-leg-reorder { display: flex; flex-direction: column; gap: 2px; flex: none; }
.ch-mini-btn { width: 22px; height: 20px; border: 1px solid var(--line); background: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; color: var(--muted); display: grid; place-items: center; line-height: 1; padding: 0; transition: all .15s; }
.ch-mini-btn:hover { border-color: var(--blue); color: var(--blue-d); }
.ch-mini-btn:disabled { opacity: .3; cursor: default; }
.ch-mini-btn.danger:hover { border-color: var(--red); color: var(--red); }

.ch-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.ch-leg-dot.tone-teal { background: var(--teal); }
.ch-leg-dot.tone-red { background: var(--red); }
.ch-leg-dot.tone-blue { background: var(--blue); }
.ch-leg-dot.tone-stay { background: #fff; border: 2px dashed var(--muted-2); }

.ch-leg-kind { flex: none; }
.ch-leg-kind .ch-seg { padding: 2px; }
.ch-leg-kind .ch-seg-btn { padding: 4px 8px; font-size: 11px; }

/* route inputs — normal 14px, not the 21px serif */
.ch-leg-route { display: flex; align-items: center; gap: 7px; flex: 1 1 auto; min-width: 0; }
.ch-leg-ac { position: relative; flex: 1 1 0; min-width: 60px; }
.ch-leg-in { width: 100%; border: 1px solid var(--line); background: #fff; border-radius: 7px; padding: 7px 9px; font-size: 14px; font-weight: 500; color: var(--ink); outline: none; font-family: var(--sans); transition: border-color .15s, box-shadow .15s; min-width: 0; }
.ch-leg-in:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.16); }
.ch-leg-in::placeholder { color: var(--muted-2); }
.ch-leg-arrow { color: var(--muted-2); font-size: 14px; flex: none; }

.ch-leg-date { flex: none; }
.ch-leg-date input { border: 1px solid var(--line); background: var(--cream); border-radius: 7px; padding: 6px 8px; font-size: 12px; font-family: inherit; color: var(--ink); outline: none; }
.ch-leg-date input:focus { border-color: var(--blue); background: #fff; }

.ch-leg-dist { flex: none; display: flex; align-items: center; gap: 4px; }
.ch-leg-price { flex: none; font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--ink); min-width: 54px; text-align: right; }
.ch-leg-price.empty { color: var(--muted-2); font-family: var(--sans); font-size: 12px; font-weight: 500; }
.ch-leg-actions { display: flex; gap: 4px; flex: none; }

/* second thin line: add-ons chip row (always present on point-to-point driving legs) */
.ch-leg-addonrow { padding: 0 12px 8px 44px; margin-top: -2px; }
/* empty state: a quiet inline text action, not an orphaned button */
.ch-addon-add { border: none; background: none; color: var(--muted); font-size: 11.5px; font-weight: 500; cursor: pointer; padding: 0; }
.ch-addon-add:hover { color: var(--orange); text-decoration: underline; text-underline-offset: 2px; }
/* active state: a solid pill naming the fees */
.ch-addon-chip.on { display: inline-flex; align-items: center; gap: 4px; border: 1px solid transparent; background: rgba(249,164,41,.13); color: #b9760f; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
.ch-addon-chip.on:hover { border-color: rgba(185,118,15,.4); }
.ch-dist-time { color: var(--muted); font-weight: 400; margin-left: 5px; padding-left: 6px; border-left: 1px solid currentColor; opacity: .55; }

/* second thin line: add-on toggles (only when the popover is open) */
.ch-leg-addons { padding: 8px 12px 10px 44px; border-top: 1px solid var(--line-soft); display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

/* dense-row responsive: when the EDITOR PANE (not the viewport) is too narrow to
   keep From→To readable alongside the date/distance/action controls, drop the
   route onto its own full-width line below the controls. Keyed to the container
   so it fires in the two-pane cockpit (editor ~590px) on any monitor size. */
@container legs (max-width: 620px) {
  .ch-leg-main { flex-wrap: wrap; }
  .ch-leg-route { flex: 1 1 100%; order: 5; }
}
/* Fallback for browsers without container queries: key off the viewport. */
@supports not (container-type: inline-size) {
  @media (max-width: 1180px) {
    .ch-leg-main { flex-wrap: wrap; }
    .ch-leg-route { flex: 1 1 100%; order: 5; }
  }
}

.ch-legs-add { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }

/* ══════════════════════════════════════════════════════════════════════════
   Money pane — ONE cohesive card, tight vertical rhythm
   ══════════════════════════════════════════════════════════════════════════ */
.ch-money-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-card); overflow: hidden; }

/* shared hairline divider inside the card */
.ch-money-rule { height: 1px; background: var(--line-soft); margin: 0; }

/* micro-label (matches the customer-strip label style) */
.ch-money-micro { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

/* --- 1. Service chooser = the card head (two price boxes that ARE the chooser) --- */
.ch-svc-choose { display: flex; gap: 10px; padding: 14px 16px; }
.ch-svc-box { flex: 1 1 0; min-width: 0; text-align: left; border: 1.5px solid var(--line); background: #fff; border-radius: var(--r-md); padding: 10px 12px; cursor: pointer; transition: border-color .15s, background .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 3px; font-family: var(--sans); }
.ch-svc-box:hover:not(:disabled):not(.active) { border-color: var(--muted-2); }
.ch-svc-box.active { border-color: var(--teal); background: rgba(10,185,182,.06); box-shadow: 0 0 0 1px var(--teal) inset; }
.ch-svc-box:disabled { cursor: not-allowed; background: var(--cream); border-color: var(--line); }
.ch-svc-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.ch-svc-box.active .ch-svc-lbl { color: var(--teal-d); }
.ch-svc-price { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.1; }
.ch-svc-box:not(.active) .ch-svc-price { color: var(--muted); }
.ch-svc-box:disabled .ch-svc-price { color: var(--muted-2); }
.ch-svc-sub { display: block; margin-top: 2px; font-size: 10px; font-weight: 400; color: var(--muted-2); font-family: var(--sans); line-height: 1.2; }
.ch-svc-hint { font-size: 10.5px; color: var(--muted); line-height: 1.3; font-weight: 500; }
.ch-svc-box:disabled .ch-svc-hint { color: var(--muted-2); }
.ch-svc-caption { padding: 0 16px 12px; font-size: 11.5px; color: var(--teal-d); line-height: 1.4; font-weight: 500; margin-top: -4px; }

/* --- 2. km line — one text line, not tiles --- */
.ch-money-body { padding: 14px 16px; }
.ch-km-line { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 10px; line-height: 1.4; }
.ch-km-line .ch-km.hero { font-family: var(--serif); font-weight: 700; font-size: 14px; color: var(--ink); background: none; padding: 0; border-radius: 0; display: inline; }

/* build-up lines (tightened) */
.ch-money-body .ch-line { padding: 4px 0; }

/* quote total — the big serif moment */
.ch-total { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 12px; display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.ch-total-lbl { font-size: 11px; font-weight: 600; color: var(--ink); text-transform: uppercase; letter-spacing: .5px; }
.ch-total-val { text-align: right; line-height: 1.05; }
.ch-total-usd { font-family: var(--serif); font-size: 30px; font-weight: 700; color: var(--ink); }
.ch-total-lkr { display: block; font-size: 12px; color: var(--muted-2); font-weight: 400; margin-top: 1px; }

/* deposit / due-now highlighted chip row (chauffeur) */
.ch-deposit-chip { margin-top: 12px; background: rgba(10,185,182,.08); border: 1px solid rgba(10,185,182,.22); border-radius: var(--r-md); padding: 9px 12px; display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.ch-deposit-chip .dep-lbl { font-size: 12px; color: var(--teal-d); font-weight: 600; }
.ch-deposit-chip .dep-val { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--teal-d); font-variant-numeric: tabular-nums; }
.ch-deposit-note { font-size: 10.5px; color: var(--muted); margin-top: 4px; line-height: 1.35; }

/* margin — small teal line */
.ch-money-body .ch-margin { margin-top: 8px; }

/* empty / error state */
.ch-money-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 22px 0; }

/* --- FLAGS — slim severity rows inside the same card, under a hairline --- */
.ch-flags-mini { padding: 12px 16px; }
.ch-flags-mini .ch-flags { gap: 7px; }
.ch-flags-mini .ch-flag { padding: 8px 11px; }
.ch-flags-mini .ch-flags-clear { padding: 2px 2px; }

/* --- OUTPUT — tab bar + copy at the card foot --- */
.ch-out-collapse { border-top: 1px solid var(--line-soft); }
.ch-out-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 12px 16px; background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.ch-out-toggle:hover { color: var(--ink); }
.ch-out-toggle .ch-chev { font-size: 16px; }
.ch-out-panel { padding: 0 16px 16px; }
.ch-out-panel .ch-tabs { margin-bottom: 12px; }

/* ---------- Slide-in drawer (Recent) ---------- */
.ch-scrim { position: fixed; inset: 0; background: rgba(58,55,57,.32); backdrop-filter: blur(2px); z-index: 90; opacity: 0; transition: opacity .2s; }
.ch-scrim.show { opacity: 1; }
.ch-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 90vw; background: var(--paper); box-shadow: var(--shadow-pop); z-index: 91; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .24s cubic-bezier(.4,0,.2,1); }
.ch-drawer.show { transform: translateX(0); }
.ch-drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--line); }
.ch-drawer-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.ch-drawer-body { padding: 8px 20px 24px; overflow-y: auto; flex: 1; }
.ch-x-btn { width: 32px; height: 32px; border: 1px solid var(--line); background: #fff; border-radius: 8px; cursor: pointer; font-size: 16px; color: var(--muted); display: grid; place-items: center; line-height: 1; }
.ch-x-btn:hover { border-color: var(--red); color: var(--red); }
.ch-drawer-empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }

/* ---------- Modal overlay (Rate Settings) ---------- */
.ch-modal { position: fixed; inset: 0; z-index: 92; display: grid; place-items: center; padding: 24px; }
.ch-modal-card { position: relative; z-index: 93; background: var(--paper); border-radius: var(--r-lg); box-shadow: var(--shadow-pop); width: min(680px, 100%); max-height: 86vh; overflow: hidden; display: flex; flex-direction: column; }
.ch-modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--line); }
.ch-modal-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.ch-modal-body { padding: 18px 20px 22px; overflow-y: auto; }
</style>

<body>

<div class="ch-app" id="app">
  <!-- rendered by render() -->
</div>

<!-- Toast lives outside #app so render() never destroys it -->
<div class="ch-toast" id="ch-toast">
  <span class="tick">&#x2713;</span>
  <span class="ch-toast-msg"></span>
</div>

<script>
'use strict';

// ── HTML escape helper ────────────────────────────────────────────────────────
function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Status tone map ───────────────────────────────────────────────────────────
const STATUS_TONE = {
  'draft':   'var(--muted-2)',
  'sent':    'var(--blue)',
  'won':     'var(--orange)',
  'lost':    'var(--red)',
  'expired': 'var(--muted)',
};

const STATUS_LABELS = {
  'draft':   'Draft',
  'sent':    'Sent',
  'won':     'Booked',
  'lost':    'Lost',
  'expired': 'Expired',
};

// ── Rate card (fetched once on load) ─────────────────────────────────────────
var rateCard = null;

// ── I1: once-guard for app-node delegated listeners ──────────────────────────
var _delegatesWired = false;

// ── Cockpit overlay state ─────────────────────────────────────────────────────
var drawerOpen = false;   // Recent quotes slide-in drawer
var ratesOpen = false;    // Rate Settings modal
// Output section: tri-state (null = follow layout default: open when two-pane
// ≥960px, collapsed when stacked; true/false = operator's explicit choice).
var outputOpen = null;
// Per-leg add-on line visibility: legId → bool (private legs only)
var legAddonsOpen = {};

// ── Estimate state ────────────────────────────────────────────────────────────
var lastEstimate = null;   // last successful /estimate response
var lastEstimateError = null; // string | null
var _estimateTimer = null;
// V8: monotonic sequence so a slow /estimate response can't overwrite a newer one.
var _estimateSeq = 0;

// All vehicle tiers have rates — no gating
var GATED_VEHICLES = {};

var VEHICLE_LABELS = {
  car:    'Car',
  van_6:  'Van 6 Seat',
  van_9:  'Van 9 Seat',
  van_14: 'Van 14 Seat',
  custom: 'Custom',
};

// V12: map tool vehicle ids → engine rate-card tiers so caps come from server truth.
var VEHICLE_ENGINE_TIER = {
  car:    'car',
  van_6:  'van',
  van_9:  'van9',
  van_14: 'van14',
  custom: 'custom',
};

// V12: derive { pax, bags } caps from the cached rate-card. Returns null until the
// rate card has loaded (so we never flag against stale defaults) and for 'custom'
// (exempt from the capacity flag; its caps are 99/99 anyway).
function vehicleCaps(toolId) {
  if (!rateCard || !rateCard.vehicle) return null;
  if (toolId === 'custom') return null;
  var tier = VEHICLE_ENGINE_TIER[toolId];
  var v = tier ? rateCard.vehicle[tier] : null;
  if (!v) return null;
  return { pax: v.maxPax, bags: v.maxBags };
}

// Driving categories (for flag computation) — slim set (R4). Anything not a
// stay day drives; stay_day is the only non-driving category.
var DRIVING_CATS = {
  transfer: true, train_support: true, airport: true,
};

function refreshEstimate() {
  clearTimeout(_estimateTimer);
  _estimateTimer = setTimeout(function() {
    _runEstimate();
  }, 350);
}

async function _runEstimate() {
  var st = state;
  // V8: claim a sequence number; a later _runEstimate bumps it, invalidating us.
  var seq = ++_estimateSeq;

  // Fix 1: no vehicle chosen yet — don't price, prompt the operator to pick one.
  if (!st.vehicleType) {
    lastEstimate = null;
    lastEstimateError = 'Choose a vehicle type to price this trip.';
    render();
    return;
  }

  // Gate: gated vehicle types — skip server call entirely
  if (GATED_VEHICLES[st.vehicleType]) {
    lastEstimate = null;
    var label = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
    lastEstimateError = 'No rate set for ' + label + ' yet — pick Car or Van 6, or add its rate.';
    render();
    return;
  }

  // Build the payload (Task 2 mapping)
  var payload = {
    service: st.service || 'private',
    vehicle: st.vehicleType,
    passengerCount: st.passengerCount,
    luggageCount: st.luggageCount,
    legs: st.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        addSafariWait:    !!leg.addSafariWait,
      };
    }),
  };

  var result = await apiEstimate(payload);

  // V8: a newer estimate started while we awaited — drop this stale result.
  if (seq !== _estimateSeq) return;

  if (result.error) {
    lastEstimate = null;
    // Friendly version for the common unknown-distance case
    var msg = result.error;
    if (/unknown distance|no distance|distance not found/i.test(msg)) {
      msg = 'Add distances to price this trip.';
    }
    lastEstimateError = msg;
    render();
    return;
  }

  lastEstimate = result;
  lastEstimateError = null;
  render();
}

// ── State model ───────────────────────────────────────────────────────────────
let legSeq = 0;

function newLeg() {
  return {
    id: 'leg_' + (legSeq++),
    category: 'transfer',
    pickupLocation: '',
    dropoffLocation: '',
    distanceKm: 0,
    driveTimeHours: 0,
    manualDistance: false,
    autoMatched: false,
    addSightseeingFee: false,
    addWaitingFee: false,
    addSafariWait: false,
    notes: '',
    date: '',
  };
}

let state = {
  id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
  customerName: '',
  contact: '',
  passengerCount: 2,
  luggageCount: 2,
  vehicleType: null,
  service: 'private',
  outputCurrency: 'USD',
  status: 'draft',
  legs: [newLeg()],
};

// ── State mutators ────────────────────────────────────────────────────────────
function mutate(patch) {
  Object.assign(state, patch);
  // Re-estimate if any pricing-affecting field changed
  if ('vehicleType' in patch || 'passengerCount' in patch || 'luggageCount' in patch) {
    refreshEstimate();
  }
  render();
}

// R1/R3: set the chosen service. Flipping to private converts any stay_day leg to
// a transfer so no stay_day is ever sent under private (backend Zod 400s otherwise).
function setService(service) {
  if (service !== 'private' && service !== 'chauffeur') service = 'private';
  if (service === state.service) return;
  state.service = service;
  if (service === 'private') {
    state.legs = state.legs.map(function(leg) {
      return leg.category === 'stay_day'
        ? Object.assign({}, leg, { category: 'transfer' })
        : leg;
    });
  }
  refreshEstimate();
  render();
}

// Count distinct leg dates — chauffeur needs >1 to be feasible (R6).
function distinctLegDateCount() {
  var seen = {};
  state.legs.forEach(function(leg) {
    if (leg.date) seen[leg.date] = true;
  });
  return Object.keys(seen).length;
}

function updateLeg(id, patch) {
  state.legs = state.legs.map(function(leg) {
    return leg.id === id ? Object.assign({}, leg, patch) : leg;
  });
  refreshEstimate();
  render();
}

function addLeg(cat) {
  var prev = state.legs.length > 0 ? state.legs[state.legs.length - 1] : null;
  var leg = newLeg();
  leg.category = cat || 'transfer';
  if (prev) {
    leg.pickupLocation = prev.dropoffLocation || '';
    if (cat === 'stay_day') {
      leg.dropoffLocation = prev.dropoffLocation || '';
    }
    // Auto-increment date by 1 day
    if (prev.date) {
      // V6: parse + format locally so the +1-day roll never shifts under any TZ.
      var d = parseISODateLocal(prev.date);
      d.setDate(d.getDate() + 1);
      leg.date = fmtISODateLocal(d);
    }
  }
  state.legs = state.legs.concat([leg]);
  refreshEstimate();
  render();
}

function removeLeg(id) {
  state.legs = state.legs.filter(function(leg) { return leg.id !== id; });
  refreshEstimate();
  render();
}

// Fix 5: swap a leg with its neighbour. Order affects the date-order flag,
// TRIP START/FINAL STOP tags, and template row order; breakdown alignment
// recomputes off the new order automatically.
function moveLeg(id, dir) {
  var idx = state.legs.findIndex(function(leg) { return leg.id === id; });
  if (idx < 0) return;
  var target = idx + dir;
  if (target < 0 || target >= state.legs.length) return;
  var next = state.legs.slice();
  var tmp = next[idx];
  next[idx] = next[target];
  next[target] = tmp;
  state.legs = next;
  refreshEstimate();
  render();
}

function dupLeg(id) {
  var idx = state.legs.findIndex(function(leg) { return leg.id === id; });
  if (idx < 0) return;
  var src = state.legs[idx];
  var copy = Object.assign({}, src, { id: 'leg_' + (legSeq++) });
  var next = state.legs.slice(0, idx + 1).concat([copy]).concat(state.legs.slice(idx + 1));
  state.legs = next;
  refreshEstimate();
  render();
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, opts) {
  opts = opts || {};
  var headers = Object.assign({}, opts.headers || {});
  var k = localStorage.getItem('chAdminKey');
  if (k) headers['x-admin-key'] = k;
  var res = await fetch(path, Object.assign({}, opts, { headers: headers }));
  if (res.status === 401) {
    var entered = prompt('Enter admin key:');
    if (entered) {
      localStorage.setItem('chAdminKey', entered);
      headers['x-admin-key'] = entered;
      res = await fetch(path, Object.assign({}, opts, { headers: headers }));
    }
  }
  return res;
}

// V9: parse a JSON body defensively — res.json() throws on empty/non-JSON bodies.
async function jsonOrNull(res) {
  try { return await res.json(); } catch (e) { return null; }
}
// V9: build a consistent { error } from a non-ok response.
async function errPayload(res) {
  var body = await jsonOrNull(res);
  return { error: (body && body.error) ? body.error : ('HTTP ' + res.status) };
}

// V9: one-shot flag so a 401 during autocomplete doesn't spam a toast per keystroke.
var _authToastShown = false;

async function apiPlaces(q) {
  try {
    var r = await api('/admin/quote/places?q=' + encodeURIComponent(q));
    if (!r.ok) {
      // Only surface an auth problem (after the api() retry) — and only once.
      if (r.status === 401 && !_authToastShown) {
        _authToastShown = true;
        showToast('Not authenticated — check the admin key');
      }
      return [];
    }
    var d = await jsonOrNull(r);
    return (d && d.places) ? d.places : [];
  } catch (e) { return []; }
}

async function apiDistance(from, to) {
  try {
    var r = await api('/admin/quote/distance', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ from: from, to: to }),
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiEstimate(payload) {
  try {
    var r = await api('/admin/quote/estimate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Estimate failed' };
  } catch (e) { return { error: 'Network error' }; }
}

async function apiRateCard() {
  try {
    var r = await api('/admin/quote/rate-card');
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiSave(payload) {
  try {
    var r = await api('/admin/quote/save', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Save failed' };
  } catch (e) { return { error: 'Network error' }; }
}

async function apiList(filter) {
  try {
    var qs = filter ? '?' + new URLSearchParams(filter).toString() : '';
    var r = await api('/admin/quote/list' + qs);
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'List failed' };
  } catch (e) { return { error: 'Network error' }; }
}

async function apiPatch(id, patch) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(patch),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Update failed' };
  } catch (e) { return { error: 'Network error' }; }
}

// V19: fetch a full saved quote (incl. request.tool) for reopening.
async function apiGetQuote(id) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id));
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Load failed' };
  } catch (e) { return { error: 'Network error' }; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('ch-toast');
  if (!el) return;
  el.querySelector('.ch-toast-msg').textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── Action handlers ───────────────────────────────────────────────────────────
function newQuote() {
  if (!confirm('Start a new quote? Unsaved changes will be lost.')) return;
  legSeq = 0;
  state = {
    id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
    customerName: '',
    contact: '',
    passengerCount: 2,
    luggageCount: 2,
    vehicleType: null,
    service: 'private',
    outputCurrency: 'USD',
    status: 'draft',
    legs: [newLeg()],
    savedId: null,
    reference: null,
  };
  lastEstimate = null;
  lastEstimateError = null;
  outputTab = 'whatsapp';
  outputOpen = null; // back to the layout default
  refreshEstimate();
  render();
  showToast('New quote started');
}

function savePayload() {
  return {
    name: state.customerName,
    contact: state.contact,
    service: state.service || 'private',
    vehicle: state.vehicleType,
    passengerCount: state.passengerCount,
    luggageCount: state.luggageCount,
    legs: state.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        addSafariWait:    !!leg.addSafariWait,
      };
    }),
  };
}

async function saveQuote() {
  if (!state.vehicleType) {
    showToast('Choose a vehicle type first');
    return;
  }
  var payload = savePayload();
  var res = await apiSave(payload);
  if (res && res.id) {
    state.savedId = res.id;
    state.reference = res.reference || res.id;
    var ref = res.reference || res.id;
    // V5: /save always persists 'draft' — if the operator picked another status
    // before the first save, sync it now via PATCH.
    var statusSynced = true;
    if (state.status !== 'draft') {
      var patchRes = await apiPatch(state.savedId, { status: state.status });
      if (!patchRes || patchRes.error) statusSynced = false;
    }
    // Load recent first (triggers render), then show toast so it survives
    var listResult = await apiList();
    if (listResult && listResult.quotes) {
      recentQuotes = listResult.quotes;
    }
    render();
    if (statusSynced) {
      showToast('Saved as ' + ref);
    } else {
      showToast('Saved as ' + ref + ', but status sync failed');
    }
  } else {
    var errMsg = (res && res.error) ? res.error : 'Save failed';
    showToast(errMsg);
  }
}

// ── Reopen a saved quote (V19) ────────────────────────────────────────────────
async function reopenQuote(id) {
  if (!id) return;
  var q = await apiGetQuote(id);
  if (!q || q.error) {
    showToast('Could not open quote — ' + ((q && q.error) || 'unknown error'));
    return;
  }
  var tool = q.request && q.request.tool;
  if (!tool) {
    // Legacy row saved before the { tool, engine } shape.
    showToast('This quote was saved before reopen support — re-create it to edit.');
    return;
  }

  // Map persisted tool legs (from/to) back to state legs (pickup/dropoff).
  legSeq = 0;
  var legs = (tool.legs || []).map(function(tl) {
    var leg = newLeg();
    leg.category = tl.category || 'transfer';
    leg.pickupLocation = tl.from || '';
    leg.dropoffLocation = tl.to || '';
    leg.distanceKm = tl.distanceKm || 0;
    // Treat the persisted distance as manual so prices don't re-resolve differently.
    leg.manualDistance = (tl.distanceKm || 0) > 0;
    leg.date = tl.date || '';
    leg.addSightseeingFee = !!tl.addSightseeingFee;
    leg.addWaitingFee = !!tl.addWaitingFee;
    leg.addSafariWait = !!tl.addSafariWait;
    return leg;
  });
  if (legs.length === 0) legs = [newLeg()];

  state.customerName = q.customerName || tool.name || '';
  state.contact = q.customerContact || tool.contact || '';
  state.vehicleType = tool.vehicle || state.vehicleType;
  state.service = (tool.service === 'chauffeur') ? 'chauffeur' : 'private';
  state.passengerCount = Math.max(1, parseInt(tool.passengerCount, 10) || 1);
  state.luggageCount = Math.max(0, parseInt(tool.luggageCount, 10) || 0);
  state.legs = legs;
  state.status = q.status || 'draft';
  state.savedId = q.id;
  state.reference = q.reference || q.id;

  lastEstimate = null;
  lastEstimateError = null;
  render();
  refreshEstimate();
  showToast('Reopened ' + (q.reference || q.id));
}

// ── Leg tone helpers ──────────────────────────────────────────────────────────
function legTone(idx, total, cat) {
  if (idx === 0) return 'teal';
  if (idx === total - 1) return 'red';
  if (cat === 'stay_day') return 'stay';
  return 'blue';
}

function legTagLabel(idx, total) {
  if (idx === 0) return 'TRIP START';
  if (idx === total - 1) return 'FINAL STOP';
  return 'STOP ' + (idx + 1);
}

// ── Per-leg price from lastEstimate breakdown ────────────────────────────────
// ── Driving-leg helpers (V1: breakdown.legs contains ONLY driving legs) ───
// A leg "drives" if it is not a stay day. breakdown.legs[] and the leg-order
// travel lineItems are indexed by DRIVING position, not by state.legs index — a
// stay_day shifts every following driving leg by one. drivingIndex() maps a
// state.legs index to its driving position (or -1 for a stay day).
function legDrives(leg) {
  return !!leg && leg.category !== 'stay_day';
}

function drivingIndex(stateIdx) {
  var d = -1;
  for (var i = 0; i <= stateIdx; i++) {
    if (legDrives(state.legs[i])) d++;
  }
  return legDrives(state.legs[stateIdx]) ? d : -1;
}

function getLegBreakdownPrice(legIdx) {
  if (!lastEstimate || !lastEstimate.breakdown || !lastEstimate.breakdown.legs) return null;
  var di = drivingIndex(legIdx);
  if (di < 0) return null; // stay day → no per-leg price
  var bleg = lastEstimate.breakdown.legs[di];
  if (!bleg) return null;
  // USD primary (engine-native); the Summary carries the LKR reference.
  return fmtUsd(bleg.priceCents);
}

// ── Render leg card HTML ──────────────────────────────────────────────────────
// hours (e.g. 2.62) → "2h 37m" / "48m"
function fmtDur(hours) {
  if (!hours || hours <= 0) return '';
  var mins = Math.round(hours * 60);
  var h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? (h + 'h' + (m ? ' ' + m + 'm' : '')) : (m + 'm');
}

function renderLegCard(leg, idx, total) {
  var tone = legTone(idx, total, leg.category);
  var isStay = leg.category === 'stay_day';
  var isChauffeur = (state.service === 'chauffeur');

  var dotTone = tone === 'stay' ? 'stay' : tone;       // teal | red | blue | stay
  var legToneClass = 'tone-' + (tone === 'stay' ? 'stay' : (tone === 'teal' ? 'teal' : (tone === 'red' ? 'red' : 'blue')));

  // Reorder controls
  var reorder = [
    '<div class="ch-leg-reorder">',
    '  <button class="ch-mini-btn" title="Move up" data-action="moveLegUp" data-leg="' + esc(leg.id) + '"' + (idx === 0 ? ' disabled' : '') + '>&#9650;</button>',
    '  <button class="ch-mini-btn" title="Move down" data-action="moveLegDown" data-leg="' + esc(leg.id) + '"' + (idx === total - 1 ? ' disabled' : '') + '>&#9660;</button>',
    '</div>',
  ].join('');

  // Travel | Stay switch (chauffeur only)
  var legKindHtml = isChauffeur ? [
    '<div class="ch-leg-kind"><div class="ch-seg sm">',
    '  <button class="ch-seg-btn' + (isStay ? '' : ' active') + '" data-action="setLegKind" data-kind="transfer" data-leg="' + esc(leg.id) + '">Travel</button>',
    '  <button class="ch-seg-btn' + (isStay ? ' active' : '') + '" data-action="setLegKind" data-kind="stay_day" data-leg="' + esc(leg.id) + '">Stay</button>',
    '</div></div>',
  ].join('') : '';

  // Route: [from → to] as normal 14px inputs (KEEP .ch-tl-title + data-field hooks for e2e/autocomplete)
  var routeHtml;
  if (isStay) {
    routeHtml = [
      '<div class="ch-leg-route">',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="Staying at…"',
      '      value="' + esc(leg.dropoffLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '  </div>',
      '</div>',
    ].join('');
  } else {
    routeHtml = [
      '<div class="ch-leg-route">',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="From"',
      '      value="' + esc(leg.pickupLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="pickupLocation" />',
      '  </div>',
      '  <span class="ch-leg-arrow">&#8594;</span>',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="To"',
      '      value="' + esc(leg.dropoffLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '  </div>',
      '</div>',
    ].join('');
  }

  // Date pill (KEEP input[type=date][data-field=date])
  var dateHtml = [
    '<div class="ch-leg-date">',
    '  <input type="date" value="' + esc(leg.date) + '" data-leg="' + esc(leg.id) + '" data-field="date" />',
    '</div>',
  ].join('');

  // Distance pill (only for travel legs)
  var distHtml = '';
  if (!isStay) {
    if (leg.manualDistance) {
      distHtml = [
        '<div class="ch-leg-dist ch-dist-manual">',
        '  <div class="ch-input-wrap" style="width:74px;padding:0 8px">',
        '    <input class="ch-input" type="number" min="0" value="' + esc(leg.distanceKm) + '"',
        '      data-leg="' + esc(leg.id) + '" data-field="distanceKm" style="width:44px" />',
        '    <span class="ch-input-suffix">km</span>',
        '  </div>',
        '  <button class="ch-link" data-action="autoDistance" data-leg="' + esc(leg.id) + '">auto</button>',
        '</div>',
      ].join('');
    } else if (leg.autoMatched) {
      var durStr = fmtDur(leg.driveTimeHours);
      distHtml = [
        '<div class="ch-leg-dist">',
        '  <span class="ch-dist-pill auto"><b>' + esc(leg.distanceKm) + ' km</b>' + (durStr ? '<span class="ch-dist-time">' + esc(durStr) + '</span>' : '') + '</span>',
        '  <button class="ch-link" data-action="manualDistance" data-leg="' + esc(leg.id) + '" title="Edit distance">&#9998;</button>',
        '</div>',
      ].join('');

  // Per-leg price (from breakdown)
  var legPrice = getLegBreakdownPrice(idx);

    '  <button class="ch-mini-btn danger" title="Remove" data-action="removeLeg" data-leg="' + esc(leg.id) + '">&times;</button>',
    '</div>',
  ].join('');

  // Add-ons chip (thin second line, point-to-point driving legs only). Shows a
  // muted dashed "+ Add-ons" pill when none are active, or a solid orange-tinted
  // pill naming the active ones — both open/close the same toggle popover.
  var activeAddonLabels = [];
  if (leg.addSightseeingFee) activeAddonLabels.push('Sightseeing');
  if (leg.addWaitingFee) activeAddonLabels.push('Waiting');
  if (leg.addSafariWait) activeAddonLabels.push('Safari wait');
  var anyAddon = activeAddonLabels.length > 0;
  var addonChipRow = (!isChauffeur && !isStay) ? [
    '<div class="ch-leg-addonrow">',
    anyAddon
      ? '  <button class="ch-addon-chip on" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">' + esc(activeAddonLabels.join(' · ')) + '</button>'
      : '  <button class="ch-addon-add" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">&#43; Fees / add-ons</button>',
    '</div>',
  ].join('') : '';

  // Add-on line (thin second line, only when the popover is toggled open; private travel only)
  var sightChecked = leg.addSightseeingFee ? ' checked' : '';
  var waitChecked = leg.addWaitingFee ? ' checked' : '';
  var safariChecked = leg.addSafariWait ? ' checked' : '';
  var addonLine = (!isChauffeur && !isStay && legAddonsOpen[leg.id]) ? [
    '<div class="ch-leg-addons">',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSightseeingFee"' + sightChecked + ' /><span class="ch-check-box">' + (leg.addSightseeingFee ? '&#10003;' : '') + '</span>Sightseeing</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addWaitingFee"' + waitChecked + ' /><span class="ch-check-box">' + (leg.addWaitingFee ? '&#10003;' : '') + '</span>Waiting</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSafariWait"' + safariChecked + ' /><span class="ch-check-box">' + (leg.addSafariWait ? '&#10003;' : '') + '</span>Safari wait</label>',
    '</div>',
  ].join('') : '';

  return [
    '<div class="ch-leg ch-tl-item ' + legToneClass + '" data-leg-id="' + esc(leg.id) + '">',
    '  <div class="ch-leg-main">',
    reorder,
    '    <span class="ch-leg-dot tone-' + esc(dotTone) + '"></span>',
    legKindHtml,
    routeHtml,
    dateHtml,
    distHtml,
    priceHtml,
    actions,
    '  </div>',
    addonChipRow,
    addonLine,
    '</div>',
  ].join('');
}

// ── Rate card body renderer ────────────────────────────────────────────────────
function renderRateCardBody() {
  if (!rateCard) {
    return '<div style="color:var(--muted);font-size:13px;padding:12px 0">Loading rate card…</div>';
  }

  var fx = rateCard.fxUsdToLkr;

  // Helper: cents → "$X.XX"
  function usd(cents) {
    return '$' + (cents / 100).toFixed(2);
  }

  // Helper: cents → "Rs X,XXX" (LKR = round(cents × fx / 100))
  function lkr(cents) {
    var val = Math.round(cents * fx / 100);
    return 'Rs ' + val.toLocaleString('en-US');
  }

  // Helper: render a static rate row
  function rateRow(label, hint, valueHtml) {
    return [
      '<div class="ch-rate-row">',
      '  <span class="ch-rate-label">',
      esc(label),
      hint ? '<span class="ch-rate-hint">' + esc(hint) + '</span>' : '',
      '  </span>',
      '  <span class="ch-rate-control" style="font-size:13px;font-weight:600;color:var(--ink);text-align:right">',
      valueHtml,
      '  </span>',
      '</div>',
    ].join('');
  }

  var carKmCents = rateCard.perKmCents.car;
  var vanKmCents = rateCard.perKmCents.van;
  var carFloorCents = rateCard.floorCents.car;
  var vanFloorCents = rateCard.floorCents.van;
  var driverCents = rateCard.chauffeurDayRateCents;
  var bufferPct = rateCard.bufferPct;
  var depositPct = rateCard.depositPct;
  var extras = rateCard.extras;

  var leftCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Per-km rates</div>',
    rateRow('Car', null,
      esc(usd(carKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carKmCents)) + ' /km</span>'),
    rateRow('Van', null,
      esc(usd(vanKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanKmCents)) + ' /km</span>'),
    '  <div class="ch-rate-group-title">Minimum per leg</div>',
    rateRow('Car floor', null,
      esc(usd(carFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carFloorCents)) + '</span>'),
    rateRow('Van floor', null,
      esc(usd(vanFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanFloorCents)) + '</span>'),
    '</div>',
  ].join('');

  var rightCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Chauffeur &amp; buffer</div>',
    rateRow('Driver day rate', null,
      esc(usd(driverCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /day</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(driverCents)) + ' /day</span>'),
    rateRow('Buffer', null, esc(String(bufferPct)) + '%'),
    rateRow('Deposit', null, esc(String(depositPct)) + '%'),
    '  <div class="ch-rate-group-title">Add-ons &amp; FX</div>',
    rateRow('Sightseeing', null,
      esc(usd(extras.sightseeing))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.sightseeing)) + '</span>'),
    rateRow('Waiting', null,
      esc(usd(extras.waiting))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.waiting)) + '</span>'),
    rateRow('Safari wait', null,
      esc(usd(extras['safari-wait']))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras['safari-wait'])) + '</span>'),
    rateRow('FX', 'LKR per USD', 'Rs ' + esc(String(fx)) + ' / $'),
    rateRow('Rate card', 'version', esc(rateCard.version)),
    '</div>',
  ].join('');

  return '<div class="ch-rate-grid">' + leftCol + rightCol + '</div>';
}

// ── Service chooser = money-pane head (R1) ───────────────────────────────────
// Two side-by-side price boxes (Point-to-point | Chauffeur-guide) that ARE the
// chooser. The selected box gets the teal-accent border/fill; each shows its
// total from est.services (USD primary + LKR sub). Chauffeur is disabled with a
// small reason hint beneath its '—' when that side returns { error } or the trip
// has ≤1 distinct leg date. Keeps [data-action=setService][data-service=…].
function renderServiceChooser() {
  var svc = (lastEstimate && lastEstimate.services) ? lastEstimate.services : null;
  var p2p = svc ? svc.pointToPoint : null;
  var chauf = svc ? svc.chauffeur : null;

  // Pre-escaped inner HTML for the price element (USD primary + LKR sub) — raw below.
  var p2pPrice = (p2p && p2p.total)
    ? esc(fmtUsd(p2p.total.cents)) + '<span class="ch-svc-sub">' + esc(p2p.total.lkr) + '</span>'
    : '—';

  // Chauffeur disabled reason: server error, or a visual pre-empt when the itinerary
  // has ≤1 distinct leg date (avoids a flash before the server error arrives).
  var chaufErr = (chauf && chauf.error) ? chauf.error : null;
  if (!chaufErr && distinctLegDateCount() <= 1) {
    chaufErr = 'single-day trip — point-to-point only';
  }
  var chaufDisabled = !!chaufErr;
  var chaufPrice = (chauf && chauf.total)
    ? esc(fmtUsd(chauf.total.cents)) + '<span class="ch-svc-sub">' + esc(chauf.total.lkr) + '</span>'
    : '—';

  var p2pActive = (state.service !== 'chauffeur');
  // If chauffeur is selected but became unavailable, still show it active so the

  var chaufActive = (state.service === 'chauffeur');

  var parts = [];
  parts.push('<div class="ch-svc-choose">');
  // Point-to-point box
  parts.push('  <button class="ch-svc-box' + (p2pActive ? ' active' : '') + '" data-action="setService" data-service="private">');
  parts.push('    <span class="ch-svc-lbl">Point-to-point</span>');
  parts.push('    <span class="ch-svc-price">' + p2pPrice + '</span>'); // pre-escaped above
  parts.push('  </button>');
  // Chauffeur-guide box
  parts.push('  <button class="ch-svc-box' + (chaufActive ? ' active' : '') + '"' + (chaufDisabled ? ' disabled' : '') + ' data-action="setService" data-service="chauffeur">');
  parts.push('    <span class="ch-svc-lbl">Chauffeur-guide</span>');
  parts.push('    <span class="ch-svc-price">' + (chaufDisabled ? '—' : chaufPrice) + '</span>'); // pre-escaped above
  if (chaufDisabled) {
    parts.push('    <span class="ch-svc-hint">' + esc(chaufErr) + '</span>');
  }
  parts.push('  </button>');
  parts.push('</div>');

  if (chaufActive && !chaufDisabled) {
    parts.push('<div class="ch-svc-caption">Car &amp; driver stay with you — sightseeing/waiting included.</div>');
  }
  return parts.join('');
}

// Composition (top→bottom): km line → cost build-up rows → big serif total →

function renderSummaryCardBody() {

  lines.push('  <span class="ch-total-val ch-line-val">'

    + (est.total.lkr ? '<span class="ch-total-lkr ch-val-sub">' + esc(est.total.lkr) + '</span>' : '')
    + '</span>');

  // Chauffeur product: deposit + balance as a subtle highlighted chip/row.
  if (est.product === 'chauffeur' && est.amountDueNow) {
    lines.push('<div class="ch-deposit-chip">');
    lines.push('  <span class="dep-lbl">Deposit to confirm</span>');
    lines.push('  <span class="dep-val">' + esc(fmtUsd(est.amountDueNow.cents)) + '</span>');

    est.warnings.forEach(function(w) {
