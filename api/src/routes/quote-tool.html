<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ceylon Hop · Ops · Quote Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* Ceylon Hop Ops — base + layout + components CSS */
:root {
  --blue: #63BFD6;
  --blue-d: #3da6c0;
  --black: #3A3739;
  --cream: #F0EEE5;
  --cream-d: #e6e3d6;
  --orange: #F9A429;
  --red: #EC3A24;
  --teal: #0AB9B6;
  --teal-d: #089a97;

  --paper: #ffffff;
  --ink: #3A3739;
  --muted: #8b8780;
  --muted-2: #b4afa6;
  --line: #e7e3d8;
  --line-soft: #efece2;

  --r-lg: 18px;
  --r-md: 13px;
  --r-sm: 9px;
  --shadow-card: 0 1px 2px rgba(58,55,57,.04), 0 8px 24px rgba(58,55,57,.06);
  --shadow-pop: 0 12px 40px rgba(58,55,57,.16);
  --serif: "Bodoni Moda", "Didot", Georgia, serif;
  --sans: "Poppins", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--cream);
  background-image: radial-gradient(circle at 18% -8%, rgba(99,191,214,.10), transparent 42%),
                    radial-gradient(circle at 100% 0%, rgba(249,164,41,.07), transparent 38%);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.45;
}
h1, h2, h3 { margin: 0; font-weight: 600; }
input, select, textarea, button { font-family: inherit; }

/* ---------- App shell ---------- */
.ch-app { min-height: 100vh; padding-bottom: 64px; }
.ch-container { max-width: 1340px; margin: 0 auto; padding: 0 22px; }

/* ---------- Header ---------- */
.ch-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,.82);
  backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--line);
}
.ch-header-in { max-width: 1340px; margin: 0 auto; padding: 12px 22px; display: flex; align-items: center; gap: 18px; }
.ch-brand { display: flex; align-items: center; gap: 11px; }
.ch-mark {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: grid; place-items: center;
  font-family: var(--serif); font-weight: 700; font-size: 18px;
  box-shadow: 0 3px 0 var(--blue-d);
}
.ch-brand-txt { line-height: 1.05; }
.ch-brand-txt b { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: .2px; display: block; }
.ch-brand-txt span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 2.2px; color: var(--muted); }
.ch-header-spacer { flex: 1; }
.ch-header-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

/* ---------- Status select ---------- */
.ch-status {
  display: inline-flex; align-items: center; gap: 7px;
  border-radius: 999px; padding: 5px 6px 5px 12px;
  border: 1px solid var(--line); background: #fff;
  font-size: 12.5px; font-weight: 500;
}
.ch-status .dot { width: 9px; height: 9px; border-radius: 50%; }
.ch-status select { border: none; background: none; font-weight: 600; font-size: 12.5px; outline: none; cursor: pointer; color: var(--ink); }

/* ---------- Layout grid ---------- */
.ch-main { padding-top: 22px; display: grid; grid-template-columns: minmax(0, 1.62fr) minmax(320px, .92fr); gap: 20px; align-items: start; }
.ch-col-l { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.ch-col-r { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 86px; }
.ch-output-wrap { margin-top: 20px; }
@media (max-width: 1080px) {
  .ch-main { grid-template-columns: 1fr; }
  .ch-col-r { position: static; }
}

/* ---------- Card ---------- */
.ch-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-card); overflow: hidden; }
.ch-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--line-soft); }
.ch-card-head-l { display: flex; align-items: center; gap: 11px; }
.ch-card-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
.ch-card-head-l { min-width: 0; }
.ch-card-icon { width: 26px; height: 26px; border-radius: 8px; background: var(--black); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 600; opacity: .92; }
.ch-card-head-r { display: flex; align-items: center; gap: 10px; }
.ch-chev { font-size: 19px; color: var(--muted); transition: transform .2s; line-height: 1; }
.ch-chev.open { transform: rotate(180deg); }
.ch-card-body { padding: 18px; }
.ch-card-body.nopad { padding: 0; }
.ch-head-tools { display: flex; align-items: center; gap: 8px; }

/* ---------- Fields ---------- */
.ch-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
.ch-row:last-child { margin-bottom: 0; }
.ch-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0; }
.ch-field-label { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: flex; align-items: center; gap: 3px; }
.ch-field-label .req { color: var(--red); font-style: normal; }
.ch-field-hint { font-size: 11px; color: var(--red); }
.ch-card-body > .ch-field { margin-top: 14px; }

.ch-input-wrap { display: flex; align-items: center; gap: 0; background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-sm); padding: 0 10px; transition: border-color .15s, box-shadow .15s; }
.ch-input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }
.ch-input-wrap.invalid { border-color: var(--red); }
.ch-input { width: 100%; border: none; background: none; outline: none; padding: 9px 0; font-size: 14px; color: var(--ink); min-width: 0; }
.ch-input::placeholder { color: var(--muted-2); }
.ch-input-prefix, .ch-input-suffix { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
.ch-input-prefix { padding-right: 6px; }
.ch-input-suffix { padding-left: 6px; }
.ch-textarea { padding: 9px 10px; resize: vertical; border: 1.5px solid var(--line); border-radius: var(--r-sm); line-height: 1.5; }
.ch-textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }

.ch-select-wrap { position: relative; padding-right: 0; }
.ch-select { appearance: none; padding-right: 26px; cursor: pointer; background: none; }
.ch-select-chev { position: absolute; right: 10px; pointer-events: none; color: var(--muted); font-size: 15px; }

/* ---------- Segmented ---------- */
.ch-seg { display: inline-flex; background: var(--cream); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 3px; gap: 3px; width: 100%; }
.ch-seg-btn { flex: 1; border: none; background: none; padding: 7px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.ch-seg-btn.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }
.ch-seg.sm .ch-seg-btn { padding: 5px 8px; font-size: 12px; }

/* ---------- Toggle ---------- */
.ch-toggle-row { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
.ch-toggle { width: 38px; height: 22px; border-radius: 999px; background: var(--cream-d); position: relative; transition: background .18s; flex: none; border: 1px solid var(--line); }
.ch-toggle.on[data-tone="blue"] { background: var(--blue); border-color: var(--blue); }
.ch-toggle.on[data-tone="teal"] { background: var(--teal); border-color: var(--teal); }
.ch-toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .18s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.ch-toggle.on .ch-toggle-knob { transform: translateX(16px); }
.ch-toggle-label { font-size: 12.5px; font-weight: 600; color: var(--ink); }

/* ---------- Check ---------- */
.ch-check { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--ink); }
.ch-check input { display: none; }
.ch-check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line); display: grid; place-items: center; color: #fff; font-size: 12px; background: #fff; transition: all .15s; }
.ch-check input:checked + .ch-check-box { background: var(--blue); border-color: var(--blue); }

/* ---------- Buttons ---------- */
.ch-btn { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.ch-btn:disabled { opacity: .45; cursor: not-allowed; }
.ch-btn-icon { font-size: 13px; line-height: 1; }
.ch-btn-sm { padding: 6px 10px; font-size: 12px; }
.ch-btn-primary { background: var(--blue); color: #fff; box-shadow: 0 2px 0 var(--blue-d); }
.ch-btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
.ch-btn-teal { background: var(--teal); color: #fff; box-shadow: 0 2px 0 var(--teal-d); }
.ch-btn-dark { background: var(--black); color: #fff; }
.ch-btn-dark:hover { filter: brightness(1.2); }
.ch-btn-outline { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
.ch-btn-outline:hover { border-color: var(--blue); color: var(--blue-d); }
.ch-btn-ghost { background: var(--cream); color: var(--ink); }
.ch-btn-ghost:hover { background: var(--cream-d); }
.ch-btn-ghostdanger { background: none; color: var(--muted); padding: 6px 9px; }
.ch-btn-ghostdanger:hover { background: rgba(236,58,36,.1); color: var(--red); }
.ch-btn-dashed { background: #fff; color: var(--muted); border: 1.5px dashed var(--line); }
.ch-btn-dashed:hover { border-color: var(--orange); color: var(--orange); background: #fffdf8; }

/* ---------- Badge ---------- */
.ch-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.ch-badge.tone-slate { background: var(--cream); color: var(--muted); }
.ch-badge.tone-blue { background: rgba(99,191,214,.16); color: var(--blue-d); }
.ch-badge.tone-teal { background: rgba(10,185,182,.14); color: var(--teal-d); }
.ch-badge.tone-orange { background: rgba(249,164,41,.16); color: #c47d12; }
.ch-badge.tone-red { background: rgba(236,58,36,.13); color: var(--red); }

/* ---------- Rate settings ---------- */
.ch-lock-note { background: var(--cream); border-radius: var(--r-md); padding: 11px 14px; font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
.ch-rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
.ch-rate-grid.disabled { opacity: .55; pointer-events: none; }
.ch-rate-col { display: flex; flex-direction: column; gap: 3px; }
.ch-rate-group-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue-d); margin: 12px 0 4px; }
.ch-rate-col .ch-rate-group-title:first-child { margin-top: 0; }
.ch-rate-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 0; }
.ch-rate-label { font-size: 13px; font-weight: 500; display: flex; flex-direction: column; }
.ch-rate-hint { font-size: 10.5px; color: var(--muted-2); }
.ch-rate-control { width: 132px; flex: none; }
@media (max-width: 620px) { .ch-rate-grid { grid-template-columns: 1fr; gap: 8px; } }

/* ---------- Itinerary (premium timeline) ---------- */
.ch-empty { padding: 48px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.ch-empty-icon { font-size: 34px; }
.ch-empty-title { color: var(--muted); font-size: 14px; }

.ch-timeline-wrap { padding: 22px 24px 8px; }
.ch-timeline { position: relative; }

.ch-tl-item { position: relative; display: grid; grid-template-columns: 30px 1fr; gap: 16px; }
.ch-tl-rail { position: relative; display: flex; justify-content: center; }
/* continuous line down the rail */
.ch-tl-item:not(:last-child) .ch-tl-rail::before { content: ''; position: absolute; top: 6px; bottom: -6px; left: 50%; transform: translateX(-50%); width: 2px; border-left: 2px dotted var(--muted-2); opacity: .55; }
.ch-marker { position: relative; z-index: 1; width: 18px; height: 18px; border-radius: 50%; margin-top: 4px; display: grid; place-items: center; font-size: 9px; color: #fff; box-shadow: 0 0 0 4px var(--paper); flex: none; }
.ch-marker.tone-teal { background: var(--teal); }
.ch-marker.tone-red { background: var(--red); }
.ch-marker.tone-blue { background: var(--blue); }
.ch-marker.ring { background: #fff; border: 2.5px solid var(--blue); }
.ch-marker.stay { background: #fff; border: 2px dashed var(--muted-2); color: var(--muted); }

.ch-tl-body { min-width: 0; padding-bottom: 8px; }

/* card */
.ch-tl-card { background: var(--paper); border: 1.5px solid var(--line); border-radius: 16px; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; transition: border-color .15s, box-shadow .15s; }
.ch-tl-card:hover { border-color: var(--cream-d); box-shadow: var(--shadow-card); }
.ch-tl-card.tone-teal { border-top: 3px solid var(--teal); }
.ch-tl-card.tone-red { border-top: 3px solid var(--red); }
.ch-tl-card.tone-blue { border-top: 3px solid var(--blue); }

.ch-tl-head { display: flex; align-items: center; gap: 10px; }
.ch-tl-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px; padding: 4px 10px; border-radius: 999px; flex: none; }
.ch-tl-tag.tone-teal { background: rgba(10,185,182,.13); color: var(--teal-d); }
.ch-tl-tag.tone-red { background: rgba(236,58,36,.11); color: var(--red); }
.ch-tl-tag.tone-blue { background: rgba(99,191,214,.16); color: var(--blue-d); }
.ch-tl-cat { width: 175px; }
.ch-tl-cat .ch-input-wrap { padding: 0 10px; }
.ch-tl-cat .ch-input { padding: 6px 0; font-size: 12.5px; font-weight: 500; }
.ch-tl-actions { margin-left: auto; display: flex; gap: 6px; }
.ch-icon-btn { width: 30px; height: 30px; border: 1.5px solid var(--line); background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); display: grid; place-items: center; transition: all .15s; }
.ch-icon-btn:hover { border-color: var(--blue); color: var(--blue-d); }
.ch-icon-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(236,58,36,.06); }

.ch-tl-title-field { display: flex; flex-direction: column; gap: 4px; }
.ch-tl-title-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); }
.ch-tl-route { display: flex; align-items: flex-end; gap: 12px; }
.ch-tl-route .ch-tl-title-field { flex: 1 1 0; min-width: 0; }
.ch-route-sep { font-size: 22px; color: var(--muted-2); padding-bottom: 9px; flex: none; }
.ch-tl-stoprow:empty { display: none; }
@media (max-width: 560px) { .ch-tl-route { flex-direction: column; align-items: stretch; gap: 8px; } .ch-route-sep { display: none; } }

/* place autocomplete */
.ch-ac { position: relative; }
.ch-tl-title-field .ch-ac { width: 100%; }
.ch-ac-menu { position: absolute; top: calc(100% + 5px); left: 0; right: 0; min-width: 230px; background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-pop); padding: 6px; z-index: 60; max-height: 264px; overflow-y: auto; }
.ch-ac-item { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: none; padding: 9px 10px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; color: var(--ink); font-family: var(--sans); }
.ch-ac-item:hover, .ch-ac-item.hi { background: var(--cream); }
.ch-ac-pin { font-size: 13px; flex: none; opacity: .85; }
.ch-ac-name { font-weight: 400; color: var(--muted); }
.ch-ac-name b { font-weight: 700; color: var(--ink); }
.ch-tl-title { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); border: 1.5px solid var(--line); background: #fff; outline: none; padding: 7px 12px; border-radius: 10px; width: 100%; line-height: 1.2; transition: border-color .15s, box-shadow .15s; }
.ch-tl-title:hover { border-color: var(--cream-d); }
.ch-tl-title:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(99,191,214,.18); }
.ch-tl-title::placeholder { color: var(--muted-2); font-style: italic; font-weight: 600; }

.ch-tl-from { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: -4px; }
.ch-from-lbl { font-size: 12px; color: var(--muted); }
.ch-from-in { border: none; border-bottom: 1.5px solid var(--line); background: none; padding: 2px 2px; font-size: 13.5px; font-weight: 500; color: var(--ink); outline: none; min-width: 80px; max-width: 180px; }
.ch-from-in:focus { border-bottom-color: var(--blue); }
.ch-from-in::placeholder { color: var(--muted-2); font-weight: 400; }

.ch-stops { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.ch-stop-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(249,164,41,.13); color: #b9760f; border-radius: 999px; padding: 3px 7px 3px 9px; font-size: 11px; font-weight: 500; }
.ch-stop-x { border: none; background: none; color: #b9760f; cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
.ch-stop-input { border: 1px dashed var(--line); background: #fff; border-radius: 999px; padding: 2px 9px; font-size: 11px; outline: none; width: 60px; }
.ch-stop-input:focus { border-color: var(--orange); width: 100px; }

.ch-tl-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.ch-meta-date { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 999px; padding: 5px 12px; font-size: 12.5px; }
.ch-meta-date .ch-meta-ic { font-size: 12px; opacity: .8; }
.ch-meta-date input { border: none; background: none; outline: none; font-family: inherit; font-size: 12.5px; color: var(--ink); font-weight: 500; }
.ch-meta-dist { display: flex; align-items: center; }
.ch-dist-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 500; padding: 5px 12px; border-radius: 999px; background: var(--cream); color: var(--ink); }
.ch-dist-pill.auto { background: rgba(99,191,214,.12); color: var(--blue-d); }
.ch-dist-pill.warn { background: rgba(249,164,41,.13); color: #b9760f; }
.ch-dist-manual { display: flex; align-items: center; gap: 7px; }
.ch-link { border: none; background: none; color: currentColor; font-size: 11px; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; opacity: .75; }
.ch-link:hover { opacity: 1; }
.ch-meta-price { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; flex: none; }
.ch-price-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); white-space: nowrap; }
.ch-price-val { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); }

/* driver / car stay toggles */
.ch-tl-stays { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--line-soft); }
.ch-stay-toggle { display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid var(--line); background: #fff; border-radius: 10px; padding: 7px 12px; cursor: pointer; transition: all .15s; }
.ch-stay-toggle:hover { border-color: var(--muted-2); }
.ch-stay-ic { font-size: 15px; filter: grayscale(.4); opacity: .7; }
.ch-stay-lb { font-size: 13px; font-weight: 600; color: var(--muted); }
.ch-stay-state { font-size: 9px; font-weight: 800; letter-spacing: .6px; color: var(--muted-2); background: var(--cream); border-radius: 5px; padding: 2px 5px; }
.ch-stay-toggle.on { background: #fff; }
.ch-stay-toggle.on .ch-stay-ic { filter: none; opacity: 1; }
.ch-stay-toggle.on .ch-stay-lb { color: var(--ink); }
.ch-stay-toggle.on.tone-teal { border-color: var(--teal); background: rgba(10,185,182,.07); }
.ch-stay-toggle.on.tone-teal .ch-stay-state { background: var(--teal); color: #fff; }
.ch-stay-toggle.on.tone-blue { border-color: var(--blue); background: rgba(99,191,214,.08); }
.ch-stay-toggle.on.tone-blue .ch-stay-state { background: var(--blue); color: #fff; }
.ch-stays-note { font-size: 11.5px; color: var(--teal-d); font-weight: 600; }

.ch-tl-fees { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.ch-fee { display: inline-flex; align-items: center; gap: 9px; }
.ch-note-in { border: 1px solid var(--line); background: #fcfbf7; border-radius: var(--r-sm); padding: 8px 11px; font-size: 12.5px; outline: none; font-family: inherit; color: var(--ink); width: 100%; }
.ch-note-in:focus { border-color: var(--blue); background: #fff; }

/* connector between stops */
.ch-connector { display: flex; align-items: center; gap: 12px; padding: 12px 4px 12px 0; }

.ch-timeline-add { display: flex; gap: 10px; padding: 6px 0 4px 46px; flex-wrap: wrap; }

/* ---------- Summary ---------- */
.ch-km-strip { display: flex; gap: 10px; margin-bottom: 16px; }
.ch-km { flex: 1; background: var(--cream); border-radius: var(--r-md); padding: 11px; text-align: center; }
.ch-km.hero { background: var(--black); color: #fff; }
.ch-km b { font-family: var(--serif); font-size: 22px; font-weight: 700; display: block; line-height: 1; }

.ch-sum-block { border: 1px solid var(--line); border-radius: var(--r-md); padding: 13px 15px; margin-bottom: 13px; }
.ch-sum-block.blue { border-left: 3px solid var(--blue); }

.ch-tip { background: rgba(99,191,214,.1); border-radius: var(--r-md); padding: 11px 13px; font-size: 12.5px; color: var(--black); margin-top: 13px; line-height: 1.5; }
.ch-tip b { color: var(--blue-d); }

/* ---------- Flags ---------- */
.ch-flags-clear { color: var(--teal-d); font-size: 13px; font-weight: 500; padding: 4px 0; }
.ch-flags { display: flex; flex-direction: column; gap: 9px; }
.ch-flag { display: flex; gap: 11px; padding: 11px 13px; border-radius: var(--r-md); }
.ch-flag-mark { font-size: 13px; line-height: 1.4; flex: none; }
.ch-flag.tone-red { background: rgba(236,58,36,.08); }
.ch-flag.tone-red .ch-flag-mark { color: var(--red); }
.ch-flag.tone-orange { background: rgba(249,164,41,.1); }
.ch-flag.tone-orange .ch-flag-mark { color: var(--orange); }

/* ---------- Output ---------- */

.ch-tab { flex: 1; border: none; background: none; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.ch-tab.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }

.ch-pre { font-family: var(--sans); font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--cream); border-radius: var(--r-md); padding: 16px 18px; margin: 0; color: var(--ink); }
.ch-pre.mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; }
.ch-email-subject { font-size: 13px; margin-bottom: 10px; padding: 10px 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--r-sm); }
.ch-email-subject span { font-size: 10.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted-2); margin-right: 8px; }
.ch-internal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.ch-internal-grid > div { background: var(--cream); border-radius: var(--r-sm); padding: 9px 11px; }
.ch-internal-grid span { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted-2); display: block; }

.ch-itable { width: 100%; border-collapse: collapse; }
.ch-itable td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--line-soft); }
.ch-itable td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.ch-itable tr.sec td { color: var(--muted); }

.ch-itable tr.hi.blue td:last-child { color: var(--blue-d); }

.ch-internal-note { font-size: 11.5px; color: var(--muted-2); margin-top: 12px; font-style: italic; }
@media (max-width: 520px) { .ch-internal-grid { grid-template-columns: repeat(2, 1fr); } }

/* ---------- Toast ---------- */
.ch-toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: #fff; padding: 12px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-pop); opacity: 0; pointer-events: none; transition: all .25s; z-index: 100; display: flex; align-items: center; gap: 8px; }

/* ---------- Recent quotes ---------- */
.ch-recent-panel { margin-top: 18px; }
.ch-recent-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted-2); margin-bottom: 8px; }
.ch-recent-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); flex-wrap: wrap; }
.ch-recent-row:last-child { border-bottom: none; }
.ch-recent-ref { font-size: 12px; font-weight: 700; color: var(--teal-d); min-width: 70px; }
.ch-recent-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 80px; }
.ch-recent-total { font-size: 12.5px; font-weight: 600; color: var(--muted); min-width: 90px; text-align: right; }
</style>
</head>
<body>

<div class="ch-app" id="app">
  <!-- rendered by render() -->
</div>

<!-- Toast lives outside #app so render() never destroys it -->
<div class="ch-toast" id="ch-toast">
  <span class="tick">&#x2713;</span>
  <span class="ch-toast-msg"></span>
</div>

<script>
'use strict';

// ── HTML escape helper ────────────────────────────────────────────────────────
function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Status tone map ───────────────────────────────────────────────────────────
const STATUS_TONE = {
  'draft':   'var(--muted-2)',
  'sent':    'var(--blue)',
  'won':     'var(--orange)',
  'lost':    'var(--red)',
  'expired': 'var(--muted)',
};

const STATUS_LABELS = {
  'draft':   'Draft',
  'sent':    'Sent',
  'won':     'Booked',
  'lost':    'Lost',
  'expired': 'Expired',
};

// ── Rate card (fetched once on load) ─────────────────────────────────────────
var rateCard = null;

// ── I1: once-guard for app-node delegated listeners ──────────────────────────
var _delegatesWired = false;

// ── Settings card collapse state ──────────────────────────────────────────────
var settingsOpen = false;

// ── Estimate state ────────────────────────────────────────────────────────────
var lastEstimate = null;   // last successful /estimate response
var lastEstimateError = null; // string | null
var _estimateTimer = null;

// All vehicle tiers have rates — no gating
var GATED_VEHICLES = {};

var VEHICLE_LABELS = {
  car:    'Car',
  van_6:  'Van 6 Seat',
  van_9:  'Van 9 Seat',
  van_14: 'Van 14 Seat',
  custom: 'Custom',
};

// Vehicle capacity table for client-side flags
var VEHICLE_CAPS = {
  car:    { pax: 3,  bags: 3  },
  van_6:  { pax: 6,  bags: 5  },
  van_9:  { pax: 9,  bags: 8  },
  van_14: { pax: 14, bags: 12 },
};

// Driving categories (for flag computation)
var DRIVING_CATS = {
  transfer: true, train_support: true, sightseeing: true,
  safari_wait: true, airport: true,
};

function refreshEstimate() {
  clearTimeout(_estimateTimer);
  _estimateTimer = setTimeout(function() {
    _runEstimate();
  }, 350);
}

async function _runEstimate() {
  var st = state;

  // Gate: gated vehicle types — skip server call entirely
  if (GATED_VEHICLES[st.vehicleType]) {
    lastEstimate = null;
    var label = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
    lastEstimateError = 'No rate set for ' + label + ' yet — pick Car or Van 6, or add its rate.';
    render();
    return;
  }

  // Build the payload (Task 2 mapping)
  var payload = {
    vehicle: st.vehicleType,
    passengerCount: st.passengerCount,
    luggageCount: st.luggageCount,
    legs: st.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        hasDriver:        !!leg.hasDriver,
        hasCarStay:       !!leg.hasCarStay,
      };
    }),
  };

  var result = await apiEstimate(payload);

  if (result._error) {
    lastEstimate = null;
    // Friendly version for the common unknown-distance case
    var msg = result._error;
    if (/unknown distance|no distance|distance not found/i.test(msg)) {
      msg = 'Add distances to price this trip.';
    }
    lastEstimateError = msg;
    render();
    return;
  }

  lastEstimate = result;
  lastEstimateError = null;
  render();
}

// ── State model ───────────────────────────────────────────────────────────────
let legSeq = 0;

function newLeg() {
  return {
    id: 'leg_' + (legSeq++),
    category: 'transfer',
    pickupLocation: '',
    dropoffLocation: '',
    stopovers: [],
    distanceKm: 0,
    driveTimeHours: 0,
    manualDistance: false,
    autoMatched: false,
    addSightseeingFee: false,
    addWaitingFee: false,
    hasDriver: false,
    hasCarStay: false,
    notes: '',
    date: '',
  };
}

let state = {
  id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
  customerName: '',
  contact: '',
  passengerCount: 2,
  luggageCount: 2,
  vehicleType: 'van_6',
  outputCurrency: 'LKR',
  status: 'draft',
  internalNotes: '',
  legs: [newLeg()],
};

// ── State mutators ────────────────────────────────────────────────────────────
function mutate(patch) {
  Object.assign(state, patch);
  // Re-estimate if any pricing-affecting field changed
  if ('vehicleType' in patch || 'passengerCount' in patch || 'luggageCount' in patch) {
    refreshEstimate();
  }
  render();
}

function updateLeg(id, patch) {
  state.legs = state.legs.map(function(leg) {
    return leg.id === id ? Object.assign({}, leg, patch) : leg;
  });
  refreshEstimate();
  render();
}

function addLeg(cat) {
  var prev = state.legs.length > 0 ? state.legs[state.legs.length - 1] : null;
  var leg = newLeg();
  leg.category = cat || 'transfer';
  if (prev) {
    leg.pickupLocation = prev.dropoffLocation || '';
    if (cat === 'stay_day') {
      leg.dropoffLocation = prev.dropoffLocation || '';
    }
    // Auto-increment date by 1 day
    if (prev.date) {
      var d = new Date(prev.date);
      d.setDate(d.getDate() + 1);
      leg.date = d.toISOString().slice(0, 10);
    }
  }
  state.legs = state.legs.concat([leg]);
  refreshEstimate();
  render();
}

function removeLeg(id) {
  state.legs = state.legs.filter(function(leg) { return leg.id !== id; });
  refreshEstimate();
  render();
}

function dupLeg(id) {
  var idx = state.legs.findIndex(function(leg) { return leg.id === id; });
  if (idx < 0) return;
  var src = state.legs[idx];
  var copy = Object.assign({}, src, { id: 'leg_' + (legSeq++) });
  var next = state.legs.slice(0, idx + 1).concat([copy]).concat(state.legs.slice(idx + 1));
  state.legs = next;
  refreshEstimate();
  render();
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, opts) {
  opts = opts || {};
  var headers = Object.assign({}, opts.headers || {});
  var k = localStorage.getItem('chAdminKey');
  if (k) headers['x-admin-key'] = k;
  var res = await fetch(path, Object.assign({}, opts, { headers: headers }));
  if (res.status === 401) {
    var entered = prompt('Enter admin key:');
    if (entered) {
      localStorage.setItem('chAdminKey', entered);
      headers['x-admin-key'] = entered;
      res = await fetch(path, Object.assign({}, opts, { headers: headers }));
    }
  }
  return res;
}

async function apiPlaces(q) {
  try {
    var r = await api('/admin/quote/places?q=' + encodeURIComponent(q));
    var d = await r.json();
    return d.places || [];
  } catch (e) { return []; }
}

async function apiDistance(from, to) {
  try {
    var r = await api('/admin/quote/distance', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ from: from, to: to }),
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiEstimate(payload) {
  try {
    var r = await api('/admin/quote/estimate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    var body = await r.json();
    if (!r.ok) return { _error: body.error || 'Estimate failed' };
    return body;
  } catch (e) { return { _error: 'Network error' }; }
}

async function apiRateCard() {
  try {
    var r = await api('/admin/quote/rate-card');
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiSave(payload) {
  try {
    var r = await api('/admin/quote/save', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return await r.json();
  } catch (e) { return null; }
}

async function apiList(filter) {
  try {
    var qs = filter ? '?' + new URLSearchParams(filter).toString() : '';
    var r = await api('/admin/quote/list' + qs);
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiPatch(id, patch) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(patch),
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('ch-toast');
  if (!el) return;
  el.querySelector('.ch-toast-msg').textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
function copyText(text, label) {
  navigator.clipboard.writeText(text || '').then(function() {
    showToast((label || 'Text') + ' copied');
  }).catch(function() {
    showToast('Copy failed — check clipboard permission');
  });
}

// ── Action handlers ───────────────────────────────────────────────────────────
function newQuote() {
  if (!confirm('Start a new quote? Unsaved changes will be lost.')) return;
  legSeq = 0;
  state = {
    id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
    customerName: '',
    contact: '',
    passengerCount: 2,
    luggageCount: 2,
    vehicleType: 'van_6',
    outputCurrency: 'LKR',
    status: 'draft',
    internalNotes: '',
    legs: [newLeg()],
    savedId: null,
    reference: null,
  };
  lastEstimate = null;
  lastEstimateError = null;
  outputTab = 'whatsapp';
  refreshEstimate();
  render();
  showToast('New quote started');
}

function savePayload() {
  return {
    name: state.customerName,
    contact: state.contact,
    vehicle: state.vehicleType,
    passengerCount: state.passengerCount,
    luggageCount: state.luggageCount,
    legs: state.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        hasDriver:        !!leg.hasDriver,
        hasCarStay:       !!leg.hasCarStay,
      };
    }),
    notes: state.internalNotes,
  };
}

async function saveQuote() {
  var payload = savePayload();
  var res = await apiSave(payload);
  if (res && res.id) {
    state.savedId = res.id;
    state.reference = res.reference || res.id;
    var ref = res.reference || res.id;
    // Load recent first (triggers render), then show toast so it survives
    var listResult = await apiList();
    if (listResult && listResult.quotes) {
      recentQuotes = listResult.quotes;
    }
    render();
    showToast('Saved as ' + ref);
  } else {
    var errMsg = (res && res.error) ? res.error : 'Save failed';
    showToast(errMsg);
  }
}

// ── Leg tone helpers ──────────────────────────────────────────────────────────
function legTone(idx, total, cat) {
  if (idx === 0) return 'teal';
  if (idx === total - 1) return 'red';
  if (cat === 'stay_day') return 'stay';
  return 'blue';
}

function legTagLabel(idx, total) {
  if (idx === 0) return 'TRIP START';
  if (idx === total - 1) return 'FINAL STOP';
  return 'STOP ' + (idx + 1);
}

// ── Per-leg price from lastEstimate breakdown ────────────────────────────────
function getLegBreakdownPrice(legIdx) {
  if (!lastEstimate || !lastEstimate.breakdown || !lastEstimate.breakdown.legs) return null;
  var bleg = lastEstimate.breakdown.legs[legIdx];
  if (!bleg) return null;
  // cents → LKR display: round(cents × fx / 100)
  var fx = lastEstimate.fxUsdToLkr || 320;
  var lkrVal = Math.round(bleg.priceCents * fx / 100);
  return 'LKR ' + lkrVal.toLocaleString('en-US');
}

// ── Render leg card HTML ──────────────────────────────────────────────────────
function renderLegCard(leg, idx, total) {
  var tone = legTone(idx, total, leg.category);
  var tagTone = tone === 'stay' ? 'blue' : tone;
  var tagLabel = legTagLabel(idx, total);
  var isStay = leg.category === 'stay_day';

  var markerClass = 'ch-marker';
  if (tone === 'teal') markerClass += ' tone-teal';
  else if (tone === 'red') markerClass += ' tone-red';
  else if (tone === 'stay') markerClass += ' stay';
  else markerClass += ' ring';

  var cardToneClass = 'ch-tl-card';
  if (tone === 'teal') cardToneClass += ' tone-teal';
  else if (tone === 'red') cardToneClass += ' tone-red';
  else cardToneClass += ' tone-blue';

  // Route section
  var routeHtml;
  if (isStay) {
    routeHtml = [
      '<div class="ch-tl-title-field">',
      '  <span class="ch-tl-title-lbl">Staying at</span>',
      '  <input class="ch-tl-title" type="text" placeholder="Where are they staying?"',
      '    value="' + esc(leg.dropoffLocation) + '"',
      '    data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '</div>',
    ].join('');
  } else {
    var distHtml;
    if (leg.manualDistance) {
      distHtml = [
        '<div class="ch-meta-dist">',
        '  <div class="ch-dist-manual">',
        '    <div class="ch-input-wrap" style="width:86px">',
        '      <input class="ch-input" type="number" min="0" value="' + esc(leg.distanceKm) + '"',
        '        data-leg="' + esc(leg.id) + '" data-field="distanceKm" style="width:60px" />',
        '      <span class="ch-input-suffix">km</span>',
        '    </div>',
        '    <button class="ch-link" data-action="autoDistance" data-leg="' + esc(leg.id) + '">auto</button>',
        '  </div>',
        '</div>',
      ].join('');
    } else if (leg.autoMatched) {
      var hrs = leg.driveTimeHours || 0;
      var hh = Math.floor(hrs);
      var mm = Math.round((hrs - hh) * 60);
      var durStr = hh > 0 ? hh + 'h ' + mm + 'm' : mm + 'm';
      distHtml = [
        '<div class="ch-meta-dist">',
        '  <span class="ch-dist-pill auto">≈ ' + esc(leg.distanceKm) + ' km · ~' + esc(durStr) + '</span>',

    // Stopovers chips

    routeHtml = [
      '<div class="ch-tl-route">',
      '  <div class="ch-tl-title-field">',
      '    <span class="ch-tl-title-lbl">From</span>',
      '    <input class="ch-tl-title" type="text" placeholder="Origin"',
      '      value="' + esc(leg.pickupLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="pickupLocation" />',

      '  <span class="ch-route-sep">→</span>',
      '  <div class="ch-tl-title-field">',
      '    <span class="ch-tl-title-lbl">Destination</span>',
      '    <input class="ch-tl-title" type="text" placeholder="Destination"',
      '      value="' + esc(leg.dropoffLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '  </div>',
      '</div>',
      '<div class="ch-tl-stoprow">',
      '  <div class="ch-stops">',
      stopChips,
      '    <input class="ch-stop-input" placeholder="+ stop"',
      '      data-action="addStop" data-leg="' + esc(leg.id) + '" />',
      '  </div>',
      '</div>',
      '<div class="ch-tl-meta">',
      '  <label class="ch-meta-date">',
      '    <span class="ch-meta-ic">&#128197;</span>',
      '    <input type="date" value="' + esc(leg.date) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="date" />',

      distHtml,
      (function() {
        var legPrice = getLegBreakdownPrice(idx);
        if (!legPrice) return '';
        return [
          '<div class="ch-meta-price">',
          '  <span class="ch-price-lbl">Leg price</span>',
          '  <span class="ch-price-val">' + esc(legPrice) + '</span>',
          '</div>',
        ].join('');
      })(),
      '</div>',
    ].join('');
  }

  // Stay meta for stay_day
  var stayMetaHtml = isStay ? [
    '<div class="ch-tl-meta">',
    '  <label class="ch-meta-date">',
    '    <span class="ch-meta-ic">&#128197;</span>',

  // Driver / car stay toggles
  var driverOnClass = leg.hasDriver ? ' on tone-teal' : '';
  var carOnClass = leg.hasCarStay ? ' on tone-blue' : '';
  var chauffeurNote = (leg.hasDriver || leg.hasCarStay) ?
    '<span class="ch-stays-note">+ chauffeur rate for this date</span>' : '';

  // Category select options
  var cats = [

    { id: 'stay_day',      label: 'Stay day' },
    { id: 'train_support', label: 'Train / luggage support' },
    { id: 'sightseeing',   label: 'Sightseeing / waiting' },
    { id: 'safari_wait',   label: 'Safari waiting' },

  var catOptions = cats.map(function(c) {
    return '<option value="' + esc(c.id) + '"' + (leg.category === c.id ? ' selected' : '') + '>' + esc(c.label) + '</option>';

  // Fees

  // Notes (show when fees enabled or notes non-empty)
  var showNotes = leg.addSightseeingFee || leg.addWaitingFee || (leg.notes && leg.notes.length > 0);
  var notesHtml = showNotes ? [
    '<input class="ch-note-in" type="text" value="' + esc(leg.notes) + '"',
    '  placeholder="Note (e.g. 1–3 hr temple stop, safari wait)…"',

  return [

    '    <div class="' + markerClass + '">',
    tone === 'stay' ? '&#x263E;' : '',
    '    </div>',
    '  </div>',
    '  <div class="ch-tl-body">',
    '    <div class="' + cardToneClass + '">',
    '      <div class="ch-tl-head">',

    '        <div class="ch-tl-cat">',
    '          <div class="ch-input-wrap">',
    '            <select class="ch-input ch-select" data-leg="' + esc(leg.id) + '" data-field="category">',
    catOptions,

    '          <button class="ch-icon-btn" title="Duplicate" data-action="dupLeg" data-leg="' + esc(leg.id) + '">⧉</button>',
    '          <button class="ch-icon-btn danger" title="Remove" data-action="removeLeg" data-leg="' + esc(leg.id) + '">×</button>',

// ── Rate card body renderer ────────────────────────────────────────────────────
function renderRateCardBody() {
  if (!rateCard) {
    return '<div style="color:var(--muted);font-size:13px;padding:12px 0">Loading rate card…</div>';
  }

  var fx = rateCard.fxUsdToLkr;

  // Helper: cents → "$X.XX"
  function usd(cents) {
    return '$' + (cents / 100).toFixed(2);
  }

  // Helper: cents → "Rs X,XXX" (LKR = round(cents × fx / 100))
  function lkr(cents) {
    var val = Math.round(cents * fx / 100);
    return 'Rs ' + val.toLocaleString('en-US');
  }

  // Helper: render a static rate row
  function rateRow(label, hint, valueHtml) {
    return [
      '<div class="ch-rate-row">',
      '  <span class="ch-rate-label">',
      esc(label),
      hint ? '<span class="ch-rate-hint">' + esc(hint) + '</span>' : '',
      '  </span>',
      '  <span class="ch-rate-control" style="font-size:13px;font-weight:600;color:var(--ink);text-align:right">',
      valueHtml,
      '  </span>',
      '</div>',
    ].join('');
  }

  var carKmCents = rateCard.perKmCents.car;
  var vanKmCents = rateCard.perKmCents.van;
  var carFloorCents = rateCard.floorCents.car;
  var vanFloorCents = rateCard.floorCents.van;
  var driverCents = rateCard.chauffeurDayRateCents;
  var bufferPct = rateCard.bufferPct;
  var depositPct = rateCard.depositPct;
  var extras = rateCard.extras;

  var leftCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Per-km rates</div>',
    rateRow('Car', null,
      esc(usd(carKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carKmCents)) + ' /km</span>'),
    rateRow('Van', null,
      esc(usd(vanKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanKmCents)) + ' /km</span>'),
    '  <div class="ch-rate-group-title">Minimum per leg</div>',
    rateRow('Car floor', null,
      esc(usd(carFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carFloorCents)) + '</span>'),
    rateRow('Van floor', null,
      esc(usd(vanFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanFloorCents)) + '</span>'),
    '</div>',
  ].join('');

  var rightCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Chauffeur &amp; buffer</div>',
    rateRow('Driver day rate', null,
      esc(usd(driverCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /day</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(driverCents)) + ' /day</span>'),
    rateRow('Buffer', null, esc(String(bufferPct)) + '%'),
    rateRow('Deposit', null, esc(String(depositPct)) + '%'),
    '  <div class="ch-rate-group-title">Add-ons &amp; FX</div>',
    rateRow('Sightseeing', null,
      esc(usd(extras.sightseeing))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.sightseeing)) + '</span>'),
    rateRow('Waiting', null,
      esc(usd(extras.waiting))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.waiting)) + '</span>'),
    rateRow('Safari wait', null,
      esc(usd(extras['safari-wait']))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras['safari-wait'])) + '</span>'),
    rateRow('FX', 'LKR per USD', 'Rs ' + esc(String(fx)) + ' / $'),
    rateRow('Rate card', 'version', esc(rateCard.version)),
    '</div>',
  ].join('');

  return '<div class="ch-rate-grid">' + leftCol + rightCol + '</div>';
}

// ── Summary card renderer (④) ─────────────────────────────────────────────────
function renderSummaryCardBody() {
  // Error / gated-vehicle / loading state
  if (lastEstimateError) {
    return '<div style="color:var(--muted);font-size:13px;padding:12px 0">' + esc(lastEstimateError) + '</div>';
  }
  if (!lastEstimate) {
    return '<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Fill the itinerary to see pricing.</div>';
  }

  var est = lastEstimate;
  var bkm = est.breakdown && est.breakdown.km ? est.breakdown.km : null;
  var lines = [];

  // km strip
  if (bkm) {
    lines.push('<div class="ch-km-strip">');
    lines.push('  <div class="ch-km"><b>' + esc(String(bkm.distanceKm)) + '</b><span>distance km</span></div>');
    lines.push('  <div class="ch-km"><b>+' + esc(String(bkm.bufferKm)) + '</b><span>buffer km</span></div>');
    lines.push('  <div class="ch-km hero"><b>' + esc(String(bkm.billableKm)) + '</b><span>billable km</span></div>');
    lines.push('</div>');
  }

  // Cost build-up block
  lines.push('<div class="ch-sum-block blue">');
  lines.push('  <div class="ch-sum-head"><div class="ch-dot blue"></div> Cost build-up</div>');

  // Line items from server
  var lineItems = est.lineItems || [];
  lineItems.forEach(function(item) {
    lines.push('  <div class="ch-line">');
    lines.push('    <span class="ch-line-label">' + esc(item.label) + '</span>');
    lines.push('    <span class="ch-line-val">' + esc(item.lkr) + '</span>');
    lines.push('  </div>');
  });

  // Quote total (strong)
  lines.push('  <div class="ch-line strong">');
  lines.push('    <span class="ch-line-label">Quote total</span>');
  lines.push('    <span class="ch-line-val">' + esc(est.total.lkr) + '</span>');
  lines.push('  </div>');

  // Margin
  if (est.margin) {
    lines.push('  <div class="ch-margin">Est. margin ' + esc(est.margin.lkr) + '</div>');
  }

  // Chauffeur product: deposit + due now
  if (est.product === 'chauffeur' && est.deposit && est.amountDueNow) {
    lines.push('  <div class="ch-line">');
    lines.push('    <span class="ch-line-label">Deposit</span>');
    lines.push('    <span class="ch-line-val">' + esc(est.deposit.lkr) + '</span>');
    lines.push('  </div>');
    lines.push('  <div class="ch-line">');
    lines.push('    <span class="ch-line-label">Due now</span>');
    lines.push('    <span class="ch-line-val">' + esc(est.amountDueNow.lkr) + '</span>');
    lines.push('  </div>');
  }

  lines.push('</div>'); // end ch-sum-block

  // Car vs van comparison
  if (est.comparison && est.comparison.car && est.comparison.van) {
    lines.push('<div class="ch-compare">');
    lines.push('  <div class="ch-compare-row"><span>Car</span><b>' + esc(est.comparison.car.total.lkr) + '</b></div>');
    lines.push('  <div class="ch-compare-row"><span>Van 6</span><b>' + esc(est.comparison.van.total.lkr) + '</b></div>');
    lines.push('  <div class="ch-compare-note">Vehicle comparison at same itinerary — for internal reference only.</div>');
    lines.push('</div>');
  }

  // Engine warnings as a tip
  if (est.warnings && est.warnings.length > 0) {
    est.warnings.forEach(function(w) {
      lines.push('<div class="ch-tip">' + esc(w) + '</div>');
    });
  }

  return lines.join('');
}

// ── Flags computation (client-side) ──────────────────────────────────────────
function computeFlags() {
  var st = state;
  var flags = [];

  // red: car luggage limit
  if (st.vehicleType === 'car' && st.luggageCount > 3) {
    flags.push({
      level: 'red',
      title: 'Car luggage limit',
      detail: 'A car fits a maximum of 3 bags — ' + st.luggageCount + ' requested. Confirm with the customer or size up to a van.',
    });
  }

  // red: long drive warning — any leg driveTimeHours >= 6 (add once)
  var hasLongDrive = st.legs.some(function(leg) { return (leg.driveTimeHours || 0) >= 6; });
  if (hasLongDrive) {
    flags.push({
      level: 'red',
      title: 'Long drive warning',
      detail: 'A leg is 6+ hours on the road. Confirm the customer understands the travel time and consider a break or an overnight stop.',
    });
  }

  // orange: hectic itinerary — 3+ consecutive driving dates
  var drivingDates = [];
  st.legs.forEach(function(leg) {
    if (DRIVING_CATS[leg.category] && leg.date) {
      drivingDates.push(leg.date);
    }
  });
  if (maxConsecutiveDates(drivingDates) >= 3) {
    flags.push({
      level: 'orange',
      title: 'Hectic itinerary warning',
      detail: 'Customer is moving on 3+ consecutive days. Consider adding a stay day or trimming stops.',
    });
  }

  // orange: capacity — skip 'custom'
  var vcap = VEHICLE_CAPS[st.vehicleType];
  if (vcap) {
    if (st.passengerCount > vcap.pax || st.luggageCount > vcap.bags) {
      var vLabel = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
      flags.push({
        level: 'orange',
        title: 'Capacity warning',
        detail: st.passengerCount + ' pax + ' + st.luggageCount + ' bags may not fit a ' + vLabel + '. Confirm vehicle type or size up.',
      });
    }
  }

  // Per-leg flags — each type fires at most once
  var flagSeen = {};
  st.legs.forEach(function(leg) {
    // orange: driver stays without the car
    if (!flagSeen.driverNocar && leg.hasDriver && !leg.hasCarStay) {
      flagSeen.driverNocar = true;
      flags.push({
        level: 'orange',
        title: 'Driver stays without the car',
        detail: 'A date has the driver staying but the car returning. Confirm this is intended — usually the car stays with the driver.',
      });
    }

    // orange: safari waiting
    if (!flagSeen.safari && leg.category === 'safari_wait') {
      flagSeen.safari = true;
      flags.push({
        level: 'orange',
        title: 'Safari waiting flagged',
        detail: 'Review safari waiting time and entry timing separately before sending.',
      });
    }

    // blue: airport timing
    if (!flagSeen.airport && (leg.category === 'airport' || /airport|cmb|katunayake/i.test((leg.pickupLocation || '') + ' ' + (leg.dropoffLocation || '')))) {
      flagSeen.airport = true;
      flags.push({
        level: 'blue',
        title: 'Airport timing reminder',
        detail: 'Confirm flight number, landing/departure time, and buffer time.',
      });
    }

    // blue: stopover included
    if (!flagSeen.stopover && (leg.stopovers || []).filter(Boolean).length > 0) {
      flagSeen.stopover = true;
      flags.push({
        level: 'blue',
        title: 'Stopover included',
        detail: 'Confirm whether each stop is a quick break, sightseeing, safari wait, or multi-hour stop.',
      });
    }

    // blue: check distances — driving leg with no distance, not auto-matched, not manual
    if (!flagSeen.distCheck && DRIVING_CATS[leg.category] && (leg.distanceKm || 0) <= 0 && !leg.autoMatched && !leg.manualDistance) {
      flagSeen.distCheck = true;
      flags.push({
        level: 'blue',
        title: 'Check distances',
        detail: 'One or more legs couldn\'t be auto-located. Enter the distance manually to price them.',
      });
    }
  });

  // blue: van minimum applied
  if (lastEstimate && lastEstimate.breakdown && lastEstimate.breakdown.legs) {
    var hasVanMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'van'; });
    if (hasVanMin) {
      flags.push({
        level: 'blue',
        title: 'Van minimum applied',
        detail: 'Minimum 100 km charge used on one or more legs.',
      });
    }
    var hasCarMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'car'; });
    if (hasCarMin) {
      flags.push({
        level: 'blue',
        title: 'Car minimum applied',
        detail: 'Minimum 50 km charge used on one or more legs.',
      });
    }
  }

  // Merge engine warnings as extra blue flags
  if (lastEstimate && lastEstimate.warnings && lastEstimate.warnings.length > 0) {
    lastEstimate.warnings.forEach(function(w) {
      flags.push({ level: 'blue', title: 'Engine note', detail: w });
    });
  }

  return flags;
}

// Helper: max consecutive calendar dates
function maxConsecutiveDates(dates) {
  if (!dates || dates.length === 0) return 0;
  // Deduplicate and convert to epoch days
  var days = [];
  var seen = {};
  dates.forEach(function(d) {
    if (!d || seen[d]) return;
    seen[d] = true;
    days.push(Math.floor(new Date(d).getTime() / 86400000));
  });
  days.sort(function(a, b) { return a - b; });
  var maxRun = 1, run = 1;
  for (var i = 1; i < days.length; i++) {
    if (days[i] === days[i - 1] + 1) {
      run++;
      if (run > maxRun) maxRun = run;
    } else {
      run = 1;
    }
  }
  return maxRun;
}

// ── Flags card renderer (⑤) ──────────────────────────────────────────────────
function renderFlagsCardBody() {
  var flags = computeFlags();

  if (flags.length === 0) {
    return '<div class="ch-flags-clear">&#x2713; No warnings. This itinerary looks clean to send.</div>';
  }

  var MARK = { red: '&#x25B2;', orange: '&#x25CF;', blue: '&#x2139;' };

  var parts = ['<div class="ch-flags">'];
  flags.forEach(function(f) {
    parts.push('<div class="ch-flag tone-' + esc(f.level) + '">');

// ── Output template helpers ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function routeText(leg) {
  if (leg.category === 'stay_day') {
    return 'Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?');
  }
  var parts = [leg.pickupLocation || '?'];
  (leg.stopovers || []).filter(Boolean).forEach(function(s) { parts.push(s); });
  parts.push(leg.dropoffLocation || '?');
  return parts.join(' → ');
}

// M(priceCents) — convert cents to display currency
function M(priceCents) {
  var cur = state.outputCurrency || 'LKR';
  var fx = (lastEstimate && lastEstimate.fxUsdToLkr) ? lastEstimate.fxUsdToLkr : 320;
  if (cur === 'USD') {
    // I3: use toFixed(2) so $40.48 is not rounded to $40
    var dollars = (priceCents / 100).toFixed(2);
    // Add thousands separator to the integer part
    var parts = dollars.split('.');
    parts[0] = parseInt(parts[0], 10).toLocaleString('en-US');
    return '$' + parts[0] + '.' + parts[1];
  }
  // LKR: priceCents is in USD cents, convert via fxUsdToLkr
  return 'LKR ' + Math.round(priceCents * fx / 100).toLocaleString('en-US');
}

// chargeRows — legs that have a price > 0 from lastEstimate.breakdown.legs
function chargeRows() {
  if (!lastEstimate || !lastEstimate.breakdown || !lastEstimate.breakdown.legs) return [];
  var rows = [];
  state.legs.forEach(function(leg, idx) {
    var bl = lastEstimate.breakdown.legs[idx];
    if (bl && bl.priceCents > 0) {
      rows.push({ leg: leg, priceCents: bl.priceCents });
    }
  });
  return rows;
}

function whatsappMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType;
  var driverDays = state.legs.filter(function(l) { return l.hasDriver; }).length;
  var lines = [];
  lines.push('Hi ' + name + ', thank you for sharing the details.', '', 'We can help with this. Based on your itinerary, here is the quote:', '');
  chargeRows().forEach(function(r) {
    lines.push(fmtDate(r.leg.date) + ' — ' + routeText(r.leg) + ' — ' + M(r.priceCents));
  });
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  lines.push('', 'Total: ' + M(totalCents), '', 'This is for a private ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations.');
  if (driverDays > 0) {
    lines.push('It also covers the driver staying with you for the nights marked, including driver meals and accommodation.');
  }
  lines.push('', 'Please let me know if you have any questions or if you would like to proceed.');
  return lines.join('\n');
}

function emailMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType;
  var lines = ['Hi ' + name + ',', '', 'Thank you for reaching out to Ceylon Hop. Based on the itinerary you shared, please find the transport quote below.', ''];
  chargeRows().forEach(function(r) {
    lines.push('  ' + fmtDate(r.leg.date) + '   ' + routeText(r.leg) + '   ' + M(r.priceCents));
  });
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  lines.push('', 'Total (private ' + veh + '): ' + M(totalCents));
  lines.push('', 'This quote includes fuel, driver cost, tolls, and pickup/drop-off from the agreed locations.', '', 'Please let us know if you would like to proceed and we can send over the booking/payment details.', '', 'Best,', 'Roshen', 'Ceylon Hop');
  return lines.join('\n');
}

function notionTable() {
  if (!lastEstimate) return null;
  var veh = (VEHICLE_LABELS[state.vehicleType] || state.vehicleType).toUpperCase();
  var out = [];
  out.push('| Date | Route | Price Given |', '|---|---|---|');
  chargeRows().forEach(function(r) {
    out.push('| ' + fmtDate(r.leg.date) + ' | ' + routeText(r.leg) + ' | ' + M(r.priceCents) + ' |');
  });
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  out.push('| PRIVATE TRANSFER VIA ' + veh + ' |  | ' + M(totalCents) + ' |');
  return out.join('\n');
}

// ── Internal view renderer ────────────────────────────────────────────────────
function renderInternalView() {
  if (!lastEstimate) {
    return '<div style="color:var(--muted);font-size:13px">Price the trip to generate the internal breakdown.</div>';
  }
  var est = lastEstimate;
  var bkm = est.breakdown && est.breakdown.km ? est.breakdown.km : null;
  var blines = est.lineItems || [];
  var driverDays = state.legs.filter(function(l) { return l.hasDriver; }).length;
  var fx = est.fxUsdToLkr || 320;

  var vLabel = VEHICLE_LABELS[state.vehicleType] || state.vehicleType;

  var gridHtml = [
    '<div class="ch-internal-grid">',
    '  <div><span>Customer</span><b>' + esc(state.customerName || '—') + '</b></div>',
    '  <div><span>Pax / Bags</span><b>' + esc(state.passengerCount) + ' / ' + esc(state.luggageCount) + '</b></div>',
    '  <div><span>Vehicle</span><b>' + esc(vLabel) + '</b></div>',
    '  <div><span>Driver nights</span><b>' + driverDays + '</b></div>',
    '  <div><span>Status</span><b>' + esc(STATUS_LABELS[state.status] || state.status) + '</b></div>',
    '  <div><span>FX</span><b>Rs ' + esc(String(fx)) + '/$</b></div>',
    '</div>',
  ].join('');

  // km summary from breakdown
  var kmRows = '';
  if (bkm) {
    kmRows = [
      '<tr><td>Total distance</td><td>' + esc(String(bkm.distanceKm)) + ' km</td></tr>',
      '<tr><td>Total buffer</td><td>+' + esc(String(bkm.bufferKm)) + ' km</td></tr>',
      '<tr><td>Total billable</td><td>' + esc(String(bkm.billableKm)) + ' km</td></tr>',
    ].join('');
  }

  // line items from server
  var lineItemRows = blines.map(function(item) {
    return '<tr class="sec"><td>' + esc(item.label) + '</td><td>' + esc(item.lkr) + '</td></tr>';
  }).join('');

  // Quote total
  var totalRow = '<tr class="hi blue"><td>Quote total</td><td>' + esc(est.total.lkr) + '</td></tr>';
  var marginRow = est.margin ? '<tr><td>Est. margin</td><td>' + esc(est.margin.lkr) + '</td></tr>' : '';

  var tableHtml = [
    '<table class="ch-itable">',
    kmRows,
    lineItemRows,
    totalRow,
    marginRow,
    '</table>',
  ].join('');

  var noteHtml = '<div class="ch-internal-note">For ops only — do not send to customer. All figures in LKR at markup.</div>';

  return gridHtml + tableHtml + noteHtml;
}

// ── Output body renderer ──────────────────────────────────────────────────────
function renderOutputBody() {
  var tab = outputTab;
  var guard = '<div style="color:var(--muted);font-size:13px;padding:16px 0">Price the trip to generate the message.</div>';

  if (tab === 'internal') {
    return renderInternalView();
  } else if (tab === 'whatsapp') {
    var msg = whatsappMessage();
    if (!msg) return guard;
    return '<pre class="ch-pre">' + esc(msg) + '</pre>';
  } else if (tab === 'email') {
    var msg2 = emailMessage();
    if (!msg2) return guard;
    return [
      '<div class="ch-email-subject"><span>Subject</span> Ceylon Hop Transport Quote for Your Sri Lanka Trip</div>',
      '<pre class="ch-pre">' + esc(msg2) + '</pre>',
