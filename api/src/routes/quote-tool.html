    });
  }

  return lines.join('');
}

// ── Flags computation (client-side) ──────────────────────────────────────────
function computeFlags() {
  var st = state;
  var flags = [];

  // red: car luggage limit
  if (st.vehicleType === 'car' && st.luggageCount > 3) {
    flags.push({
      level: 'red',
      title: 'Car luggage limit',
      detail: 'A car fits a maximum of 3 bags — ' + st.luggageCount + ' requested. Confirm with the customer or size up to a van.',
    });
  }

  // red: long drive warning — any leg driveTimeHours >= 6 (add once)
  var hasLongDrive = st.legs.some(function(leg) { return (leg.driveTimeHours || 0) >= 6; });
  if (hasLongDrive) {
    flags.push({
      level: 'red',
      title: 'Long drive warning',
      detail: 'A leg is 6+ hours on the road. Confirm the customer understands the travel time and consider a break or an overnight stop.',
    });
  }

  // orange: hectic itinerary — 3+ consecutive driving dates
  var drivingDates = [];
  st.legs.forEach(function(leg) {
    if (DRIVING_CATS[leg.category] && leg.date) {
      drivingDates.push(leg.date);
    }
  });
  if (maxConsecutiveDates(drivingDates) >= 3) {
    flags.push({
      level: 'orange',
      title: 'Hectic itinerary warning',
      detail: 'Customer is moving on 3+ consecutive days. Consider adding a stay day or trimming stops.',
    });
  }

  // orange: dates out of order — a dated leg is earlier than a dated leg above it.
  // ISO 'YYYY-MM-DD' compares lexicographically, so no Date parsing (TZ-safe).
  (function() {
    var prevDate = null;
    for (var oi = 0; oi < st.legs.length; oi++) {
      var d = st.legs[oi].date;
      if (!d) continue;
      if (prevDate !== null && d < prevDate) {
        flags.push({
          level: 'orange',
          title: 'Dates out of order',
          detail: 'Leg ' + (oi + 1) + ' (' + d + ') is dated before the leg above it — reorder the legs or fix the dates.',
        });
        return;
      }
      prevDate = d;
    }
  })();

  // orange: capacity — server-derived caps; null until rate card loads / for 'custom'
  var vcap = vehicleCaps(st.vehicleType);
  if (vcap) {
    if (st.passengerCount > vcap.pax || st.luggageCount > vcap.bags) {
      var vLabel = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
      flags.push({
        level: 'orange',
        title: 'Capacity warning',
        detail: st.passengerCount + ' pax + ' + st.luggageCount + ' bags may not fit a ' + vLabel + '. Confirm vehicle type or size up.',
      });
    }
  }

  // Per-leg flags — each type fires at most once
  var flagSeen = {};
  st.legs.forEach(function(leg) {
    // orange: safari waiting add-on flagged (now a per-leg add-on, not a category)
    if (!flagSeen.safari && leg.addSafariWait) {
      flagSeen.safari = true;
      flags.push({
        level: 'orange',
        title: 'Safari waiting flagged',
        detail: 'Review safari waiting time and entry timing separately before sending.',
      });
    }

    // blue: airport timing
    if (!flagSeen.airport && (leg.category === 'airport' || /airport|cmb|katunayake/i.test((leg.pickupLocation || '') + ' ' + (leg.dropoffLocation || '')))) {
      flagSeen.airport = true;
      flags.push({
        level: 'blue',
        title: 'Airport timing reminder',
        detail: 'Confirm flight number, landing/departure time, and buffer time.',
      });
    }

    // blue: check distances — driving leg with no distance, not auto-matched, not manual
    if (!flagSeen.distCheck && DRIVING_CATS[leg.category] && (leg.distanceKm || 0) <= 0 && !leg.autoMatched && !leg.manualDistance) {
      flagSeen.distCheck = true;
      flags.push({
        level: 'blue',
        title: 'Check distances',
        detail: 'One or more legs couldn\'t be auto-located. Enter the distance manually to price them.',
      });
    }
  });

  // blue: van minimum applied
  if (lastEstimate && lastEstimate.breakdown && lastEstimate.breakdown.legs) {
    var hasVanMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'van'; });
    if (hasVanMin) {
      flags.push({
        level: 'blue',
        title: 'Van minimum applied',
        detail: 'Minimum 100 km charge used on one or more legs.',
      });
    }
    var hasCarMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'car'; });
    if (hasCarMin) {
      flags.push({
        level: 'blue',
        title: 'Car minimum applied',
        detail: 'Minimum 50 km charge used on one or more legs.',
      });
    }
  }

  // Merge engine warnings as extra blue flags
  if (lastEstimate && lastEstimate.warnings && lastEstimate.warnings.length > 0) {
    lastEstimate.warnings.forEach(function(w) {
      flags.push({ level: 'blue', title: 'Engine note', detail: w });
    });
  }

  return flags;
}

// Helper: max consecutive calendar dates
function maxConsecutiveDates(dates) {
  if (!dates || dates.length === 0) return 0;
  // Deduplicate and convert to epoch days
  var days = [];
  var seen = {};
  dates.forEach(function(d) {
    if (!d || seen[d]) return;
    seen[d] = true;
    // V6: parse date-only locally so consecutive-day math is TZ-stable.
    days.push(Math.floor(parseISODateLocal(d).getTime() / 86400000));
  });
  days.sort(function(a, b) { return a - b; });
  var maxRun = 1, run = 1;
  for (var i = 1; i < days.length; i++) {
    if (days[i] === days[i - 1] + 1) {
      run++;
      if (run > maxRun) maxRun = run;
    } else {
      run = 1;
    }
  }
  return maxRun;
}

// ── Flags card renderer (⑤) ──────────────────────────────────────────────────
function renderFlagsCardBody() {
  var flags = computeFlags();

  if (flags.length === 0) {
    return '<div class="ch-flags-clear">&#x2713; No warnings. This itinerary looks clean to send.</div>';
  }

  var MARK = { red: '&#x25B2;', orange: '&#x25CF;', blue: '&#x2139;' };

  var parts = ['<div class="ch-flags">'];
  flags.forEach(function(f) {
    parts.push('<div class="ch-flag tone-' + esc(f.level) + '">');
    parts.push('  <span class="ch-flag-mark">' + (MARK[f.level] || '&#x2022;') + '</span>');
    parts.push('  <div>');
    parts.push('    <div class="ch-flag-title">' + esc(f.title) + '</div>');
    parts.push('    <div class="ch-flag-detail">' + esc(f.detail) + '</div>');
    parts.push('  </div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}

// ── Date helpers ──────────────────────────────────────────────────────────────
// V6: parse a date-only 'YYYY-MM-DD' as LOCAL midnight (not UTC midnight) so an
// operator west of UTC never shows customers a date one day early.
function parseISODateLocal(iso) {
  var p = String(iso).split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}
function pad2(n) { return (n < 10 ? '0' : '') + n; }
// Manual local YYYY-MM-DD formatting — never round-trips through UTC.
function fmtISODateLocal(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

// ── Output template helpers ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  var d = parseISODateLocal(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function routeText(leg) {
  if (leg.category === 'stay_day') {
    return 'Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?');
  }
  return (leg.pickupLocation || '?') + ' → ' + (leg.dropoffLocation || '?');
}

// M(priceCents) — convert cents to display currency
// USD display formatter (separators + always 2 decimals) — the internal-primary currency.
function fmtUsd(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// USD primary + small LKR reference (LKR string comes from the server response).
function usdWithLkr(cents, lkrStr) {
  return esc(fmtUsd(cents)) + (lkrStr ? '<span class="ch-val-sub">' + esc(lkrStr) + '</span>' : '');
}

function M(priceCents) {
  var cur = state.outputCurrency || 'LKR';
  var fx = (lastEstimate && lastEstimate.fxUsdToLkr) ? lastEstimate.fxUsdToLkr : 320;
  if (cur === 'USD') {
    // I3: use toFixed(2) so $40.48 is not rounded to $40
    var dollars = (priceCents / 100).toFixed(2);
    // Add thousands separator to the integer part
    var parts = dollars.split('.');
    parts[0] = parseInt(parts[0], 10).toLocaleString('en-US');
    return '$' + parts[0] + '.' + parts[1];
  }
  // LKR: priceCents is in USD cents, convert via fxUsdToLkr
  return 'LKR ' + Math.round(priceCents * fx / 100).toLocaleString('en-US');
}

// ── Template row model (V2/S2): rows that sum to the total by construction ────
// The engine returns lineItems already in the right order:
//   PRIVATE  : one travel item PER DRIVING LEG (in driving order), then extras.
//   CHAUFFEUR: day-rate, distance (incl. idle), then extras — no per-leg items.
// The per-leg travel items are identified by meta.billableKm when present; if the
// server strips meta, they are equivalently the FIRST N lineItems where N is the
// number of driving legs (engine pushes leg items before extras). We zip those to
// the driving legs (via the driving-index map) to caption them with date+route.

function legOrderItems() {
  return (lastEstimate && lastEstimate.lineItems) ? lastEstimate.lineItems : [];
}

function drivingLegList() {
  return state.legs.filter(legDrives);
}

// Split lineItems into { travel: [...perDrivingLeg], extras: [...rest] }.
function splitLineItems() {
  var items = legOrderItems();
  var drivingCount = drivingLegList().length;
  // Prefer explicit meta.billableKm markers; fall back to positional (first N).
  var hasMeta = items.some(function(it) { return it.meta && it.meta.billableKm != null; });
  var travel = [];
  var extras = [];
  if (hasMeta) {
    items.forEach(function(it) {
      if (it.meta && it.meta.billableKm != null) travel.push(it);
      else extras.push(it);
    });
  } else {
    items.forEach(function(it, i) {
      if (i < drivingCount) travel.push(it);
      else extras.push(it);
    });
  }
  return { travel: travel, extras: extras };
}

// PRIVATE per-driving-leg rows: { date, route, cents } zipped in driving order.
function privateLegRows() {
  var split = splitLineItems();
  var rows = [];
  var drivingLegs = drivingLegList();
  drivingLegs.forEach(function(leg, di) {
    var item = split.travel[di];
    if (!item) return;
    rows.push({ date: leg.date, route: routeText(leg), cents: item.amountCents });
  });
  return rows;
}

function isChauffeurEstimate() {
  return lastEstimate && lastEstimate.product === 'chauffeur';
}

function productBlurb(veh) {
  if (isChauffeurEstimate()) {
    return 'This is for a chauffeur-driven ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations. It also covers the driver staying with you for the nights marked, including driver meals and accommodation.';
  }
  return 'This is for a private ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations.';
}

function whatsappMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = [];
  lines.push('Hi ' + name + ', thank you for sharing the details.', '', 'We can help with this. Based on your itinerary, here is the quote:', '');

  if (isChauffeurEstimate()) {
    // Itinerary lines UNpriced (driving legs + stay days), in state order.
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push(fmtDate(leg.date) + ' — ' + routeText(leg));
      } else {
        lines.push(fmtDate(leg.date) + ' — Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?'));
      }
    });
    lines.push('');
    // Every engine lineItem as a priced row.
    legOrderItems().forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Deposit to confirm: ' + M(dueCents) + ' (balance on/after the trip).');
  } else {
    // PRIVATE: per driving leg (date — route — price), then extras, then total.
    privateLegRows().forEach(function(r) {
      lines.push(fmtDate(r.date) + ' — ' + r.route + ' — ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
  }

  lines.push('', 'Please let me know if you have any questions or if you would like to proceed.');
  return lines.join('\n');
}

function emailMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = ['Hi ' + name + ',', '', 'Thank you for reaching out to Ceylon Hop. Based on the itinerary you shared, please find the transport quote below.', ''];

  if (isChauffeurEstimate()) {
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push('  ' + fmtDate(leg.date) + '   ' + routeText(leg));
      } else {
        lines.push('  ' + fmtDate(leg.date) + '   Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?'));
      }
    });
    lines.push('');
    legOrderItems().forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Deposit to confirm: ' + M(dueCents) + ' (balance on/after the trip).');
  } else {
    privateLegRows().forEach(function(r) {
      lines.push('  ' + fmtDate(r.date) + '   ' + r.route + '   ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
  }

  lines.push('', productBlurb(veh), '', 'Please let us know if you would like to proceed and we can send over the booking/payment details.', '', 'Best,', 'Roshen', 'Ceylon Hop');
  return lines.join('\n');
}

// ── Internal view renderer ────────────────────────────────────────────────────
function renderInternalView() {

  var est = lastEstimate;
  var bkm = est.breakdown && est.breakdown.km ? est.breakdown.km : null;
  var blines = est.lineItems || [];
  var serviceLabel = (state.service === 'chauffeur') ? 'Chauffeur-guide' : 'Point-to-point';
  var fx = est.fxUsdToLkr || 320;

  var vLabel = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';

  var gridHtml = [
    '<div class="ch-internal-grid">',
    '  <div><span>Customer</span><b>' + esc(state.customerName || '—') + '</b></div>',
    '  <div><span>Pax / Bags</span><b>' + esc(state.passengerCount) + ' / ' + esc(state.luggageCount) + '</b></div>',
    '  <div><span>Vehicle</span><b>' + esc(vLabel) + '</b></div>',

    '  <div><span>FX</span><b>Rs ' + esc(String(fx)) + '/$</b></div>',
    '</div>',
  ].join('');

  // km summary from breakdown
  var kmRows = '';
  if (bkm) {
    kmRows = [
      '<tr><td>Total distance</td><td>' + esc(String(bkm.distanceKm)) + ' km</td></tr>',
      '<tr><td>Total buffer</td><td>+' + esc(String(bkm.bufferKm)) + ' km</td></tr>',
      '<tr><td>Total billable</td><td>' + esc(String(bkm.billableKm)) + ' km</td></tr>',
    ].join('');
  }

  // line items from server
  var lineItemRows = blines.map(function(item) {
    return '<tr class="sec"><td>' + esc(item.label) + '</td><td>' + esc(fmtUsd(item.amountCents)) + ' <span style="color:var(--muted-2)">(' + esc(item.lkr) + ')</span></td></tr>';

  var noteHtml = '<div class="ch-internal-note">For ops only — do not send to customer. All figures in LKR at markup.</div>';

  return gridHtml + tableHtml + noteHtml;

// ── Output body renderer ──────────────────────────────────────────────────────
function renderOutputBody() {
  var tab = outputTab;
  var guard = '<div style="color:var(--muted);font-size:13px;padding:16px 0">Price the trip to generate the message.</div>';

  if (tab === 'internal') {

      '<pre class="ch-pre">' + esc(msg2) + '</pre>',

  return '';
}

// Capture the currently-focused editor input so a full re-render doesn't lose
// the operator's typing. Identified by data-leg+data-field (leg place/distance
// inputs) or element id (customer fields). Returns null when focus is elsewhere.
function captureEditorFocus() {
  var el = document.activeElement;
  if (!el || typeof el.matches !== 'function') return null;
  if (!el.matches('#app input, #app textarea')) return null;
  var leg = el.getAttribute('data-leg');
  var field = el.getAttribute('data-field');
  var id = el.id || null;
  if (!leg && !id) return null;
  var snap = { leg: leg, field: field, id: id, value: el.value, start: null, end: null };
  // selectionStart throws on some input types (e.g. type=number/date) — guard it.
  try { snap.start = el.selectionStart; snap.end = el.selectionEnd; } catch (e) {}
  return snap;
}

function restoreEditorFocus(snap) {
  if (!snap) return;
  var sel;
  if (snap.leg && snap.field) {
    sel = '#app [data-leg="' + snap.leg + '"][data-field="' + snap.field + '"]';
  } else if (snap.id) {
    sel = '#app #' + snap.id;
  } else {
    return;
  }
  var el = document.querySelector(sel);
  if (!el) return;
  // Restore the operator's in-progress text (state may lag a keystroke behind).
  if (typeof snap.value === 'string' && el.value !== snap.value) el.value = snap.value;
  el.focus();
  if (snap.start != null) {
    try { el.setSelectionRange(snap.start, snap.end); } catch (e) {}
  }
}

// ── Event delegation ──────────────────────────────────────────────────────────
function attachEventListeners() {
  // Status select
  var statusSel = document.getElementById('statusSelect');
  if (statusSel) {
    statusSel.addEventListener('change', function() {
      var prevStatus = state.status;
      var newStatus = statusSel.value;
      mutate({ status: newStatus });
      // V9: only persist for an already-saved quote; await + revert on failure so
      // the UI never shows a status the server rejected. (Before first save, the
      // chosen status is carried and synced by saveQuote — see V5.)
      if (state.savedId) {
        apiPatch(state.savedId, { status: newStatus }).then(function(res) {
          if (!res || res.error) {
            showToast('Status update failed — ' + ((res && res.error) || 'unknown error'));
            state.status = prevStatus;
            render();
          }
        });
      }
    });
  }

  // Header buttons
  var btnNew = document.getElementById('btnNew');
  if (btnNew) btnNew.addEventListener('click', newQuote);

  var btnSave = document.getElementById('btnSave');
  if (btnSave) btnSave.addEventListener('click', saveQuote);

  // Customer card fields — live update state without full re-render for text inputs
  var fieldMap = {
    'f-customerName':    function(v) { state.customerName = v; },
    'f-contact':         function(v) { state.contact = v; },
    // V18: server 400s on pax<1 — clamp client-side so we never send it.
    'f-passengerCount':  function(v) { state.passengerCount = Math.max(1, parseInt(v, 10) || 1); },
    'f-luggageCount':    function(v) { state.luggageCount = Math.max(0, parseInt(v, 10) || 0); },
  };
  // I2: only price-affecting fields trigger refreshEstimate+render on change.
  // Text-only fields (customerName, contact) update state on input only —
  // no change→render, which would destroy #btnSave between mousedown and click.
  var priceFields = { 'f-passengerCount': true, 'f-luggageCount': true };
  Object.keys(fieldMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() { fieldMap[id](el.value); });
    if (priceFields[id]) {
      el.addEventListener('change', function() {
        fieldMap[id](el.value);
        refreshEstimate();
        render();
      });
    }
  });

  // Vehicle type select
  var vehicleSel = document.getElementById('f-vehicleType');
  if (vehicleSel) {
    vehicleSel.addEventListener('change', function() {
      mutate({ vehicleType: vehicleSel.value });
    });
  }

  // Event delegation for data-action on the whole app
  // I1: attach these ONCE — #app persists across renders, so adding on every
  // render would accumulate duplicate handlers (N renders → N handler copies).
  var app = document.getElementById('app');
  if (!app) return;

  if (!_delegatesWired) {
    _delegatesWired = true;

  app.addEventListener('click', function(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    var legId = el.getAttribute('data-leg');

    if (action === 'addLeg') {
      var cat = el.getAttribute('data-cat') || 'transfer';
      addLeg(cat);
    } else if (action === 'removeLeg') {
      removeLeg(legId);
    } else if (action === 'dupLeg') {
      dupLeg(legId);
    } else if (action === 'moveLegUp') {
      moveLeg(legId, -1);
    } else if (action === 'moveLegDown') {
      moveLeg(legId, 1);
    } else if (action === 'setService') {
      if (el.disabled) return;
      setService(el.getAttribute('data-service'));
    } else if (action === 'setLegKind') {
      // Travel | Stay switch (chauffeur only). Stay days keep no route/distance.
      var kind = el.getAttribute('data-kind') === 'stay_day' ? 'stay_day' : 'transfer';
      delete _distCache[legId];
      updateLeg(legId, { category: kind });
      if (kind === 'transfer') scheduleAutoDistance(legId);
    } else if (action === 'toggleAddons') {
      legAddonsOpen[legId] = !legAddonsOpen[legId];
      render();
    } else if (action === 'openDrawer') {
      drawerOpen = true;
      render();
      loadRecent();
    } else if (action === 'closeDrawer') {
      drawerOpen = false;
      render();
    } else if (action === 'openRates') {
      ratesOpen = true;
      render();
    } else if (action === 'closeRates') {
      ratesOpen = false;
      render();
    } else if (action === 'toggleOutput') {
      // Resolve the current effective open state (tri-state → bool), then flip to
      // the explicit opposite so one click always toggles what the operator sees.
      var wide = (typeof window !== 'undefined' && window.matchMedia)
        ? window.matchMedia('(min-width: 961px)').matches : true;
      var eff = (outputOpen === null) ? wide : outputOpen;
      outputOpen = !eff;
      render();
    } else if (action === 'manualDistance') {
      updateLeg(legId, { manualDistance: true });
    } else if (action === 'autoDistance') {
      delete _distCache[legId];
      updateLeg(legId, { manualDistance: false, autoMatched: false, distanceKm: 0 });
      scheduleAutoDistance(legId);
    } else if (action === 'setCurrency') {
      mutate({ outputCurrency: el.getAttribute('data-val') });
    } else if (action === 'setTab') {
      outputTab = el.getAttribute('data-tab') || 'whatsapp';
      render();
    } else if (action === 'reopenQuote') {
      // V19: don't reopen when the click landed inside the status select control.
      if (e.target.closest('.ch-select-wrap')) return;
      drawerOpen = false;
      reopenQuote(el.getAttribute('data-qid'));
    } else if (action === 'patchStatus') {
      // handled via change event below
    }
  });

  // Recent panel status change delegation
  app.addEventListener('change', function(e) {
    var el = e.target;
    if (el.getAttribute('data-action') === 'patchStatus') {
      var qid = el.getAttribute('data-qid');
      var newStatus = el.value;
      if (qid) {
        // V9: await + on failure toast and revert (reload the list so the row
        // reflects the server's actual status, never a rejected one).
        apiPatch(qid, { status: newStatus }).then(function(res) {
          if (!res || res.error) {
            showToast('Status update failed — ' + ((res && res.error) || 'unknown error'));
          }
          loadRecent();
        });
      }
      return;
    }
  });

  // Leg field change delegation
  app.addEventListener('change', function(e) {
    var el = e.target;
    var legId = el.getAttribute('data-leg');
    var field = el.getAttribute('data-field');
    if (!legId || !field) return;

    var val;
    if (el.type === 'checkbox') {
      val = el.checked;
    } else if (el.type === 'number') {
      val = parseFloat(el.value) || 0;
    } else {
      val = el.value;
    }
    var patch = {};
    patch[field] = val;
    updateLeg(legId, patch);
  });

  } // end if (!_delegatesWired)

  // Wire place autocomplete on all ch-tl-title inputs (re-attached every render
  // because the input elements themselves are replaced by innerHTML).
  attachAutoComplete();
}

// ── Auto-distance ─────────────────────────────────────────────────────────────
// Per-leg debounce timers and last-fetched from/to cache to avoid redundant fetches.
var _distTimers = {};      // legId → setTimeout handle
var _distCache = {};       // legId → 'from||to' string of the last fetch

function scheduleAutoDistance(legId) {
  clearTimeout(_distTimers[legId]);
  _distTimers[legId] = setTimeout(function() {
    runAutoDistance(legId);
  }, 350);
}

async function runAutoDistance(legId) {
  var leg = state.legs.find(function(l) { return l.id === legId; });
  if (!leg) return;
  // Only drive auto-distance for non-stay legs with both endpoints set, not in manual mode
  if (leg.category === 'stay_day') return;
  if (leg.manualDistance) return;
  var from = (leg.pickupLocation || '').trim();
  var to = (leg.dropoffLocation || '').trim();
  if (!from || !to) return;
  var cacheKey = from + '||' + to;
  if (_distCache[legId] === cacheKey) return; // already fetched this exact from/to
  _distCache[legId] = cacheKey;

  var seg = await apiDistance(from, to);

  // Guard: leg may have changed while we awaited
  var current = state.legs.find(function(l) { return l.id === legId; });
  if (!current || current.manualDistance) return;
  if ((current.pickupLocation || '').trim() !== from) return;
  if ((current.dropoffLocation || '').trim() !== to) return;

  if (seg && seg.km != null) {
    var hrs = Math.round(((seg.durationMin || 0) / 60) * 100) / 100;
    updateLeg(legId, { distanceKm: seg.km, driveTimeHours: hrs, autoMatched: true });
  } else {
    // No distance found → "No distance" warn state
    updateLeg(legId, { distanceKm: 0, driveTimeHours: 0, autoMatched: false });
  }
}

// ── Place autocomplete ────────────────────────────────────────────────────────
// Module-level state for the currently open autocomplete menu.
var _ac = {
  legId: null,
  field: null,
  items: [],
  hiIdx: -1,
  inputEl: null,
  menuEl: null,
  timer: null,
};

function acClose() {
  if (_ac.menuEl && _ac.menuEl.parentNode) {
    _ac.menuEl.parentNode.removeChild(_ac.menuEl);
  }
  _ac.legId = null;
  _ac.field = null;
  _ac.items = [];
  _ac.hiIdx = -1;
  _ac.inputEl = null;
  _ac.menuEl = null;
}

function acPick(name) {
  var legId = _ac.legId;
  var field = _ac.field;
  if (!legId || !field) { acClose(); return; }

  // Update the input value without a full re-render so cursor stays correct
  if (_ac.inputEl) _ac.inputEl.value = name;
  acClose();

  // Patch leg state (this calls render(), wiping the menu — already gone)
  var patch = {};
  patch[field] = name;
  // Clear cache so a new distance fetch runs after the leg updates
  delete _distCache[legId];
  // Use direct state mutation to avoid two renders
  state.legs = state.legs.map(function(l) {
    return l.id === legId ? Object.assign({}, l, patch) : l;
  });
  // Now schedule auto-distance before rendering so the leg is already updated
  scheduleAutoDistance(legId);
  refreshEstimate();
  render();
}

function acRenderMenu(inputEl, items, query) {
  // Remove any existing menu
  if (_ac.menuEl && _ac.menuEl.parentNode) {
    _ac.menuEl.parentNode.removeChild(_ac.menuEl);
    _ac.menuEl = null;
  }
  if (!items || items.length === 0) return;

  var menu = document.createElement('div');
  menu.className = 'ch-ac-menu';

  items.forEach(function(name, idx) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ch-ac-item' + (idx === _ac.hiIdx ? ' hi' : '');
    // Highlight matching substring
    var escaped = esc(name);
    var escapedQuery = esc(query);
    var re = new RegExp('(' + escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    var highlighted = escaped.replace(re, '<b>$1</b>');
    btn.innerHTML = '<span class="ch-ac-pin">📍</span><span class="ch-ac-name">' + highlighted + '</span>';
    btn.addEventListener('mousedown', function(e) {
      e.preventDefault(); // prevent blur before click
      acPick(name);
    });
    menu.appendChild(btn);
  });

  // Position under the input
  var wrap = inputEl.parentNode;
  wrap.style.position = 'relative';
  wrap.appendChild(menu);
  _ac.menuEl = menu;
}

function acUpdateHighlight() {
  if (!_ac.menuEl) return;
  var btns = _ac.menuEl.querySelectorAll('.ch-ac-item');
  btns.forEach(function(b, i) {
    b.classList.toggle('hi', i === _ac.hiIdx);
  });
}

function attachAutoComplete() {
  // Find all place inputs in the current DOM
  var inputs = document.querySelectorAll('.ch-tl-title[data-field="pickupLocation"], .ch-tl-title[data-field="dropoffLocation"]');

  inputs.forEach(function(input) {
    var legId = input.getAttribute('data-leg');
    var field = input.getAttribute('data-field');
    if (!legId || !field) return;

    // Debounced input handler — fetch suggestions
    input.addEventListener('input', function() {
      var q = input.value.trim();
      clearTimeout(_ac.timer);

      if (q.length < 2) {
        acClose();
        return;
      }

      // Track which input is active
      _ac.legId = legId;
      _ac.field = field;
      _ac.inputEl = input;
      _ac.hiIdx = -1;

      _ac.timer = setTimeout(function() {
        apiPlaces(q).then(function(places) {
          // Guard: input must still be the active one
          if (_ac.inputEl !== input) return;
          var limited = places.slice(0, 6);
          _ac.items = limited;
          acRenderMenu(input, limited, q);
        });
      }, 220);
    });

    // Keyboard navigation
    input.addEventListener('keydown', function(e) {
      if (!_ac.menuEl || _ac.inputEl !== input) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _ac.hiIdx = Math.min(_ac.hiIdx + 1, _ac.items.length - 1);
        acUpdateHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _ac.hiIdx = Math.max(_ac.hiIdx - 1, -1);
        acUpdateHighlight();
      } else if (e.key === 'Enter') {
        if (_ac.hiIdx >= 0 && _ac.items[_ac.hiIdx]) {
          e.preventDefault();
          acPick(_ac.items[_ac.hiIdx]);
        }
      } else if (e.key === 'Escape') {
        acClose();
      }
    });

    // Close on blur — small delay so mousedown on an item fires first
    input.addEventListener('blur', function() {
      setTimeout(function() {
        if (_ac.inputEl === input) acClose();
        // Also trigger auto-distance when the user finishes typing manually
        var leg = state.legs.find(function(l) { return l.id === legId; });
        if (leg && !leg.manualDistance) {
          // Update state for the field value (in case user typed without picking)
          var currentVal = input.value;
          if (leg[field] !== currentVal) {
            delete _distCache[legId];
            state.legs = state.legs.map(function(l) {
              return l.id === legId ? Object.assign({}, l, (function() { var p = {}; p[field] = currentVal; return p; })()) : l;
            });
          }
          scheduleAutoDistance(legId);
          refreshEstimate();
        }
      }, 200);
    });
  });

}

// Close autocomplete on outside click — registered once, not per render
document.addEventListener('mousedown', function(e) {
  if (_ac.menuEl && !_ac.menuEl.contains(e.target) && _ac.inputEl !== e.target) {
    acClose();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function boot() {
  render(); // first paint with loading state
  var rc = await apiRateCard();
  if (rc) {
    rateCard = rc;
    render(); // repaint with rate card data
  }
  // Load recent quotes in background (non-blocking)
  loadRecent();
})();
</script>
</body>
</html>
