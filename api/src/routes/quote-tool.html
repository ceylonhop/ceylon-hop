<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ceylon Hop · Quote Generator</title>
<style>
  :root{--bg:#f5f0e8;--card:#fff;--ink:#2a2622;--soft:#7a736a;--line:#e3dccd;--teal:#0ab9b6;--teal-d:#0a7a78}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}
  .wrap{max-width:880px;margin:0 auto}
  h1{font-family:Georgia,serif;font-size:1.7rem;font-weight:700;display:flex;align-items:center;gap:12px}
  h1 .dot{width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:700}
  .sub{color:var(--soft);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;margin-left:46px;margin-top:-4px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h2{font-family:Georgia,serif;font-size:1.15rem;margin-bottom:14px}
  label{display:block;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);margin-bottom:5px}
  input,select{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--teal)}
  .row{display:grid;gap:12px}
  .r4{grid-template-columns:2fr 1fr 1fr 1.6fr}
  .r5{grid-template-columns:1.6fr 1.4fr .8fr .8fr 1.4fr}
  .r3{grid-template-columns:1fr 1fr 1fr}
  .leg{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fdfcf9;position:relative}
  .leg .top{display:grid;grid-template-columns:1.3fr 1fr .8fr;gap:10px;margin-bottom:10px}
  .leg .lr{display:grid;grid-template-columns:1fr 1fr 1.1fr .5fr;gap:10px;align-items:end}
  .leg .opts{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
  .chk{display:flex;align-items:center;gap:6px;font-size:.85rem;text-transform:none;letter-spacing:0}
  .chk input{width:auto}
  .x{background:#f3eee3;border:1px solid var(--line);border-radius:8px;cursor:pointer;padding:9px;color:var(--soft)}
  .ac{position:relative}
  .acmenu{position:absolute;z-index:50;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:240px;overflow:auto;display:none}
  .acmenu.on{display:block}
  .acitem{padding:9px 12px;cursor:pointer;font-size:.9rem;border-bottom:1px solid #f3eee3}
  .acitem:hover,.acitem.sel{background:rgba(10,185,182,.08)}
  .dist{font-size:.8rem;color:var(--teal-d);margin-top:5px}
  button{font:inherit;cursor:pointer}
  .btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:600}.btn:hover{background:var(--teal-d)}
  .ghost{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:8px 14px;color:var(--teal-d);font-weight:600}
  .total{font-family:Georgia,serif;font-size:2.2rem;color:var(--teal-d);font-weight:700}
  .usd{color:var(--soft);font-size:1rem}
  .li{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:.92rem}.li:last-child{border-bottom:none}
  .pill{display:inline-block;background:rgba(10,185,182,.12);color:var(--teal-d);padding:3px 10px;border-radius:99px;font-size:.78rem;font-weight:600;text-transform:capitalize}
  .warn{background:#fff7e6;border:1px solid #f0d999;color:#8a6d1f;padding:9px 12px;border-radius:9px;font-size:.85rem;margin-top:8px}
  .err{background:#fdecea;border:1px solid #f3b4ad;color:#a3271b;padding:11px 14px;border-radius:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .cmp{border:1.5px solid var(--line);border-radius:12px;padding:14px;text-align:center}.cmp b{font-family:Georgia,serif;font-size:1.3rem}
  textarea{width:100%;min-height:160px;padding:12px;border:1.5px solid var(--line);border-radius:10px;font:inherit;resize:vertical}
  .muted{color:var(--soft);font-size:.82rem}
  .banner{background:#eef9f8;border:1px solid #bfe8e6;color:#0a6a68;border-radius:10px;padding:8px 12px;font-size:.78rem;margin-top:10px}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{padding:6px 14px;border:1.5px solid var(--line);border-radius:99px;background:#fff;font-size:.85rem;font-weight:600;color:var(--soft)}
  .tab.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  @media(max-width:700px){.r4,.r5,.r3,.leg .top,.leg .lr,.grid2{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot">C</span> Ceylon Hop</h1>
  <div class="sub">Internal · Quote Generator</div>
  <div class="banner">Autocomplete + auto-distance run server-side — pick a location and the distance fills in (editable). Known SL places work offline; full Google coverage turns on once a server Maps key is set.</div>

  <div class="card">
    <h2>① Customer &amp; Request</h2>
    <div class="row r5">
      <div><label>Customer name</label><input id="name" placeholder="e.g. Nikhil" /></div>
      <div><label>WhatsApp / email</label><input id="contact" placeholder="WhatsApp / email" /></div>
      <div><label>Passengers</label><input id="pax" type="number" min="1" value="2" /></div>
      <div><label>Bags</label><input id="bags" type="number" min="0" value="2" /></div>
      <div><label>Service</label><select id="product"><option value="private">Transfers (point-to-point)</option><option value="chauffeur">Chauffeur (keep car + driver)</option></select></div>
    </div>
    <div class="row r3" style="margin-top:12px">
      <div><label>Vehicle</label><select id="vehicle">
        <option value="car">Car (≤3 pax)</option>
        <option value="van">Van 6 (≤6 pax)</option>
        <option value="van9" disabled>Van 9 — rate pending</option>
        <option value="van14" disabled>Van 14 — rate pending</option>
        <option value="custom" disabled>Custom — rate pending</option>
      </select></div>
      <div></div><div></div>
    </div>
  </div>

  <div class="card">
    <h2>② Itinerary <span class="muted" id="itinHint" style="font-weight:400;font-size:.8rem"></span></h2>
    <div id="legs"></div>
    <button class="ghost" onclick="addLeg()">+ Add leg</button>
  </div>

  <div style="margin-top:18px;display:flex;gap:12px;align-items:center">
    <button class="btn" id="go" onclick="getQuote()">Get Quote</button>
    <span class="muted" id="status"></span>
  </div>
  <div id="result"></div>
  <div class="card" style="margin-top:24px">
    <h2>Recent Quotes</h2>
    <div id="recent"></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
let legId=0;

function adminKey(){ return localStorage.getItem('chAdminKey') || ''; }
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  const k = adminKey(); if(k) headers['x-admin-key'] = k;
  let res = await fetch(path, Object.assign({}, opts, { headers }));
  if(res.status === 401){
    const entered = prompt('Enter the admin key for the quoting tool:');
    if(entered){ localStorage.setItem('chAdminKey', entered); headers['x-admin-key'] = entered;
      res = await fetch(path, Object.assign({}, opts, { headers })); }
  }
  return res;
}

async function apiPlaces(q){ try{ const r=await api('/admin/quote/places?q='+encodeURIComponent(q)); const d=await r.json(); return d.places||[]; }catch(e){ return []; } }
async function apiDistance(from,to){ try{ const r=await api('/admin/quote/distance',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({from,to})}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }

function attachAC(input){
  const wrap=document.createElement('div'); wrap.className='ac';
  input.parentNode.insertBefore(wrap,input); wrap.appendChild(input);
  const menu=document.createElement('div'); menu.className='acmenu'; wrap.appendChild(menu);
  let items=[],seq=0;
  const close=()=>{menu.classList.remove('on');menu.innerHTML='';};
  input.addEventListener('input',async()=>{
    const my=++seq; const sug=await apiPlaces(input.value);
    if(my!==seq) return;
    items=sug;
    if(!sug.length){close();return;}
    menu.innerHTML=sug.map((s,i)=>`<div class="acitem" data-i="${i}">${s}</div>`).join('');
    menu.classList.add('on');
    menu.querySelectorAll('.acitem').forEach(el=>el.onclick=()=>{ input.value=items[+el.dataset.i]; close(); input.dispatchEvent(new Event('change')); });
  });
  input.addEventListener('blur',()=>setTimeout(close,150));
}

function legRow(){
  const id='leg'+(legId++);
  const div=document.createElement('div'); div.className='leg'; div.dataset.id=id;
  div.innerHTML=`
    <div class="top">
      <div><label>Leg type</label><select data-f="type">
        <option value="transfer">Transfer</option>
        <option value="airport">Airport pickup / drop-off</option>
        <option value="train_support">Train / luggage support</option>
        <option value="sightseeing">Sightseeing / waiting</option>
        <option value="safari_wait">Safari waiting</option>
        <option value="stay_day">Stay day (no transfer)</option>
      </select></div>
      <div class="dateCell" style="display:none"><label>Date</label><input data-f="date" type="date"/></div>
      <div></div>
    </div>
    <div class="lr">
      <div><label>From</label><input data-f="from" placeholder="Start typing…" autocomplete="off"/></div>
      <div><label>To</label><input data-f="to" placeholder="Start typing…" autocomplete="off"/></div>
      <div><label>Distance (km)</label><input data-f="distanceKm" type="number" min="0" placeholder="auto"/></div>
      <button class="x" onclick="this.closest('.leg').remove();syncMode()">✕</button>
    </div>
    <div class="dist" data-f="distNote"></div>
    <div class="opts">
      <span class="chk"><input data-f="sightseeing" type="checkbox"/> Sightseeing fee (+$10)</span>
      <span class="chk"><input data-f="waiting" type="checkbox"/> Waiting fee (+$10)</span>
    </div>`;
  return div;
}
function wireLeg(div){
  const from=div.querySelector('[data-f=from]'), to=div.querySelector('[data-f=to]');
  const dist=div.querySelector('[data-f=distanceKm]'), note=div.querySelector('[data-f=distNote]');
  let manual=false; dist.addEventListener('input',()=>{manual=true;});
  const recompute=async()=>{
    if(manual||!from.value.trim()||!to.value.trim()) return;
    note.textContent='measuring…';
    const r=await apiDistance(from.value.trim(),to.value.trim());
    if(r){ dist.value=r.km; note.textContent=`≈ ${r.km} km · ~${Math.floor(r.durationMin/60)?Math.floor(r.durationMin/60)+'h ':''}${r.durationMin%60}m (auto — editable)`; }
    else { note.textContent='no auto-distance for this pair — enter km manually'; }
  };
  attachAC(from); attachAC(to);
  from.addEventListener('change',recompute); to.addEventListener('change',recompute);
  div.querySelector('[data-f=type]').addEventListener('change',()=>syncStay(div));
  syncStay(div);
}
function syncStay(div){
  const stay=div.querySelector('[data-f=type]').value==='stay_day';
  div.querySelector('[data-f=to]').closest('div').style.display=stay?'none':'';
  div.querySelector('[data-f=distanceKm]').closest('div').style.display=stay?'none':'';
  div.querySelector('[data-f=from]').closest('div').querySelector('label').textContent=stay?'Staying at':'From';
}
function addLeg(){ const d=legRow(); $('legs').appendChild(d); wireLeg(d); syncMode(); }

function syncMode(){
  const ch=$('product').value==='chauffeur';
  $('itinHint').textContent=ch?'· car + driver retained; add Stay days for idle days (they bill the minimum)':'· each leg priced point-to-point';
  document.querySelectorAll('.dateCell').forEach(e=>e.style.display=ch?'':'none');
}
$('product').addEventListener('change',syncMode);

function collect(){
  const legs=[...document.querySelectorAll('.leg')].map(L=>{
    const o={}; L.querySelectorAll('[data-f]').forEach(el=>{ if(el.dataset.f==='distNote')return; o[el.dataset.f]=el.type==='checkbox'?el.checked:el.value; }); return o;
  });
  return { name:$('name').value, pax:+$('pax').value||1, bags:+$('bags').value||0, product:$('product').value, vehicle:$('vehicle').value, legs };
}

async function getQuote(){
  $('status').textContent='Pricing…'; $('go').disabled=true;
  try{
    const res=await api('/admin/quote/estimate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(collect())});
    const d=await res.json();
    if(!res.ok){ render(`<div class="card"><div class="err">${esc(d.error||'Error')}</div></div>`); return; }
    renderResult(d);
  }catch(e){ render(`<div class="card"><div class="err">${esc(String(e))}</div></div>`); }
  finally{ $('status').textContent=''; $('go').disabled=false; }
}
function render(h){ $('result').innerHTML=h; }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
let DRAFTS={};
function showTab(which,btn){ $('draftBox').value=DRAFTS[which]||''; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); btn.classList.add('on'); }
function renderResult(d){
  DRAFTS=d.drafts||{};
  const li=d.lineItems.map(x=>`<div class="li"><span>${esc(x.label)}</span><b>${x.lkr} <span class="muted">${x.usd}</span></b></div>`).join('');
  const warn=(d.warnings||[]).filter(w=>w!=='margin not modelled for shared').map(w=>`<div class="warn">⚠️ ${esc(w)}</div>`).join('');
  const margin=d.margin?`<div class="li"><span class="muted">Est. margin (internal)</span><b class="muted">${d.margin.lkr} ${d.margin.usd}</b></div>`:'';
  const cmp=d.comparison?`<div class="card"><h2>Car vs Van</h2><div class="grid2">
      <div class="cmp"><div class="muted">Car</div><b>${d.comparison.car.total?d.comparison.car.total.lkr:'—'}</b><div class="muted">${d.comparison.car.total?d.comparison.car.total.usd:(d.comparison.car.error||'')}</div></div>
      <div class="cmp"><div class="muted">Van</div><b>${d.comparison.van.total?d.comparison.van.total.lkr:'—'}</b><div class="muted">${d.comparison.van.total?d.comparison.van.total.usd:(d.comparison.van.error||'')}</div></div>
    </div></div>`:'';
  render(`
    <div class="card">
      <h2>③ Pricing Summary <span class="pill">${esc(d.product)}</span></h2>
      <div class="total">${d.total.lkr}</div>
      <div class="usd">~${d.total.usd} · FX ${d.fxUsdToLkr} LKR/$ · deposit ${d.deposit.lkr} · due now ${d.amountDueNow.lkr}</div>
      ${warn}<div style="margin-top:14px">${li}${margin}</div>
      <div style="margin-top:14px;display:flex;gap:12px;align-items:center">
        <button class="btn" id="saveBtn" onclick="saveQuote()">Save quote</button>
        <span id="saveMsg"></span>
      </div>
    </div>
    ${cmp}
    <div class="card">
      <h2>④ Quote Output</h2>
      <div class="tabs">
        <button class="tab on" onclick="showTab('whatsapp',this)">WhatsApp</button>
        <button class="tab" onclick="showTab('email',this)">Email</button>
        <button class="tab" onclick="showTab('notion',this)">Notion</button>
      </div>
      <textarea id="draftBox">${esc(DRAFTS.whatsapp||'')}</textarea>
      <div style="margin-top:10px"><button class="ghost" onclick="navigator.clipboard.writeText($('draftBox').value);this.textContent='Copied ✓'">Copy</button></div>
    </div>`);
}

async function saveQuote(){
  const payload = collect();
  payload.name = ($('name').value || '').trim();
  payload.contact = ($('contact') ? $('contact').value.trim() : '');
  const res = await api('/admin/quote/save', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(payload) });
  const d = await res.json();
  if(!res.ok){ $('saveMsg').textContent = d.error || 'Save failed'; return; }
  $('saveMsg').innerHTML = 'Saved as <b>'+d.reference+'</b>';
  loadRecent();
}

async function loadRecent(){
  const res = await api('/admin/quote/list');
  if(!res.ok) return;
  const { quotes } = await res.json();
  $('recent').innerHTML = quotes.map(function(q){
    return '<div class="qrow" data-id="'+q.id+'"><span class="qref">'+q.reference+'</span>'
      + '<span>'+(q.customerName||'—')+'</span>'
      + '<span>'+q.product+'</span>'
      + '<span class="qtotal">'+q.totalCents+'</span>'
      + '<select class="qstatus">'
      + ['draft','sent','won','lost','expired'].map(function(s){ return '<option'+(s===q.status?' selected':'')+'>'+s+'</option>'; }).join('')
      + '</select></div>';
  }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('.qrow .qstatus'), function(sel){
    sel.addEventListener('change', function(){
      const id = sel.closest('.qrow').getAttribute('data-id');
      api('/admin/quote/'+id, { method:'PATCH', headers:{'content-type':'application/json'}, body: JSON.stringify({ status: sel.value }) });
    });
  });
}

addLeg();
syncMode();
loadRecent();
</script>
</body>
</html>
