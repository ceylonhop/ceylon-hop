// GL-1a: copy the active tab's message for manual paste into WhatsApp/email (owner
// decision 2026-07-02 — no deep link; the operator sends it themselves).
function copyOutputText() {
  // Maker-checker hard guard (belt-and-braces behind the disabled button): the customer
  // message can't be copied until the quote is approved.
  if (!copyUnlocked()) { showToast('Approve the quote first — copy unlocks at “Ready to send”'); return; }
  var text = null;
  if (outputTab === 'whatsapp') {
    text = whatsappMessage();
  } else if (outputTab === 'email') {
    var body = emailMessage();
    if (body) text = 'Subject: Ceylon Hop Transport Quote for Your Sri Lanka Trip\n\n' + body;
  }
  if (!text) { showToast('Price the trip first'); return; }
  var done = function() {
    showToast(outputTab === 'whatsapp' ? 'Copied — paste into WhatsApp' : 'Copied — paste into your email');
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function() { legacyCopy(text); done(); });
  } else {
    legacyCopy(text);
    done();
  }
}

// execCommand fallback for non-secure contexts (clipboard API needs HTTPS/localhost).
function legacyCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) { /* best effort */ }
  document.body.removeChild(ta);
}

function renderOutputBody() {
  var tab = outputTab;
  var guard = '<div style="color:var(--muted);font-size:13px;padding:16px 0">Price the trip to generate the message.</div>';

  if (tab === 'internal') {
    return renderInternalView(); // never gated — internal-only ops summary
  }

  // Copy gate: before approval, a support agent can't lift the customer message out at
  // all (lock card). The founder still sees it — they need to review the exact wording —
  // but with a "not yet sendable" note, and Copy stays disabled for everyone until ready.
  if (!copyUnlocked() && !isApprover()) {
    return [
      '<div class="ch-copy-lock">',
      '  <div class="ch-copy-lock-icon">&#x1F512;</div>',
      '  <div class="ch-copy-lock-title">Waiting on approval</div>',
      '  <div class="ch-copy-lock-sub">The customer message unlocks once the founder marks this quote <b>Ready to send</b>.</div>',
      '</div>',
    ].join('');
  }
  var reviewNote = (!copyUnlocked() && isApprover())
    ? '<div class="ch-copy-review-note">Preview for review — approve the quote to make it sendable.</div>'
    : '';

  if (tab === 'whatsapp') {
    var msg = whatsappMessage();
    if (!msg) return guard;
    return reviewNote + '<pre class="ch-pre">' + esc(msg) + '</pre>';
  } else if (tab === 'email') {
    var msg2 = emailMessage();
    if (!msg2) return guard;
    return [
      reviewNote,

      '<pre class="ch-pre">' + esc(msg2) + '</pre>',
    ].join('');
  }
  return '';
}

const STATUS_PILL_TONE = {

// once approved, mark sent — never approve. The founder reviews, approves (or self-approves
// a draft in one hop), sends back, or edits in place. Buttons are data-action delegated.
function renderActionBar() {
  var s = state.status, approver = isApprover(), out = [];
  var B = function(action, label, cls) { return '<button class="ch-btn ' + cls + '" data-action="' + action + '">' + label + '</button>'; };
  var SAVE = B('saveDraft', 'Save', 'ch-btn-outline'); // persist edits, keep status
  if (approver) {
    if (s === 'draft' || s === 'changes_requested') { out.push(B('approveReady', 'Approve — ready to send', 'ch-btn-teal'), SAVE); }
    else if (s === 'pending_review') { out.push(B('approveReady', 'Approve — ready to send', 'ch-btn-teal'), B('sendBack', 'Send back for changes', 'ch-btn-outline'), SAVE); }
    else if (s === 'ready') { out.push(B('markSent', 'Mark as sent', 'ch-btn-primary'), B('reopenToDraft', 'Reopen to edit', 'ch-btn-ghost')); }
    else if (s === 'sent') { out.push(B('markWon', 'Mark booked', 'ch-btn-teal'), B('markLost', 'Mark lost', 'ch-btn-ghostdanger')); }
  } else {
    if (s === 'draft') { out.push(B('submitForReview', 'Submit for review', 'ch-btn-teal'), SAVE); }
    else if (s === 'changes_requested') { out.push(B('submitForReview', 'Resubmit for review', 'ch-btn-teal'), SAVE); }
    else if (s === 'ready') { out.push(B('markSent', 'Mark as sent to customer', 'ch-btn-primary')); }
    else if (s === 'sent') { out.push(B('markWon', 'Mark booked', 'ch-btn-teal'), B('markLost', 'Mark lost', 'ch-btn-ghostdanger')); }
    // pending_review → awaiting the founder; no support actions (read-only)
  }
  return out.join('');
}

// After a full re-render blows away the open autocomplete menu, rebuild it
// against the fresh input node so it doesn't vanish mid-selection (the "dropdown
// disappears before I can click" symptom when a background estimate/distance
// render lands while the operator is choosing a place). _ac still holds the last
// fetched items + highlight index; we just need the new DOM node to anchor to.
function reopenAutoCompleteMenu() {
  if (!_ac.legId || !_ac.field || !_ac.items || _ac.items.length === 0) return;
  var sel = '#quoteRoot .ch-app [data-leg="' + _ac.legId + '"][data-field="' + _ac.field + '"]';
  var input = document.querySelector(sel);
  if (!input) return;
  // Only reopen while the operator is actually in this field.
  if (document.activeElement !== input) return;
  _ac.inputEl = input;
  acRenderMenu(input, _ac.items, input.value || '');
}

// Capture the currently-focused editor input so a full re-render doesn't lose
// the operator's typing. Identified by data-leg+data-field (leg place/distance
// inputs) or element id (customer fields). Returns null when focus is elsewhere.
function captureEditorFocus() {
  var el = document.activeElement;
  if (!el || typeof el.matches !== 'function') return null;
  if (!el.matches('#quoteRoot .ch-app input, #quoteRoot .ch-app textarea')) return null;
  var leg = el.getAttribute('data-leg');
  var field = el.getAttribute('data-field');
  var id = el.id || null;
  if (!leg && !id) return null;
  var snap = { leg: leg, field: field, id: id, value: el.value, start: null, end: null };
  // selectionStart throws on some input types (e.g. type=number/date) — guard it.
  try { snap.start = el.selectionStart; snap.end = el.selectionEnd; } catch (e) {}
  return snap;
}

function restoreEditorFocus(snap) {
  if (!snap) return;
  var sel;
  if (snap.leg && snap.field) {
    sel = '#quoteRoot .ch-app [data-leg="' + snap.leg + '"][data-field="' + snap.field + '"]';
  } else if (snap.id) {
    sel = '#quoteRoot .ch-app #' + snap.id;
  } else {
    return;
  }
  var el = document.querySelector(sel);
  if (!el) return;
  // Restore the operator's in-progress text (state may lag a keystroke behind).
  if (typeof snap.value === 'string' && el.value !== snap.value) el.value = snap.value;
  el.focus();
  if (snap.start != null) {
    try { el.setSelectionRange(snap.start, snap.end); } catch (e) {}
  }
  // Reopen the live autocomplete after a background re-render ONLY while the operator is
  // still actively searching. After a commit (acPick) `_ac.committed` stays true, so a
  // just-picked place does not spuriously reopen the dropdown on every follow-up render.
  if (snap.leg && snap.field && el.classList && el.classList.contains('ch-tl-title') && !_ac.committed) {
    requestAutocomplete(el, snap.leg, snap.field, (el.value || '').trim());
  }
}

// ── Event delegation ──────────────────────────────────────────────────────────
// The status dropdown + New/Save header buttons were replaced by the maker-checker
// action bar (data-action delegated in the app-level click handler above), so this
// function now only wires the free-text customer fields.
function attachEventListeners() {

  // Customer card fields — live update state without full re-render for text inputs
  var fieldMap = {
    'f-customerName':    function(v) { state.customerName = v; },
    'f-contact':         function(v) { state.contact = v; },
    // V18: server 400s on pax<1 — clamp client-side so we never send it.
    'f-passengerCount':  function(v) { state.passengerCount = Math.max(1, parseInt(v, 10) || 1); },
    'f-luggageCount':    function(v) { state.luggageCount = Math.max(0, parseInt(v, 10) || 0); },
  };
  // I2: only price-affecting fields trigger refreshEstimate+render on change.
  // Text-only fields (customerName, contact) update state on input only —
  // no change→render, which would destroy #btnSave between mousedown and click.
  var priceFields = { 'f-passengerCount': true, 'f-luggageCount': true };
  Object.keys(fieldMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() { fieldMap[id](el.value); });
    if (priceFields[id]) {
      el.addEventListener('change', function() {
        fieldMap[id](el.value);
        refreshEstimate();
        render();
      });
    }
  });

  // (Vehicle selection is now the chip row in the money pane — see renderVehicleChips and
  // the delegated 'setVehicle' action; the old header select is gone.)

  // GL-1d: operator's custom $/km for Van 14/Custom (empty → price at the prefill default).
  var customRateIn = document.getElementById('f-customRate');
  if (customRateIn) {
    customRateIn.addEventListener('change', function() {
      var v = parseFloat(customRateIn.value);
      mutate({ customRatePerKm: (isNaN(v) || v <= 0) ? null : v });
    });
  }

  // Event delegation for data-action on the whole app
  // I1: attach these ONCE — the render target persists across renders, so adding on every
  // render would accumulate duplicate handlers (N renders → N handler copies).
  var app = document.querySelector('#quoteRoot .ch-app');
  if (!app) return;

  if (!_delegatesWired) {
    _delegatesWired = true;

  app.addEventListener('click', function(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    var legId = el.getAttribute('data-leg');

    if (action === 'addLeg') {
      var cat = el.getAttribute('data-cat') || 'transfer';
      addLeg(cat);
    } else if (action === 'removeLeg') {
      removeLeg(legId);
    } else if (action === 'dupLeg') {
      dupLeg(legId);
    } else if (action === 'moveLegUp') {
      moveLeg(legId, -1);
    } else if (action === 'moveLegDown') {
      moveLeg(legId, 1);
    } else if (action === 'setService') {
      if (el.disabled) return;
      setService(el.getAttribute('data-service'));
    } else if (action === 'setVehicle') {
      // Same mutation the old header select performed — switching tier clears the
      // custom $/km so a rate set for one vehicle never silently prices another (GL-1d).
      mutate({ vehicleType: el.getAttribute('data-veh'), customRatePerKm: null });
    } else if (action === 'setLegKind') {
      // Travel | Stay switch (chauffeur only). Stay days keep no route/distance.
      var kind = el.getAttribute('data-kind') === 'stay_day' ? 'stay_day' : 'transfer';
      delete _distCache[legId];
      updateLeg(legId, { category: kind });
      if (kind === 'transfer') scheduleAutoDistance(legId);
    } else if (action === 'toggleAddons') {
      legAddonsOpen[legId] = !legAddonsOpen[legId];
      render();
    } else if (action === 'backToQueue') {
      if (window.opsGoQuotes) window.opsGoQuotes();
    } else if (action === 'saveDraft') {
      saveQuote();
    } else if (action === 'submitForReview') {
      submitForReview();
    } else if (action === 'approveReady') {
      approveReady();
    } else if (action === 'sendBack') {
      sendBackOpen = true;
      render();
      var ta = document.getElementById('sendBackNote');
      if (ta) ta.focus();
    } else if (action === 'confirmSendBack') {
      confirmSendBack();
    } else if (action === 'cancelSendBack') {
      sendBackOpen = false;
      render();
    } else if (action === 'markSent') {
      markSent();
    } else if (action === 'markWon') {
      markOutcome('won');
    } else if (action === 'markLost') {
      markOutcome('lost');
    } else if (action === 'reopenToDraft') {
      reopenToDraft();
    } else if (action === 'openRates') {
      ratesOpen = true;
      render();
    } else if (action === 'closeRates') {
      ratesOpen = false;
      render();
    } else if (action === 'toggleOutput') {
      // Resolve the current effective open state (tri-state → bool), then flip to
      // the explicit opposite so one click always toggles what the operator sees.
      var wide = (typeof window !== 'undefined' && window.matchMedia)
        ? window.matchMedia('(min-width: 961px)').matches : true;
      var eff = (outputOpen === null) ? wide : outputOpen;
      outputOpen = !eff;
      render();
    } else if (action === 'manualDistance') {
      updateLeg(legId, { manualDistance: true });
    } else if (action === 'autoDistance') {
      delete _distCache[legId];
      updateLeg(legId, { manualDistance: false, autoMatched: false, distanceKm: 0 });
      scheduleAutoDistance(legId);
    } else if (action === 'setCurrency') {
      mutate({ outputCurrency: el.getAttribute('data-val') });
    } else if (action === 'copyOutput') {
      copyOutputText(); // GL-1a: manual copy → WhatsApp/email
    } else if (action === 'setTab') {
      outputTab = el.getAttribute('data-tab') || 'whatsapp';
      render();
    }
  });

  // Leg field change delegation
  app.addEventListener('change', function(e) {
    var el = e.target;
    var legId = el.getAttribute('data-leg');
    var field = el.getAttribute('data-field');
    if (!legId || !field) return;

    var val;
    if (el.type === 'checkbox') {
      val = el.checked;
    } else if (el.type === 'number') {
      val = parseFloat(el.value) || 0;
    } else {
      val = el.value;
    }
    // No past dates: reject a typed/pasted leg date before today (native min guards the
    // calendar; this guards direct entry). Clear the field and tell the operator why.
    if (field === 'date' && val && val < fmtISODateLocal(new Date())) {
      el.value = '';
      showToast("Trip dates can't be in the past.");
      updateLeg(legId, { date: '' });
      return;
    }
    var patch = {};
    patch[field] = val;
    updateLeg(legId, patch);
  });

  } // end if (!_delegatesWired)

  // Wire place autocomplete on all ch-tl-title inputs (re-attached every render
  // because the input elements themselves are replaced by innerHTML).
  attachAutoComplete();
}

// ── Auto-distance ─────────────────────────────────────────────────────────────
// Per-leg debounce timers and last-fetched from/to cache to avoid redundant fetches.
var _distTimers = {};      // legId → setTimeout handle
var _distCache = {};       // legId → 'from||to' string of the last fetch

function scheduleAutoDistance(legId) {
  clearTimeout(_distTimers[legId]);
  _distTimers[legId] = setTimeout(function() {
    runAutoDistance(legId);
  }, 350);
}

async function runAutoDistance(legId) {
  var leg = state.legs.find(function(l) { return l.id === legId; });
  if (!leg) return;
  // Only drive auto-distance for non-stay legs with both endpoints set, not in manual mode
  if (leg.category === 'stay_day') return;
  if (leg.manualDistance) return;
  var from = (leg.pickupLocation || '').trim();
  var to = (leg.dropoffLocation || '').trim();
  if (!from || !to) return;
  var cacheKey = from + '||' + to;
  if (_distCache[legId] === cacheKey) return; // already fetched this exact from/to
  _distCache[legId] = cacheKey;

  var seg = await apiDistance(from, to);

  // Guard: leg may have changed while we awaited
  var current = state.legs.find(function(l) { return l.id === legId; });
  if (!current || current.manualDistance) return;
  if ((current.pickupLocation || '').trim() !== from) return;
  if ((current.dropoffLocation || '').trim() !== to) return;

  if (seg && seg.km != null) {
    var hrs = Math.round(((seg.durationMin || 0) / 60) * 100) / 100;
    updateLeg(legId, { distanceKm: seg.km, driveTimeHours: hrs, autoMatched: true });
  } else {
    // No distance found → "No distance" warn state
    updateLeg(legId, { distanceKm: 0, driveTimeHours: 0, autoMatched: false });
  }
}

// ── Place autocomplete ────────────────────────────────────────────────────────
// Module-level state for the currently open autocomplete menu.
var _ac = {
  legId: null,
  field: null,
  items: [],
  hiIdx: -1,
  inputEl: null,
  menuEl: null,
  timer: null,
  seq: 0,
  committed: false,
  openedAt: 0,
};

function acClose(invalidate) {
  if (invalidate !== false) _ac.seq++;
  if (_ac.menuEl && _ac.menuEl.parentNode) {
    _ac.menuEl.parentNode.removeChild(_ac.menuEl);
  }
  _ac.legId = null;
  _ac.field = null;
  _ac.items = [];
  _ac.hiIdx = -1;
  _ac.inputEl = null;
  _ac.menuEl = null;
  _ac.committed = false;
}

function acPick(item) {
  var legId = _ac.legId;
  var field = _ac.field;
  if (!legId || !field) { acClose(); return; }
  var name = (typeof item === 'string') ? item : (item && item.label) || '';
  _ac.committed = true;
  _ac.seq++;

  // Update the input value without a full re-render so cursor stays correct
  if (_ac.inputEl) _ac.inputEl.value = name;
  acClose(false);
  // acClose() clears `committed`; re-assert it so the render() below — and any
  // follow-up auto-distance/estimate re-render — does NOT reopen the dropdown for
  // the place we just picked (restoreEditorFocus refocuses this field on every
  // render). Cleared again on the next keystroke (requestAutocomplete) or blur.
  _ac.committed = true;

  // Patch leg state (this calls render(), wiping the menu — already gone)
  var patch = {};
  patch[field] = name;
  // Clear cache so a new distance fetch runs after the leg updates
  delete _distCache[legId];
  // Use direct state mutation to avoid two renders
  state.legs = state.legs.map(function(l) {
    return l.id === legId ? Object.assign({}, l, patch) : l;
  });
  markDirty();
  // Now schedule auto-distance before rendering so the leg is already updated
  scheduleAutoDistance(legId);
  refreshEstimate();
  render();
}

function acRenderMenu(inputEl, items, query, opts) {
  opts = opts || {};
  items = items || [];
  _ac.items = items;
  // Remove any existing menu
  if (_ac.menuEl && _ac.menuEl.parentNode) {
    _ac.menuEl.parentNode.removeChild(_ac.menuEl);
    _ac.menuEl = null;
  }
  if (items.length === 0 && !opts.loading) return;

  var menu = document.createElement('div');
  menu.className = 'ch-ac-menu';

  items.forEach(function(item, idx) {
    var name = (typeof item === 'string') ? item : (item && item.label) || '';
    var source = (typeof item === 'string') ? 'google' : ((item && item.source) || 'google');
    var sourceLabel = source === 'known' ? 'Popular Route' : 'Google';
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ch-ac-item' + (idx === _ac.hiIdx ? ' hi' : '');
    // Highlight matching substring
    var escaped = esc(name);
    var escapedQuery = esc(query);
    var re = new RegExp('(' + escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    var highlighted = escaped.replace(re, '<b>$1</b>');
    btn.innerHTML = '<span class="ch-ac-pin">📍</span><span class="ch-ac-name">' + highlighted + '</span><span class="ch-ac-source">' + sourceLabel + '</span>';
    btn.addEventListener('mousedown', function(e) {
      e.preventDefault(); // prevent blur before click
      acPick(item);
    });
    menu.appendChild(btn);
  });

  if (opts.loading) {
    var loading = document.createElement('button');
    loading.type = 'button';
    loading.className = 'ch-ac-item loading';
    loading.disabled = true;
    loading.setAttribute('aria-disabled', 'true');
    loading.innerHTML = '<span class="ch-ac-pin">⌕</span><span class="ch-ac-name">Searching Google…</span><span class="ch-ac-source">Google</span>';
    menu.appendChild(loading);
  }

  // Position under the input
  var wrap = inputEl.parentNode;
  wrap.style.position = 'relative';
  wrap.appendChild(menu);
  _ac.menuEl = menu;
  _ac.openedAt = Date.now();
}

function acUpdateHighlight() {
  if (!_ac.menuEl) return;
  var btns = _ac.menuEl.querySelectorAll('.ch-ac-item:not(.loading)');
  btns.forEach(function(b, i) {
    b.classList.toggle('hi', i === _ac.hiIdx);
  });
}

function attachAutoComplete() {
  // Find all place inputs in the current DOM
  var inputs = document.querySelectorAll('.ch-tl-title[data-field="pickupLocation"], .ch-tl-title[data-field="dropoffLocation"]');

  inputs.forEach(function(input) {
    var legId = input.getAttribute('data-leg');
    var field = input.getAttribute('data-field');
    if (!legId || !field) return;

    // Debounced input handler — fetch suggestions
    input.addEventListener('input', function() {
      requestAutocomplete(input, legId, field, input.value.trim());
    });

    // Keyboard navigation
    input.addEventListener('keydown', function(e) {
      if (!_ac.menuEl || _ac.inputEl !== input) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _ac.hiIdx = Math.min(_ac.hiIdx + 1, _ac.items.length - 1);
        acUpdateHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _ac.hiIdx = Math.max(_ac.hiIdx - 1, -1);
        acUpdateHighlight();
      } else if (e.key === 'Enter') {
        if (_ac.hiIdx >= 0 && _ac.items[_ac.hiIdx]) {
          e.preventDefault();
          acPick(_ac.items[_ac.hiIdx]);
        }
      } else if (e.key === 'Escape') {
        acClose();
      }
    });

    // Close on blur — small delay so mousedown on an item fires first
    input.addEventListener('blur', function() {
      setTimeout(function() {
        if (_ac.inputEl === input) acClose();
        // Also trigger auto-distance when the user finishes typing manually
        var leg = state.legs.find(function(l) { return l.id === legId; });
        if (leg && !leg.manualDistance) {
          // Only react when the operator ACTUALLY changed the place text. A background
          // estimate/distance re-render (render() swaps the render target's innerHTML, then restores
          // focus) makes this now-detached input fire a spurious async 'blur' with an
          // unchanged value. Re-pricing on that looped render→blur→estimate→render — the
          // destination field flickering and "calculating distance" forever.
          var currentVal = input.value;
          if (leg[field] !== currentVal) {
            delete _distCache[legId];
            state.legs = state.legs.map(function(l) {
              return l.id === legId ? Object.assign({}, l, (function() { var p = {}; p[field] = currentVal; return p; })()) : l;
            });
            markDirty();
            scheduleAutoDistance(legId);
            refreshEstimate();
          }
        }
      }, 200);
    });
  });

}

function requestAutocomplete(input, legId, field, q) {
  clearTimeout(_ac.timer);

  if (q.length < 2) {
    acClose();
    return;
  }

  // Track which input is active
  _ac.legId = legId;
  _ac.field = field;
  _ac.inputEl = input;
  _ac.hiIdx = -1;
  _ac.committed = false;
  var requestSeq = ++_ac.seq;
  acRenderMenu(input, [], q, { loading: true });

  _ac.timer = setTimeout(function() {
    apiPlaces(q).then(function(places) {
      if (requestSeq !== _ac.seq || _ac.committed) return;
      // Guard: input must still be the active one. A background estimate/distance
      // render can replace this DOM node while the autocomplete request is in flight;
      // re-anchor to the fresh focused field instead of dropping valid suggestions.
      var targetInput = input;
      if (_ac.inputEl !== input) {
        var fresh = document.querySelector('#quoteRoot .ch-app [data-leg="' + legId + '"][data-field="' + field + '"]');
        if (!fresh || document.activeElement !== fresh || (fresh.value || '').trim() !== q) return;
        _ac.inputEl = fresh;
        targetInput = fresh;
      } else if (document.activeElement !== input || (input.value || '').trim() !== q) {
        return;
      }
      var limited = places.slice(0, 6);
      _ac.items = limited;
      acRenderMenu(targetInput, limited, q);
    });
  }, 220);
}

// Close autocomplete on outside click — registered once, not per render
document.addEventListener('mousedown', function(e) {
  if (_ac.menuEl && !_ac.menuEl.contains(e.target) && _ac.inputEl !== e.target) {
    acClose();
  }
});
document.addEventListener('scroll', function() {
  if (_ac.menuEl && Date.now() - _ac.openedAt > 250) acClose();
}, true);
window.addEventListener('wheel', function() { if (_ac.menuEl) acClose(); }, { passive: true });
window.addEventListener('touchmove', function() { if (_ac.menuEl) acClose(); }, { passive: true });

// ── Boot ──────────────────────────────────────────────────────────────────────
// T5: no self-invoke — the ops shell calls QuoteView.init() when the founder
// opens the Quote view; _inited makes repeated calls no-ops.
var _inited = false;

async function init() {
  if (_inited) return;
  _inited = true;
  render(); // first paint with loading state
  var rc = await apiRateCard();
  if (rc) {
    rateCard = rc;
    render(); // repaint with rate card data
  }
}

// Unmount: drop the unsaved-changes flag, stop every pending timer, close the
// autocomplete, reset the init guard, and empty the render target.
function teardown() {
  _dirty = false;
  clearTimeout(_estimateTimer);
  _estimateTimer = null;
  Object.keys(_distTimers).forEach(function (k) { clearTimeout(_distTimers[k]); delete _distTimers[k]; });
  clearTimeout(_ac.timer);
  _ac.timer = null;
  acClose();
  _inited = false;
  var target = document.querySelector('#quoteRoot .ch-app');
  if (target) target.innerHTML = '';
}

// Open a saved quote by id in the builder — used by the ops-shell Quotes tab. init() is
// _inited-guarded so calling it here is a no-op when the cockpit is already mounted.
async function openQuote(id) {
  await init();
  await reopenQuote(id);
}

return { init: init, teardown: teardown, openQuote: openQuote, startNew: startNew };
})();
</script>
</body>
