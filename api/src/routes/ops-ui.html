<div class="scrim" id="scrim"></div><aside class="sheet" id="sheet"></aside><div class="toast" id="toast"></div>

<script>
/* ── date helpers (today is computed client-side, per grouping spec) ── */
const _pad=n=>String(n).padStart(2,'0');
const isoOf=d=>`${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
const TODAY=isoOf(new Date());
const addDays=(iso,n)=>{const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return isoOf(d);};
const TOMORROW=addDays(TODAY,1);
const fmtFull=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const fmtDate=d=>d===TODAY?'Today':new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtDateTime=iso=>{const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' · '+_pad(d.getHours())+':'+_pad(d.getMinutes());};
const nowStamp=()=>{const d=new Date();return `${isoOf(d)} ${_pad(d.getHours())}:${_pad(d.getMinutes())}`;};

const DAYGROUPS=['Pending','Today','Tomorrow','Upcoming','Completed'];
const dayGroup=t=>{
  if(t.stage==='completed')return 'Completed';
  if(t.stage==='awaiting_payment'||!t.date)return 'Pending';
  if(t.date===TODAY)return 'Today';
  if(t.date===TOMORROW)return 'Tomorrow';
  return 'Upcoming';
};
const groupNote={Pending:'awaiting payment · undated',Today:()=>fmtFull(TODAY),Tomorrow:()=>fmtFull(TOMORROW),Upcoming:'scheduled ahead',Completed:'done'};

/* ── fulfilment lifecycle — ops only sees bookings that are paid (or, on the manual
   channel, awaiting payment after a link was sent). Quoting/payment-link steps
   live outside ops in WhatsApp/Notion. ── */
const STAGES=['awaiting_payment','paid','vehicle_confirmed','pickup_confirmed','on_trip','completed'];
const STAGE={
  awaiting_payment:{label:'Awaiting payment',short:'Awaiting',c:'#c7841f',cbg:'#fbf0d8'},
  paid:{label:'Paid',short:'Paid',c:'#2f9558',cbg:'#e6f4ec'},
  vehicle_confirmed:{label:'Vehicle confirmed',short:'Vehicle',c:'#6d4fb8',cbg:'#efeafb'},
  pickup_confirmed:{label:'Pickup confirmed',short:'Pickup',c:'#0a8f86',cbg:'#dff3ef'},
  on_trip:{label:'On trip',short:'On trip',c:'#1f6fd0',cbg:'#e6f0fc'},
  completed:{label:'Completed',short:'Done',c:'#7c7a73',cbg:'#eeece4'},
};
const stVars=s=>`--c:${STAGE[s].c};--cbg:${STAGE[s].cbg}`;
/* NEXT covers only the post-payment machine. awaiting_payment has NO advance button —
   payment arrives via the webhook; ops follows up instead. */
const NEXT={
  paid:{to:'vehicle_confirmed',label:'Confirm vehicle',act:'advance'},
  vehicle_confirmed:{to:'pickup_confirmed',label:'Confirm pickup',act:'advance'},
  pickup_confirmed:{to:'on_trip',label:'Mark on trip',act:'advance'},
  on_trip:{to:'completed',label:'Mark completed',act:'advance'},
  completed:null,
};
const MODE={single:'Transfer',private:'Private',shared:'Shared',trip:'Multi-stop',chauffeur:'Chauffeur'};

/* The only surviving template: the payment-reminder copy an ops agent sends to nudge
   an awaiting-payment customer. Interpolates the first name and the amount. */
const payreminder=t=>`Hi ${t.first} 👋 Just a friendly nudge from Ceylon Hop — your booking for ${t.route} is held pending payment of ${money(t)}.\n\nHere's your secure link again to lock it in 🌴 Reply if you have any questions!`;

/* attention logic — what an ops agent must act on */
const reason=t=>{
  if(t.stage==='awaiting_payment')return 'Payment link sent — follow up';
  if(t.stage==='paid')return 'Vehicle not confirmed yet';
  if(t.stage==='vehicle_confirmed'&&!t.updated)return 'Customer not contacted yet';
  return '';
};
const isAttn=t=>!!reason(t)&&t.stage!=='completed';

const GROUPS=[
  {id:'all',label:'All open',c:'#241f1d'},
  {id:'pay',label:'Awaiting payment',c:'#c7841f'},
  {id:'paid',label:'Needs vehicle',c:'#cf4a2f'},
  {id:'ready',label:'Ready',c:'#0a8f86'},
  {id:'trip',label:'On trip',c:'#1f6fd0'},
  {id:'done',label:'Completed',c:'#7c7a73'},
];
const inGroup=(t,g)=>{
  if(g==='all')return t.stage!=='completed';
  if(g==='pay')return t.stage==='awaiting_payment';
  if(g==='paid')return t.stage==='paid';
  if(g==='ready')return ['vehicle_confirmed','pickup_confirmed'].includes(t.stage);
  if(g==='trip')return t.stage==='on_trip';
  if(g==='done')return t.stage==='completed';
  return true;
};
const ICON={
  wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2z"/></svg>',
  web:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',

const chanClass=c=>c==='whatsapp'?'wa':'web';

/* Amount is integer minor units in the given currency; render major units. */
const money=t=>{const v=(t.amount||0)/100;const sym=t.currency==='USD'?'$':t.currency==='EUR'?'€':(t.currency?t.currency+' ':'');return t.amount!=null?`${sym}${v.toLocaleString('en-US',{minimumFractionDigits:v%1?2:0,maximumFractionDigits:2})}`:'—';};

/* ── API client — same-origin, session cookie; 401 → login overlay ── */
const api={

  async post(p,body){const r=await fetch('/admin/ops'+p,{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify(body??{})});if(r.status===401){showLogin();throw new Error('auth');}if(!r.ok)throw new Error('api '+r.status);return r.json();},

/* ── row → ticket mapping (backend OpsBookingRow → view model) ── */
function rowToTicket(row){
  return {
    id:row.id, ref:row.reference, chan:row.channel, cust:row.customerName, first:row.customerFirstName,
    mode:row.mode, route:row.route, date:row.travelDate, time:row.travelTime, guests:row.pax,
    amount:row.amount, currency:row.currency, stage:row.stage, paid:row.paymentStatus==='paid',
    photo:!!row.vehiclePhotoReceived, updated:!!row.customerUpdated,
    notes:(row.opsNotes||'').split('\n').map(s=>s.trim()).filter(Boolean), opsNotesRaw:row.opsNotes||'',
  };
}

let tickets=[];
let state={route:'tickets',q:'',group:'all',chan:'',detail:null,detailData:null,role:null};

async function loadQueue(){const rows=await api.get('/bookings');tickets=rows.map(rowToTicket);render();}

/* nav is rendered per-capability: Bookings always; Quote for anyone with quote:manage

function viewTickets(){
  $('#topbar').innerHTML=`
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="q" placeholder="Search name, ref, route…" value="${esc(state.q)}"></div>

/* ── Quotes queue ─────────────────────────────────────────────────────────────
   The merged, queue-first Quotes surface (D6). Fed by GET /admin/quote/list; rows
   open into the builder (QuoteView) as a detail view, and "+ New quote" opens a fresh
   one. The queue is grouped into role-aware sections so each viewer sees what's on
   THEIR plate first: a founder (quote:approve) leads with quotes needing review; a
   support agent leads with approved quotes ready to send + any sent back to them.
   Status changes are deliberate actions in the detail view (maker-checker), never a
   casual per-row dropdown — so rows show a read-only status pill. */
let opsQuotes=[],opsQuotesLoaded=false;
// Status → { label, tone } for the read-only pill. Tone drives the CSS colour class.
const QSTATUS={
  draft:{label:'Draft',tone:'slate'},
  pending_review:{label:'In review',tone:'amber'},
  changes_requested:{label:'Changes requested',tone:'amber'},
  ready:{label:'Ready to send',tone:'teal'},
  sent:{label:'Sent',tone:'blue'},
  won:{label:'Booked',tone:'green'},
  lost:{label:'Lost',tone:'red'},
  expired:{label:'Expired',tone:'muted'},
};
// Section order encodes "what's on your plate first". Approvers (founder) triage the
// review queue; support acts on approved + sent-back quotes. Closed always sinks last.
const QUEUE_SECTIONS_APPROVER=[
  {id:'review',label:'Needs your review',statuses:['pending_review'],hint:'Check pricing &amp; margin, then approve or send back'},
  {id:'ready',label:'Ready to send',statuses:['ready'],hint:'Approved — hand back to support to send'},
  {id:'progress',label:'In progress',statuses:['draft','changes_requested'],hint:'Drafts and quotes sent back for changes'},
  {id:'closed',label:'Sent &amp; closed',statuses:['sent','won','lost','expired']},
];
const QUEUE_SECTIONS_SUPPORT=[
  {id:'ready',label:'Ready to send',statuses:['ready'],hint:'Approved — copy the message and send to the customer'},
  {id:'sentback',label:'Sent back to you',statuses:['changes_requested'],hint:'Update the quote and resubmit for review'},
  {id:'review',label:'Awaiting review',statuses:['pending_review'],hint:'With the founder for approval'},
  {id:'drafts',label:'Drafts',statuses:['draft']},
  {id:'closed',label:'Sent &amp; closed',statuses:['sent','won','lost','expired']},
];
function isApprover(){return !!(state.caps&&state.caps.includes('quote:approve'));}
function quoteUsd(cents){return '$'+((cents||0)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
async function loadOpsQuotes(){
  try{
    const r=await fetch('/admin/quote/list',{credentials:'same-origin'});
    if(r.status===401){showLogin();throw new Error('auth');}
    if(!r.ok)throw new Error('quotes '+r.status);
    const body=await r.json();
    opsQuotes=(body&&body.quotes)||[];opsQuotesLoaded=true;
    if(state.route==='quotes')viewQuotes();
  }catch(e){if(e.message!=='auth')toast('Could not load quotes');}
}
function statusPill(status){
  const m=QSTATUS[status]||{label:status||'—',tone:'muted'};
  return `<span class="qpill tone-${m.tone}">${esc(m.label)}</span>`;
}
function quoteRowHtml(q){
  return `<div class="qrow" data-qopen="${esc(q.id)}" role="button" tabindex="0">
    <span class="qref">${esc(q.reference||q.id)}</span>
    <span class="qcust">${esc(q.customerName||'Untitled')}</span>
    <span class="qprod">${esc(q.product||'')}${q.vehicle?' · '+esc(q.vehicle):''}</span>
    <span class="qtotal">${esc(quoteUsd(q.totalCents))}</span>
    <span class="qstat">${statusPill(q.status)}</span>
  </div>`;
}
function viewQuotes(){
  $('#topbar').innerHTML='';
  const sections=isApprover()?QUEUE_SECTIONS_APPROVER:QUEUE_SECTIONS_SUPPORT;
  const byStatus={};opsQuotes.forEach(q=>{(byStatus[q.status]=byStatus[q.status]||[]).push(q);});
  let html=`<div class="qhead pagehead">
      <h1>Quotes</h1>
      <button class="qnew" data-qnew><span class="qnew-plus">+</span> New quote</button>
    </div>
    <p class="pagesub"><b>${opsQuotes.length} quote${opsQuotes.length===1?'':'s'}</b> · ${isApprover()?'review, approve, and track every quote':'submit new quotes and send approved ones to customers'}</p>`;
  if(!opsQuotesLoaded){html+='<p class="muted">Loading quotes…</p>';$('#view').innerHTML=html;return;}
  if(!opsQuotes.length){
    html+=`<div class="qempty"><div class="qempty-icon">📝</div><div class="qempty-title">No quotes yet</div><div class="qempty-sub">Start one with <b>+ New quote</b> above.</div></div>`;
    $('#view').innerHTML=html;return;
  }
  sections.forEach(sec=>{
    const rows=sec.statuses.reduce((acc,s)=>acc.concat(byStatus[s]||[]),[]);
    if(!rows.length)return;
    html+=`<div class="qsection qsec-${sec.id}">
      <div class="qsection-head">
        <h2 class="qsection-title">${sec.label}<span class="qsection-count">${rows.length}</span></h2>
        ${sec.hint?`<span class="qsection-hint">${sec.hint}</span>`:''}
      </div>
      <div class="qlist">${rows.map(quoteRowHtml).join('')}</div>
    </div>`;
  });
  $('#view').innerHTML=html;
}
function openOpsQuote(id){

/* ── build the activity timeline from the detail payload ── */
function buildActivity(t,d){
  const acts=[];
  if(d?.booking?.createdAt)acts.push([fmtDateTime(d.booking.createdAt),`Booking created · ${chanLabel(t.chan)}`]);
  (d?.payments||[]).forEach(p=>{if(p.status==='succeeded')acts.push([`Payment · ${money({amount:p.amount,currency:p.currency})}`,'Payment received']);});
  if(d?.ops?.vehicleConfirmedAt)acts.push([fmtDateTime(d.ops.vehicleConfirmedAt),'Vehicle confirmed']);
  if(d?.ops?.updatedAt)acts.push([fmtDateTime(d.ops.updatedAt),`Ops updated · now “${STAGE[t.stage].label}”`]);
  t.notes.forEach(n=>acts.push(['Note',n]));
  return acts;
}

/* trip legs (mode 'trip') from the booking input's stops/dates */
function legsHtmlFor(d){
  const b=d?.booking;
  if(b&&b.mode==='trip'&&Array.isArray(b.input?.stops)&&b.input.stops.length>1){
    const stops=b.input.stops,dates=b.input.dates||[];
    let rows='';
    for(let i=0;i<stops.length-1;i++){
      const when=dates[i]?fmtDate(dates[i]):`Leg ${i+1}`;
      rows+=`<div class="leg"><span class="r">${esc(when)} · ${esc(stops[i])} → ${esc(stops[i+1])}</span></div>`;
    }
    return `<div class="legs">${rows}</div>`;
  }
  return '<div style="color:var(--ink-faint);font-size:.88rem">Single transfer — no leg breakdown.</div>';
}

async function openDetail(id){

  catch(e){if(e.message!=='auth')toast('Could not load details');}

let toastT;function toast(m){const t=$('#toast');t.innerHTML=ICON.check+esc(m);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* re-fetch the single row after a mutation and splice it in, then re-render */
async function refreshRow(id){
  try{const rows=await api.get('/bookings');tickets=rows.map(rowToTicket);const still=tickets.find(x=>x.id===id);if(!still)state.detail=null;render();}
  catch(e){if(e.message!=='auth')toast('Refresh failed');}

/* T6: #view and #quoteRoot are each persistent DOM nodes (only [hidden] toggles, never
   removed/re-created) with their own independent scroller (.scroll{overflow-y:auto} /
   #quoteRoot{overflow-y:auto} — see CSS above), so each element's scrollTop is preserved
   natively by the browser across hide/show; verified there is no shared scroller whose
   position could leak between routes, so no manual scrollTop save/restore is needed. */

/* ── quote view panel — mounts QuoteView into #quoteRoot: .ch-app render target + SIBLING #ch-toast (innerHTML swaps never destroy the toast) ── */
function showQuoteView(){
  if(!state.caps||!state.caps.includes('quote:manage')){state.route='tickets';if(location.hash)history.replaceState(null,'',location.pathname+location.search);render();return;}
  /* close any open Bookings detail sheet + scrim so its fixed overlay doesn't float over the cockpit */
  if(state.detail){state.detail=null;state.detailData=null;renderSheet();}
  const qr=$('#quoteRoot');
  qr.hidden=false;$('#view').hidden=true;$('#topbar').hidden=true;
  if(!qr.querySelector('.ch-app')){
    qr.innerHTML='<div class="ch-app ch-app-inner"></div>'
      +'<div class="ch-toast" id="ch-toast"><span class="tick">&#x2713;</span><span class="ch-toast-msg"></span></div>';
  }
  QuoteView.init(); /* _inited-guarded inside the module — later calls are no-ops */
}
function hideQuoteView(){$('#quoteRoot').hidden=true;$('#view').hidden=false;$('#topbar').hidden=false;}

/* T6: only move focus on an actual route TRANSITION, not on every render() while
   already settled on a route (render() also runs after toggles/notes/queue refresh
   while staying on Bookings — re-focusing #q on each of those would steal focus from
   whatever the operator is doing). _lastRenderedRoute tracks the previous paint. */
let _lastRenderedRoute=null;
function render(){
  if((state.route==='quote'||state.route==='quotes')&&(!state.caps||!state.caps.includes('quote:manage')))state.route='tickets';
  const entering=state.route!==_lastRenderedRoute;
  setNav();
  if(state.route==='quote'){
    showQuoteView();
    if(entering){
      /* Quote (builder) entry: the cockpit's own fields render async inside QuoteView.init(),
         so we don't reach into its DOM — focus the Quotes nav button (which stays highlighted
         for the builder too). Guarantees the keyboard never lands on a now-hidden element. */
      const navBtn=document.querySelector('#nav [data-route="quotes"]');
      if(navBtn)navBtn.focus();
    }
  }else if(state.route==='quotes'){
    /* Quotes list lives in the ops shell #view (not the cockpit pane) so it reads as one
       console. Close any open Bookings detail sheet first. */
    hideQuoteView();
    if(state.detail){state.detail=null;state.detailData=null;renderSheet();}
    viewQuotes();
    if(entering){
      loadOpsQuotes(); /* refresh on every entry so newly-saved quotes show up */
      const navBtn=document.querySelector('#nav [data-route="quotes"]');
      if(navBtn)navBtn.focus();
    }
  }else{
    hideQuoteView();viewTickets();renderSheet();
    if(entering){
      /* Bookings entry: viewTickets() just rebuilt #topbar, so #q is fresh. */
      const qInput=$('#q');
      if(qInput)qInput.focus({preventScroll:true});
    }
  }
  _lastRenderedRoute=state.route;
}

/* ── events ── */
document.addEventListener('click',e=>{

  else if(location.hash)history.replaceState(null,'',location.pathname+location.search);

});

/* Quotes queue: "+ New quote" and click/keyboard row-open into the builder detail view.
   Status is changed deliberately in the detail view (maker-checker), not from the queue. */
document.addEventListener('click',e=>{
  if(e.target.closest('#view [data-qnew]')){openNewQuote();return;}
  const row=e.target.closest('#view [data-qopen]');

});
document.addEventListener('keydown',e=>{

$('#scrim').addEventListener('click',()=>{state.detail=null;state.detailData=null;renderSheet();});
document.addEventListener('input',e=>{if(e.target.id==='q'){state.q=e.target.value;viewTickets();}});
document.addEventListener('change',e=>{if(e.target.id==='chansel'){state.chan=e.target.value;viewTickets();}});

  const el=e.target.closest('[data-act]');if(!el)return;

    case 'close':state.detail=null;state.detailData=null;renderSheet();break;
    case 'advance':{const n=NEXT[t.stage];if(!n)break;try{await api.post(`/bookings/${id}/status`,{to:n.to});toast(`Moved to “${STAGE[n.to].label}”`);state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Could not advance');}break;}
    case 'toggle':{const k=el.dataset.k==='photo'?'vehiclePhotoReceived':'customerUpdated';const val=!t[el.dataset.k];try{await api.post(`/bookings/${id}/flags`,{[k]:val});toast('Updated');state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Update failed');}break;}
    case 'addnote':{const inp=$('#noteinput');const text=inp&&inp.value.trim();if(!text)break;const line=`[${nowStamp()}] ${text}`;const next=t.opsNotesRaw?t.opsNotesRaw+'\n'+line:line;try{await api.post(`/bookings/${id}/flags`,{opsNotes:next});toast('Note added');state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Could not add note');}break;}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&state.detail){state.detail=null;state.detailData=null;renderSheet();}});

/* ── login / session ── */
function showLogin(){$('#login').classList.add('show');$('#approot').hidden=true;}
function hideLogin(){$('#login').classList.remove('show');$('#approot').hidden=false;}
function bootApp(identity){
  hideLogin();
  state.role=identity.role;state.caps=identity.caps;state.email=identity.email;
  window.opsShowLogin=showLogin; /* the quote module reaches the login overlay through this */
  window.opsGoBookings=()=>{state.route='tickets';render();}; /* quote module bounces a 403 (no quote:manage) back to Bookings */
  window.opsGoQuotes=()=>{state.route='quotes';render();}; /* builder returns to the queue after a hand-off action */
  window.opsRefreshQuotes=loadOpsQuotes; /* builder asks the shell to refresh the queue list after save/transition */
  window.opsCaps=identity.caps||[]; window.opsRole=identity.role; /* the builder reads the viewer's role/caps for the maker-checker action bar */
  /* Deep-link (single source of truth for both the login and whoami-refresh paths):
     anyone with quote:manage can land on #quote (the builder) or #quotes (the queue);
     both need quote:manage (D-A: all 3 roles). Otherwise bounce to Bookings + clear the hash. */
  const canQuote=state.caps&&state.caps.includes('quote:manage');
  if(location.hash==='#quote'&&canQuote)state.route='quote';
  else if(location.hash==='#quotes'&&canQuote)state.route='quotes';
  else{state.route='tickets';if(location.hash)history.replaceState(null,'',location.pathname+location.search);}
  const initials=identity.role.slice(0,2).toUpperCase();
  const roleLabel=identity.role.charAt(0).toUpperCase()+identity.role.slice(1);
  $('#railfoot').innerHTML=`<div class="avatar">${initials}</div><div><b>Signed in</b><span>${esc(identity.email)} · ${esc(roleLabel)}</span></div><button class="logout" id="logoutbtn">Logout</button>`;
  setNav();
  if(state.route==='quote'||state.route==='quotes')render(); /* paint the quote surface immediately — it needs no booking data; loadQueue populates Bookings in the background */
  loadQueue().catch(e=>{if(e.message!=='auth')toast('Could not load bookings');});
}

/* Google Identity Services calls this with the signed ID token credential. */
function onGoogleCredential(resp){
  const errEl=$('#loginerr');errEl.textContent='';
  fetch('/admin/ops/login',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({credential:resp.credential})})
    .then(async r=>{
      if(r.ok){
        /* /login returns {email,role} only — re-fetch whoami for the full {email,role,caps}
           the app needs (mirrors the dev-login path; without this bootApp gets no caps). */
        const who=await fetch('/admin/ops/whoami',{credentials:'same-origin'});
        if(who.ok)bootApp(await who.json());
        else{errEl.textContent='Signed in, but could not load your session — retry';}
      }
      else{const card=$('#login-card');card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');errEl.textContent="This Google account isn't authorised";}
    }).catch(()=>{errEl.textContent='Network error — try again';});
}
window.onGoogleCredential=onGoogleCredential;

/* Dev-only bypass (NODE_ENV!=='production'): mints a session for an allowlisted email
   without going through Google, for local dev + e2e. The server 404s /dev-login in
   production, and the form itself is only unhidden when the server tells us (via the
   templated devlogin-foot flag) that dev bypass is enabled — never shown in prod. */
const devLoginForm=$('#devloginform');
if(devLoginForm)devLoginForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const errEl=$('#loginerr'),email=$('#devloginemail').value.trim();
  errEl.textContent='';if(!email)return;
  try{
    const r=await fetch('/admin/ops/dev-login',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({email})});
    if(r.ok){
      const who=await fetch('/admin/ops/whoami',{credentials:'same-origin'});
      if(who.ok)bootApp(await who.json());
    }else{errEl.textContent='Not authorised for dev sign-in';}
  }catch(_){errEl.textContent='Network error — try again';}
});

$('#login').addEventListener('click',e=>{if(e.target.id==='logoutbtn'){}});
document.addEventListener('click',async e=>{if(e.target.id==='logoutbtn'){QuoteView.teardown();/* T6: clear _inited/_dirty/timers + empty render target BEFORE resetting session state, so a re-login starts clean and no stale beforeunload fires */await fetch('/admin/ops/logout',{method:'POST',credentials:'same-origin'}).catch(()=>{});tickets=[];state.detail=null;state.route='tickets';if(location.hash)history.replaceState(null,'',location.pathname+location.search);showLogin();}});

/* Render the Google Sign-In button. The GIS script is `async defer`, so it may load
   BEFORE or AFTER this inline script — so this is called from BOTH the script's onload
   AND the boot sequence; whichever runs once `window.google` exists wins. The
   childElementCount guard makes the double-call idempotent (renders exactly once). */
function initGoogleButton(){
  if(!(window.google&&google.accounts&&google.accounts.id))return;
  const el=$('#g_id_signin');
  if(!el||el.childElementCount>0)return; /* already rendered */
  google.accounts.id.initialize({client_id:'{{GOOGLE_CLIENT_ID}}',callback:onGoogleCredential});
  google.accounts.id.renderButton(el,{theme:'filled_black',size:'large',shape:'pill'});
}
window.initGoogleButton=initGoogleButton;

/* boot: whoami → in-session boots the app, else show login (+ init the GIS button) */
(async function(){
  localStorage.removeItem('chAdminKey'); /* T5: stale secret from the quote tool's admin-key era */
  initGoogleButton(); /* if GIS already loaded; else the script's onload calls it */
  const devFoot=$('#devlogin-foot');
  if(devFoot&&devFoot.dataset.devLoginEnabled==='true'&&devLoginForm)devLoginForm.style.display='';
  try{
    const r=await fetch('/admin/ops/whoami',{credentials:'same-origin'});
    if(r.ok){
      bootApp(await r.json()); /* T6 deep-link resolution lives in bootApp now (honored on both the whoami and login paths) */
    }else{showLogin();}
  }catch(_){showLogin();}
})();
</script>
<script>
/* ══════════════════════════════════════════════════════════════════════════
   QUOTE VIEW MODULE (T5) — the quote tool's entire JS, ported verbatim from
   quote-tool.html and closure-scoped so none of its ~120 top-level names
   (state, render, api, esc, fmtDate, showToast, …) can collide with the ops
   script above; nothing here leaks to window. Renders into
   #quoteRoot > .ch-app (its sibling #ch-toast survives innerHTML swaps);
   auth = the ops session cookie. The ops shell calls QuoteView.init() when
   the founder opens the Quote view. Pricing stays server-authoritative —
   the transforms above touched ONLY mount + auth + boot, never the
   estimate/save/autocomplete/distance logic.
   ══════════════════════════════════════════════════════════════════════════ */
const QuoteView = (function () {
'use strict';

// ── HTML escape helper ────────────────────────────────────────────────────────
function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Status tone + label maps (maker-checker lifecycle) ────────────────────────
const STATUS_TONE = {
  'draft':             'var(--muted-2)',
  'pending_review':    'var(--wait)',
  'changes_requested': 'var(--wait)',
  'ready':             'var(--teal)',
  'sent':              'var(--blue)',
  'won':               'var(--orange)',
  'lost':              'var(--red)',
  'expired':           'var(--muted)',
};

const STATUS_LABELS = {
  'draft':             'Draft',
  'pending_review':    'In review',
  'changes_requested': 'Changes requested',
  'ready':             'Ready to send',
  'sent':              'Sent',
  'won':               'Booked',
  'lost':              'Lost',
  'expired':           'Expired',
};

// ── Viewer role bridge (set by the ops shell's bootApp) ───────────────────────
function viewerCan(action) { return (window.opsCaps || []).indexOf(action) >= 0; }
function isApprover() { return viewerCan('quote:approve'); } // founder-only — the maker-checker gate
// The customer-facing message (WhatsApp/Email) is copyable ONLY once the founder has
// approved it — i.e. status is ready (about to send) or sent. Everything before that is
// still under review, so support cannot lift the message out and send it early.
function copyUnlocked() { return state.status === 'ready' || state.status === 'sent'; }

// ── Rate card (fetched once on load) ─────────────────────────────────────────
var rateCard = null;

// ── I1: once-guard for app-node delegated listeners ──────────────────────────
var _delegatesWired = false;

// ── Cockpit overlay state ─────────────────────────────────────────────────────
var ratesOpen = false;    // Rate Settings modal
var sendBackOpen = false; // inline "send back for changes" note composer (founder)
// Output section: tri-state (null = follow layout default: open when two-pane
// ≥960px, collapsed when stacked; true/false = operator's explicit choice).
var outputOpen = null;
// Per-leg add-on line visibility: legId → bool (private legs only)
var legAddonsOpen = {};

// ── Estimate state ────────────────────────────────────────────────────────────
var lastEstimate = null;   // last successful /estimate response
var lastEstimateError = null; // string | null
var _estimateTimer = null;
// V8: monotonic sequence so a slow /estimate response can't overwrite a newer one.
var _estimateSeq = 0;

// All vehicle tiers have rates — no gating
var GATED_VEHICLES = {};

var VEHICLE_LABELS = {
  car:    'Car',
  van_6:  'Van 6 Seat',
  van_9:  'Van 9 Seat',
  van_14: 'Van 14 Seat',
  custom: 'Custom',
};

// V12: map tool vehicle ids → engine rate-card tiers so caps come from server truth.
var VEHICLE_ENGINE_TIER = {
  car:    'car',
  van_6:  'van',
  van_9:  'van9',
  van_14: 'van14',
  custom: 'custom',
};

// V12: derive { pax, bags } caps from the cached rate-card. Returns null until the
// rate card has loaded (so we never flag against stale defaults) and for 'custom'
// (exempt from the capacity flag; its caps are 99/99 anyway).
function vehicleCaps(toolId) {
  if (!rateCard || !rateCard.vehicle) return null;
  if (toolId === 'custom') return null;
  var tier = VEHICLE_ENGINE_TIER[toolId];
  var v = tier ? rateCard.vehicle[tier] : null;
  if (!v) return null;
  return { pax: v.maxPax, bags: v.maxBags };
}

// GL-1d: the rate-card prefill default for the custom-priced tiers, as dollars for the
// $/km input placeholder. Falls back to the shipped placeholders until /rate-card loads.
function defaultCustomRateDollars(toolId) {
  var tier = VEHICLE_ENGINE_TIER[toolId];
  var cents = (rateCard && rateCard.perKmCents && rateCard.perKmCents[tier]) || (toolId === 'van_14' ? 130 : 175);
  return (cents / 100).toFixed(2);
}

// Driving categories (for flag computation) — slim set (R4). Anything not a
// stay day drives; stay_day is the only non-driving category.
var DRIVING_CATS = {
  transfer: true, train_support: true, airport: true,
};

function refreshEstimate() {
  clearTimeout(_estimateTimer);
  _estimateTimer = setTimeout(function() {
    _runEstimate();
  }, 350);
}

async function _runEstimate() {
  var st = state;
  // V8: claim a sequence number; a later _runEstimate bumps it, invalidating us.
  var seq = ++_estimateSeq;

  // Fix 1: no vehicle chosen yet — don't price, prompt the operator to pick one.
  if (!st.vehicleType) {
    lastEstimate = null;
    lastEstimateError = 'Pick a vehicle above to price this trip.';
    render();
    return;
  }

  // Gate: gated vehicle types — skip server call entirely
  if (GATED_VEHICLES[st.vehicleType]) {
    lastEstimate = null;
    var label = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
    lastEstimateError = 'No rate set for ' + label + ' yet — pick Car or Van 6, or add its rate.';
    render();
    return;
  }

  // Build the payload (Task 2 mapping)
  var payload = {
    service: st.service || 'private',
    vehicle: st.vehicleType,
    passengerCount: st.passengerCount,
    luggageCount: st.luggageCount,
    customRatePerKmCents: customRateCents(), // GL-1d: undefined unless van_14/custom + set
    legs: st.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        addSafariWait:    !!leg.addSafariWait,
      };
    }),
  };

  var result = await apiEstimate(payload);

  // V8: a newer estimate started while we awaited — drop this stale result.
  if (seq !== _estimateSeq) return;

  if (result.error) {
    lastEstimate = null;
    // Friendly version for the common unknown-distance case
    var msg = result.error;
    if (/unknown distance|no distance|distance not found/i.test(msg)) {
      msg = 'Add distances to price this trip.';
    }
    lastEstimateError = msg;
    render();
    return;
  }

  lastEstimate = result;
  lastEstimateError = null;
  render();
}

// ── State model ───────────────────────────────────────────────────────────────
let legSeq = 0;

function newLeg() {
  return {
    id: 'leg_' + (legSeq++),
    category: 'transfer',
    pickupLocation: '',
    dropoffLocation: '',
    distanceKm: 0,
    driveTimeHours: 0,
    manualDistance: false,
    autoMatched: false,
    addSightseeingFee: false,
    addWaitingFee: false,
    addSafariWait: false,
    notes: '',
    date: '',
  };
}

let state = {
  id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
  customerName: '',
  contact: '',
  passengerCount: 2,
  luggageCount: 2,
  vehicleType: null,
  // GL-1d: Van 14/Custom are custom-priced per quote — operator's $/km (dollars, UI-side).
  // null = use the rate-card prefill default; only sent to the API when explicitly set.
  customRatePerKm: null,
  service: 'private',
  outputCurrency: 'USD',
  status: 'draft',
  notes: '',
  legs: [newLeg()],
};

// GL-1b: unsaved-changes guard. Every state mutator marks dirty; save/new/reopen clear it.
// beforeunload asks the browser to confirm the close so an unsaved quote is never lost silently.
var _dirty = false;
function markDirty() { _dirty = true; }
window.addEventListener('beforeunload', function(e) {
  if (_dirty) {
    e.preventDefault();
    e.returnValue = ''; // required by Chrome to show the native confirm
  }
});

// ── State mutators ────────────────────────────────────────────────────────────
function mutate(patch) {
  Object.assign(state, patch);
  markDirty();
  // Re-estimate if any pricing-affecting field changed
  if ('vehicleType' in patch || 'passengerCount' in patch || 'luggageCount' in patch || 'customRatePerKm' in patch) {
    refreshEstimate();
  }
  render();
}

// R1/R3: set the chosen service. Flipping to private converts any stay_day leg to
// a transfer so no stay_day is ever sent under private (backend Zod 400s otherwise).
function setService(service) {
  if (service !== 'private' && service !== 'chauffeur') service = 'private';
  if (service === state.service) return;
  state.service = service;
  if (service === 'private') {
    state.legs = state.legs.map(function(leg) {
      return leg.category === 'stay_day'
        ? Object.assign({}, leg, { category: 'transfer' })
        : leg;
    });
  }
  markDirty();
  refreshEstimate();
  render();
}

// Count distinct leg dates — chauffeur needs >1 to be feasible (R6).
function distinctLegDateCount() {
  var seen = {};
  state.legs.forEach(function(leg) {
    if (leg.date) seen[leg.date] = true;
  });
  return Object.keys(seen).length;
}

function updateLeg(id, patch) {
  state.legs = state.legs.map(function(leg) {
    return leg.id === id ? Object.assign({}, leg, patch) : leg;
  });
  markDirty();
  refreshEstimate();
  render();
}

function addLeg(cat) {
  markDirty();
  var prev = state.legs.length > 0 ? state.legs[state.legs.length - 1] : null;
  var leg = newLeg();
  leg.category = cat || 'transfer';
  if (prev) {
    leg.pickupLocation = prev.dropoffLocation || '';
    if (cat === 'stay_day') {
      leg.dropoffLocation = prev.dropoffLocation || '';
    }
    // Auto-increment date by 1 day
    if (prev.date) {
      // V6: parse + format locally so the +1-day roll never shifts under any TZ.
      var d = parseISODateLocal(prev.date);
      d.setDate(d.getDate() + 1);
      leg.date = fmtISODateLocal(d);
    }
  }
  state.legs = state.legs.concat([leg]);
  refreshEstimate();
  render();
}

function removeLeg(id) {
  state.legs = state.legs.filter(function(leg) { return leg.id !== id; });
  markDirty();
  refreshEstimate();
  render();
}

// Fix 5: swap a leg with its neighbour. Order affects the date-order flag,
// TRIP START/FINAL STOP tags, and template row order; breakdown alignment
// recomputes off the new order automatically.
function moveLeg(id, dir) {
  var idx = state.legs.findIndex(function(leg) { return leg.id === id; });
  if (idx < 0) return;
  var target = idx + dir;
  if (target < 0 || target >= state.legs.length) return;
  var next = state.legs.slice();
  var tmp = next[idx];
  next[idx] = next[target];
  next[target] = tmp;
  state.legs = next;
  markDirty();
  refreshEstimate();
  render();
}

function dupLeg(id) {
  var idx = state.legs.findIndex(function(leg) { return leg.id === id; });
  if (idx < 0) return;
  var src = state.legs[idx];
  var copy = Object.assign({}, src, { id: 'leg_' + (legSeq++) });
  var next = state.legs.slice(0, idx + 1).concat([copy]).concat(state.legs.slice(idx + 1));
  state.legs = next;
  markDirty();
  refreshEstimate();
  render();
}

// ── API helpers ───────────────────────────────────────────────────────────────
// T5: auth = the ops session cookie (same-origin fetch). 401 surfaces the ops
// login overlay; 403 (signed in but not founder) toasts and bounces to Bookings.
// opts.headers passes through untouched via Object.assign — callers keep setting
// their own content-type.
async function api(path, opts) {
  opts = opts || {};
  const res = await fetch(path, Object.assign({}, opts, { credentials: 'same-origin' }));
  if (res.status === 401) { if (window.opsShowLogin) window.opsShowLogin(); }
  if (res.status === 403) { showToast('Founder access required'); if (window.opsGoBookings) window.opsGoBookings(); }
  return res;
}

// V9: parse a JSON body defensively — res.json() throws on empty/non-JSON bodies.
async function jsonOrNull(res) {
  try { return await res.json(); } catch (e) { return null; }
}
// V9: build a consistent { error } from a non-ok response.
async function errPayload(res) {
  var body = await jsonOrNull(res);
  return { error: (body && body.error) ? body.error : ('HTTP ' + res.status) };
}

// Client-side cache of autocomplete results (each query is a billed Google round-trip;
// operators re-type and backtrack constantly, so caching makes repeats instant and stops
// the dropdown feeling laggy / flickering when a slow response lands after a re-render).
var _placeCache = {};
async function apiPlaces(q) {
  var key = (q || '').trim().toLowerCase();
  if (_placeCache[key]) return _placeCache[key];
  try {
    var r = await api('/admin/quote/places?q=' + encodeURIComponent(q));
    // T5: a 401 already surfaced the ops login via api() — nothing extra to toast.
    if (!r.ok) return [];
    var d = await jsonOrNull(r);
    var places = (d && d.suggestions && d.suggestions.length)
      ? d.suggestions
      : ((d && d.places) ? d.places.map(function(name) { return { label: name, source: 'google' }; }) : []);
    if (places.length) _placeCache[key] = places; // cache hits only; let empties retry
    return places;
  } catch (e) { return []; }
}

async function apiDistance(from, to) {
  try {
    var r = await api('/admin/quote/distance', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ from: from, to: to }),
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiEstimate(payload) {
  try {
    var r = await api('/admin/quote/estimate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Estimate failed' };
  } catch (e) { return { error: 'Network error' }; }
}

async function apiRateCard() {
  try {
    var r = await api('/admin/quote/rate-card');
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function apiSave(payload) {
  try {
    var r = await api('/admin/quote/save', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Save failed' };
  } catch (e) { return { error: 'Network error' }; }
}

async function apiPatch(id, patch) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(patch),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Update failed' };
  } catch (e) { return { error: 'Network error' }; }
}

// V19: fetch a full saved quote (incl. request.tool) for reopening.
async function apiGetQuote(id) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id));
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Load failed' };
  } catch (e) { return { error: 'Network error' }; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('ch-toast');
  if (!el) return;
  el.querySelector('.ch-toast-msg').textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── Action handlers ───────────────────────────────────────────────────────────
// Reset the builder to a blank draft (no prompt — callers decide whether to guard).
function resetToNew() {
  legSeq = 0;
  state = {
    id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
    customerName: '',
    contact: '',
    passengerCount: 2,
    luggageCount: 2,
    vehicleType: null,
    customRatePerKm: null,
    service: 'private',
    outputCurrency: 'USD',
    status: 'draft',
    notes: '',
    legs: [newLeg()],
    savedId: null,
    reference: null,
  };
  lastEstimate = null;
  lastEstimateError = null;
  outputTab = 'whatsapp';
  outputOpen = null; // back to the layout default
  sendBackOpen = false;
  _dirty = false; // fresh quote — nothing to lose (GL-1b)
  refreshEstimate();
  render();
}

// The ops shell's "+ New quote" entry: reset to a fresh draft, guarding only when
// there are unsaved edits to lose.
function startNew() {
  if (_dirty && !confirm('Start a new quote? Unsaved changes will be lost.')) return;
  resetToNew();
}

// GL-1d: the operator's custom $/km (dollars) → integer cents for the API. Only meaningful
// for Van 14/Custom; undefined otherwise (or when unset → server prices at the prefill default).
function customRateCents() {
  if (state.vehicleType !== 'van_14' && state.vehicleType !== 'custom') return undefined;
  var v = state.customRatePerKm;
  if (v == null || v === '' || isNaN(v) || Number(v) <= 0) return undefined;
  return Math.round(Number(v) * 100);
}

function savePayload() {
  return {
    // When the quote is already saved, send its id so the server updates it in place
    // (same row, lifecycle preserved) instead of inserting a duplicate.
    id: state.savedId || undefined,
    name: state.customerName,
    contact: state.contact,
    notes: state.notes || '', // round-trip the send-back note so a content save doesn't wipe it
    service: state.service || 'private',
    vehicle: state.vehicleType,
    passengerCount: state.passengerCount,
    luggageCount: state.luggageCount,
    customRatePerKmCents: customRateCents(), // GL-1d
    legs: state.legs.map(function(leg) {
      return {
        category:         leg.category,
        from:             leg.pickupLocation || '',
        to:               leg.dropoffLocation || '',
        distanceKm:       leg.distanceKm || 0,
        date:             leg.date || '',
        addSightseeingFee: !!leg.addSightseeingFee,
        addWaitingFee:    !!leg.addWaitingFee,
        addSafariWait:    !!leg.addSafariWait,
      };
    }),
  };
}

// Persist the quote's content. Because savePayload() carries state.savedId as `id`,
// an already-saved quote is updated in place (same row, status preserved server-side);
// a fresh one is inserted as a draft. Returns true on success. `opts.silent` skips the
// toast + re-render (used by transition(), which handles its own feedback).
async function saveQuote(opts) {
  opts = opts || {};
  if (!state.vehicleType) {
    showToast('Choose a vehicle type first');
    return false;
  }
  var res = await apiSave(savePayload());
  if (res && res.id) {
    state.savedId = res.id;
    state.reference = res.reference || res.id;
    if (res.status) state.status = res.status; // the server is the source of truth for status
    _dirty = false; // persisted — nothing unsaved to lose (GL-1b)
    if (window.opsRefreshQuotes) window.opsRefreshQuotes(); // keep the shell queue in sync
    if (!opts.silent) { render(); showToast('Saved as ' + state.reference); }
    return true;
  }
  showToast((res && res.error) ? res.error : 'Save failed');
  return false;
}

// ── Maker-checker transitions ─────────────────────────────────────────────────
// Persist current edits (in place), then move the quote to `toStatus`. An optional
// note (the send-back reason) rides on the PATCH. On success, optionally bounce back
// to the queue so the hand-off is visible ("it went into the queue").
async function transition(toStatus, opts) {
  opts = opts || {};
  if (!(await saveQuote({ silent: true }))) return; // saveQuote already surfaced the reason
  var patchBody = { status: toStatus };
  if (opts.note != null) patchBody.notes = opts.note;
  var res = await apiPatch(state.savedId, patchBody);
  if (!res || res.error) {
    showToast('Could not update — ' + ((res && res.error) || 'unknown error'));
    return;
  }
  state.status = toStatus;
  _dirty = false;
  if (window.opsRefreshQuotes) window.opsRefreshQuotes();
  if (opts.toast) showToast(opts.toast);
  if (opts.goQueue && window.opsGoQuotes) window.opsGoQuotes();
  else render();
}

function submitForReview() { transition('pending_review', { toast: 'Submitted for review', goQueue: true }); }
function approveReady()    { transition('ready', { toast: 'Approved — ready to send', goQueue: true }); }
function markSent()        { transition('sent', { toast: 'Marked as sent to customer', goQueue: true }); }
function markOutcome(s)    { transition(s, { toast: 'Marked ' + (STATUS_LABELS[s] || s), goQueue: true }); }
function reopenToDraft()   { transition('draft', { toast: 'Reopened for editing' }); }
// Send-back uses an inline note composer (not a native prompt): confirmSendBack reads
// the textarea and PATCHes the quote to changes_requested with the note attached.
function confirmSendBack() {
  var ta = document.getElementById('sendBackNote');
  var note = ta ? ta.value.trim() : '';
  if (!note) { showToast('Add a short note so support knows what to change'); return; }
  sendBackOpen = false;
  transition('changes_requested', { note: note, toast: 'Sent back for changes', goQueue: true });
}

// ── Reopen a saved quote (V19) ────────────────────────────────────────────────
async function reopenQuote(id) {
  if (!id) return;
  var q = await apiGetQuote(id);
  if (!q || q.error) {
    showToast('Could not open quote — ' + ((q && q.error) || 'unknown error'));
    return;
  }
  var tool = q.request && q.request.tool;
  if (!tool) {
    // Legacy row saved before the { tool, engine } shape.
    showToast('This quote was saved before reopen support — re-create it to edit.');
    return;
  }

  // Map persisted tool legs (from/to) back to state legs (pickup/dropoff).
  legSeq = 0;
  var legs = (tool.legs || []).map(function(tl) {
    var leg = newLeg();
    leg.category = tl.category || 'transfer';
    leg.pickupLocation = tl.from || '';
    leg.dropoffLocation = tl.to || '';
    leg.distanceKm = tl.distanceKm || 0;
    // Treat the persisted distance as manual so prices don't re-resolve differently.
    leg.manualDistance = (tl.distanceKm || 0) > 0;
    leg.date = tl.date || '';
    leg.addSightseeingFee = !!tl.addSightseeingFee;
    leg.addWaitingFee = !!tl.addWaitingFee;
    leg.addSafariWait = !!tl.addSafariWait;
    return leg;
  });
  if (legs.length === 0) legs = [newLeg()];

  state.customerName = q.customerName || tool.name || '';
  state.contact = q.customerContact || tool.contact || '';
  state.vehicleType = tool.vehicle || state.vehicleType;
  // GL-1d: restore the operator's custom $/km (persisted in cents on the request snapshot).
  state.customRatePerKm = tool.customRatePerKmCents ? tool.customRatePerKmCents / 100 : null;
  state.service = (tool.service === 'chauffeur') ? 'chauffeur' : 'private';
  state.passengerCount = Math.max(1, parseInt(tool.passengerCount, 10) || 1);
  state.luggageCount = Math.max(0, parseInt(tool.luggageCount, 10) || 0);
  state.legs = legs;
  state.status = q.status || 'draft';
  state.notes = q.notes || ''; // send-back reason etc., shown in the review banner
  state.savedId = q.id;
  state.reference = q.reference || q.id;

  lastEstimate = null;
  lastEstimateError = null;
  sendBackOpen = false;
  _dirty = false; // freshly loaded from the server — nothing unsaved (GL-1b)
  render();
  refreshEstimate();
  showToast('Reopened ' + (q.reference || q.id));
}

// ── Leg tone helpers ──────────────────────────────────────────────────────────
function legTone(idx, total, cat) {
  if (idx === 0) return 'teal';
  if (idx === total - 1) return 'red';
  if (cat === 'stay_day') return 'stay';
  return 'blue';
}

function legTagLabel(idx, total) {
  if (idx === 0) return 'TRIP START';
  if (idx === total - 1) return 'FINAL STOP';
  return 'STOP ' + (idx + 1);
}

// ── Per-leg price from lastEstimate breakdown ────────────────────────────────
// ── Driving-leg helpers (V1: breakdown.legs contains ONLY driving legs) ───
// A leg "drives" if it is not a stay day. breakdown.legs[] and the leg-order
// travel lineItems are indexed by DRIVING position, not by state.legs index — a
// stay_day shifts every following driving leg by one. drivingIndex() maps a
// state.legs index to its driving position (or -1 for a stay day).
function legDrives(leg) {
  return !!leg && leg.category !== 'stay_day';
}

function drivingIndex(stateIdx) {
  var d = -1;
  for (var i = 0; i <= stateIdx; i++) {
    if (legDrives(state.legs[i])) d++;
  }
  return legDrives(state.legs[stateIdx]) ? d : -1;
}

function getLegBreakdownPrice(legIdx) {
  if (!lastEstimate || !lastEstimate.breakdown || !lastEstimate.breakdown.legs) return null;
  var di = drivingIndex(legIdx);
  if (di < 0) return null; // stay day → no per-leg price
  var bleg = lastEstimate.breakdown.legs[di];
  if (!bleg) return null;
  // USD primary (engine-native); the Summary carries the LKR reference.
  return fmtUsd(bleg.priceCents);
}

// ── Render leg card HTML ──────────────────────────────────────────────────────
// hours (e.g. 2.62) → "2h 37m" / "48m"
function fmtDur(hours) {
  if (!hours || hours <= 0) return '';
  var mins = Math.round(hours * 60);
  var h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? (h + 'h' + (m ? ' ' + m + 'm' : '')) : (m + 'm');
}

function renderLegCard(leg, idx, total) {
  var tone = legTone(idx, total, leg.category);
  var isStay = leg.category === 'stay_day';
  var isChauffeur = (state.service === 'chauffeur');

  var dotTone = tone === 'stay' ? 'stay' : tone;       // teal | red | blue | stay
  var legToneClass = 'tone-' + (tone === 'stay' ? 'stay' : (tone === 'teal' ? 'teal' : (tone === 'red' ? 'red' : 'blue')));

  // Reorder controls
  var reorder = [
    '<div class="ch-leg-reorder">',
    '  <button class="ch-mini-btn" title="Move up" data-action="moveLegUp" data-leg="' + esc(leg.id) + '"' + (idx === 0 ? ' disabled' : '') + '>&#9650;</button>',
    '  <button class="ch-mini-btn" title="Move down" data-action="moveLegDown" data-leg="' + esc(leg.id) + '"' + (idx === total - 1 ? ' disabled' : '') + '>&#9660;</button>',
    '</div>',
  ].join('');

  // Travel | Stay switch (chauffeur only)
  var legKindHtml = isChauffeur ? [
    '<div class="ch-leg-kind"><div class="ch-seg sm">',
    '  <button class="ch-seg-btn' + (isStay ? '' : ' active') + '" data-action="setLegKind" data-kind="transfer" data-leg="' + esc(leg.id) + '">Travel</button>',
    '  <button class="ch-seg-btn' + (isStay ? ' active' : '') + '" data-action="setLegKind" data-kind="stay_day" data-leg="' + esc(leg.id) + '">Stay</button>',
    '</div></div>',
  ].join('') : '';

  // Route: [from → to] as normal 14px inputs (KEEP .ch-tl-title + data-field hooks for e2e/autocomplete)
  var routeHtml;
  if (isStay) {
    routeHtml = [
      '<div class="ch-leg-route">',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="Staying at…"',
      '      value="' + esc(leg.dropoffLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '  </div>',
      '</div>',
    ].join('');
  } else {
    routeHtml = [
      '<div class="ch-leg-route">',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="From"',
      '      value="' + esc(leg.pickupLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="pickupLocation" />',
      '  </div>',
      '  <span class="ch-leg-arrow">&#8594;</span>',
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="To"',
      '      value="' + esc(leg.dropoffLocation) + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="dropoffLocation" />',
      '  </div>',
      '</div>',
    ].join('');
  }

  // Date pill (KEEP input[type=date][data-field=date]). min = today so a past date can't be
  // picked from the native calendar (the change handler also rejects a typed past value).
  var dateHtml = [
    '<div class="ch-leg-date">',
    '  <input type="date" min="' + fmtISODateLocal(new Date()) + '" value="' + esc(leg.date) + '" data-leg="' + esc(leg.id) + '" data-field="date" />',
    '</div>',
  ].join('');

  // Distance pill (only for travel legs)
  var distHtml = '';
  if (!isStay) {
    if (leg.manualDistance) {
      distHtml = [
        '<div class="ch-leg-dist ch-dist-manual">',
        '  <div class="ch-input-wrap" style="width:74px;padding:0 8px">',
        '    <input class="ch-input" type="number" min="0" value="' + esc(leg.distanceKm) + '"',
        '      data-leg="' + esc(leg.id) + '" data-field="distanceKm" style="width:44px" />',
        '    <span class="ch-input-suffix">km</span>',
        '  </div>',
        '  <button class="ch-link" data-action="autoDistance" data-leg="' + esc(leg.id) + '">auto</button>',
        '</div>',
      ].join('');
    } else if (leg.autoMatched) {
      var durStr = fmtDur(leg.driveTimeHours);
      distHtml = [
        '<div class="ch-leg-dist">',
        '  <span class="ch-dist-pill auto"><b>' + esc(leg.distanceKm) + ' km</b>' + (durStr ? '<span class="ch-dist-time">' + esc(durStr) + '</span>' : '') + '</span>',
        '  <button class="ch-link" data-action="manualDistance" data-leg="' + esc(leg.id) + '" title="Edit distance">&#9998;</button>',
        '</div>',
      ].join('');
    } else {
      distHtml = [
        '<div class="ch-leg-dist">',
        '  <span class="ch-dist-pill warn">No distance</span>',
        '  <button class="ch-link" data-action="manualDistance" data-leg="' + esc(leg.id) + '">set</button>',
        '</div>',
      ].join('');
    }
  }

  // Per-leg price (from breakdown)
  var legPrice = getLegBreakdownPrice(idx);
  var priceHtml = legPrice
    ? '<div class="ch-leg-price">' + esc(legPrice) + '</div>'
    : '<div class="ch-leg-price empty">' + (isStay ? 'stay' : '—') + '</div>';

  // Actions cluster (duplicate / remove only — add-ons now lives on the second line)
  var actions = [
    '<div class="ch-leg-actions">',
    '  <button class="ch-mini-btn" title="Duplicate" data-action="dupLeg" data-leg="' + esc(leg.id) + '">&#10697;</button>',
    '  <button class="ch-mini-btn danger" title="Remove" data-action="removeLeg" data-leg="' + esc(leg.id) + '">&times;</button>',
    '</div>',
  ].join('');

  // Add-ons chip (thin second line, point-to-point driving legs only). Shows a
  // muted dashed "+ Add-ons" pill when none are active, or a solid orange-tinted
  // pill naming the active ones — both open/close the same toggle popover.
  var activeAddonLabels = [];
  if (leg.addSightseeingFee) activeAddonLabels.push('Sightseeing');
  if (leg.addWaitingFee) activeAddonLabels.push('Waiting');
  if (leg.addSafariWait) activeAddonLabels.push('Safari wait');
  var anyAddon = activeAddonLabels.length > 0;
  var addonChipRow = (!isChauffeur && !isStay) ? [
    '<div class="ch-leg-addonrow">',
    anyAddon
      ? '  <button class="ch-addon-chip on" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">' + esc(activeAddonLabels.join(' · ')) + '</button>'
      : '  <button class="ch-addon-add" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">&#43; Fees / add-ons</button>',
    '</div>',
  ].join('') : '';

  // Add-on line (thin second line, only when the popover is toggled open; private travel only)
  var sightChecked = leg.addSightseeingFee ? ' checked' : '';
  var waitChecked = leg.addWaitingFee ? ' checked' : '';
  var safariChecked = leg.addSafariWait ? ' checked' : '';
  var addonLine = (!isChauffeur && !isStay && legAddonsOpen[leg.id]) ? [
    '<div class="ch-leg-addons">',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSightseeingFee"' + sightChecked + ' /><span class="ch-check-box">' + (leg.addSightseeingFee ? '&#10003;' : '') + '</span>Sightseeing</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addWaitingFee"' + waitChecked + ' /><span class="ch-check-box">' + (leg.addWaitingFee ? '&#10003;' : '') + '</span>Waiting</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSafariWait"' + safariChecked + ' /><span class="ch-check-box">' + (leg.addSafariWait ? '&#10003;' : '') + '</span>Safari wait</label>',
    '</div>',
  ].join('') : '';

  return [
    '<div class="ch-leg ch-tl-item ' + legToneClass + (isChauffeur ? ' is-chauffeur' : '') + '" data-leg-id="' + esc(leg.id) + '">',
    '  <div class="ch-leg-main">',
    reorder,
    '    <span class="ch-leg-dot tone-' + esc(dotTone) + '"></span>',
    legKindHtml,
    routeHtml,
    dateHtml,
    distHtml,
    priceHtml,
    actions,
    '  </div>',
    addonChipRow,
    addonLine,
    '</div>',
  ].join('');
}

// ── Rate card body renderer ────────────────────────────────────────────────────
function renderRateCardBody() {
  if (!rateCard) {
    return '<div style="color:var(--muted);font-size:13px;padding:12px 0">Loading rate card…</div>';
  }

  var fx = rateCard.fxUsdToLkr;

  // Helper: cents → "$X.XX"
  function usd(cents) {
    return '$' + (cents / 100).toFixed(2);
  }

  // Helper: cents → "Rs X,XXX" (LKR = round(cents × fx / 100))
  function lkr(cents) {
    var val = Math.round(cents * fx / 100);
    return 'Rs ' + val.toLocaleString('en-US');
  }

  // Helper: render a static rate row
  function rateRow(label, hint, valueHtml) {
    return [
      '<div class="ch-rate-row">',
      '  <span class="ch-rate-label">',
      esc(label),
      hint ? '<span class="ch-rate-hint">' + esc(hint) + '</span>' : '',
      '  </span>',
      '  <span class="ch-rate-control" style="font-size:13px;font-weight:600;color:var(--ink);text-align:right">',
      valueHtml,
      '  </span>',
      '</div>',
    ].join('');
  }

  var carKmCents = rateCard.perKmCents.car;
  var vanKmCents = rateCard.perKmCents.van;
  var carFloorCents = rateCard.floorCents.car;
  var vanFloorCents = rateCard.floorCents.van;
  var driverCents = rateCard.chauffeurDayRateCents;
  var bufferPct = rateCard.bufferPct;
  var depositPct = rateCard.depositPct;
  var extras = rateCard.extras;

  var leftCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Per-km rates</div>',
    rateRow('Car', null,
      esc(usd(carKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carKmCents)) + ' /km</span>'),
    rateRow('Van', null,
      esc(usd(vanKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanKmCents)) + ' /km</span>'),
    '  <div class="ch-rate-group-title">Minimum per leg</div>',
    rateRow('Car floor', null,
      esc(usd(carFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carFloorCents)) + '</span>'),
    rateRow('Van floor', null,
      esc(usd(vanFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanFloorCents)) + '</span>'),
    '</div>',
  ].join('');

  var rightCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Chauffeur &amp; buffer</div>',
    rateRow('Driver day rate', null,
      esc(usd(driverCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /day</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(driverCents)) + ' /day</span>'),
    rateRow('Buffer', null, esc(String(bufferPct)) + '%'),

    '  <div class="ch-rate-group-title">Add-ons &amp; FX</div>',
    rateRow('Sightseeing', null,
      esc(usd(extras.sightseeing))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.sightseeing)) + '</span>'),
    rateRow('Waiting', null,
      esc(usd(extras.waiting))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.waiting)) + '</span>'),
    rateRow('Safari wait', null,
      esc(usd(extras['safari-wait']))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras['safari-wait'])) + '</span>'),
    rateRow('FX', 'LKR per USD', 'Rs ' + esc(String(fx)) + ' / $'),
    rateRow('Rate card', 'version', esc(rateCard.version)),
    '</div>',
  ].join('');

  return '<div class="ch-rate-grid">' + leftCol + rightCol + '</div>';
}

    + '</span>');

// ── Flags computation (client-side) ──────────────────────────────────────────
function computeFlags() {
  var st = state;
  var flags = [];

  // orange: no vehicle chosen — the quote can't price at all, so the flags pane must never
  // show the "looks clean to send" all-clear in this state.
  if (!st.vehicleType) {
    flags.push({
      level: 'orange',
      title: 'Vehicle not set',
      detail: 'Pick a vehicle at the top of the price panel to price this trip.',
    });
  }

  // red: car luggage limit
  if (st.vehicleType === 'car' && st.luggageCount > 3) {
    flags.push({
      level: 'red',
      title: 'Car luggage limit',
      detail: 'A car fits a maximum of 3 bags — ' + st.luggageCount + ' requested. Confirm with the customer or size up to a van.',
    });
  }

  // red: long drive warning — any leg driveTimeHours >= 6 (add once)
  var hasLongDrive = st.legs.some(function(leg) { return (leg.driveTimeHours || 0) >= 6; });
  if (hasLongDrive) {
    flags.push({
      level: 'red',
      title: 'Long drive warning',
      detail: 'A leg is 6+ hours on the road. Confirm the customer understands the travel time and consider a break or an overnight stop.',
    });
  }

  // orange: hectic itinerary — 3+ consecutive driving dates
  var drivingDates = [];
  st.legs.forEach(function(leg) {
    if (DRIVING_CATS[leg.category] && leg.date) {
      drivingDates.push(leg.date);
    }
  });
  if (maxConsecutiveDates(drivingDates) >= 3) {
    flags.push({
      level: 'orange',
      title: 'Hectic itinerary warning',
      detail: 'Customer is moving on 3+ consecutive days. Consider adding a stay day or trimming stops.',
    });
  }

  // orange: dates out of order — a dated leg is earlier than a dated leg above it.
  // ISO 'YYYY-MM-DD' compares lexicographically, so no Date parsing (TZ-safe).
  (function() {
    var prevDate = null;
    for (var oi = 0; oi < st.legs.length; oi++) {
      var d = st.legs[oi].date;
      if (!d) continue;
      if (prevDate !== null && d < prevDate) {
        flags.push({
          level: 'orange',
          title: 'Dates out of order',
          detail: 'Leg ' + (oi + 1) + ' (' + d + ') is dated before the leg above it — reorder the legs or fix the dates.',
        });
        return;
      }
      prevDate = d;
    }
  })();

  // orange: capacity — server-derived caps; null until rate card loads / for 'custom'
  var vcap = vehicleCaps(st.vehicleType);
  if (vcap) {
    if (st.passengerCount > vcap.pax || st.luggageCount > vcap.bags) {
      var vLabel = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
      flags.push({
        level: 'orange',
        title: 'Capacity warning',
        detail: st.passengerCount + ' pax + ' + st.luggageCount + ' bags may not fit a ' + vLabel + '. Confirm vehicle type or size up.',
      });
    }
  }

  // Per-leg flags — each type fires at most once
  var flagSeen = {};
  st.legs.forEach(function(leg) {
    // orange: safari waiting add-on flagged (now a per-leg add-on, not a category)
    if (!flagSeen.safari && leg.addSafariWait) {
      flagSeen.safari = true;
      flags.push({
        level: 'orange',
        title: 'Safari waiting flagged',
        detail: 'Review safari waiting time and entry timing separately before sending.',
      });
    }

    // blue: airport timing
    if (!flagSeen.airport && (leg.category === 'airport' || /airport|cmb|katunayake/i.test((leg.pickupLocation || '') + ' ' + (leg.dropoffLocation || '')))) {
      flagSeen.airport = true;
      flags.push({
        level: 'blue',
        title: 'Airport timing reminder',
        detail: 'Confirm flight number, landing/departure time, and buffer time.',
      });
    }

    // blue: check distances — driving leg with no distance, not auto-matched, not manual
    if (!flagSeen.distCheck && DRIVING_CATS[leg.category] && (leg.distanceKm || 0) <= 0 && !leg.autoMatched && !leg.manualDistance) {
      flagSeen.distCheck = true;
      flags.push({
        level: 'blue',
        title: 'Check distances',
        detail: 'One or more legs couldn\'t be auto-located. Enter the distance manually to price them.',
      });
    }
  });

  // blue: van minimum applied
  if (lastEstimate && lastEstimate.breakdown && lastEstimate.breakdown.legs) {
    var hasVanMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'van'; });
    if (hasVanMin) {
      flags.push({
        level: 'blue',
        title: 'Van minimum applied',
        detail: 'Minimum 100 km charge used on one or more legs.',
      });
    }
    var hasCarMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'car'; });
    if (hasCarMin) {
      flags.push({
        level: 'blue',
        title: 'Car minimum applied',
        detail: 'Minimum 50 km charge used on one or more legs.',
      });
    }
  }

  // Merge engine warnings as extra blue flags
  if (lastEstimate && lastEstimate.warnings && lastEstimate.warnings.length > 0) {
    lastEstimate.warnings.forEach(function(w) {
      flags.push({ level: 'blue', title: 'Engine note', detail: w });
    });
  }

  return flags;
}

// Helper: max consecutive calendar dates
function maxConsecutiveDates(dates) {
  if (!dates || dates.length === 0) return 0;
  // Deduplicate and convert to epoch days
  var days = [];
  var seen = {};
  dates.forEach(function(d) {
    if (!d || seen[d]) return;
    seen[d] = true;
    // V6: parse date-only locally so consecutive-day math is TZ-stable.
    days.push(Math.floor(parseISODateLocal(d).getTime() / 86400000));
  });
  days.sort(function(a, b) { return a - b; });
  var maxRun = 1, run = 1;
  for (var i = 1; i < days.length; i++) {
    if (days[i] === days[i - 1] + 1) {
      run++;
      if (run > maxRun) maxRun = run;
    } else {
      run = 1;
    }
  }
  return maxRun;
}

// ── Flags card renderer (⑤) ──────────────────────────────────────────────────
function renderFlagsCardBody() {
  var flags = computeFlags();

  if (flags.length === 0) {
    return '<div class="ch-flags-clear">&#x2713; No warnings. This itinerary looks clean to send.</div>';
  }

  var MARK = { red: '&#x25B2;', orange: '&#x25CF;', blue: '&#x2139;' };

  var parts = ['<div class="ch-flags">'];
  flags.forEach(function(f) {
    parts.push('<div class="ch-flag tone-' + esc(f.level) + '">');
    parts.push('  <span class="ch-flag-mark">' + (MARK[f.level] || '&#x2022;') + '</span>');
    parts.push('  <div>');
    parts.push('    <div class="ch-flag-title">' + esc(f.title) + '</div>');
    parts.push('    <div class="ch-flag-detail">' + esc(f.detail) + '</div>');
    parts.push('  </div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}

// ── Flags badge (count or "All clear") ────────────────────────────────────────
function renderFlagsBadge(flagCount) {

// ── Output tab state ──────────────────────────────────────────────────────────
var outputTab = 'whatsapp'; // 'internal' | 'whatsapp' | 'email'

// ── Date helpers ──────────────────────────────────────────────────────────────
// V6: parse a date-only 'YYYY-MM-DD' as LOCAL midnight (not UTC midnight) so an
// operator west of UTC never shows customers a date one day early.
function parseISODateLocal(iso) {
  var p = String(iso).split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}
function pad2(n) { return (n < 10 ? '0' : '') + n; }
// Manual local YYYY-MM-DD formatting — never round-trips through UTC.
function fmtISODateLocal(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

// ── Output template helpers ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  var d = parseISODateLocal(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function routeText(leg) {
  if (leg.category === 'stay_day') {
    return 'Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?');
  }
  return (leg.pickupLocation || '?') + ' → ' + (leg.dropoffLocation || '?');
}

// M(priceCents) — convert cents to display currency
// USD display formatter (separators + always 2 decimals) — the internal-primary currency.
function fmtUsd(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// USD primary + small LKR reference (LKR string comes from the server response).
function usdWithLkr(cents, lkrStr) {
  return esc(fmtUsd(cents)) + (lkrStr ? '<span class="ch-val-sub">' + esc(lkrStr) + '</span>' : '');
}

function M(priceCents) {
  var cur = state.outputCurrency || 'LKR';
  var fx = (lastEstimate && lastEstimate.fxUsdToLkr) ? lastEstimate.fxUsdToLkr : 320;
  if (cur === 'USD') {
    // I3: use toFixed(2) so $40.48 is not rounded to $40
    var dollars = (priceCents / 100).toFixed(2);
    // Add thousands separator to the integer part
    var parts = dollars.split('.');
    parts[0] = parseInt(parts[0], 10).toLocaleString('en-US');
    return '$' + parts[0] + '.' + parts[1];
  }
  // LKR: priceCents is in USD cents, convert via fxUsdToLkr
  return 'LKR ' + Math.round(priceCents * fx / 100).toLocaleString('en-US');
}

// ── Template row model (V2/S2): rows that sum to the total by construction ────
// The engine returns lineItems already in the right order:
//   PRIVATE  : one travel item PER DRIVING LEG (in driving order), then extras.
//   CHAUFFEUR: day-rate, distance (incl. idle), then extras — no per-leg items.
// The per-leg travel items are identified by meta.billableKm when present; if the
// server strips meta, they are equivalently the FIRST N lineItems where N is the
// number of driving legs (engine pushes leg items before extras). We zip those to
// the driving legs (via the driving-index map) to caption them with date+route.

function legOrderItems() {
  return (lastEstimate && lastEstimate.lineItems) ? lastEstimate.lineItems : [];
}

function drivingLegList() {
  return state.legs.filter(legDrives);
}

// Split lineItems into { travel: [...perDrivingLeg], extras: [...rest] }.
function splitLineItems() {
  var items = legOrderItems();
  var drivingCount = drivingLegList().length;
  // Prefer explicit meta.billableKm markers; fall back to positional (first N).
  var hasMeta = items.some(function(it) { return it.meta && it.meta.billableKm != null; });
  var travel = [];
  var extras = [];
  if (hasMeta) {
    items.forEach(function(it) {
      if (it.meta && it.meta.billableKm != null) travel.push(it);
      else extras.push(it);
    });
  } else {
    items.forEach(function(it, i) {
      if (i < drivingCount) travel.push(it);
      else extras.push(it);
    });
  }
  return { travel: travel, extras: extras };
}

// PRIVATE per-driving-leg rows: { date, route, cents } zipped in driving order.
function privateLegRows() {
  var split = splitLineItems();
  var rows = [];
  var drivingLegs = drivingLegList();
  drivingLegs.forEach(function(leg, di) {
    var item = split.travel[di];
    if (!item) return;
    rows.push({ date: leg.date, route: routeText(leg), cents: item.amountCents });
  });
  return rows;
}

function isChauffeurEstimate() {
  return lastEstimate && lastEstimate.product === 'chauffeur';
}

function productBlurb(veh) {
  if (isChauffeurEstimate()) {
    return 'This is for a chauffeur-driven ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations. It also covers the driver staying with you for the nights marked, including driver meals and accommodation.';
  }
  return 'This is for a private ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations.';
}

function whatsappMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = [];
  lines.push('Hi ' + name + ', thank you for sharing the details.', '', 'We can help with this. Based on your itinerary, here is the quote:', '');

  if (isChauffeurEstimate()) {
    // Itinerary lines UNpriced (driving legs + stay days), in state order.
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push(fmtDate(leg.date) + ' — ' + routeText(leg));
      } else {
        lines.push(fmtDate(leg.date) + ' — Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?'));
      }
    });
    lines.push('');
    // Every engine lineItem as a priced row.
    legOrderItems().forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Pay in full to confirm: ' + M(dueCents) + '.');
  } else {
    // PRIVATE: per driving leg (date — route — price), then extras, then total.
    privateLegRows().forEach(function(r) {
      lines.push(fmtDate(r.date) + ' — ' + r.route + ' — ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
  }

  lines.push('', 'Please let me know if you have any questions or if you would like to proceed.');
  return lines.join('\n');
}

function emailMessage() {
  if (!lastEstimate) return null;
  var name = state.customerName || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = ['Hi ' + name + ',', '', 'Thank you for reaching out to Ceylon Hop. Based on the itinerary you shared, please find the transport quote below.', ''];

  if (isChauffeurEstimate()) {
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push('  ' + fmtDate(leg.date) + '   ' + routeText(leg));
      } else {
        lines.push('  ' + fmtDate(leg.date) + '   Stay in ' + (leg.dropoffLocation || leg.pickupLocation || '?'));
      }
    });
    lines.push('');
    legOrderItems().forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Pay in full to confirm: ' + M(dueCents) + '.');
  } else {
    privateLegRows().forEach(function(r) {
      lines.push('  ' + fmtDate(r.date) + '   ' + r.route + '   ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
  }

  lines.push('', productBlurb(veh), '', 'Please let us know if you would like to proceed and we can send over the booking/payment details.', '', 'Best,', 'Roshen', 'Ceylon Hop');
  return lines.join('\n');
}
