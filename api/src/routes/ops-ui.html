    const stops=b.input.stops,dates=b.input.dates||[];
    let rows='';
    for(let i=0;i<stops.length-1;i++){
      const when=dates[i]?fmtDate(dates[i]):`Leg ${i+1}`;
      rows+=`<div class="leg"><span class="r">${esc(when)} · ${esc(stops[i])} → ${esc(stops[i+1])}</span></div>`;
    }
    return `<div class="legs">${rows}</div>`;
  }
  return '<div style="color:var(--ink-faint);font-size:.88rem">Single transfer — no leg breakdown.</div>';
}

/* detail */
function renderSheet(){
  const t=tickets.find(x=>x.id===state.detail);const sc=$('#scrim'),sh=$('#sheet');
  if(!t){sc.classList.remove('show');sh.classList.remove('show');return;}
  const d=state.detailData;
  const st=STAGE[t.stage],idx=STAGES.indexOf(t.stage),nx=NEXT[t.stage];
  sh.style.setProperty('--c',st.c);sh.style.setProperty('--cbg',st.cbg);
  const pipe=STAGES.map((s,i)=>`<span class="pstep ${i<idx?'done':i===idx?'cur':''}" style="${stVars(s)}">${STAGE[s].short}</span>`).join('');
  const acts=buildActivity(t,d).map(a=>`<div class="act"><div class="at">${esc(a[0])}</div><div class="am">${esc(a[1])}</div></div>`).reverse().join('')||'<p class="muted" style="padding:0">Loading activity…</p>';
  const cust=d?.booking?.input?.customer;
  const isPending=t.stage==='awaiting_payment';
  let pipeAction;
  if(isPending){
    pipeAction=`<div class="followup"><div><b>Payment link sent — follow up.</b> Payment lands automatically via the webhook. Nudge the customer if it's overdue.</div></div>
      <div class="sheet-actions"><button class="btn btn-go btn-lg" data-act="payreminder" data-id="${esc(t.id)}">${ICON.copy} Copy payment reminder</button></div>`;
  }else if(nx){
    pipeAction=`<div class="sheet-actions" style="margin-top:12px"><button class="btn btn-go btn-lg" data-act="advance" data-id="${esc(t.id)}">${nx.label} ${ICON.arrow}</button></div>`;
  }else{pipeAction='';}
  sh.innerHTML=`
    <div class="sheet-h"><button class="x" data-act="close">✕</button>
      <div class="ey"><span class="chan ${chanClass(t.chan)}" style="width:22px;height:22px;border-radius:6px">${chanIcon(t.chan)}</span> ${chanLabel(t.chan)} · ${MODE[t.mode]||esc(t.mode)}</div>
      <h2>${esc(t.cust)}</h2><span class="rf">${esc(t.ref)}</span> <span class="pill" style="margin-left:8px"><span class="pd"></span>${st.label}</span>
    </div>
    <div class="sheet-b">
      <div class="block"><h4>Pipeline</h4><div class="pipe">${pipe}</div>${pipeAction}</div>
      <div class="block"><h4>Customer</h4>
        <div class="kv"><span class="k">WhatsApp</span><span class="v">${esc(cust?.whatsapp||'—')}</span></div>
        <div class="kv"><span class="k">Email</span><span class="v">${esc(cust?.email||'—')}</span></div>
        <div class="kv"><span class="k">Country</span><span class="v">${esc(cust?.country||'—')}</span></div>
      </div>
      <div class="block"><h4>Trip</h4>
        <div class="kv"><span class="k">Route</span><span class="v">${esc(t.route)}</span></div>
        <div class="kv"><span class="k">When</span><span class="v">${t.date?fmtDate(t.date):'Flexible'}${t.time?' · '+t.time:''}</span></div>
        <div class="kv"><span class="k">Guests</span><span class="v">${t.guests}</span></div>
        <div style="margin-top:10px">${legsHtmlFor(d)}</div>
      </div>
      <div class="block"><h4>Payment</h4>
        <div class="kv"><span class="k">Amount</span><span class="v">${money(t)}</span></div>
        <div class="kv"><span class="k">Status</span><span class="v">${t.paid?'<span style="color:var(--ok);font-weight:700">Paid</span>':'<span style="color:var(--wait);font-weight:700">Awaiting payment</span>'}</span></div>
        <div class="kv"><span class="k">Channel</span><span class="v">${chanLabel(t.chan)}</span></div>
        ${!t.paid?`<p style="margin:10px 0 0;font-size:.84rem;color:var(--ink-soft)">Payment link was sent — quoting &amp; links live outside ops. Follow up with the customer using the <b>payment reminder</b>.</p>`:''}
      </div>
      <div class="block"><h4>Vehicle &amp; pickup</h4>
        <div class="kv"><span class="k">Assigned</span><span class="v">${idx>=STAGES.indexOf('vehicle_confirmed')?'<span style="color:var(--ok);font-weight:700">Vehicle confirmed</span>':'<span style="color:var(--alert);font-weight:700">Not yet</span>'}</span></div>
        <div class="togg"><span>Vehicle photo received</span><button class="switch ${t.photo?'on':''}" data-act="toggle" data-id="${esc(t.id)}" data-k="photo"></button></div>
        <div class="togg"><span>Customer contacted · pickup confirmed</span><button class="switch ${t.updated?'on':''}" data-act="toggle" data-id="${esc(t.id)}" data-k="updated"></button></div>
      </div>
      <div class="block"><h4>Activity</h4>${acts}
        <div class="notebox"><input id="noteinput" placeholder="Add an internal note…"><button class="btn btn-go" data-act="addnote" data-id="${esc(t.id)}">Add</button></div>
      </div>
    </div>`;
  sc.classList.add('show');sh.classList.add('show');
}

async function openDetail(id){
  state.detail=id;state.detailData=null;renderSheet();
  try{state.detailData=await api.get('/bookings/'+id);if(state.detail===id)renderSheet();}
  catch(e){if(e.message!=='auth')toast('Could not load details');}
}

let toastT;function toast(m){const t=$('#toast');t.innerHTML=ICON.check+esc(m);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* re-fetch the single row after a mutation and splice it in, then re-render */
async function refreshRow(id){
  try{const rows=await api.get('/bookings');tickets=rows.map(rowToTicket);const still=tickets.find(x=>x.id===id);if(!still)state.detail=null;render();}
  catch(e){if(e.message!=='auth')toast('Refresh failed');}
}

/* ── quote view panel — empty scaffold; the quote module mounts into #quoteRoot later ── */
function showQuoteView(){
  if(state.role!=='founder'){state.route='tickets';if(location.hash)history.replaceState(null,'',location.pathname+location.search);render();return;}
  $('#quoteRoot').hidden=false;$('#view').hidden=true;$('#topbar').hidden=true;
}
function hideQuoteView(){$('#quoteRoot').hidden=true;$('#view').hidden=false;$('#topbar').hidden=false;}

function render(){
  if(state.route==='quote'&&state.role!=='founder')state.route='tickets';
  setNav();
  if(state.route==='quote'){showQuoteView();}
  else{hideQuoteView();viewTickets();renderSheet();}
}

/* ── events ── */
document.addEventListener('click',e=>{
  const btn=e.target.closest('#nav [data-route]');if(!btn)return;
  let route=btn.dataset.route;
  if(route==='quote'&&state.role!=='founder')route='tickets';
  state.route=route;
  if(route==='quote')location.hash='quote';
  else if(location.hash)history.replaceState(null,'',location.pathname+location.search);
  render();
});
$('#scrim').addEventListener('click',()=>{state.detail=null;state.detailData=null;renderSheet();});
document.addEventListener('input',e=>{if(e.target.id==='q'){state.q=e.target.value;viewTickets();}});
document.addEventListener('change',e=>{if(e.target.id==='chansel'){state.chan=e.target.value;viewTickets();}});
document.addEventListener('click',async e=>{
  const g=e.target.closest('[data-g]');if(g){state.group=g.dataset.g;viewTickets();return;}
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act,id=el.dataset.id||null;const t=id?tickets.find(x=>x.id===id):null;
  switch(act){
    case 'open':await openDetail(id);break;
    case 'close':state.detail=null;state.detailData=null;renderSheet();break;
    case 'advance':{const n=NEXT[t.stage];if(!n)break;try{await api.post(`/bookings/${id}/status`,{to:n.to});toast(`Moved to “${STAGE[n.to].label}”`);state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Could not advance');}break;}
    case 'toggle':{const k=el.dataset.k==='photo'?'vehiclePhotoReceived':'customerUpdated';const val=!t[el.dataset.k];try{await api.post(`/bookings/${id}/flags`,{[k]:val});toast('Updated');state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Update failed');}break;}
    case 'addnote':{const inp=$('#noteinput');const text=inp&&inp.value.trim();if(!text)break;const line=`[${nowStamp()}] ${text}`;const next=t.opsNotesRaw?t.opsNotesRaw+'\n'+line:line;try{await api.post(`/bookings/${id}/flags`,{opsNotes:next});toast('Note added');state.detailData=await api.get('/bookings/'+id).catch(()=>state.detailData);await refreshRow(id);}catch(err){if(err.message!=='auth')toast('Could not add note');}break;}
    case 'payreminder':{const text=payreminder(t);navigator.clipboard&&navigator.clipboard.writeText(text).catch(()=>{});toast('Payment reminder copied');break;}
  }
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&state.detail){state.detail=null;state.detailData=null;renderSheet();}});

/* ── login / session ── */
function showLogin(){$('#login').classList.add('show');$('#approot').hidden=true;const k=$('#loginkey');if(k){k.value='';setTimeout(()=>k.focus(),120);}}
function hideLogin(){$('#login').classList.remove('show');$('#approot').hidden=false;}
function bootApp(role){
  hideLogin();
  state.role=role;
  window.opsShowLogin=showLogin; /* the quote module reaches the login overlay through this */
  if(state.route==='quote'&&state.role!=='founder'){state.route='tickets';if(location.hash)history.replaceState(null,'',location.pathname+location.search);hideQuoteView();}
  const initials=role==='founder'?'FO':'SU';
  $('#railfoot').innerHTML=`<div class="avatar">${initials}</div><div><b>Signed in</b><span>Ops · ${role==='founder'?'Founder':'Support'}</span></div><button class="logout" id="logoutbtn">Logout</button>`;
  setNav();
  loadQueue().catch(e=>{if(e.message!=='auth')toast('Could not load bookings');});
}

$('#loginform').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=$('#loginbtn'),errEl=$('#loginerr'),key=$('#loginkey').value.trim();
  errEl.textContent='';if(!key)return;
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/admin/ops/login',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({key})});
    if(r.ok){const {role}=await r.json();bootApp(role);}
    else{const card=$('#login-card');card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');errEl.textContent='Wrong key';$('#loginkey').value='';$('#loginkey').focus();}
  }catch(_){errEl.textContent='Network error — try again';}
  finally{btn.disabled=false;btn.textContent='Sign in';}
});
$('#login').addEventListener('click',e=>{if(e.target.id==='logoutbtn'){}});
document.addEventListener('click',async e=>{if(e.target.id==='logoutbtn'){await fetch('/admin/ops/logout',{method:'POST',credentials:'same-origin'}).catch(()=>{});tickets=[];state.detail=null;showLogin();}});

/* boot: whoami → in-session boots the app, else show login */
(async function(){
  try{
    const r=await fetch('/admin/ops/whoami',{credentials:'same-origin'});
    if(r.ok){const {role}=await r.json();bootApp(role);}else{showLogin();}
  }catch(_){showLogin();}
})();
</script>
</body>
</html>
