// ── Output tab state ──────────────────────────────────────────────────────────
var outputTab = 'whatsapp'; // 'internal' | 'whatsapp' | 'email'
var outputDrafts = { whatsapp: null, email: null };
var outputIncludeChauffeurUpsell = false;

// ── Date helpers ──────────────────────────────────────────────────────────────
// V6: parse a date-only 'YYYY-MM-DD' as LOCAL midnight (not UTC midnight) so an
// operator west of UTC never shows customers a date one day early.
function parseISODateLocal(iso) {
  var p = String(iso).split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}
function pad2(n) { return (n < 10 ? '0' : '') + n; }
// Manual local YYYY-MM-DD formatting — never round-trips through UTC.
function fmtISODateLocal(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

// ── Output template helpers ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  var d = parseISODateLocal(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function routeText(leg) {
  // Dual-shape reads (SELF-CONTAINED — web-tests/unit/ops-route-note.test.js extracts this
  // function by source and evals it against legacy-scalar fixture legs): live legs carry the
  // per-segment stop chain (stops[]); fixtures use pickupLocation/dropoffLocation.
  var stops = leg.stops || [leg.pickupLocation, leg.dropoffLocation];
  if (leg.category === 'stay_day') {
    return 'Stay in ' + (stops[stops.length - 1] || stops[0] || '?');
  }
  var s = stops.map(function(p) { return p || '?'; }).join(' → ');
  // Route-choice note — only when the operator explicitly picked a road (2026-07-20).
  if (leg.routeVariant === 'no_tolls') s += ' (via local road, no highway tolls)';
  else if (leg.routeVariant === 'fastest' && leg.routeOptions) s += ' (via expressway)';
  return s;
}

// M(priceCents) — convert cents to display currency
// USD display formatter (separators + always 2 decimals) — the internal-primary currency.
function fmtUsd(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// USD primary + small LKR reference (LKR string comes from the server response).
function usdWithLkr(cents, lkrStr) {
  return esc(fmtUsd(cents)) + (lkrStr ? '<span class="ch-val-sub">' + esc(lkrStr) + '</span>' : '');
}

function M(priceCents) {
  var cur = state.outputCurrency || 'LKR';
  var fx = (lastEstimate && lastEstimate.fxUsdToLkr) ? lastEstimate.fxUsdToLkr : 320;
  if (cur === 'USD') {
    // I3: use toFixed(2) so $40.48 is not rounded to $40
    var dollars = (priceCents / 100).toFixed(2);
    // Add thousands separator to the integer part
    var parts = dollars.split('.');
    parts[0] = parseInt(parts[0], 10).toLocaleString('en-US');
    return '$' + parts[0] + '.' + parts[1];
  }
  // LKR: priceCents is in USD cents, convert via fxUsdToLkr
  return 'LKR ' + Math.round(priceCents * fx / 100).toLocaleString('en-US');
}

// ── Template row model (V2/S2): rows that sum to the total by construction ────
// The engine returns lineItems already in the right order:
//   PRIVATE  : one travel item PER DRIVING LEG (in driving order), then extras.
//   CHAUFFEUR: day-rate, distance (incl. idle), then extras — no per-leg items.
// The per-leg travel items are identified by meta.billableKm when present; if the
// server strips meta, they are equivalently the FIRST N lineItems where N is the
// number of driving legs (engine pushes leg items before extras). We zip those to
// the driving legs (via the driving-index map) to caption them with date+route.

function legOrderItems() {
  return (lastEstimate && lastEstimate.lineItems) ? lastEstimate.lineItems : [];
}

// The adjustment is visible in the internal price build-up, but customer drafts show only the
// polished final total rather than exposing an internal pricing-policy label.
function customerLineItems() {
  var adjustment = 0;
  var items = [];
  legOrderItems().forEach(function(it) {
    if (it.meta && it.meta.kind === 'price_adjustment') adjustment += Number(it.amountCents) || 0;
    else items.push(Object.assign({}, it));
  });
  if (!adjustment || !items.length) return items;

  // Keep the policy auditable internally while making customer rows add up to Total.
  // Prefer the main travel charges; use another visible charge only if those cannot
  // absorb the full reduction without becoming negative.
  var candidates = [];
  if (isChauffeurEstimate()) {
    items.forEach(function(it, i) {
      if (/^(Chauffeur day rate|Distance)\s+—/.test(it.label || '')) candidates.push(i);
    });
  } else {
    items.forEach(function(it, i) {
      if (it.meta && it.meta.billableKm != null) candidates.push(i);
    });
  }
  if (!candidates.length) {
    items.forEach(function(it, i) { if (Number(it.amountCents) > 0) candidates.push(i); });
  }
  candidates.sort(function(a, b) { return Number(items[b].amountCents) - Number(items[a].amountCents); });
  items.forEach(function(it, i) {
    if (Number(it.amountCents) > 0 && candidates.indexOf(i) < 0) candidates.push(i);
  });

  var remaining = adjustment;
  candidates.forEach(function(i) {
    if (!remaining) return;
    var amount = Number(items[i].amountCents) || 0;
    var applied = remaining < 0 ? Math.max(remaining, -amount) : remaining;
    items[i].amountCents = amount + applied;
    remaining -= applied;
  });
  return items;
}

function drivingLegList() {
  return state.legs.filter(legDrives);
}

// Split lineItems into { travel: [...perDrivingLeg], extras: [...rest] }.
function splitLineItems() {
  var items = customerLineItems();
  var drivingCount = drivingLegList().length;
  // Prefer explicit meta.billableKm markers; fall back to positional (first N).
  var hasMeta = items.some(function(it) { return it.meta && it.meta.billableKm != null; });
  var travel = [];
  var extras = [];
  if (hasMeta) {
    items.forEach(function(it) {
      if (it.meta && it.meta.billableKm != null) travel.push(it);
      else extras.push(it);
    });
  } else {
    items.forEach(function(it, i) {
      if (i < drivingCount) travel.push(it);
      else extras.push(it);
    });
  }
  return { travel: travel, extras: extras };
}

// PRIVATE per-driving-leg rows: { date, route, cents } zipped in driving order.
function privateLegRows() {
  var split = splitLineItems();
  var rows = [];
  var drivingLegs = drivingLegList();
  drivingLegs.forEach(function(leg, di) {
    var item = split.travel[di];
    if (!item) return;
    rows.push({ date: leg.date, route: routeText(leg), cents: item.amountCents });
  });
  return rows;
}

function isChauffeurEstimate() {
  return lastEstimate && lastEstimate.product === 'chauffeur';
}

function productBlurb(veh) {
  if (isChauffeurEstimate()) {
    return 'This is for a chauffeur-driven ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations. It also covers the driver staying with you for the nights marked, including driver meals and accommodation.';
  }
  return 'This is for a private ' + veh + ' and includes fuel, driver cost, tolls, and pickup/drop-off from your locations.';
}

function generatedWhatsappMessage() {
  if (!lastEstimate) return null;
  var name = customerName() || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = [];
  lines.push('Hi ' + name + ', thank you for sharing the details.', '', 'We can help with this. Based on your itinerary, here is the quote:', '');

  if (isChauffeurEstimate()) {
    // Itinerary lines UNpriced (driving legs + stay days), in state order.
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push(fmtDate(leg.date) + ' — ' + routeText(leg));
      } else {
        lines.push(fmtDate(leg.date) + ' — Stay in ' + (legTo(leg) || legFrom(leg) || '?'));
      }
    });
    lines.push('');
    // Every engine lineItem as a priced row.
    customerLineItems().forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Pay in full to confirm: ' + M(dueCents) + '.');
  } else {
    // PRIVATE: per driving leg (date — route — price), then extras, then total.
    privateLegRows().forEach(function(r) {
      lines.push(fmtDate(r.date) + ' — ' + r.route + ' — ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push(it.label + ' — ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    lines.push('', productBlurb(veh));
  }

  appendChauffeurUpsell(lines, false);
  lines.push('', 'Please let me know if you have any questions or if you would like to proceed.');
  return lines.join('\n');
}

function generatedEmailMessage() {
  if (!lastEstimate) return null;
  var name = customerName() || 'there';
  var veh = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';
  var totalCents = lastEstimate.total && lastEstimate.total.cents != null ? lastEstimate.total.cents : 0;
  var lines = ['Hi ' + name + ',', '', 'Thank you for reaching out to Ceylon Hop. Based on the itinerary you shared, please find the transport quote below.', ''];

  if (isChauffeurEstimate()) {
    state.legs.forEach(function(leg) {
      if (legDrives(leg)) {
        lines.push('  ' + fmtDate(leg.date) + '   ' + routeText(leg));
      } else {
        lines.push('  ' + fmtDate(leg.date) + '   Stay in ' + (legTo(leg) || legFrom(leg) || '?'));
      }
    });
    lines.push('');
    customerLineItems().forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
    var dueCents = lastEstimate.amountDueNow && lastEstimate.amountDueNow.cents != null ? lastEstimate.amountDueNow.cents : 0;
    lines.push('', 'Pay in full to confirm: ' + M(dueCents) + '.');
  } else {
    privateLegRows().forEach(function(r) {
      lines.push('  ' + fmtDate(r.date) + '   ' + r.route + '   ' + M(r.cents));
    });
    splitLineItems().extras.forEach(function(it) {
      lines.push('  ' + it.label + '   ' + M(it.amountCents));
    });
    lines.push('', 'Total: ' + M(totalCents));
  }

  appendChauffeurUpsell(lines, true);
  lines.push('', productBlurb(veh), '', 'Please let us know if you would like to proceed and we can send over the booking/payment details.', '', 'Best,', 'Roshen', 'Ceylon Hop');
  return lines.join('\n');
}

function generatedOutputMessage(tab) {
  if (tab === 'whatsapp') return generatedWhatsappMessage();
  if (tab === 'email') return generatedEmailMessage();
  return null;
}

function currentOutputMessage(tab) {
  if (tab !== 'whatsapp' && tab !== 'email') return null;
  var draft = outputDrafts[tab];
  if (typeof draft === 'string') return draft;
  return generatedOutputMessage(tab);
}

function hasCustomOutputDraft(tab) {
  return (tab === 'whatsapp' || tab === 'email') && typeof outputDrafts[tab] === 'string';
}

function chauffeurUpsellSummary() {
  if (state.service === 'chauffeur' || !lastEstimate || !lastEstimate.services) return null;
  var chauf = lastEstimate.services.chauffeur;
  return (chauf && chauf.total) ? chauf : null;
}

function appendChauffeurUpsell(lines, emailStyle) {
  var chauf = chauffeurUpsellSummary();
  if (!outputIncludeChauffeurUpsell || !chauf) return;
  var amount = M(chauf.total.cents);
  if (emailStyle) {
    lines.push(
      '',
      'If you would also like the chauffeur-guide option to keep the same car and driver with you throughout the trip, that would be ' + amount + ' total.',
      'That option includes fuel, tolls, and the driver staying with you between the dated travel days, with meals and accommodation covered.'
    );
    return;
  }
  lines.push(
    '',
    'If you\'d prefer the chauffeur-guide option to keep the same car and driver with you throughout the trip, that would be ' + amount + ' total.',
    'That option includes fuel, tolls, and the driver staying with you between the dated travel days, with meals and accommodation covered.'
  );
}

// ── Internal view renderer ────────────────────────────────────────────────────
function renderInternalView() {
  if (!lastEstimate) {
    return '<div style="color:var(--muted);font-size:13px">Price the trip to generate the internal breakdown.</div>';
  }
  var est = lastEstimate;
  var bkm = est.breakdown && est.breakdown.km ? est.breakdown.km : null;
  var blines = est.lineItems || [];
  var serviceLabel = (state.service === 'chauffeur') ? 'Chauffeur-guide' : 'Point-to-point';
  var fx = est.fxUsdToLkr || 320;

  var vLabel = VEHICLE_LABELS[state.vehicleType] || state.vehicleType || '—';

  var gridHtml = [
    '<div class="ch-internal-grid">',
    '  <div><span>Customer</span><b>' + esc(customerName() || '—') + '</b></div>',
    '  <div><span>Pax / Bags</span><b>' + esc(state.passengerCount) + ' / ' + esc(state.luggageCount) + '</b></div>',
    '  <div><span>Vehicle</span><b>' + esc(vLabel) + '</b></div>',
    '  <div><span>Service</span><b>' + esc(serviceLabel) + '</b></div>',
    '  <div><span>Status</span><b>' + esc(STATUS_LABELS[state.status] || state.status) + '</b></div>',
    '  <div><span>FX</span><b>Rs ' + esc(String(fx)) + '/$</b></div>',
    '</div>',
  ].join('');

  // km summary from breakdown
  var kmRows = '';
  if (bkm) {
    kmRows = [
      '<tr><td>Total distance</td><td>' + esc(String(bkm.distanceKm)) + ' km</td></tr>',
      '<tr><td>Total buffer</td><td>+' + esc(String(bkm.bufferKm)) + ' km</td></tr>',
      '<tr><td>Total billable</td><td>' + esc(String(bkm.billableKm)) + ' km</td></tr>',
    ].join('');
  }

  // line items from server
  var lineItemRows = blines.map(function(item) {
    return '<tr class="sec"><td>' + esc(item.label) + '</td><td>' + esc(fmtUsd(item.amountCents)) + ' <span style="color:var(--muted-2)">(' + esc(item.lkr) + ')</span></td></tr>';
  }).join('');

  // Quote total
  var totalRow = '<tr class="hi blue"><td>Quote total</td><td>' + esc(fmtUsd(est.total.cents)) + ' <span style="color:var(--muted-2)">(' + esc(est.total.lkr) + ')</span></td></tr>';
  // FOUNDER-ONLY margin row (server-stripped for non-margin:view; capability-gated here too).
  var marginRow = (est.margin && viewerCan('margin:view')) ? '<tr><td>Est. margin</td><td>' + esc(fmtUsd(est.margin.cents)) + ' <span style="color:var(--muted-2)">(' + esc(est.margin.lkr) + ')</span></td></tr>' : '';

  var tableHtml = [
    '<table class="ch-itable">',
    kmRows,
    lineItemRows,
    totalRow,
    marginRow,
    '</table>',
  ].join('');

  var noteHtml = '<div class="ch-internal-note">For ops only — do not send to customer. All figures in LKR at markup.</div>';

  return gridHtml + tableHtml + noteHtml;
}

// ── Output body renderer ──────────────────────────────────────────────────────
// GL-1a: copy the active tab's message for manual paste into WhatsApp/email (owner
// decision 2026-07-02 — no deep link; the operator sends it themselves).
function copyOutputText() {
  // Maker-checker hard guard (belt-and-braces behind the disabled button): the customer
  // message can't be copied until the quote is approved.
  if (!copyUnlocked()) { showToast('Approve the quote first — copy unlocks at “Ready to send”'); return; }
  var text = null;
  if (outputTab === 'whatsapp') {
    text = currentOutputMessage('whatsapp');
  } else if (outputTab === 'email') {
    var body = currentOutputMessage('email');
    if (body) text = 'Subject: Ceylon Hop Transport Quote for Your Sri Lanka Trip\n\n' + body;
  }
  if (!text) { showToast('Price the trip first'); return; }
  var done = function() {
    showToast(outputTab === 'whatsapp' ? 'Copied — paste into WhatsApp' : 'Copied — paste into your email');
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function() { legacyCopy(text); done(); });
  } else {
    legacyCopy(text);
    done();
  }
}

// execCommand fallback for non-secure contexts (clipboard API needs HTTPS/localhost).
function legacyCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) { /* best effort */ }
  document.body.removeChild(ta);
}

function renderOutputBody() {
  var tab = outputTab;
  var guard = '<div style="color:var(--muted);font-size:13px;padding:16px 0">Price the trip to generate the message.</div>';

  if (tab === 'internal') {
    return renderInternalView(); // never gated — internal-only ops summary
  }

  // Copy gate: the customer message stays hidden until the quote is approved (Ready to
  // send) — for EVERYONE, founder included (owner decision 2026-07-10). Nobody sees the
  // sendable wording before approval; the founder reviews pricing/vehicle on the Internal
  // tab (never gated) + the itinerary, approves, and the message then appears to copy.
  if (!copyUnlocked()) {
    var lockSub = isApprover()
      ? 'Click <b>Approve &mdash; ready to send</b> to reveal and copy the customer message.'
      : 'The customer message unlocks once the founder marks this quote <b>Ready to send</b>.';
    return [
      '<div class="ch-copy-lock">',
      '  <div class="ch-copy-lock-icon">&#x1F512;</div>',
      '  <div class="ch-copy-lock-title">Not ready to send yet</div>',
      '  <div class="ch-copy-lock-sub">' + lockSub + '</div>',
      '</div>',
    ].join('');
  }

  if (tab === 'whatsapp') {
    var msg = currentOutputMessage('whatsapp');
    if (!msg) return guard;
    return [
      '<div class="ch-output-meta">',
      '  <div class="ch-output-hint">Generated draft. Edit it here before copying if you want to personalize it.</div>',
      (hasCustomOutputDraft('whatsapp')
        ? '  <button class="ch-btn ch-btn-sm" data-action="resetOutputDraft" data-tab="whatsapp" type="button">Reset</button>'
        : ''),
      '</div>',
      '<textarea class="ch-pre ch-output-editor" data-output-tab="whatsapp" spellcheck="true">' + esc(msg) + '</textarea>',
    ].join('');
  } else if (tab === 'email') {
    var msg2 = currentOutputMessage('email');
    if (!msg2) return guard;
    return [
      '<div class="ch-output-meta">',
      '  <div class="ch-output-hint">Generated draft. Edit the email body here before copying if you want to personalize it.</div>',
      (hasCustomOutputDraft('email')
        ? '  <button class="ch-btn ch-btn-sm" data-action="resetOutputDraft" data-tab="email" type="button">Reset</button>'
        : ''),
      '</div>',
      '<div class="ch-email-subject"><span>Subject</span> Ceylon Hop Transport Quote for Your Sri Lanka Trip</div>',
      '<textarea class="ch-pre ch-output-editor" data-output-tab="email" spellcheck="true">' + esc(msg2) + '</textarea>',
    ].join('');
  }
  return '';
}


// ── Maker-checker header pieces ───────────────────────────────────────────────
const STATUS_PILL_TONE = {
  draft: 'slate', pending_review: 'amber', changes_requested: 'amber',
  ready: 'teal', sent: 'blue', won: 'green', lost: 'red', expired: 'muted',
};
function renderStatusPill() {
  var label = STATUS_LABELS[state.status] || state.status || 'Draft';
  return '<span class="ch-status-pill tone-' + (STATUS_PILL_TONE[state.status] || 'slate') + '">' + esc(label) + '</span>';
}

// States where a quote is locked (submitted/approved) but not yet sent — deletable by a founder
// only (mirrors the server's DELETABLE_BY_FOUNDER). Defined out here, not inline in
// renderActionBar, so the review-lock test's per-line scan isn't tripped by a non-row mention.
var DELETABLE_LOCKED_STATES = ['pending_review', 'ready'];
// Role- and status-aware action bar. A support agent (no quote:approve) can submit and,
// once approved, mark sent — never approve. The founder reviews, approves (or self-approves
// a draft in one hop), sends back, or edits in place. Buttons are data-action delegated.
function renderActionBar() {
  var s = state.status, approver = isApprover(), out = [];
  // Quote intent (spec 2026-07-17): a quote can't be submitted for review — or self-approved —
  // until the customer request is recorded. Mirror the server gate on the client so the buttons
  // that would 400 are disabled with a reason. Save is NEVER gated (work-in-progress must save).
  var needReq = !state.requestedService, reqHint = 'Record what the customer asked for first';
  var B = function(action, label, cls, disabled, title) {
    return '<button class="ch-btn ' + cls + '" data-action="' + action + '"'
      + (disabled ? ' disabled' : '') + (title ? ' title="' + esc(title) + '"' : '') + '>' + label + '</button>';
  };
  var GB = function(action, label, cls) { return B(action, label, cls, needReq, needReq ? reqHint : null); }; // gated button
  var SAVE = B('saveDraft', 'Save', 'ch-btn-outline'); // persist edits, keep status
  if (approver) {
    // Lifecycle is enforced for everyone, founders included: a quote must be Submitted for review
    // before it can be Approved (no self-approve straight from a draft). Approve appears only in
    // pending_review below — matching the server, which now rejects draft/changes_requested → ready.
    if (s === 'draft' || s === 'changes_requested') { out.push(GB('submitForReview', s === 'changes_requested' ? 'Resubmit for review' : 'Submit for review', 'ch-btn-teal'), SAVE); }
    else if (s === 'pending_review') { out.push(GB('approveReady', 'Approve — ready to send', 'ch-btn-teal'), B('sendBack', 'Send back for changes', 'ch-btn-outline'), B('reopenToDraft', 'Reopen to edit', 'ch-btn-ghost')); }
    else if (s === 'ready') { out.push(B('markSent', 'Mark as sent', 'ch-btn-primary'), B('reopenToDraft', 'Reopen to edit', 'ch-btn-ghost')); }
    else if (s === 'sent') { out.push(B('markWon', 'Mark booked', 'ch-btn-teal'), B('markLost', 'Mark lost', 'ch-btn-ghostdanger'), B('reopenToDraft', 'Reopen to edit', 'ch-btn-ghost')); }
    else if (s === 'won' && !state.convertedBookingId) { out.push(B('markWon', 'Mark booked', 'ch-btn-teal')); }
  } else {
    if (s === 'draft') { out.push(GB('submitForReview', 'Submit for review', 'ch-btn-teal'), SAVE); }
    else if (s === 'changes_requested') { out.push(GB('submitForReview', 'Resubmit for review', 'ch-btn-teal'), SAVE); }
    else if (s === 'ready') { out.push(B('markSent', 'Mark as sent to customer', 'ch-btn-primary')); }
    else if (s === 'sent') { out.push(B('markWon', 'Mark booked', 'ch-btn-teal'), B('markLost', 'Mark lost', 'ch-btn-ghostdanger')); }
    else if (s === 'won' && !state.convertedBookingId) { out.push(B('markWon', 'Mark booked', 'ch-btn-teal')); }
    else if (s === 'pending_review') { out.push(B('reopenToDraft', 'Reopen to edit', 'ch-btn-ghost')); } // pull it back from review to fix something
  }
  // Delete (spec 2026-07-22): soft delete, only for a SAVED quote, gated by state + role to mirror
  // the server. draft/changes_requested → anyone here (ops); pending_review/ready → approver
  // (founder) only; sent/decided → never (no button). The server is authoritative regardless.
  var canDelete = !!state.savedId && (
    s === 'draft' || s === 'changes_requested' ||
    (DELETABLE_LOCKED_STATES.indexOf(s) >= 0 && approver)
  );
  if (canDelete) out.push(B('deleteQuote', 'Delete', 'ch-btn-ghostdanger'));
  return out.join('');

// A contextual banner above the editor explaining the current review state (and, for a
// sent-back quote, the founder's note — the one cross-role message in v1).
// The assign picker's roster, fetched once per session. Empty on failure — the picker just
// shows Unassigned, which is honest: assignment is optional, and a stale roster would offer
// people the server would reject anyway.
var opsUsers = [];
async function loadOpsUsers() {
  if (window.opsUsers) { opsUsers = window.opsUsers; return; } // the shell already fetched it for the queue chips
  try {
    var r = await api('/admin/ops/users');
    if (!r.ok) return;
    var b = await jsonOrNull(r);
    opsUsers = (b && b.users) || [];
  } catch (e) { /* leave the roster empty; assigning is not required to quote */ }
}

// Assignee picker — lives in the header next to the action buttons (spec 2026-07-22). No label:
// the selected name IS the label, and clicking the select reassigns. Assignment is what notifies
// someone, so it stays a first-class control; hidden until the quote is saved (no id to assign).
// A new quote is auto-assigned to its creator server-side, so this opens already on the maker.
function renderHeaderAssign() {
  if (!state.savedId) return '';
  var cur = state.assignedTo || '';
  var me = (window.opsEmail || '').toLowerCase();
  var opts = ['<option value="">Unassigned</option>'];
  opsUsers.forEach(function(u) {
    // Name the person, not their inbox. displayName comes from the server ('Roshen W.') and
    // falls back to the email local part for anyone who hasn't signed in since profiles shipped.
    var label = u.displayName || String(u.email || '').split('@')[0];
    opts.push('<option value="' + esc(u.email) + '"' + (u.email === cur ? ' selected' : '') +
      ' title="' + esc(u.email) + '">' +
      esc(label) + (u.email === me ? ' (you)' : '') + '</option>');
  });
  var tone = (cur && cur === me) ? ' mine' : (cur ? '' : ' none');
  return '<select class="ch-assign-sel ch-head-assign' + tone + '" id="assignSel" data-action="assignQuote"'
    + ' aria-label="Assign this quote" title="Assign this quote — click to reassign">' + opts.join('') + '</select>';

// Provenance — a quiet created/updated-by line above the editor. The interactive assignee moved to
// the header (renderHeaderAssign); this is the read-only audit that used to sit beside it.
function renderAssignStrip() {
  if (!state.savedId) return '';
  var audit = [];
  if (state.createdBy) audit.push('Created by ' + esc(state.createdBy));
  if (state.updatedBy) audit.push('last updated by ' + esc(state.updatedBy));
  if (!audit.length) return '';
  return '<div class="ch-assign"><span class="ch-assign-audit">' + audit.join(' &middot; ') + '</span></div>';
}

// Hand the quote to someone (or nobody). The server validates the assignee against OPS_USERS
// and emails them; on failure we re-render so the select snaps back to the truth rather than
// showing a handover that never happened.
async function assignQuote(email) {
  if (!state.savedId) return;
  var res = await apiPatch(state.savedId, { assignedTo: email || null });
  if (!res || res.error) {
    showToast('Could not assign — ' + ((res && res.error) || 'unknown error'));
    render();
    return;
  }
  state.assignedTo = res.assignedTo || null;
  state.updatedBy = res.updatedBy || state.updatedBy;
  showToast(state.assignedTo ? ('Assigned to ' + userLabel(state.assignedTo)) : 'Unassigned');
  if (window.opsRefreshQuotes) window.opsRefreshQuotes();
  render();
}

function renderReviewBanner() {
  var s = state.status, note = state.notes ? String(state.notes).trim() : '';
  function banner(tone, title, body) {
    return '<div class="ch-review-banner tone-' + tone + '">' +
      '<b>' + esc(title) + '</b>' + (body ? '<span>' + esc(body) + '</span>' : '') + '</div>';

  if (s === 'pending_review') {
    return isApprover()
      ? banner('amber', 'In review — locked', 'Approve, send back, or reopen to edit.')
      : banner('amber', 'Submitted — locked', 'With the founder. Reopen to edit if you need to change it.');
  }
  if (s === 'changes_requested') {
    return isApprover()
      ? banner('amber', 'Sent back for changes', note ? 'Note: ' + note : '')
      : banner('amber', 'Changes requested', (note ? 'Note: ' + note + ' — ' : '') + 'update the quote and resubmit for review.');
  }
  if (s === 'ready') {
    return isApprover()
      ? banner('teal', 'Approved — ready to send', 'Support can now copy the customer message and send it.')
      : banner('teal', 'Approved — ready to send', 'Copy the message below, send it to the customer, then mark it sent.');

  return '';

// ── Number tick (2026-07-21) ──────────────────────────────────────────────────
// When the diff-render updates a number (a leg price, a km pill, the totals), settle it
// in with a soft fade-and-rise instead of a hard character swap. The diff's onElUpdated
// hook collects exactly the changed elements; nothing animates on renders that didn't
// touch it. Respects prefers-reduced-motion.
var NUM_TICK_SELECTOR = '.ch-leg-price, .ch-dist-pill, .ch-total-usd, .ch-total-lkr, .ch-km.hero, .ch-line-val';
var _numTickEls = [];
function runNumberTicks() {
  var els = _numTickEls;
  _numTickEls = [];
  if (!els.length) return;
  try { if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; } catch (e) {}
  // An updated total fires for both the row and the value span inside it — animate only
  // the outermost of any nested pair so opacities don't compound.
  els = els.filter(function (el) {
    return !els.some(function (other) { return other !== el && other.contains(el); });
  });
  els.forEach(function (el) {
    if (!el.isConnected || typeof el.animate !== 'function') return;
    el.animate(
      [{ opacity: 0.3, transform: 'translateY(3px)' }, { opacity: 1, transform: 'translateY(0)' }],
      { duration: 260, easing: 'cubic-bezier(0.2, 0.6, 0.2, 1)' }
    );
  });
}

      return [
        '<div class="ch-scrim show" data-action="routeModalDismiss"></div>',
        '<div class="ch-modal ch-rc-modal">',
        '  <div class="ch-modal-card">',
        '    <div class="ch-modal-head">',
        '      <h2>Two routes for this leg</h2>',
        '      <button class="ch-x-btn" id="rc-dismiss" data-action="routeModalDismiss" title="Keep default and close">&times;</button>',
        '    </div>',
        '    <div class="ch-modal-body">',
        '      <div class="ch-lock-note">' + esc(d.from) + ' &rarr; ' + esc(d.to) + ' &middot; pick which one to quote</div>',
        '      <div class="ch-rc-body">',
        '        <div class="ch-rc-map" id="route-modal-map"></div>',
        '        <div class="ch-rc-cards">',
        '          <button class="ch-rc-card' + (d.selected === 'fastest' ? ' is-sel' : '') + '" id="rc-card-fast" data-route="fastest" data-action="routeModalSelectFast">',
        '            <div class="ch-rc-name"><span class="ch-rc-swatch-fast">&#9473;</span> Expressway <span class="ch-rc-tag">current</span></div>',
        '            <div class="ch-rc-hero-row">',
        '              <div class="ch-rc-hero">' + esc(d.fast.time) + '</div>',
        '              <div class="ch-rc-price">' + esc(d.fast.price) + '</div>',
        '            </div>',
        '            <div class="ch-rc-stats"><span><b>' + esc(d.fast.km) + '</b>distance</span><span><b>Tolled</b>expressway</span></div>',
        '            <div class="ch-rc-fit">Fastest &middot; best for tight flight connections</div>',
        '          </button>',
        '          <button class="ch-rc-card' + (d.selected === 'no_tolls' ? ' is-sel' : '') + '" id="rc-card-local" data-route="local" data-action="routeModalSelectLocal">',
        '            <div class="ch-rc-name"><span class="ch-rc-swatch-local">&#9548;</span> Local road</div>',
        '            <div class="ch-rc-hero-row">',
        '              <div class="ch-rc-hero">' + esc(d.local.time) + (d.local.slower ? ' <span class="ch-rc-save">' + esc(d.local.slower) + '</span>' : '') + '</div>',
        '              <div class="ch-rc-price">' + esc(d.local.price) + (d.local.save ? ' <span class="ch-rc-save">' + esc(d.local.save) + '</span>' : '') + '</div>',
        '            </div>',
        '            <div class="ch-rc-stats"><span><b>' + esc(d.local.km) + '</b>distance</span><span><b>Toll-free</b>local road</span></div>',
        '            <div class="ch-rc-fit">Cheaper &middot; best for budget or scenic hill country</div>',
        '          </button>',
        '        </div>',
        '      </div>',
        '      <div style="display:flex;justify-content:flex-end;align-items:center;margin-top:16px">',
        '        <button class="ch-btn ch-btn-teal" id="rc-use-btn" data-action="' + (d.selected === 'no_tolls' ? 'routeModalPickLocal' : 'routeModalPickFast') + '">' + (d.selected === 'no_tolls' ? 'Use local road' : 'Use expressway') + '</button>',
        '      </div>',
        '    </div>',
        '  </div>',
        '</div>',
      ].join('');
    })() : ''),

  ].join('');

  // V19: render() replaces the render target's innerHTML wholesale, destroying whatever
  // input the operator is currently typing into. A background render (an earlier
  // leg's auto-distance resolving, or refreshEstimate landing) would otherwise
  // wipe the destination the operator is entering on a LATER leg — the "distance
  // stops working after the first leg" symptom. Snapshot the focused field's
  // in-progress text + caret before the swap and restore them after.
  var _focusSnap = captureEditorFocus();
  // Was an autocomplete menu open? The innerHTML swap below destroys it (it's a
  // child of the render target), so capture the intent to rebuild it afterwards.
  var _menuWasOpen = !!_ac.menuEl;
  // Diff-render (2026-07-21): patch the live DOM against the new tree instead of an
  // innerHTML swap. Nodes whose rendered output didn't change are left alone — no repaint,
  // no image/map reload, no focus or scroll loss. This retires the whole class of
  // "every edit makes the builder flicker" bugs the swap kept producing.
  _numTickEls = [];
  _renderSwapping = true;
  morphdom(document.querySelector('#quoteRoot .ch-app'), '<div>' + html + '</div>', {
    childrenOnly: true,
    getNodeKey: function (node) {
      if (node.nodeType !== 1) return undefined;
      // Leg cards are keyed by leg id so a reorder/insert moves nodes instead of
      // rewriting every row after the change.
      return node.id || node.getAttribute('data-leg-id') || undefined;
    },
    onBeforeElUpdated: function (fromEl, toEl) {
      if (fromEl.isEqualNode(toEl)) return false; // unchanged subtree — skip entirely
      // The persistent map hosts are populated OUTSIDE render() (syncItinMap /
      // syncRouteModalMap keep a long-lived map element inside them). Their children
      // aren't in the rendered HTML, so the diff must never descend into them.
      if (fromEl.id === 'itin-map-slot' || fromEl.id === 'route-modal-map') return false;
      return true;
    },
    onElUpdated: function (el) {
      // The diff already knows which elements changed — collect the number-bearing
      // ones so runNumberTicks() can settle them in softly instead of a hard swap.
      if (el.nodeType === 1 && el.matches && el.matches(NUM_TICK_SELECTOR)) _numTickEls.push(el);
    },
    onBeforeNodeDiscarded: function (node) {
      // The open autocomplete menu is interaction state appended next to its input,
      // not render output — the diff must not remove it mid-selection.
      if (node.nodeType === 1 && node.classList && node.classList.contains('ch-ac-menu')) return false;
      return true;
    },
  });
  _renderSwapping = false;
  runNumberTicks();
  applyContentLock();
  attachEventListeners();
  restoreEditorFocus(_focusSnap, _menuWasOpen);
  if (_menuWasOpen) reopenAutoCompleteMenu();
  syncItinMap(); // move/refresh the persistent route map into this render's slot
  syncRouteModalMap(); // draw both routes in the open route-choice modal (no-op when closed)
}

// After a full re-render blows away the open autocomplete menu, rebuild it
// against the fresh input node so it doesn't vanish mid-selection (the "dropdown
// disappears before I can click" symptom when a background estimate/distance
// render lands while the operator is choosing a place). _ac still holds the last
// fetched items + highlight index; we just need the new DOM node to anchor to.
function reopenAutoCompleteMenu() {
  if (!_ac.legId || !_ac.field || !_ac.items || _ac.items.length === 0) return;
  var input = document.querySelector(acInputSelector(_ac.legId, _ac.field, _ac.stop));
  if (!input) return;
  // Only reopen while the operator is actually in this field.
  if (document.activeElement !== input) return;
  _ac.inputEl = input;
  acRenderMenu(input, _ac.items, input.value || '');
}

// Selector for one leg editor input. data-leg + data-field, PLUS the data-stop /
// data-seg index when given — Task 8 renders many stop inputs (field="stop") and many
// per-segment km inputs (field="distanceKm") per leg, so leg+field alone is ambiguous.
function acInputSelector(legId, field, stopIdx, segIdx) {
  var sel = '#quoteRoot .ch-app [data-leg="' + legId + '"][data-field="' + field + '"]';
  if (stopIdx != null) sel += '[data-stop="' + stopIdx + '"]';
  if (segIdx != null) sel += '[data-seg="' + segIdx + '"]';
  return sel;
}

// Capture the currently-focused editor input so a full re-render doesn't lose
// the operator's typing. Identified by data-leg+data-field (+data-stop/data-seg
// index) or element id (customer fields). Returns null when focus is elsewhere.
function captureEditorFocus() {
  var el = document.activeElement;
  if (!el || typeof el.matches !== 'function') return null;
  if (!el.matches('#quoteRoot .ch-app input, #quoteRoot .ch-app textarea')) return null;
  var leg = el.getAttribute('data-leg');
  var field = el.getAttribute('data-field');
  var id = el.id || null;
  if (!leg && !id) return null;
  var snap = { leg: leg, field: field, stop: el.getAttribute('data-stop'), seg: el.getAttribute('data-seg'), id: id, value: el.value, start: null, end: null };
  // selectionStart throws on some input types (e.g. type=number/date) — guard it.
  try { snap.start = el.selectionStart; snap.end = el.selectionEnd; } catch (e) {}
  return snap;
}

function restoreEditorFocus(snap, menuWasOpen) {
  if (!snap) return;
  var sel;
  if (snap.leg && snap.field) {
    sel = acInputSelector(snap.leg, snap.field, snap.stop, snap.seg);
  } else if (snap.id) {
    sel = '#quoteRoot .ch-app #' + snap.id;
  } else {
    return;
  }
  var el = document.querySelector(sel);
  if (!el) return;
  // Restore the operator's in-progress text (state may lag a keystroke behind).
  if (typeof snap.value === 'string' && el.value !== snap.value) el.value = snap.value;
  el.focus();
  if (snap.start != null) {
    try { el.setSelectionRange(snap.start, snap.end); } catch (e) {}
  }
  // Reopen the live autocomplete after a background re-render ONLY while the operator is
  // still actively searching. After a commit (acPick) `_ac.committed` stays true, so a
  // just-picked place does not spuriously reopen the dropdown on every follow-up render.
  // Reopen only if the menu was actually open before this render (matching reopenAutoCompleteMenu
  // below). Without the menuWasOpen gate, a background estimate/distance render would re-open a
  // menu the operator had dismissed (e.g. scrolled/wheeled away) — the "menu pops back after I
  // scroll it closed" regression.
  if (snap.leg && snap.field && el.classList && el.classList.contains('ch-tl-title') && !_ac.committed && menuWasOpen) {
    requestAutocomplete(el, snap.leg, snap.field, snap.stop, (el.value || '').trim());
  }
}

// ── Event delegation ──────────────────────────────────────────────────────────
// The status dropdown + New/Save header buttons were replaced by the maker-checker
// action bar (data-action delegated in the app-level click handler above), so this
// function now only wires the free-text customer fields.
function attachEventListeners() {

  // Customer card fields — live update state without full re-render for text inputs
  var fieldMap = {
    'f-firstName':       function(v) { state.firstName = v; },
    'f-lastName':        function(v) { state.lastName = v; },
    'f-contact':         function(v) { state.contact = v; },
    // V18: server 400s on pax<1 — clamp client-side so we never send it.
    'f-passengerCount':  function(v) { state.passengerCount = Math.max(1, parseInt(v, 10) || 1); },
    'f-luggageCount':    function(v) { state.luggageCount = Math.max(0, Math.min(absMaxBags(), parseInt(v, 10) || 0)); },
  };
  var priceFields = { 'f-passengerCount': true, 'f-luggageCount': true };
  Object.keys(fieldMap).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var isText = (id === 'f-firstName' || id === 'f-lastName' || id === 'f-contact');
    el.addEventListener('input', function() {
      fieldMap[id](el.value);
      // Text basics: live-update the contact validity + itinerary gate (renders only on a
      // flip, so the operator's typing/focus is never disrupted mid-keystroke).
      if (isText) syncBasics();
      // D3: pax/bags keystrokes retarget the vehicle suggestion instantly — a targeted
      // #veh-chips swap (the caret lives in this input, outside that subtree).
      if (priceFields[id]) {
        var vc = document.getElementById('veh-chips');
        if (vc) vc.outerHTML = renderVehicleChips();
      }
    });
    // Price fields (pax/bags) re-estimate + re-render on change; they also affect the gate.
    if (priceFields[id]) {
      el.addEventListener('change', function() { fieldMap[id](el.value); refreshEstimate(); render(); });
    }
  });

  // (Vehicle selection is the chip row in Trip basics — see renderVehicleChips and the
  // delegated 'setVehicle' action. Van 14/Custom price from the rate card, no per-quote input.)

  // Event delegation for data-action on the whole app
  // I1: attach these ONCE — the render target persists across renders, so adding on every
  // render would accumulate duplicate handlers (N renders → N handler copies).
  var app = document.querySelector('#quoteRoot .ch-app');
  if (!app) return;

  if (!_delegatesWired) {
    _delegatesWired = true;

  // Internal-notes textarea (2026-07-22): lives inside the re-rendered itinerary, so it's wired
  // by delegation on the persistent app node rather than a per-render listener. markDirty() arms
  // the same 2.5s autosave the rest of the builder uses; the diff-render preserves the caret.
  app.addEventListener('input', function(e) {
    var t = e.target;
    if (t && t.id === 'f-internalNotes') { state.internalNotes = t.value; markDirty(); }
  });

  app.addEventListener('click', function(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    var legId = el.getAttribute('data-leg');

    if (action === 'addLeg') {
      var cat = el.getAttribute('data-cat') || 'transfer';
      addLeg(cat);
    } else if (action === 'removeLeg') {
      removeLeg(legId);
    } else if (action === 'dupLeg') {
      dupLeg(legId);
    } else if (action === 'moveLegUp') {
      moveLeg(legId, -1);
    } else if (action === 'moveLegDown') {
      moveLeg(legId, 1);
    } else if (action === 'addStop' || action === 'removeStop' || action === 'andReturn') {
      // Multi-stop rides (Task 8). Every stop-list change goes through rebuildSegments
      // (structural invalidation, spec §5) and clears the 2-stop-only route-choice state
      // (GC-10) — any stop-count transition invalidates a picked/offered fork.
      var sLeg = state.legs.find(function(l) { return l.id === legId; });
      if (sLeg && sLeg.category !== 'stay_day') {
        var newStops = sLeg.stops.slice();
        if (action === 'addStop' && newStops.length < 8) {
          newStops.splice(newStops.length - 1, 0, ''); // new empty stop BEFORE the last
        } else if (action === 'removeStop' && newStops.length > 2) {
          var rmIdx = parseInt(el.getAttribute('data-stop'), 10);
          if (!isNaN(rmIdx) && rmIdx >= 0 && rmIdx < newStops.length) newStops.splice(rmIdx, 1);
        } else if (action === 'andReturn' && newStops.length < 8 && (newStops[0] || '').trim()) {
          newStops.push(newStops[0]); // out-and-back sugar: end where the ride starts
        }
        if (newStops.length !== sLeg.stops.length) {
          // Segment indices shifted — the per-index distance cache keys are stale.
          delete _distCache[legId];
          // Neutralize any pending autocomplete blur commit: a stop input that blurred when
          // this button was pressed has a 200ms delayed commit still captured at its OLD
          // stop index; after this shift that index points at a different stop, so the
          // commit would write stale text there. Bumping the token makes that callback skip.
          _stopMutationSeq++;
          updateLeg(legId, {
            stops: newStops,
            segments: rebuildSegments(sLeg.stops, sLeg.segments, newStops),
            routeVariant: undefined, routeOptions: null, _sameRoute: false, _promptedRouteChoice: false,
          });
          scheduleAutoDistance(legId);
          if (action === 'addStop') {
            // Put the caret in the stop just inserted (index = second-to-last).
            var freshStop = document.querySelector('#quoteRoot .ch-app [data-leg="' + legId + '"][data-field="stop"][data-stop="' + (newStops.length - 2) + '"]');
            if (freshStop) freshStop.focus();
          }
        }
      }
    } else if (action === 'setService') {
      if (el.disabled) return;
      setService(el.getAttribute('data-service'));
    } else if (action === 'setRequestedService') {
      setRequestedService(el.getAttribute('data-req'));
    } else if (action === 'setVehicle') {
      mutate({ vehicleType: el.getAttribute('data-veh') });
    } else if (action === 'toggleAddons') {
      legAddonsOpen[legId] = !legAddonsOpen[legId];
      render();
    } else if (action === 'toggleMap') {
      _mapOpen = !_mapOpen;
      render();
    } else if (action === 'backToQueue') {
      // D5: guard in-app back navigation the same way "+ New quote" and the browser's
      // beforeunload do — an unsaved builder shouldn't be discarded on a single click with no
      // warning. Autosave only covers already-saved quotes, so a brand-new unsaved quote has
      // nothing to fall back on.
      if (_dirty && !confirm('Leave this quote? Unsaved changes will be lost.')) return;
      if (window.opsGoQuotes) window.opsGoQuotes();
    } else if (action === 'saveDraft') {
      saveQuote();
    } else if (action === 'submitForReview') {
      submitForReview();
    } else if (action === 'approveReady') {
      approveReady();
    } else if (action === 'sendBack') {
      sendBackOpen = true;
      render();
      var ta = document.getElementById('sendBackNote');
      if (ta) ta.focus();
    } else if (action === 'confirmSendBack') {
      confirmSendBack();
    } else if (action === 'cancelSendBack') {
      sendBackOpen = false;
      render();
    } else if (action === 'markSent') {
      markSent();
    } else if (action === 'markWon') {
      bookOpen = true;
      render();
    } else if (action === 'markLost') {
      markOutcome('lost');
    } else if (action === 'confirmBook') {
      bookQuote();
    } else if (action === 'cancelBook') {
      bookOpen = false;
      render();
    } else if (action === 'reopenToDraft') {
      reopenToDraft();
    } else if (action === 'deleteQuote') {
      deleteQuote();
    } else if (action === 'openRates') {
      if (!viewerCan('margin:view')) return; // founder-only rate card
      ratesOpen = true;
      hzEditId = null;
      loadHotZones(); // async: fetches the zone list, then re-renders the panel in place
      render();
    } else if (action === 'closeRates') {
      ratesOpen = false;
      hzEditId = null;
      render();
    } else if (action === 'hzSubmit') {
      hzSubmitZone();
    } else if (action === 'hzEditStart') {
      hzEditId = el.getAttribute('data-id');
      render();
    } else if (action === 'hzEditCancel') {
      hzEditId = null;
      render();
    } else if (action === 'hzToggleActive') {
      hzToggleZone(el.getAttribute('data-id'));
    } else if (action === 'hzDelete') {
      hzDeleteZone(el.getAttribute('data-id'));
    } else if (action === 'toggleOutput') {
      // Resolve the current effective open state (tri-state → bool), then flip to
      // the explicit opposite so one click always toggles what the operator sees.
      var wide = (typeof window !== 'undefined' && window.matchMedia)
        ? window.matchMedia('(min-width: 961px)').matches : true;
      var eff = (outputOpen === null) ? wide : outputOpen;
      outputOpen = !eff;
      render();
    } else if (action === 'manualDistance') {
      // Manual km wins: a typed number is not a Google route, so the variant label must go.
      // Per-segment (Task 8): every km affordance carries data-seg; absent → segment 0.
      var mLeg = state.legs.find(function(l) { return l.id === legId; });
      if (mLeg) {
        var mSi = parseInt(el.getAttribute('data-seg'), 10); if (isNaN(mSi)) mSi = 0;
        updateLeg(legId, { segments: segmentsWith(mLeg, mSi, { manual: true }), routeVariant: undefined });
      }
    } else if (action === 'autoDistance') {
      var aLeg = state.legs.find(function(l) { return l.id === legId; });
      if (aLeg) {
        var aSi = parseInt(el.getAttribute('data-seg'), 10);
        // data-seg → that segment back to auto (only its cache entry dropped, so the other
        // segments of a multi-stop ride don't re-bill a fetch); absent → the whole leg
        // (kept for safety). Stale driveTimeHours is deliberately kept until the
        // re-resolve lands — exactly what the old leg-level reset did.
        if (isNaN(aSi)) delete _distCache[legId];
        else if (_distCache[legId]) delete _distCache[legId][aSi];
        var aSegs = isNaN(aSi)
          ? aLeg.segments.map(function(s) { return Object.assign({}, s, { manual: false, autoMatched: false, km: 0 }); })
          : segmentsWith(aLeg, aSi, { manual: false, autoMatched: false, km: 0 });
        updateLeg(legId, { segments: aSegs, routeVariant: undefined, routeOptions: null, _sameRoute: false, _promptedRouteChoice: false });
        scheduleAutoDistance(legId);
      }
    } else if (action === 'openRouteModal' || action === 'compareRoutes') {
      // Ensure variants are loaded (auto-resolve usually has them already), then open the modal.
      (async function () {
        var l = state.legs.find(function (x) { return x.id === legId; });
        if (l && !l.routeOptions) { await compareRoutes(legId); }
        var l2 = state.legs.find(function (x) { return x.id === legId; });
        if (l2 && l2.routeOptions) openRouteModal(legId);
      })();
    } else if (action === 'routeModalSelectFast') {
      _rcSel = 'fastest'; render();   // display-only highlight; nothing commits until "Use"
    } else if (action === 'routeModalSelectLocal') {
      _rcSel = 'no_tolls'; render();
    } else if (action === 'routeModalPickFast') {
      pickRoute(routeModalLegId, 'fastest');
    } else if (action === 'routeModalPickLocal') {
      pickRoute(routeModalLegId, 'no_tolls');
    } else if (action === 'routeModalDismiss') {
      closeRouteModal(true);
    } else if (action === 'setCurrency') {
      mutate({ outputCurrency: el.getAttribute('data-val') });
    } else if (action === 'copyOutput') {
      copyOutputText(); // GL-1a: manual copy → WhatsApp/email
    } else if (action === 'toggleChauffeurUpsell') {
      outputIncludeChauffeurUpsell = !outputIncludeChauffeurUpsell;
      outputDrafts = { whatsapp: null, email: null };
      render();
    } else if (action === 'resetOutputDraft') {
      var tabKey = el.getAttribute('data-tab');
      if (tabKey === 'whatsapp' || tabKey === 'email') {
        outputDrafts[tabKey] = null;
        render();
      }
    } else if (action === 'setTab') {
      outputTab = el.getAttribute('data-tab') || 'whatsapp';
      render();
    }
  });

  // Leg field change delegation
  app.addEventListener('change', function(e) {
    // The innerHTML swap in render() rips out a dirty focused input, which makes Chromium
    // fire a native 'change' that bubbles here mid-swap. Committing it would write the
    // operator's HALF-TYPED text into state → auto-distance + re-price → render → another
    // artifact 'change': the typing-flicker loop (docs/bug-ops-quote-typing-flicker.md).
    if (_renderSwapping) return;
    var el = e.target;
    if (el.getAttribute('data-action') === 'assignQuote') { assignQuote(el.value); return; }
    var legId = el.getAttribute('data-leg');
    var field = el.getAttribute('data-field');
    if (!legId || !field) return;
    // Same loop, second guard: a 'change' whose value matches state is a render artifact or
    // a repeat — updateLeg would still markDirty + re-render + re-price, sustaining the
    // loop, so a no-change commit must be a true no-op.
    var legNow = state.legs.find(function(l) { return l.id === legId; });
    if (legNow && el.type !== 'checkbox' && String(legNow[field] == null ? '' : legNow[field]) === String(el.value)) return;

    var val;
    if (el.type === 'checkbox') {
      val = el.checked;
    } else if (el.type === 'number') {
      val = parseFloat(el.value) || 0;
    } else {
      val = el.value;
    }
    // No past dates: reject a typed/pasted leg date before today (native min guards the
    // calendar; this guards direct entry). Clear the field and tell the operator why.
    if (field === 'date' && val && val < fmtISODateLocal(new Date())) {
      el.value = '';
      showToast("Trip dates can't be in the past.");
      updateLeg(legId, { date: '' });
      return;
    }
    var patch = {};
    // Route choice (2026-07-20): this generic handler ALSO commits typed locations (native
    // 'change' fires on blur before the dedicated blur handler sees it) and manual km edits —
    // both invalidate a picked route, so the choice resets here too, same as the blur path.
    // A committed stop (typed + blurred, or an autocomplete pick's change). On the ride model this
    // DOES auto-resolve distance (D3, below); the older "typed-only never auto-resolves" contour was
    // fixed on main (#103) and is ported here.
    if (field === 'stop') {
      var cLeg = state.legs.find(function(l) { return l.id === legId; });
      if (!cLeg) return;
      var cSi = parseInt(el.getAttribute('data-stop'), 10);
      if (isNaN(cSi) || cSi < 0 || cSi >= cLeg.stops.length) return;
      // A no-op blur (value unchanged — e.g. a mousedown elsewhere blurs an already-picked stop)
      // must NOT reset the route choice: clearing routeOptions here collapses the route-choice
      // modal the instant the operator presses one of its cards. Only proceed on a real change.
      if ((cLeg.stops[cSi] || '') === (val || '')) return;

// ── Place autocomplete ────────────────────────────────────────────────────────
// Module-level state for the currently open autocomplete menu.
var _ac = {
  legId: null,
  field: null,
  stop: null, // data-stop index of the active stop input (Task 8: field is 'stop' + index)
  items: [],
  hiIdx: -1,
  inputEl: null,
  menuEl: null,
  timer: null,
  seq: 0,
  committed: false,
  openedAt: 0,
};

function acClose(invalidate) {
  if (invalidate !== false) _ac.seq++;
  if (_ac.menuEl && _ac.menuEl.parentNode) {
    _ac.menuEl.parentNode.removeChild(_ac.menuEl);
  }
  _ac.legId = null;
  _ac.field = null;
  _ac.stop = null;
  _ac.items = [];
  _ac.hiIdx = -1;
  _ac.inputEl = null;
  _ac.menuEl = null;
  _ac.committed = false;
}

function acPick(item) {
  var legId = _ac.legId;
  var field = _ac.field;
  var stopIdx = parseInt(_ac.stop, 10);
  if (!legId || !field || isNaN(stopIdx)) { acClose(); return; }
  var name = (typeof item === 'string') ? item : (item && item.label) || '';
  _ac.committed = true;
  _ac.seq++;

  // Update the input value without a full re-render so cursor stays correct
  if (_ac.inputEl) _ac.inputEl.value = name;
  acClose(false);
  // acClose() clears `committed`; re-assert it so the render() below — and any
  // follow-up auto-distance/estimate re-render — does NOT reopen the dropdown for
  // the place we just picked (restoreEditorFocus refocuses this field on every
  // render). Cleared again on the next keystroke (requestAutocomplete) or blur.
  _ac.committed = true;

  // Patch leg state (this calls render(), wiping the menu — already gone)
  // Per-segment: rebuildSegments resets the changed pairs' segments (manual + autoMatched
  // dropped) so auto-distance re-resolves for the NEW route. Reopened legs are manual (to
  // preserve their saved price); without this, picking a new place kept the stale saved
  // distance and the quote never re-priced. Task 8: any stop index, not just the endpoints.
  var pickedLeg = state.legs.find(function(l) { return l.id === legId; });
  var patch = (pickedLeg && stopIdx >= 0 && stopIdx < pickedLeg.stops.length)
    ? stopPatch(pickedLeg, stopIdx, name) : {};
  // Route choice (2026-07-20): a new place invalidates any picked/offered route.
  patch.routeVariant = undefined;
  patch.routeOptions = null;
  patch._sameRoute = false;
  patch._promptedRouteChoice = false;

  delete _distCache[legId];

  state.legs = state.legs.map(function(l) {
    return l.id === legId ? Object.assign({}, l, patch) : l;

  // Remove any existing menu

function attachAutoComplete() {

    // Debounced input handler — fetch suggestions. The typed place syncs to state (and the
    // quote re-prices) on commit: an autocomplete pick (acPick) or blur. Re-pricing per
    // keystroke was tried and reverted — it re-rendered mid-type and popped the suggestion

function requestAutocomplete(input, legId, field, stopIdx, q) {
  clearTimeout(_ac.timer);

  if (q.length < 2) {
    acClose();
    return;
  }

  // Track which input is active
  _ac.legId = legId;
  _ac.field = field;
  _ac.stop = stopIdx;
  _ac.inputEl = input;
  _ac.hiIdx = -1;
  _ac.committed = false;
  var requestSeq = ++_ac.seq;

  _ac.timer = setTimeout(function() {

      if (requestSeq !== _ac.seq || _ac.committed) return;

      // re-anchor to the fresh focused field instead of dropping valid suggestions.

      if (_ac.inputEl !== input) {

        targetInput = fresh;

// Close autocomplete on outside click — registered once, not per render
document.addEventListener('mousedown', function(e) {

    acClose();
  }
});
// Scrolling/wheeling/touch-dragging INSIDE the menu scrolls the results (the menu is its
// own scroll box — max-height + overflow-y); only movement OUTSIDE it dismisses, mirroring
// the click-away rule above. The scroll listener is capture-phase, so it sees the menu's own
// scroll events too — hence the same inside-the-menu guard.

  if (_ac.menuEl && !_ac.menuEl.contains(e.target) && Date.now() - _ac.openedAt > 250) acClose();

  if (_ac.menuEl && !_ac.menuEl.contains(e.target)) acClose();
}, { passive: true });
window.addEventListener('touchmove', function(e) {
  if (_ac.menuEl && !_ac.menuEl.contains(e.target)) acClose();
}, { passive: true });

// ── Boot ──────────────────────────────────────────────────────────────────────
// T5: no self-invoke — the ops shell calls QuoteView.init() when the founder

async function init() {

    rateCard = rc;
    render(); // repaint with rate card data
  }

// Unmount: drop the unsaved-changes flag, stop every pending timer, close the

function teardown() {
  _dirty = false;
  clearTimeout(_estimateTimer);
  _estimateTimer = null;
  Object.keys(_distTimers).forEach(function (k) { clearTimeout(_distTimers[k]); delete _distTimers[k]; });
  clearTimeout(_ac.timer);
  _ac.timer = null;
  acClose();
  _inited = false;
  var target = document.querySelector('#quoteRoot .ch-app');
  if (target) target.innerHTML = '';
}

// Open a saved quote by id in the builder — used by the ops-shell Quotes tab. init() is
// _inited-guarded so calling it here is a no-op when the cockpit is already mounted.
async function openQuote(id) {
  await init();
  await reopenQuote(id);
}

// D2: contextual command-palette actions while the builder is mounted (shell merges these).
window.opsQuoteKbar = function() {
  var root = document.getElementById('quoteRoot');
  if (!root || root.hidden || !root.querySelector('.ch-app')) return [];
  var acts = [];
  if (isEditableNow() && state.vehicleType) acts.push({ label: 'Save quote', hint: '\u2318S', run: function() { saveQuote(); } });
  if (isEditableNow()) acts.push({ label: 'Add leg', hint: '\u21B5 in a leg', run: function() { addLeg('transfer'); } });
  return acts;
};

return { init: init, teardown: teardown, openQuote: openQuote, startNew: startNew };
})();
