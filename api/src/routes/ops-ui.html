};
const chanClass=c=>c==='whatsapp'?'wa':'web';
const chanIcon=c=>c==='whatsapp'?ICON.wa:ICON.web;
const chanLabel=c=>c==='whatsapp'?'WhatsApp booking':'Website booking';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=s=>document.querySelector(s);
/* Amount is integer minor units in the given currency; render major units. */
const money=t=>{const v=(t.amount||0)/100;const sym=t.currency==='USD'?'$':t.currency==='EUR'?'€':(t.currency?t.currency+' ':'');return t.amount!=null?`${sym}${v.toLocaleString('en-US',{minimumFractionDigits:v%1?2:0,maximumFractionDigits:2})}`:'—';};

/* ── API client — same-origin, session cookie; 401 → login overlay ── */
const api={
  async get(p){const r=await fetch('/admin/ops'+p,{credentials:'same-origin'});if(r.status===401){showLogin();throw new Error('auth');}if(!r.ok)throw new Error('api '+r.status);return r.json();},
  async post(p,body){const r=await fetch('/admin/ops'+p,{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify(body??{})});if(r.status===401){showLogin();throw new Error('auth');}if(!r.ok)throw new Error('api '+r.status);return r.json();},
};

/* ── row → ticket mapping (backend OpsBookingRow → view model) ── */
function rowToTicket(row){
  return {
    id:row.id, ref:row.reference, chan:row.channel, cust:row.customerName, first:row.customerFirstName,
    mode:row.mode, route:row.route, date:row.travelDate, time:row.travelTime, guests:row.pax,
    amount:row.amount, currency:row.currency, stage:row.stage, paid:row.paymentStatus==='paid',
    photo:!!row.vehiclePhotoReceived, updated:!!row.customerUpdated,
    notes:(row.opsNotes||'').split('\n').map(s=>s.trim()).filter(Boolean), opsNotesRaw:row.opsNotes||'',
  };
}

let tickets=[];
let _bookingsLoaded=false; // false until the first /bookings fetch resolves — drives the loading state
let state={route:'tickets',routeQuoteId:null,q:'',group:'all',chan:'',detail:null,detailData:null,role:null};

function routeStateFromUrl(canQuote){
  const url=new URL(window.location.href);
  const quoteId=(url.searchParams.get('quote')||'').trim()||null;
  if(quoteId&&canQuote)return { route:'quote', routeQuoteId:quoteId };
  if(url.hash==='#quote'&&canQuote)return { route:'quote', routeQuoteId:null };
  if(url.hash==='#quotes'&&canQuote)return { route:'quotes', routeQuoteId:null };
  return { route:'tickets', routeQuoteId:null };
}
function syncUrl(route, quoteId, mode){
  const url=new URL(window.location.href);
  if(route==='quote')url.hash='#quote';
  else if(route==='quotes')url.hash='#quotes';
  else url.hash='';
  if(route==='quote'&&quoteId)url.searchParams.set('quote',quoteId);
  else url.searchParams.delete('quote');
  const next=url.pathname+url.search+url.hash;
  if(mode==='push')history.pushState(null,'',next);
  else history.replaceState(null,'',next);
}
function setShellRoute(route, opts){
  opts=opts||{};
  state.route=route;
  state.routeQuoteId=(route==='quote'&&opts.quoteId)?opts.quoteId:null;
  syncUrl(route,state.routeQuoteId,opts.replace?'replace':'push');
  render();
}
function applyRouteFromUrl(mode){
  const next=routeStateFromUrl(!!(state.caps&&state.caps.includes('quote:manage')));
  state.route=next.route;
  state.routeQuoteId=next.routeQuoteId;
  syncUrl(state.route,state.routeQuoteId,mode==='push'?'push':'replace');
  render();
  if(state.route==='quote'&&state.routeQuoteId&&QuoteView.openQuote)QuoteView.openQuote(state.routeQuoteId);
}

async function loadQueue(){
  const rows=await api.get('/bookings');tickets=rows.map(rowToTicket);_bookingsLoaded=true;
  // Booking data only feeds the Bookings surface + the nav attention count. Re-rendering the
  // whole app here re-painted the quote/quotes surfaces too (which don't use it) — the visible
  // "double render". So re-render only on Bookings; elsewhere just refresh the count.
  if(state.route==='tickets')render();else setNav();
}

/* Rail collapse: reclaims horizontal space while working; the choice persists per browser. */
function railCollapsed(){try{return localStorage.getItem('ch_ops_rail')==='1';}catch(e){return false;}}
function applyRailState(){
  const collapsed=railCollapsed();
  $('#approot').classList.toggle('rail-collapsed',collapsed);
}
function expandRail(){
  try{localStorage.setItem('ch_ops_rail','0');}catch(e){}
  applyRailState();
  armRailAutoCollapse();
}
/* Auto-hiding sidebar (common dashboard pattern): once expanded, the rail tucks itself
   away after a short idle OR as soon as you start working in the main area — but the idle
   timer pauses while the pointer is over the rail, so it never collapses mid-interaction. */
let railTimer=null;
function clearRailTimer(){if(railTimer){clearTimeout(railTimer);railTimer=null;}}
function armRailAutoCollapse(){
  clearRailTimer();
  const root=$('#approot');
  if(!root||root.hidden||root.classList.contains('rail-collapsed'))return;
  railTimer=setTimeout(collapseRail,4000);
}
function collapseRail(){
  clearRailTimer();
  const root=$('#approot');
  if(!root||root.classList.contains('rail-collapsed'))return;
  try{localStorage.setItem('ch_ops_rail','1');}catch(e){}
  applyRailState();
}

function viewTickets(){
  $('#topbar').innerHTML=`
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="q" placeholder="Search name, ref, route…" value="${esc(state.q)}"></div>
    <div class="spacer"></div>
    <select class="sel" id="chansel"><option value="">All channels</option><option value="website" ${state.chan==='website'?'selected':''}>Website</option><option value="whatsapp" ${state.chan==='whatsapp'?'selected':''}>WhatsApp</option></select>`;

    return true;
  });
  const tkey=t=>(t.date||'9999-99-99')+'T'+(t.time||'99:99');

    <p class="pagesub"><b>${list.length} booking${list.length===1?'':'s'}</b> · paid &amp; upcoming, website &amp; WhatsApp in one timeline · <span class="a">${tickets.filter(isAttn).length} need attention</span></p>
    <div class="filterbar">${GROUPS.map(g=>{const n=tickets.filter(x=>inGroup(x,g.id)).length;return `<button class="fchip ${state.group===g.id?'on':''}" style="--fc:${g.c}" data-g="${g.id}"><span class="dot"></span>${g.label}<span class="fc">${n}</span></button>`;}).join('')}</div>`;
  DAYGROUPS.forEach(g=>{
    const rows=buckets[g].sort((a,b)=>tkey(a).localeCompare(tkey(b)));

    html+=`<div class="sec${g==='Pending'?' warn':''}${g==='Today'?' now':''}"><h2>${g}${note?`<span class="secnote">${note}</span>`:''}</h2><span class="ln"></span><span class="tag">${rows.length}</span></div>`+rows.map(ticketRow).join('');
  });

    html+=!_bookingsLoaded
      ? `<div class="qempty"><div class="qempty-icon">⏳</div><div class="qempty-title">Loading bookings…</div></div>`

/* ── Quotes queue ─────────────────────────────────────────────────────────────
   The merged, queue-first Quotes surface (D6). Fed by GET /admin/quote/list; rows
   open into the builder (QuoteView) as a detail view, and "+ New quote" opens a fresh
   one. The queue is grouped into role-aware sections so each viewer sees what's on
   THEIR plate first: a founder (quote:approve) leads with quotes needing review; a
   support agent leads with approved quotes ready to send + any sent back to them.
   Status changes are deliberate actions in the detail view (maker-checker), never a
   casual per-row dropdown — so rows show a read-only status pill. */
let opsQuotes=[],opsQuotesLoaded=false;
// Status → { label, tone } for the read-only pill. Tone drives the CSS colour class.
const QSTATUS={
  draft:{label:'Draft',tone:'slate'},
  pending_review:{label:'In review',tone:'amber'},
  changes_requested:{label:'Changes requested',tone:'amber'},
  ready:{label:'Ready to send',tone:'teal'},
  sent:{label:'Sent',tone:'blue'},
  won:{label:'Booked',tone:'green'},
  lost:{label:'Lost',tone:'red'},
  expired:{label:'Expired',tone:'muted'},
};
// Section order encodes "what's on your plate first". Approvers (founder) triage the
// review queue; support acts on approved + sent-back quotes. Closed always sinks last.
// Statuses that still need work from whoever holds the quote (drives the "Assigned to me"
// section). Excludes sent/won/lost/expired — those are closed, not someone's to-do.
const MINE_STATUSES=['draft','pending_review','changes_requested','ready'];
const QUEUE_SECTIONS_APPROVER=[
  {id:'review',label:'Needs your review',statuses:['pending_review'],hint:'Check pricing &amp; margin, then approve or send back'},
  {id:'ready',label:'Ready to send',statuses:['ready'],hint:'Approved — hand back to support to send'},
  {id:'progress',label:'In progress',statuses:['draft','changes_requested'],hint:'Drafts and quotes sent back for changes'},
  {id:'closed',label:'Sent &amp; closed',statuses:['sent','won','lost','expired']},
];
const QUEUE_SECTIONS_SUPPORT=[
  {id:'ready',label:'Ready to send',statuses:['ready'],hint:'Approved — copy the message and send to the customer'},
  {id:'sentback',label:'Sent back to you',statuses:['changes_requested'],hint:'Update the quote and resubmit for review'},
  {id:'review',label:'Awaiting review',statuses:['pending_review'],hint:'With the founder for approval'},
  {id:'drafts',label:'Drafts',statuses:['draft']},
  {id:'closed',label:'Sent &amp; closed',statuses:['sent','won','lost','expired']},
];
// Coarse status-group filters for the queue (independent of the role-aware sections).
const QUEUE_FILTERS=[
  {id:'all',label:'All',statuses:null},
  {id:'progress',label:'In progress',statuses:['draft','pending_review','changes_requested']},
  {id:'ready',label:'Ready to send',statuses:['ready']},
  {id:'sent',label:'Sent to customer',statuses:['sent','won','lost','expired']},
];
let queueFilter='all';
function isApprover(){return !!(state.caps&&state.caps.includes('quote:approve'));}
function quoteUsd(cents){return '$'+((cents||0)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
// Age-since-request chip for the queue: how long a quote has waited, coloured to create urgency
// to get it sent. Clock = the quote's created_at (from /admin/quote/list). Compact label: now/47m/3h/2d.
function quoteAgeLabel(iso){
  const t=iso?Date.parse(iso):NaN;
  if(isNaN(t))return '';
  const mins=Math.floor((Date.now()-t)/60000);
  if(mins<1)return 'now';
  if(mins<60)return mins+'m';
  const hrs=Math.floor(mins/60);
  if(hrs<24)return hrs+'h';
  return Math.floor(hrs/24)+'d';
}
// Only quotes still awaiting the team escalate (fresh <1h → warn 1–6h → urgent 6h+); once a quote
// is sent/booked/lost/expired the send-urgency is over, so the age shows but stays neutral.
const QAGE_DONE=new Set(['sent','won','lost','expired']);
function quoteAgeTone(iso,status){
  if(QAGE_DONE.has(status))return 'muted';
  const t=iso?Date.parse(iso):NaN;
  if(isNaN(t))return 'muted';
  const hrs=(Date.now()-t)/3600000;
  if(hrs<1)return 'fresh';
  if(hrs<6)return 'warn';
  return 'urgent';
}
function quoteAgeChip(q){
  const label=quoteAgeLabel(q.createdAt);
  if(!label)return '';
  const title=q.createdAt?' title="Requested '+esc(new Date(q.createdAt).toLocaleString())+'"':'';
  return `<span class="qage tone-${quoteAgeTone(q.createdAt,q.status)}"${title}>${esc(label)}</span>`;
}
async function loadOpsQuotes(){
  try{
    const r=await fetch('/admin/quote/list',{credentials:'same-origin'});
    if(r.status===401){showLogin();throw new Error('auth');}
    if(!r.ok)throw new Error('quotes '+r.status);
    const body=await r.json();
    opsQuotes=(body&&body.quotes)||[];opsQuotesLoaded=true;
    if(state.route==='quotes')viewQuotes();
  }catch(e){if(e.message!=='auth')toast('Could not load quotes');}
}
function statusPill(status){
  const m=QSTATUS[status]||{label:status||'—',tone:'muted'};
  return `<span class="qpill tone-${m.tone}">${esc(m.label)}</span>`;
}
// 'roshen@ceylonhop.com' → 'roshen'. Last-resort label: used when the roster has no entry
// for an email (someone left OPS_USERS while still holding an old quote) or hasn't loaded.
// The full address stays in the title attribute either way.
function shortUser(email){const s=String(email||'');const at=s.indexOf('@');return at>0?s.slice(0,at):s;}
// email → 'Roshen W.', from /admin/ops/users. The server formats the label so this queue and
// the builder's assign picker can't drift into naming the same person two different ways.
let opsRoster=new Map();
async function loadOpsRoster(){
  try{
    const r=await fetch('/admin/ops/users',{credentials:'same-origin'});
    if(!r.ok)return; /* 401 is handled by the queue/booking loaders; don't double-bounce to login */
    const body=await r.json();
    const users=(body&&body.users)||[];
    window.opsUsers=users; /* the builder's assign picker reads this rather than re-fetching */
    opsRoster=new Map(users.map(u=>[String(u.email||'').toLowerCase(),u.displayName||shortUser(u.email)]));
    if(state.route==='quotes'&&opsQuotesLoaded)viewQuotes(); /* names arrived after first paint */
  }catch(e){/* labels fall back to the email local part — the queue still works */}
}
function userLabel(email){return opsRoster.get(String(email||'').toLowerCase())||shortUser(email);}
function isMineEmail(email){const me=(state.email||'').toLowerCase();return !!me&&String(email||'').toLowerCase()===me;}
function assigneeChip(email){
  const mine=isMineEmail(email);
  return `<span class="qassignee${mine?' mine':''}" title="Assigned to ${esc(email)}">${esc(mine?'you':userLabel(email))}</span>`;
}
// An unassigned quote is the one state worth stating outright: it means nobody has picked it
// up, which is invisible if we render nothing at all.
function unassignedChip(){
  return '<span class="qassignee nobody" title="Nobody is assigned to this quote yet">Unassigned</span>';
}
// hideAssignee: suppress the chip inside the "Assigned to me" section, where it only ever
// says "you". NOTE callers must use .map(q=>quoteRowHtml(q)) — a bare .map(quoteRowHtml)
// would pass the array index in as hideAssignee.
function quoteRowHtml(q,hideAssignee){
  return `<div class="qrow" data-qopen="${esc(q.id)}" role="button" tabindex="0">
    <span class="qref">${esc(q.reference||q.id)}</span>
    <span class="qcust">${esc(q.customerName||'Untitled')}</span>
    <span class="qprod">${esc(q.product||'')}${q.vehicle?' · '+esc(q.vehicle):''}</span>
    <span class="qtotal">${esc(quoteUsd(q.totalCents))}</span>
    <span class="qstat">${hideAssignee?'':(q.assignedTo?assigneeChip(q.assignedTo):unassignedChip())}${quoteAgeChip(q)}${statusPill(q.status)}</span>
  </div>`;
}
function viewQuotes(){
  $('#topbar').innerHTML='';
  const sections=isApprover()?QUEUE_SECTIONS_APPROVER:QUEUE_SECTIONS_SUPPORT;
  // "Assigned to me" is a PARTITION, not an overlay: a quote assigned to me is lifted out of
  // its status section rather than duplicated into two. The status sections already tile the
  // queue exactly once each (their status lists don't overlap), and a row appearing twice in
  // one list reads as a bug. The status pill on the row still says where it is in the flow.
  // Open states only — a sent/won/lost quote assigned to me is history, not work.
  const mineRows=opsQuotes.filter(q=>isMineEmail(q.assignedTo)&&MINE_STATUSES.includes(q.status));
  const mineIds=new Set(mineRows.map(q=>q.id));
  const byStatus={};opsQuotes.forEach(q=>{if(mineIds.has(q.id))return;(byStatus[q.status]=byStatus[q.status]||[]).push(q);});
  let html=`<div class="qhead pagehead">
      <h1>Quotes</h1>
      <button class="qnew" data-qnew><span class="qnew-plus">+</span> New quote</button>
    </div>
    <p class="pagesub"><b>${opsQuotes.length} quote${opsQuotes.length===1?'':'s'}</b> · ${isApprover()?'review, approve, and track every quote':'submit new quotes and send approved ones to customers'}</p>`;
  if(!opsQuotesLoaded){html+='<p class="muted">Loading quotes…</p>';$('#view').innerHTML=html;return;}
  if(!opsQuotes.length){
    html+=`<div class="qempty"><div class="qempty-icon">📝</div><div class="qempty-title">No quotes yet</div><div class="qempty-sub">Start one with <b>+ New quote</b> above.</div></div>`;
    $('#view').innerHTML=html;return;
  }
  // Filter toggles (coarse status groups). Counts reflect the whole queue, not the section.
  html+='<div class="qfilters">'+QUEUE_FILTERS.map(f=>{
    const n=f.statuses?opsQuotes.filter(q=>f.statuses.includes(q.status)).length:opsQuotes.length;
    return `<button class="qfilter ${queueFilter===f.id?'on':''}" data-qfilter="${f.id}">${f.label}<span class="qfilter-n">${n}</span></button>`;
  }).join('')+'</div>';
  const activeFilter=QUEUE_FILTERS.find(f=>f.id===queueFilter)||QUEUE_FILTERS[0];
  const allowed=activeFilter.statuses?new Set(activeFilter.statuses):null;
  let rendered=0;
  const mineVisible=allowed?mineRows.filter(q=>allowed.has(q.status)):mineRows;
  if(mineVisible.length){
    rendered++;
    html+=`<div class="qsection qsec-mine">
      <div class="qsection-head">
        <h2 class="qsection-title">Assigned to me<span class="qsection-count">${mineVisible.length}</span></h2>
        <span class="qsection-hint">Handed to you — yours to move</span>
      </div>
      <div class="qlist">${mineVisible.map(q=>quoteRowHtml(q,true)).join('')}</div>
    </div>`;
  }
  sections.forEach(sec=>{
    const secStatuses=allowed?sec.statuses.filter(s=>allowed.has(s)):sec.statuses;
    const rows=secStatuses.reduce((acc,s)=>acc.concat(byStatus[s]||[]),[]);
    if(!rows.length)return;
    rendered++;
    html+=`<div class="qsection qsec-${sec.id}">

}

/* ── build the activity timeline from the detail payload ── */
function buildActivity(t,d){
  const acts=[];
  if(d?.booking?.createdAt)acts.push([fmtDateTime(d.booking.createdAt),`Booking created · ${chanLabel(t.chan)}`]);
  (d?.payments||[]).forEach(p=>{if(p.status==='succeeded')acts.push(['Payment',`Received · ${money({amount:p.amount,currency:p.currency})}`]);});
  if(d?.ops?.vehicleConfirmedAt)acts.push([fmtDateTime(d.ops.vehicleConfirmedAt),'Vehicle confirmed']);
  if(d?.ops?.updatedAt)acts.push([fmtDateTime(d.ops.updatedAt),`Ops updated · now “${STAGE[t.stage].label}”`]);
  t.notes.forEach(n=>acts.push(['Note',n]));
  return acts;
}

/* trip legs (mode 'trip') from the booking input's stops/dates */
function legsHtmlFor(d){
  const b=d?.booking;
  if(b&&b.mode==='trip'&&Array.isArray(b.input?.stops)&&b.input.stops.length>1){
    const stops=b.input.stops,dates=b.input.dates||[];
    let rows='';
    for(let i=0;i<stops.length-1;i++){
      const when=dates[i]?fmtDate(dates[i]):`Leg ${i+1}`;
      rows+=`<div class="leg"><span class="r">${esc(when)} · ${esc(stops[i])} → ${esc(stops[i+1])}</span></div>`;
    }
    return `<div class="legs">${rows}</div>`;
  }
  return '<div style="color:var(--ink-faint);font-size:.88rem">Single transfer — no leg breakdown.</div>';
}

/* T6: #view and #quoteRoot are each persistent DOM nodes (only [hidden] toggles, never
   removed/re-created) with their own independent scroller (.scroll{overflow-y:auto} /
   #quoteRoot{overflow-y:auto} — see CSS above), so each element's scrollTop is preserved
   natively by the browser across hide/show; verified there is no shared scroller whose
   position could leak between routes, so no manual scrollTop save/restore is needed. */

/* ── quote view panel — mounts QuoteView into #quoteRoot: .ch-app render target + SIBLING #ch-toast (innerHTML swaps never destroy the toast) ── */
function showQuoteView(){
  if(!state.caps||!state.caps.includes('quote:manage')){state.route='tickets';state.routeQuoteId=null;syncUrl('tickets',null,'replace');render();return;}
  /* close any open Bookings detail sheet + scrim so its fixed overlay doesn't float over the cockpit */
  if(state.detail){state.detail=null;state.detailData=null;renderSheet();}
  const qr=$('#quoteRoot');
  qr.hidden=false;$('#view').hidden=true;$('#topbar').hidden=true;
  if(!qr.querySelector('.ch-app')){
    qr.innerHTML='<div class="ch-app ch-app-inner"></div>'
      +'<div class="ch-toast" id="ch-toast"><span class="tick">&#x2713;</span><span class="ch-toast-msg"></span></div>';
  }
  QuoteView.init(); /* _inited-guarded inside the module — later calls are no-ops */
}
function hideQuoteView(){$('#quoteRoot').hidden=true;$('#view').hidden=false;$('#topbar').hidden=false;}

/* T6: only move focus on an actual route TRANSITION, not on every render() while
   already settled on a route (render() also runs after toggles/notes/queue refresh
   while staying on Bookings — re-focusing #q on each of those would steal focus from
   whatever the operator is doing). _lastRenderedRoute tracks the previous paint. */
let _lastRenderedRoute=null;
function render(){
  if((state.route==='quote'||state.route==='quotes')&&(!state.caps||!state.caps.includes('quote:manage')))state.route='tickets';
  const entering=state.route!==_lastRenderedRoute;
  setNav();
  if(state.route==='quote'){
    showQuoteView();
    if(entering){
      /* Quote (builder) entry: the cockpit's own fields render async inside QuoteView.init(),
         so we don't reach into its DOM — focus the Quotes nav button (which stays highlighted
         for the builder too). Guarantees the keyboard never lands on a now-hidden element. */
      const navBtn=document.querySelector('#nav [data-route="quotes"]');
      if(navBtn)navBtn.focus();
    }
  }else if(state.route==='quotes'){
    /* Quotes list lives in the ops shell #view (not the cockpit pane) so it reads as one
       console. Close any open Bookings detail sheet first. */
    hideQuoteView();
    if(state.detail){state.detail=null;state.detailData=null;renderSheet();}
    viewQuotes();
    if(entering){
      loadOpsQuotes(); /* refresh on every entry so newly-saved quotes show up */
      const navBtn=document.querySelector('#nav [data-route="quotes"]');
      if(navBtn)navBtn.focus();
    }
  }else{
    hideQuoteView();viewTickets();renderSheet();
    if(entering){
      /* Bookings entry: viewTickets() just rebuilt #topbar, so #q is fresh. */
      const qInput=$('#q');
      if(qInput)qInput.focus({preventScroll:true});
    }
  }
  _lastRenderedRoute=state.route;
}

let kbarSel=0;

function kbarOpen(){

function kbarFiltered(){

  return kbarActions().filter(a=>!q||a.label.toLowerCase().includes(q));

function kbarRender(){

  $('#kbarList').innerHTML=list.length
    ? list.map((a,i)=>'<div class="kbar-item'+(i===kbarSel?' sel':'')+'" data-kbar="'+i+'">'+esc(a.label)
        +(a.hint?'<span class="kbar-hint">'+esc(a.hint)+'</span>':'')+'</div>').join('')
    : '<div class="kbar-empty">No matching command</div>';
}
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){
    e.preventDefault();
    const kb=$('#kbar');
    if(kb.hidden&&!$('#approot').hidden)kbarOpen();else kbarClose();
    return;
  }
  const kb=$('#kbar');
  if(kb.hidden)return;
  if(e.key==='Escape'){e.preventDefault();kbarClose();}
  else if(e.key==='ArrowDown'){e.preventDefault();kbarSel++;kbarRender();}
  else if(e.key==='ArrowUp'){e.preventDefault();kbarSel=Math.max(0,kbarSel-1);kbarRender();}
  else if(e.key==='Enter'){e.preventDefault();const list=kbarFiltered();const a=list[kbarSel];if(a){kbarClose();a.run();}}
});

/* ── D6: theme ─────────────────────────────────────────────────────────────── */
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  /* D9: keep the UA colour-scheme in step so native controls (the search field, <select>s)
     follow the theme and repaint with it, rather than sampling the OS scheme. */
  document.documentElement.style.colorScheme=(t==='dark')?'dark':'light';
  try{localStorage.setItem('ch_ops_theme',t);}catch(e){}
  const b=$('#railTheme');if(b)b.innerHTML=(t==='dark')?'&#9788;':'&#9789;';
}
function toggleTheme(){
  applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
  /* D9: rebuild the current shell view so the frosted topbar search box and the queue filter
     chips repaint under the new theme. A bare data-theme swap left those composited surfaces
     showing stale (dark-on-dark) colours until the next navigation repainted them. Only the two
     shell lists are rebuilt; the builder reads the same CSS variables and needs no rebuild. */
  if(!$('#approot').hidden){
    if(state.route==='tickets')viewTickets();
    else if(state.route==='quotes')viewQuotes();
  }
}
document.addEventListener('click',e=>{if(e.target.closest('#railTheme'))toggleTheme();});
applyTheme(document.documentElement.dataset.theme||'light');
document.addEventListener('click',e=>{
  const kb=$('#kbar');

  if(item){const a=kbarFiltered()[parseInt(item.dataset.kbar,10)];kbarClose();if(a)a.run();return;}
  if(!e.target.closest('.kbar-panel'))kbarClose();
});

  const el=e.target.closest('[data-act]');if(!el)return;

/* ── login / session ── */
/* Avatar initials: first+last from the Google profile name ("Sandra Wolker"→"SW");
   no name (dev-login, legacy cookies) → first two letters of the email local part. */
function avatarInitials(name,email){
  const parts=(name||'').trim().split(/\s+/).filter(Boolean);
  if(parts.length>1)return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return ((email||'').split('@')[0].slice(0,2)||'??').toUpperCase();
}
function showLogin(){$('#login').classList.add('show');$('#approot').hidden=true;}
function hideLogin(){$('#login').classList.remove('show');$('#approot').hidden=false;armRailAutoCollapse();}
function bootApp(identity){
  hideLogin();
  state.role=identity.role;state.caps=identity.caps;state.email=identity.email;
  window.opsShowLogin=showLogin; /* the quote module reaches the login overlay through this */
  window.opsGoBookings=()=>{setShellRoute('tickets',{ replace:true });}; /* quote module bounces a 403 (no quote:manage) back to Bookings */
  window.opsGoQuotes=()=>{setShellRoute('quotes',{ replace:true });}; /* builder returns to the queue after a hand-off action */
  window.opsToast=toast; /* D6: shell-level toast the builder can use when it routes back to the queue (its own #ch-toast is inside the now-hidden builder pane) */
  window.opsRefreshQuotes=loadOpsQuotes; /* builder asks the shell to refresh the queue list after save/transition */
  window.opsEmail=identity.email||''; /* the builder labels the assign picker's "(you)" option */
  window.opsCaps=identity.caps||[]; window.opsRole=identity.role; /* the builder reads the viewer's role/caps for the maker-checker action bar */
  /* URL is the single source of truth for route/deep-link state across login refreshes,
     shared quote links, and browser back/forward. */
  const next=routeStateFromUrl(!!(state.caps&&state.caps.includes('quote:manage')));
  state.route=next.route;

/* Google Identity Services calls this with the signed ID token credential. */
function onGoogleCredential(resp){

/* ══════════════════════════════════════════════════════════════════════════
   QUOTE VIEW MODULE (T5) — the quote tool's entire JS, ported verbatim from
   quote-tool.html and closure-scoped so none of its ~120 top-level names
   (state, render, api, esc, fmtDate, showToast, …) can collide with the ops
   script above; nothing here leaks to window. Renders into
   #quoteRoot > .ch-app (its sibling #ch-toast survives innerHTML swaps);
   auth = the ops session cookie. The ops shell calls QuoteView.init() when
   the founder opens the Quote view. Pricing stays server-authoritative —
   the transforms above touched ONLY mount + auth + boot, never the
   estimate/save/autocomplete/distance logic.
   ══════════════════════════════════════════════════════════════════════════ */
const QuoteView = (function () {
'use strict';

// ── HTML escape helper ────────────────────────────────────────────────────────
function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Status tone + label maps (maker-checker lifecycle) ────────────────────────
const STATUS_TONE = {
  'draft':             'var(--muted-2)',
  'pending_review':    'var(--wait)',
  'changes_requested': 'var(--wait)',
  'ready':             'var(--teal)',
  'sent':              'var(--blue)',
  'won':               'var(--orange)',
  'lost':              'var(--red)',
  'expired':           'var(--muted)',
};

const STATUS_LABELS = {
  'draft':             'Draft',
  'pending_review':    'In review',
  'changes_requested': 'Changes requested',
  'ready':             'Ready to send',
  'sent':              'Sent',
  'won':               'Booked',
  'lost':              'Lost',
  'expired':           'Expired',
};

// ── Viewer role bridge (set by the ops shell's bootApp) ───────────────────────
function viewerCan(action) { return (window.opsCaps || []).indexOf(action) >= 0; }
function isApprover() { return viewerCan('quote:approve'); } // founder-only — the maker-checker gate
// The customer-facing message (WhatsApp/Email) is copyable ONLY once the founder has
// approved it — i.e. status is ready (about to send) or sent. Everything before that is
// still under review, so support cannot lift the message out and send it early.
function copyUnlocked() { return state.status === 'ready' || state.status === 'sent'; }

function customerName() {
  return [state.firstName, state.lastName].map(function(s) { return (s || '').trim(); }).filter(Boolean).join(' ');
}
function splitCustomerName(name) {
  var parts = (name || '').trim().split(/\s+/).filter(Boolean);
  return { firstName: parts.shift() || '', lastName: parts.join(' ') };
}

// ── Trip-basics validation ────────────────────────────────────────────────────
// The contact must be a real email OR a phone number WITH a country code (leading +).
function isValidEmail(s) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }
function isValidPhone(s) {
  // Leading + then 8–15 digits total (spaces / dashes / parens allowed as separators).
  if (!/^\+[\d\s().-]+$/.test(s)) return false;
  var digits = s.replace(/\D/g, '');

function contactOk(s) { s = (s || '').trim(); return s === '' || contactValid(s); }

  return !!state.vehicleType
    && (state.firstName || '').trim() !== ''
    // Last name is OPTIONAL — many enquiries arrive first-name-only (Instagram/WhatsApp).
    && contactOk(state.contact)

  var m = [];
  if ((state.firstName || '').trim() === '') m.push('first name');
  // Only flag contact when the operator typed one that isn't valid — blank is allowed.
  if (!contactOk(state.contact)) m.push('a valid WhatsApp number (with country code) or email, or clear the field');
  if (!state.vehicleType) m.push('a vehicle');
  return m.length ? 'Still needed: ' + m.join(', ') + '.' : 'Fill in the trip basics above to start.';
}

// name/contact input handler re-render ONLY when the gate flips, avoiding a per-keystroke
// rebuild (which would fight the operator's focus).
var _basicsUnlocked = false;
function syncBasics() {
  var contactEl = document.getElementById('f-contact');
  if (contactEl) contactEl.classList.toggle('invalid', (state.contact || '').trim() !== '' && !contactValid(state.contact));
  if (basicsComplete() !== _basicsUnlocked) render(); // gate flipped → rebuild the itinerary
}

// ── Rate card (fetched once on load) ─────────────────────────────────────────
var rateCard = null;

var _delegatesWired = false;

var hzEditId = null;      // id of the zone currently being edited inline, or null (add mode)

var sendBackOpen = false; // inline "send back for changes" note composer (founder)

var routeModalLegId = null; // legId the route-choice modal is open for, or null
var _rcSel = null;        // route-choice modal: display-only highlighted variant before "Use"
var _rcPrices = {};       // legId → { sig, fastest:<cents|null>, no_tolls:<cents|null>, loading:bool }

var outputOpen = null;
// Per-leg add-on line visibility: legId → bool (private legs only)

  car:    'Car',
  van_6:  'Van 6 Seat',
  van_9:  'Van 9 Seat',
  van_14: 'Van 14 Seat',
  custom: 'Custom',
};

// V12: map tool vehicle ids → engine rate-card tiers so caps come from server truth.
var VEHICLE_ENGINE_TIER = {
  car:    'car',
  van_6:  'van',
  van_9:  'van9',
  van_14: 'van14',
  custom: 'custom',

// V12: derive { pax, bags } caps from the cached rate-card. Returns null until the
// rate card has loaded (so we never flag against stale defaults) and for 'custom'
// (exempt from the capacity flag; its caps are 99/99 anyway).
function vehicleCaps(toolId) {
  if (!rateCard || !rateCard.vehicle) return null;
  if (toolId === 'custom') return null;
  var tier = VEHICLE_ENGINE_TIER[toolId];

function absMaxBags() {

  var m = 0;
  Object.keys(rateCard.vehicle).forEach(function(k) { m = Math.max(m, rateCard.vehicle[k].maxBags || 0); });
  return m || 99;
}

// Driving categories (for flag computation) — slim set (R4). Anything not a
// stay day drives; stay_day is the only non-driving category.
var DRIVING_CATS = {

async function apiPlaces(q) {
  var key = (q || '').trim().toLowerCase();
  if (_placeCache[key]) return _placeCache[key];
  try {
    var r = await api('/admin/quote/places?q=' + encodeURIComponent(q));
    // T5: a 401 already surfaced the ops login via api() — nothing extra to toast.
    if (!r.ok) return [];
    var d = await jsonOrNull(r);
    var places = (d && d.suggestions && d.suggestions.length)
      ? d.suggestions
      : ((d && d.places) ? d.places.map(function(name) { return { label: name, source: 'google' }; }) : []);
    if (places.length) _placeCache[key] = places; // cache hits only; let empties retry
    return places;
  } catch (e) { return []; }
}
