// ── Toast ─────────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('ch-toast');
  if (!el) return;
  el.querySelector('.ch-toast-msg').textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── Action handlers ───────────────────────────────────────────────────────────
// Reset the builder to a blank draft (no prompt — callers decide whether to guard).
function resetToNew() {
  legSeq = 0;
  state = {
    id: 'Q-' + Math.random().toString(36).slice(2, 6).toUpperCase(),
    firstName: '',
    lastName: '',
    contact: '',
    passengerCount: 2,
    luggageCount: 2,
    vehicleType: null,
    service: 'private',
    requestedService: null,
    outputCurrency: 'USD',
    status: 'draft',
    notes: '',
    internalNotes: '',
    legs: [newLeg()],
    savedId: null,
    reference: null,
    assignedTo: null, // who holds it; set only via the assign picker (never by a transition)
    createdBy: null,
    updatedBy: null,
    convertedBookingId: null, // the booking this quote became, once "Mark booked" completes
  };
  lastEstimate = null;
  lastEstimateError = null;
  outputTab = 'whatsapp';
  outputDrafts = { whatsapp: null, email: null };
  outputIncludeChauffeurUpsell = false;
  outputOpen = null; // back to the layout default
  sendBackOpen = false;
  bookOpen = false;
  _mapOpen = true;
  _dirty = false; // fresh quote — nothing to lose (GL-1b)
  refreshEstimate();
  render();
}

// The ops shell's "+ New quote" entry: reset to a fresh draft, guarding only when
// there are unsaved edits to lose.
function startNew() {
  if (_dirty && !confirm('Start a new quote? Unsaved changes will be lost.')) return;
  resetToNew();
}

function savePayload() {
  // Task 7: service/vehicle/pax/bags/legs come from the shared buildToolRequest() so save and
  // estimate can never drift apart on the leg wire shape (per-segment stops/segmentKms + the
  // legacy from/to/distanceKm mirror).
  return Object.assign({
    // When the quote is already saved, send its id so the server updates it in place
    // (same row, lifecycle preserved) instead of inserting a duplicate.
    id: state.savedId || undefined,
    firstName: state.firstName,
    lastName: state.lastName,
    contact: state.contact,
    notes: state.notes || '', // round-trip the send-back note so a content save doesn't wipe it
    internalNotes: state.internalNotes || '', // ops-only scratchpad (punch list); `service` now comes from buildToolRequest()
    requestedService: state.requestedService,
  }, buildToolRequest());
}

// Persist the quote's content. Because savePayload() carries state.savedId as `id`,
// an already-saved quote is updated in place (same row, status preserved server-side);
// a fresh one is inserted as a draft. Returns true on success. `opts.silent` skips the
// toast + re-render (used by transition(), which handles its own feedback).
async function saveQuote(opts) {
  opts = opts || {};
  if (!state.vehicleType) {
    showToast('Choose a vehicle type first');
    return false;
  }
  // Block a chauffeur save the server is guaranteed to reject (an undated leg drops a day rate).
  // render() flags the offending legs' date fields; the toast says what to do — no silent 400.
  var _gaps = chauffeurUndatedLegs();
  if (_gaps.length) {
    if (!opts.silent) { render(); showToast('Add a date to every leg for chauffeur pricing'); }
    return false;
  }
  var res = await apiSave(savePayload());
  if (res && res.id) {
    state.savedId = res.id;
    state.reference = res.reference || res.id;
    if (res.status) state.status = res.status; // the server is the source of truth for status
    // A fresh save auto-assigns the quote to its creator (server); reflect it so the header picker
    // shows the maker immediately instead of "Unassigned" until reload. Re-saves omit assignedTo.
    if (res.assignedTo !== undefined) state.assignedTo = res.assignedTo;
    _dirty = false; // persisted — nothing unsaved to lose (GL-1b)
    if (window.opsRefreshQuotes) window.opsRefreshQuotes(); // keep the shell queue in sync
    if (!opts.silent) { render(); showToast('Saved as ' + state.reference); }
    return true;
  }
  if (!opts.silent) showToast((res && res.error) ? res.error : 'Save failed');
  return false;
}

// ── Maker-checker transitions ─────────────────────────────────────────────────
// Persist current edits (in place), then move the quote to `toStatus`. An optional
// note (the send-back reason) rides on the PATCH. On success, optionally bounce back
// to the queue so the hand-off is visible ("it went into the queue").
async function transition(toStatus, opts) {
  opts = opts || {};
  // Flush pending edits first — but ONLY while the quote is still editable. A ready/sent quote is
  // content-locked server-side (/save → 409 not_editable) and has no unsaved edits to flush, so
  // saving first would spuriously abort the move. The /save maker-checker lock (commit 3d93b56)
  // made the old unconditional save-first fail here, breaking "Mark as sent" + "Reopen to edit".
  var editable = isEditableNow(); // review lock: pending_review no longer flushes a save (it would 409)
  if (editable && !(await saveQuote({ silent: true }))) return; // saveQuote already surfaced the reason
  var patchBody = { status: toStatus };
  if (opts.note != null) patchBody.notes = opts.note;
  var res = await apiPatch(state.savedId, patchBody);
  if (!res || res.error) {
    // Quote intent (spec 2026-07-17): the server gate can 400 even if a client bypassed the
    // disabled button — give it the same friendly copy as the button hint, not the raw code.
    if (res && res.error === 'requested_service_required') { showToast('Record what the customer asked for first'); return; }
    showToast('Could not update — ' + ((res && res.error) || 'unknown error'));
    return;
  }
  state.status = toStatus;
  _dirty = false;
  if (window.opsRefreshQuotes) window.opsRefreshQuotes();
  if (opts.toast) showToast(opts.toast);
  if (opts.goQueue && window.opsGoQuotes) window.opsGoQuotes();
  else {
    render();
    // Reopen-to-edit drops the rate lock server-side (spec 2026-07-11 §3); re-price live so the
    // operator builds on the current card again instead of the just-shown frozen price.
    if (toStatus === 'draft' || toStatus === 'pending_review' || toStatus === 'changes_requested') refreshEstimate();
  }
}

function submitForReview() { transition('pending_review', { toast: 'Submitted for review', goQueue: true }); }
function approveReady()    { transition('ready', { toast: 'Approved — ready to send', goQueue: true }); }
function markSent()        { transition('sent', { toast: 'Marked as sent to customer', goQueue: true }); }
function markOutcome(s)    { transition(s, { toast: 'Marked ' + (STATUS_LABELS[s] || s), goQueue: true }); }
function reopenToDraft()   { transition('draft', { toast: 'Reopened for editing' }); }

// Delete (spec 2026-07-22): soft delete + back to the queue. The button only shows for the
// states/roles the server allows, but the server is authoritative — so map its refusals to
// friendly copy rather than trusting the button alone.
async function deleteQuote() {
  if (!state.savedId) return;
  var ref = state.reference || 'this quote';
  if (!confirm('Delete quote ' + ref + '?\n\nIt will be removed from the queue. Only an admin can bring it back.')) return;
  var res = await apiDelete(state.savedId);
  if (res && res.deleted) {
    _dirty = false; // deleted — no unsaved-changes prompt on the way out
    if (window.opsRefreshQuotes) window.opsRefreshQuotes();
    if (window.opsGoQuotes) window.opsGoQuotes(); // back to the queue
    showToast('Quote ' + ref + ' deleted');
    return;
  }
  var reason = res && res.reason;
  if (reason === 'founder_only') showToast('Only a founder can delete a locked quote');
  else if (reason === 'sent_or_decided') showToast('A quote already sent to the customer can’t be deleted');
  else showToast('Could not delete — ' + ((res && res.error) || 'unknown error'));
}
// Send-back uses an inline note composer (not a native prompt): confirmSendBack reads
// the textarea and PATCHes the quote to changes_requested with the note attached.
function confirmSendBack() {
  var ta = document.getElementById('sendBackNote');
  var note = ta ? ta.value.trim() : '';
  if (!note) { showToast('Add a short note so support knows what to change'); return; }
  sendBackOpen = false;
  transition('changes_requested', { note: note, toast: 'Sent back for changes', goQueue: true });
}

// ── "Mark booked" modal (spec 2026-07-18) ─────────────────────────────────────
// Reads a modal input field by id, trimmed. Local helper — these fields (email,
// whatsapp, country, vehicle, date, time) aren't tracked in `state`; they're
// booking-only details the quote itself never carries.
function val(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
async function apiBook(id, payload) {
  try {
    var r = await api('/admin/quote/' + encodeURIComponent(id) + '/book', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) return await errPayload(r);
    var body = await jsonOrNull(r);
    return body || { error: 'Booking failed' };
  } catch (e) { return { error: 'Network error' }; }
}
// Creates the booking from the modal's fields (server re-validates via the same Zod
// schema); on success stamps the local won+convertedBookingId so the button set updates
// without a full reopen.
async function bookQuote() {
  var b = {
    customer: {
      firstName: val('bk-first'), lastName: val('bk-last'),
      email: val('bk-email'), whatsapp: val('bk-whatsapp'), country: val('bk-country'),
    },
    vehicleType: val('bk-vehicle') || 'car',
    pax: Number(val('bk-pax')) || 1,
    bags: Number(val('bk-bags')) || 0,
    date: val('bk-date') || undefined,
    time: val('bk-time') || undefined,
  };
  // Client-side required-field guard (server re-validates via Zod).
  if (!b.customer.firstName || !b.customer.lastName || !b.customer.email || !b.customer.whatsapp || !b.customer.country || !b.date || !b.time) {
    showToast('Fill in name, email, WhatsApp, country, date and time');
    return;
  }
  // Re-entrancy guard: a double-clicked Confirm booking button fires bookQuote() twice
  // before the first POST resolves. Without this, both reach the server and the second
  // response is redundant at best; with it, the second call is a silent no-op.
  if (bookSubmitting) return;
  bookSubmitting = true;
  try {
    var res = await apiBook(state.savedId, b);
    if (!res || res.error) { showToast('Could not book — ' + ((res && res.error) || 'unknown error')); return; }
    bookOpen = false;
    state.status = 'won';
    state.convertedBookingId = res.id;
    showToast('Booked · ' + res.reference);
    if (window.opsRefreshQuotes) window.opsRefreshQuotes();
    render();
  } finally {
    bookSubmitting = false;
  }
}

// ── Reopen a saved quote (V19) ────────────────────────────────────────────────
async function reopenQuote(id) {
  if (!id) return;
  var q = await apiGetQuote(id);
  if (!q || q.error) {
    // D6: a bad deep link (e.g. /ops?quote=Q-FHEXB — a reference, not the internal key the
    // lookup expects) used to fail silently and strand the operator in a blank New-quote
    // builder. Say what happened (naming the quote when it's a reference) and drop back to the
    // queue rather than leaving an empty builder that looks like a fresh quote. Prefer the
    // shell toast — after opsGoQuotes() the builder's own #ch-toast is hidden with the pane.
    var isRef = /^Q-/i.test(String(id || ''));
    var notFound = q && q.error === 'not_found';
    var msg = notFound
      ? (isRef ? 'Quote ' + id + ' not found' : 'Quote not found')
      : ('Couldn’t open the quote' + (q && q.error && q.error !== 'not_found' ? ' — ' + q.error : ''));
    if (window.opsToast) window.opsToast(msg); else showToast(msg);
    if (window.opsGoQuotes) window.opsGoQuotes();
    return;
  }
  var tool = q.request && q.request.tool;
  if (!tool) {
    // Legacy row saved before the { tool, engine } shape.
    showToast('This quote was saved before reopen support — re-create it to edit.');
    return;
  }

  // Map persisted tool legs back to state legs (Task 7: per-segment). A multi-stop chain
  // comes back as stops+segmentKms; a legacy payload (from/to/distanceKm) becomes the
  // degenerate 2-stop chain — this normalizer must agree with the server's.
  legSeq = 0;
  var legs = (tool.legs || []).map(function(tl) {
    var leg = newLeg();
    leg.category = tl.category || 'transfer';
    var stops = (tl.stops && tl.stops.length >= 2)
      ? tl.stops.map(function(s) { return s || ''; })
      : [tl.from || '', tl.to || ''];
    var kms = tl.segmentKms || [tl.distanceKm || 0];
    leg.stops = stops;
    leg.segments = [];
    for (var si = 0; si < stops.length - 1; si++) {
      var km = Number(kms[si]) || 0;
      // Treat each persisted segment distance as MANUAL so prices don't re-resolve
      // differently on reopen (km > 0 ⇒ manual — the old leg-level rule, per segment now;
      // a location change on that pair clears it via rebuildSegments).
      leg.segments.push({ km: km, driveTimeHours: 0, manual: km > 0, autoMatched: false });
    }
    leg.date = tl.date || '';
    leg.addSightseeingFee = !!tl.addSightseeingFee;
    leg.addWaitingFee = !!tl.addWaitingFee;
    leg.addSafariWait = !!tl.addSafariWait;
    // Route choice (2026-07-20): restore what was picked/offered so the message note and
    // pills survive a reopen (the persisted km stays manual per the rule above). 2-stop legs
    // ONLY (GC-10) — a multi-stop chain drops any persisted route choice.
    if (stops.length === 2) {
      leg.routeVariant = tl.routeVariant || undefined;
      leg.routeOptions = tl.routeOptions || null;
    }
    return leg;
  });
  if (legs.length === 0) legs = [newLeg()];

  var split = {
    firstName: tool.firstName || '',
    lastName: tool.lastName || '',
  };
  if (!split.firstName && !split.lastName) split = splitCustomerName(q.customerName || tool.name || '');
  state.firstName = split.firstName;
  state.lastName = split.lastName;
  state.contact = q.customerContact || tool.contact || '';
  state.vehicleType = tool.vehicle || state.vehicleType;
  state.service = (tool.service === 'chauffeur') ? 'chauffeur' : 'private';
  state.requestedService = (tool.requestedService === 'private' || tool.requestedService === 'chauffeur' || tool.requestedService === 'both')
    ? tool.requestedService : null;
  state.passengerCount = Math.max(1, parseInt(tool.passengerCount, 10) || 1);
  state.luggageCount = Math.max(0, parseInt(tool.luggageCount, 10) || 0);
  state.legs = legs;
  state.status = q.status || 'draft';
  state.notes = q.notes || ''; // send-back reason etc., shown in the review banner
  state.internalNotes = q.internalNotes || ''; // ops-only scratchpad, edited beside the route map
  state.savedId = q.id;
  state.reference = q.reference || q.id;
  state.assignedTo = q.assignedTo || null;
  state.createdBy = q.createdBy || null;
  state.updatedBy = q.updatedBy || null;
  state.convertedBookingId = q.convertedBookingId || null; // back-link if already "Mark booked"-ed

  lastEstimate = null;
  lastEstimateError = null;
  outputDrafts = { whatsapp: null, email: null };
  outputIncludeChauffeurUpsell = false;
  sendBackOpen = false;
  bookOpen = false;
  _mapOpen = true;
  _dirty = false; // freshly loaded from the server — nothing unsaved (GL-1b)
  // A ready/sent quote is rate-locked (spec 2026-07-11 §3): render the APPROVED price the server
  // priced against the frozen snapshot, rather than live-recomputing on a card that may have moved
  // since approval. Editable states still price live as the operator builds.
  if ((q.status === 'ready' || q.status === 'sent') && q.estimate) {
    lastEstimate = q.estimate;
    render();
  } else {
    render();
    refreshEstimate();
  }
  // D7: this just loads a quote into the builder for viewing/editing — it is NOT the
  // "Reopen to edit" status transition (reopenToDraft). Saying "Reopened" on a locked
  // in-review quote contradicts its own "In review — locked" banner. "Opened" is honest.
  showToast('Opened ' + (q.reference || q.id));
}

// ── Leg tone helpers ──────────────────────────────────────────────────────────
function legTone(idx, total, cat) {
  if (idx === 0) return 'teal';
  if (idx === total - 1) return 'red';
  if (cat === 'stay_day') return 'stay';
  return 'blue';
}

function legTagLabel(idx, total) {
  if (idx === 0) return 'TRIP START';
  if (idx === total - 1) return 'FINAL STOP';
  return 'STOP ' + (idx + 1);
}

// ── Per-leg price from lastEstimate breakdown ────────────────────────────────
// ── Driving-leg helpers (V1: breakdown.legs contains ONLY driving legs) ───
// A leg "drives" if it is not a stay day. breakdown.legs[] and the leg-order
// travel lineItems are indexed by DRIVING position, not by state.legs index — a
// stay_day shifts every following driving leg by one. drivingIndex() maps a
// state.legs index to its driving position (or -1 for a stay day).
function legDrives(leg) {
  return !!leg && leg.category !== 'stay_day';
}

function drivingIndex(stateIdx) {
  var d = -1;
  for (var i = 0; i <= stateIdx; i++) {
    if (legDrives(state.legs[i])) d++;
  }
  return legDrives(state.legs[stateIdx]) ? d : -1;
}

function getLegBreakdownPrice(legIdx) {
  if (!lastEstimate || !lastEstimate.breakdown || !lastEstimate.breakdown.legs) return null;
  // _pricedLegMap slots each leg into breakdown.legs; -1 = a stay day, or a leg left out of a
  // partial (point-to-point) estimate — either way there is no per-leg price to show.
  var di = _pricedLegMap[legIdx];
  if (di == null || di < 0) return null;
  var bleg = lastEstimate.breakdown.legs[di];
  if (!bleg) return null;
  // USD primary (engine-native); the Summary carries the LKR reference.
  return fmtUsd(bleg.priceCents);
}

// ── Render leg card HTML ──────────────────────────────────────────────────────
// hours (e.g. 2.62) → "2h 37m" / "48m"
function fmtDur(hours) {
  if (!hours || hours <= 0) return '';
  var mins = Math.round(hours * 60);
  var h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? (h + 'h' + (m ? ' ' + m + 'm' : '')) : (m + 'm');
}

function renderLegCard(leg, idx, total) {
  var tone = legTone(idx, total, leg.category);
  var isStay = leg.category === 'stay_day';
  var isChauffeur = (state.service === 'chauffeur');

  // Stay legs always take the small dashed dot (they carry no leg number), even in
  // first/last position where legTone() gives them teal/red.
  var dotTone = (leg.category === 'stay_day') ? 'stay' : tone; // teal | red | blue | stay
  var legToneClass = 'tone-' + (tone === 'stay' ? 'stay' : (tone === 'teal' ? 'teal' : (tone === 'red' ? 'red' : 'blue')));

  // Reorder controls
  var reorder = [
    '<div class="ch-leg-reorder">',
    '  <button class="ch-mini-btn" title="Move up" data-action="moveLegUp" data-leg="' + esc(leg.id) + '"' + (idx === 0 ? ' disabled' : '') + '>&#9650;</button>',
    '  <button class="ch-mini-btn" title="Move down" data-action="moveLegDown" data-leg="' + esc(leg.id) + '"' + (idx === total - 1 ? ' disabled' : '') + '>&#9660;</button>',
    '</div>',
  ].join('');

  // (Removed the Travel|Stay per-leg toggle: chauffeur standby/idle days are derived from
  // the leg dates by the engine — no explicit "stay" leg is needed. Legacy stay_day legs on
  // a reopened quote still render read-only below.)

  // Route (Task 8, multi-stop): the stop chain as real inputs. EVERY place input carries
  // data-leg + data-field="stop" + data-stop="<index>" — the two-value pickupLocation/
  // dropoffLocation enum is GONE from the DOM; autocomplete, focus-restore and the
  // pick/blur location sync all key on (leg, 'stop', index) now. 2 stops keep the compact
  // From → To row; 3+ stops render the vertical list with a per-segment distance row
  // between consecutive stops. stay_day keeps its single-location input (the LAST stop —
  // the old dropoffLocation slot), no stop controls.
  var isMulti = !isStay && leg.stops.length > 2;
  function stopInput(i, placeholder) {
    return [
      '  <div class="ch-leg-ac">',
      '    <input class="ch-leg-in ch-tl-title" type="text" placeholder="' + placeholder + '"',
      '      value="' + esc(leg.stops[i] || '') + '"',
      '      data-leg="' + esc(leg.id) + '" data-field="stop" data-stop="' + i + '" />',
      '  </div>',
    ].join('');
  }
  // One segment's distance control (km pill / manual km input / "set"), carrying
  // data-leg + data-seg. This is the ONLY km UI — the old aggregate-km-input-writes-
  // segments[0] interim hack is gone; a 2-stop leg is just the si=0 case of this.
  function segmentHtml(si) {
    var s = leg.segments[si];
    if (!s) return '';
    if (s.manual) {
      return [
        '<div class="ch-leg-dist ch-dist-manual">',
        '  <div class="ch-input-wrap" style="width:92px;padding:0 8px">',
        '    <input class="ch-input" type="number" min="0" value="' + esc(s.km) + '"',
        '      data-leg="' + esc(leg.id) + '" data-seg="' + si + '" data-field="distanceKm" style="width:56px" />',
        '    <span class="ch-input-suffix">km</span>',
        '  </div>',
        '  <button class="ch-link" data-action="autoDistance" data-leg="' + esc(leg.id) + '" data-seg="' + si + '">auto</button>',
        '</div>',
      ].join('');
    }
    if (s.autoMatched) {
      var segDur = fmtDur(parseFloat(s.driveTimeHours) || 0);
      return [
        '<div class="ch-leg-dist">',
        '  <span class="ch-dist-pill auto"><b>' + esc(s.km) + ' km</b>' + (segDur ? '<span class="ch-dist-time">' + esc(segDur) + '</span>' : '') + '</span>',
        '  <button class="ch-link" data-action="manualDistance" data-leg="' + esc(leg.id) + '" data-seg="' + si + '" title="Edit distance">&#9998;</button>',
        '</div>',
      ].join('');
    }
    return [
      '<div class="ch-leg-dist">',
      '  <span class="ch-dist-pill warn">No distance</span>',
      '  <button class="ch-link" data-action="manualDistance" data-leg="' + esc(leg.id) + '" data-seg="' + si + '">set</button>',
      '</div>',
    ].join('');
  }
  var routeHtml;
  if (isStay) {
    routeHtml = [
      '<div class="ch-leg-route">',
      stopInput(leg.stops.length - 1, 'Staying at…'),
      '</div>',
    ].join('');
  } else if (isMulti) {
    var stopRows = [];
    for (var sri = 0; sri < leg.stops.length; sri++) {
      stopRows.push('<div class="ch-stop-row">'
        + '<span class="ch-stop-dot' + (sri === leg.stops.length - 1 ? ' end' : '') + '"></span>'
        + stopInput(sri, sri === 0 ? 'From' : (sri === leg.stops.length - 1 ? 'To' : 'Stop'))
        + '<button class="ch-mini-btn danger" title="Remove stop" data-action="removeStop" data-leg="' + esc(leg.id) + '" data-stop="' + sri + '">&times;</button>'
        + '</div>');
      if (sri < leg.stops.length - 1) {
        stopRows.push('<div class="ch-seg-row">' + segmentHtml(sri) + '</div>');
      }
    }
    routeHtml = '<div class="ch-leg-route ch-stops-multi">' + stopRows.join('') + '</div>';
  } else {
    routeHtml = [
      '<div class="ch-leg-route">',
      stopInput(0, 'From'),
      '  <span class="ch-leg-arrow">&#8594;</span>',
      stopInput(1, 'To'),
      '</div>',
    ].join('');
  }

  // Date pill (KEEP input[type=date][data-field=date]). min = today so a past date can't be
  // picked from the native calendar (the change handler also rejects a typed past value).
  var dateNeeded = state.service === 'chauffeur' && distinctLegDateCount() >= 2 && !leg.date;
  var dateHtml = [
    '<div class="ch-leg-date' + (dateNeeded ? ' invalid' : '') + '">',
    '  <input type="date" min="' + fmtISODateLocal(new Date()) + '" value="' + esc(leg.date) + '" data-leg="' + esc(leg.id) + '" data-field="date" />',
    (dateNeeded ? '  <span class="ch-leg-date-hint">date required</span>' : ''),
    '</div>',
  ].join('');

  // Distance display (only for travel legs). Per-segment now (Task 8): a 2-stop leg shows
  // its single segment's control here (same slot as always); a multi-stop leg carries the
  // per-segment controls in the stop list above, so this slot shows only the read-only
  // ride total (segment sum + summed drive time) once every segment is resolved.
  var distHtml = '';
  var routeChipHtml = ''; // rendered on the add-ons line, built alongside the distance state
  if (!isStay) {
    if (!isMulti) {
      distHtml = segmentHtml(0);
    } else if (legKm(leg) > 0) {
      var totDur = fmtDur(legDriveHours(leg));
      distHtml = [
        '<div class="ch-leg-dist">',
        '  <span class="ch-dist-pill" title="Ride total"><b>' + esc(legKm(leg)) + ' km</b>' + (totDur ? '<span class="ch-dist-time">' + esc(totDur) + '</span>' : '') + '</span>',
        '</div>',
      ].join('');
    }
    // Route choice: the modal is the picker. A fork leg shows a compact chip — "Compare
    // routes" while undecided, "Route: <pick> ▾" once chosen — both open the modal, rendered
    // on the add-ons line below the leg (owner call 2026-07-21). Only a 2-stop leg has an
    // expressway/local fork (a multi-stop chain has none — GC-10); no "Same route" caption
    // (removed as noise, #100). Uses the ride-model accessors, not the retired pickup/dropoff.
    var rcFrom = legFrom(leg).trim();
    var rcTo = legTo(leg).trim();
    if (rcFrom && rcTo && leg.stops.length === 2 && leg.routeOptions) {
      var rcPicked = leg.routeVariant === 'no_tolls' ? 'Local road' : (leg.routeVariant === 'fastest' ? 'Expressway' : null);
      routeChipHtml = rcPicked
        ? '<button class="ch-link ch-route-chip" data-action="openRouteModal" data-leg="' + esc(leg.id) + '">Route: ' + esc(rcPicked) + ' &#9662;</button>'
        : '<button class="ch-link ch-route-chip" data-action="openRouteModal" data-leg="' + esc(leg.id) + '">Compare routes</button>';
    }
  }

  // Per-leg price (from breakdown)
  var legPrice = getLegBreakdownPrice(idx);
  var priceHtml = legPrice
    ? '<div class="ch-leg-price">' + esc(legPrice) + '</div>'
    : '<div class="ch-leg-price empty">' + (isStay ? 'stay' : '—') + '</div>';

  // Actions cluster (duplicate / remove only — add-ons now lives on the second line)
  var actions = [
    '<div class="ch-leg-actions">',
    '  <button class="ch-mini-btn" title="Duplicate" data-action="dupLeg" data-leg="' + esc(leg.id) + '">&#10697;</button>',
    '  <button class="ch-mini-btn danger" title="Remove" data-action="removeLeg" data-leg="' + esc(leg.id) + '">&times;</button>',
    '</div>',
  ].join('');

  // Stop-list controls (thin line, driving legs only): "+ stop" inserts a new empty stop
  // BEFORE the last one; "and return" appends a copy of stops[0] (pure sugar — rendered
  // only while stops[0] is set and the ride doesn't already end back there). Both are
  // hidden at the 8-stop wire cap.
  var stopCtrls = '';
  if (!isStay) {
    var atStopCap = leg.stops.length >= 8;
    var rideStart = (leg.stops[0] || '').trim();
    var endsAtStart = !!rideStart && legTo(leg).trim() === rideStart;
    var ctrls = [];
    if (!atStopCap) ctrls.push('  <button class="ch-link" data-action="addStop" data-leg="' + esc(leg.id) + '">&#43; stop</button>');
    if (!atStopCap && rideStart && !endsAtStart) ctrls.push('  <button class="ch-link" data-action="andReturn" data-leg="' + esc(leg.id) + '">and return</button>');
    if (ctrls.length) stopCtrls = '<div class="ch-stop-ctrls">' + ctrls.join('') + '</div>';
  }

  // Add-ons chip (thin second line, point-to-point driving legs only). Shows a
  // muted dashed "+ Add-ons" pill when none are active, or a solid orange-tinted
  // pill naming the active ones — both open/close the same toggle popover.
  var activeAddonLabels = [];
  if (leg.addSightseeingFee) activeAddonLabels.push('Sightseeing');
  if (leg.addWaitingFee) activeAddonLabels.push('Waiting');
  if (leg.addSafariWait) activeAddonLabels.push('Safari wait');
  var anyAddon = activeAddonLabels.length > 0;
  var addonChipHtml = (!isChauffeur && !isStay)
    ? (anyAddon
      ? '<button class="ch-addon-chip on" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">' + esc(activeAddonLabels.join(' · ')) + '</button>'
      : '<button class="ch-addon-add" data-action="toggleAddons" data-leg="' + esc(leg.id) + '">&#43; Fees / add-ons</button>')
    : '';
  // Second line: fees/add-ons chip + the route chip share one quiet row under the leg.
  var addonChipRow = (addonChipHtml || routeChipHtml)
    ? '<div class="ch-leg-addonrow">' + addonChipHtml + routeChipHtml + '</div>'
    : '';

  // Add-on line (thin second line, only when the popover is toggled open; private travel only)
  var sightChecked = leg.addSightseeingFee ? ' checked' : '';
  var waitChecked = leg.addWaitingFee ? ' checked' : '';
  var safariChecked = leg.addSafariWait ? ' checked' : '';
  var addonLine = (!isChauffeur && !isStay && legAddonsOpen[leg.id]) ? [
    '<div class="ch-leg-addons">',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSightseeingFee"' + sightChecked + ' /><span class="ch-check-box">' + (leg.addSightseeingFee ? '&#10003;' : '') + '</span>Sightseeing</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addWaitingFee"' + waitChecked + ' /><span class="ch-check-box">' + (leg.addWaitingFee ? '&#10003;' : '') + '</span>Waiting</label>',
    '  <label class="ch-check"><input type="checkbox" data-leg="' + esc(leg.id) + '" data-field="addSafariWait"' + safariChecked + ' /><span class="ch-check-box">' + (leg.addSafariWait ? '&#10003;' : '') + '</span>Safari wait</label>',
    '</div>',
  ].join('') : '';

  // Multi-stop: the stop chain renders in its own block BELOW the main row, so the main
  // row can act as the leg's header band (see the route-rail CSS). Compact 2-stop legs
  // keep the route inline in the main row, exactly as before.
  return [
    '<div class="ch-leg ch-tl-item ' + legToneClass + (isChauffeur ? ' is-chauffeur' : '') + (isMulti ? ' is-multistop' : '') + '" data-leg-id="' + esc(leg.id) + '">',
    '  <div class="ch-leg-main">',
    reorder,
    '    <span class="ch-leg-dot tone-' + esc(dotTone) + '">' + (isStay ? '' : (idx + 1)) + '</span>',
    (isMulti ? '' : routeHtml),
    dateHtml,
    distHtml,
    priceHtml,
    actions,
    '  </div>',
    (isMulti ? '<div class="ch-leg-stoplist">' + routeHtml + '</div>' : ''),
    stopCtrls,
    addonChipRow,
    addonLine,
    '</div>',
  ].join('');
}

// ── Rate card body renderer ────────────────────────────────────────────────────
function renderRateCardBody() {
  if (!rateCard) {
    return '<div style="color:var(--muted);font-size:13px;padding:12px 0">Loading rate card…</div>';
  }

  var fx = rateCard.fxUsdToLkr;

  // Helper: cents → "$X.XX"
  function usd(cents) {
    return '$' + (cents / 100).toFixed(2);
  }

  // Helper: cents → "Rs X,XXX" (LKR = round(cents × fx / 100))
  function lkr(cents) {
    var val = Math.round(cents * fx / 100);
    return 'Rs ' + val.toLocaleString('en-US');
  }

  // Helper: render a static rate row
  function rateRow(label, hint, valueHtml) {
    return [
      '<div class="ch-rate-row">',
      '  <span class="ch-rate-label">',
      esc(label),
      hint ? '<span class="ch-rate-hint">' + esc(hint) + '</span>' : '',
      '  </span>',
      '  <span class="ch-rate-control" style="font-size:13px;font-weight:600;color:var(--ink);text-align:right">',
      valueHtml,
      '  </span>',
      '</div>',
    ].join('');
  }

  var carKmCents = rateCard.perKmCents.car;
  var vanKmCents = rateCard.perKmCents.van;
  var van14KmCents = rateCard.perKmCents.van14;
  var customKmCents = rateCard.perKmCents.custom;
  var carFloorCents = rateCard.floorCents.car;
  var vanFloorCents = rateCard.floorCents.van;
  var driverCents = rateCard.chauffeurDayRateCents;
  var bufferPct = rateCard.bufferPct;
  var depositPct = rateCard.depositPct;
  var extras = rateCard.extras;

  var leftCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Per-km rates</div>',
    rateRow('Car', null,
      esc(usd(carKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carKmCents)) + ' /km</span>'),
    rateRow('Van', null,
      esc(usd(vanKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanKmCents)) + ' /km</span>'),
    rateRow('Van 14', null,
      esc(usd(van14KmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(van14KmCents)) + ' /km</span>'),
    rateRow('Custom', null,
      esc(usd(customKmCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /km</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(customKmCents)) + ' /km</span>'),
    '  <div class="ch-rate-group-title">Minimum per leg</div>',
    rateRow('Car floor', null,
      esc(usd(carFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(carFloorCents)) + '</span>'),
    rateRow('Van floor', null,
      esc(usd(vanFloorCents))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(vanFloorCents)) + '</span>'),
    '</div>',
  ].join('');

  var rightCol = [
    '<div class="ch-rate-col">',
    '  <div class="ch-rate-group-title">Chauffeur &amp; buffer</div>',
    rateRow('Driver day rate', null,
      esc(usd(driverCents)) + '<span style="font-weight:400;color:var(--muted);font-size:11.5px"> /day</span>'
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(driverCents)) + ' /day</span>'),
    rateRow('Buffer', null, esc(String(bufferPct)) + '%'),
    rateRow('Deposit', null, esc(String(depositPct)) + '%'),
    '  <div class="ch-rate-group-title">Add-ons &amp; FX</div>',
    rateRow('Sightseeing', null,
      esc(usd(extras.sightseeing))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.sightseeing)) + '</span>'),
    rateRow('Waiting', null,
      esc(usd(extras.waiting))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras.waiting)) + '</span>'),
    rateRow('Safari wait', null,
      esc(usd(extras['safari-wait']))
      + '<br><span style="font-size:11px;color:var(--muted-2)">' + esc(lkr(extras['safari-wait'])) + '</span>'),
    rateRow('FX', 'LKR per USD', 'Rs ' + esc(String(fx)) + ' / $'),
    rateRow('Rate card', 'version', esc(rateCard.version)),
    '</div>',
  ].join('');

  return '<div class="ch-rate-grid">' + leftCol + rightCol + '</div>';
}

// ── Hot zones admin (spec 2026-07-22) — founder-only pricing lever inside Rate Settings. ──
// A premium-town list: a quoted trip touching a listed town is boosted by its %. Editable here
// (unlike the read-only rate card above); zones affect OPS quotes now (the website is a later
// release). The whole app re-renders by innerHTML swap, so the form inputs are UNCONTROLLED —
// their values are read from the DOM only at submit time (hzSubmit), never bound per keystroke,
// which sidesteps the focus-wipe-on-render problem entirely.
var hotZonesOff = false; // mirror of HOT_ZONES_DISABLED from the server (kill switch banner)

async function loadHotZones() {
  try {
    var r = await api('/admin/quote/zones');
    if (!r.ok) return; // 403 handled by api(); leave list as-is
    var d = await jsonOrNull(r);
    hotZones = (d && d.zones) ? d.zones : [];
    hotZonesOff = !!(d && d.disabled);
    render();
  } catch (e) { /* leave prior state; a transient failure just shows the last list */ }
}

// Create or update a zone from the (uncontrolled) form inputs, read at click time. Boost > 20%
// asks for confirmation (spec D4/R3) — a high premium should feel deliberate, not routine.
async function hzSubmitZone() {
  var placeEl = document.getElementById('hz-place');
  var boostEl = document.getElementById('hz-boost');
  var activeEl = document.getElementById('hz-active');
  if (!placeEl || !boostEl) return;
  var placeName = (placeEl.value || '').trim();
  var boostPct = parseInt(boostEl.value, 10);
  var active = activeEl ? !!activeEl.checked : true;
  if (!placeName) { showToast('Enter a town name'); return; }
  if (isNaN(boostPct) || boostPct < 0 || boostPct > 100) { showToast('Boost must be 0–100%'); return; }
  if (boostPct > 20 && !window.confirm('A +' + boostPct + '% premium is unusually high. Apply it?')) return;
  hzBusy = true; render();
  try {
    var path = hzEditId ? '/admin/quote/zones/' + hzEditId : '/admin/quote/zones';
    var method = hzEditId ? 'PATCH' : 'POST';
    var r = await api(path, { method: method, headers: { 'content-type': 'application/json' }, body: JSON.stringify({ placeName: placeName, boostPct: boostPct, active: active }) });
    hzBusy = false;
    if (!r.ok) { var e = await errPayload(r); showToast(e.error === 'bad_request' ? 'Check the values' : (e.error || 'Save failed')); render(); return; }
    hzEditId = null;
    showToast('Zone saved');
    await loadHotZones();
  } catch (e) { hzBusy = false; showToast('Save failed'); render(); }
}

async function hzToggleZone(id) {
  var z = (hotZones || []).find(function(x) { return x.id === id; });
  if (!z) return;
  hzBusy = true; render();
  try {
    var r = await api('/admin/quote/zones/' + id, { method: 'PATCH', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ active: !z.active }) });
    hzBusy = false;
    if (!r.ok) { showToast('Update failed'); render(); return; }
    await loadHotZones();
  } catch (e) { hzBusy = false; showToast('Update failed'); render(); }
}

async function hzDeleteZone(id) {
  var z = (hotZones || []).find(function(x) { return x.id === id; });
  if (z && !window.confirm('Delete the ' + z.placeName + ' hot zone?')) return;
  hzBusy = true; render();
  try {
    var r = await api('/admin/quote/zones/' + id, { method: 'DELETE', headers: { 'content-type': 'application/json' } });
    hzBusy = false;
    if (!r.ok) { showToast('Delete failed'); render(); return; }
    if (hzEditId === id) hzEditId = null;
    showToast('Zone deleted');
    await loadHotZones();
  } catch (e) { hzBusy = false; showToast('Delete failed'); render(); }
}

function renderHotZonesPanel() {
  if (!viewerCan('margin:view')) return ''; // founder-only (defence-in-depth; the button is gated too)
  var rows = '';
  if (hotZones === null) {
    rows = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Loading zones…</div>';
  } else if (hotZones.length === 0) {
    rows = '<div style="color:var(--muted);font-size:13px;padding:8px 0">No hot zones yet. Add a town below to boost every quote that touches it.</div>';
  } else {
    rows = hotZones.map(function(z) {
      var hot = z.boostPct > 20;
      var pill = z.active
        ? '<span class="ch-badge tone-teal">active</span>'
        : '<span class="ch-badge tone-slate">paused</span>';
      return '<div class="ch-hz-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)">'
        + '<div style="flex:1;min-width:0"><b>' + esc(z.placeName) + '</b> '
        + '<span style="color:' + (hot ? 'var(--danger,#c0392b)' : 'var(--muted-2)') + '">+' + esc(String(z.boostPct)) + '%</span>'
        + (hot ? ' <span title="Above 20% is unusually high">&#9888;</span>' : '') + '</div>'
        + pill
        + '<button class="ch-btn ch-btn-ghost ch-btn-sm" data-action="hzEditStart" data-id="' + esc(z.id) + '">Edit</button>'
        + '<button class="ch-btn ch-btn-ghost ch-btn-sm" data-action="hzToggleActive" data-id="' + esc(z.id) + '">' + (z.active ? 'Pause' : 'Resume') + '</button>'
        + '<button class="ch-btn ch-btn-ghost ch-btn-sm" data-action="hzDelete" data-id="' + esc(z.id) + '">Delete</button>'
        + '</div>';
    }).join('');
  }

  var editing = hzEditId ? (hotZones || []).find(function(z) { return z.id === hzEditId; }) : null;
  var placeVal = editing ? esc(editing.placeName) : '';
  var boostVal = editing ? esc(String(editing.boostPct)) : '';
  var activeChecked = editing ? (editing.active ? ' checked' : '') : ' checked';
  var dis = hzBusy ? ' disabled' : '';

  var banner = hotZonesOff
    ? '<div class="ch-lock-note" style="border-color:var(--danger,#c0392b)">&#9888; Hot zones are PAUSED globally (HOT_ZONES_DISABLED). Quotes ignore every zone until this env flag is cleared.</div>'
    : '';

  var form = '<div class="ch-hz-form" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line)">'
    + '<div style="font-weight:600;margin-bottom:8px">' + (editing ? 'Edit zone' : 'Add a zone') + '</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'
    + '<label style="flex:2;min-width:160px;font-size:12px;color:var(--muted)">Town<br>'
    + '<input id="hz-place" class="ch-input" style="width:100%" placeholder="e.g. Ella" value="' + placeVal + '"' + dis + '></label>'
    + '<label style="flex:1;min-width:90px;font-size:12px;color:var(--muted)">Boost %<br>'
    + '<input id="hz-boost" class="ch-input" style="width:100%" type="number" min="0" max="100" step="1" placeholder="15" value="' + boostVal + '"' + dis + '></label>'
    + '<label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;padding-bottom:8px"><input id="hz-active" type="checkbox"' + activeChecked + dis + '> Active</label>'
    + '<button class="ch-btn ch-btn-teal ch-btn-sm" data-action="hzSubmit"' + dis + '>' + (editing ? 'Save' : 'Add zone') + '</button>'
    + (editing ? '<button class="ch-btn ch-btn-outline ch-btn-sm" data-action="hzEditCancel"' + dis + '>Cancel</button>' : '')
    + '</div>'
    + '<div style="font-size:11px;color:var(--muted-2);margin-top:6px">Match is by town name, as it appears in the quote tool (e.g. Ella, Galle, Sigiriya / Dambulla). A premium above 20% will ask you to confirm.</div>'
    + '</div>';

  return '<div class="ch-hz-panel" style="margin-top:20px">'
    + '<h3 style="margin:0 0 4px;font-size:15px">Hot zones</h3>'
    + '<div class="ch-lock-note">Premium towns. A quote that touches one is boosted by its %. Affects ops quotes now; the website updates on the next deploy.</div>'
    + banner
    + rows
    + form
    + '</div>';
}

// ── Service chooser = money-pane head (R1) ───────────────────────────────────
// Two side-by-side price boxes (Point-to-point | Chauffeur-guide) that ARE the
// chooser. The selected box gets the teal-accent border/fill; each shows its
// total from est.services (USD primary + LKR sub). Chauffeur is disabled with a
// small reason hint beneath its '—' when that side returns { error } or the trip
// has ≤1 distinct leg date. Keeps [data-action=setService][data-service=…].
// ── Vehicle chips (pricing decision #1) ───────────────────────────────────────
// Vehicle lives in the money pane with its sibling pricing decisions (service, price):
// chips above the service chooser, seat caps from the live rate card. A chip too small
// for the current pax count shows a warn tint but stays clickable — the capacity flag
// covers a deliberate override. Clicking a chip runs the same mutate() the old header
// select did (GL-1d: switching tier clears the custom $/km).
function renderVehicleChips() {
  var st = state;
  var ids = ['car', 'van_6', 'van_9', 'van_14', 'custom'];
  var parts = [];
  // D3: recommend the smallest vehicle that fits pax+bags — the operator confirms rather than
  // decides. Suggestion only while nothing is chosen; their explicit pick always wins.
  var sug = null;
  if (!st.vehicleType) {
    for (var si = 0; si < ids.length; si++) {
      var sc = vehicleCaps(ids[si]);
      if (sc && st.passengerCount <= sc.pax && st.luggageCount <= sc.bags) { sug = ids[si]; break; }
    }
  }
  parts.push('<div id="veh-chips" class="ch-veh-chips' + (st.vehicleType ? '' : ' unset') + '">');
  parts.push('  <div class="ch-veh-head"><span class="ch-veh-lbl">Vehicle</span>'
    + (st.vehicleType ? '' : '<span class="ch-veh-hint">Pick a vehicle to price this trip'
        + (sug ? ' &mdash; ' + esc(VEHICLE_LABELS[sug]) + ' fits this group' : '') + '</span>')
    + '</div>');
  parts.push('  <div class="ch-veh-row">');
  ids.forEach(function(id) {
    var caps = vehicleCaps(id);
    // Seats are a HARD limit — a vehicle that can't seat the party is disabled (you can't put
    // 6 people in a 3-seat car). Bags are SOFT — over the bag count we only warn and keep the
    // chip clickable (staff can override; the capacity flag + backend upgrade still apply).
    var paxOver = !!(caps && st.passengerCount > caps.pax);
    var bagsOver = !!(caps && st.luggageCount > caps.bags);
    var seatsBlock = paxOver && st.vehicleType !== id; // never disable the chip already selected
    var bagsWarn = bagsOver && !paxOver;
    // Tag: when it doesn't fit, name the exceeded limit; otherwise show the seat count (except Custom).
    var tag = paxOver ? 'seats ' + caps.pax
            : bagsOver ? 'bags ' + caps.bags
            : (caps && id !== 'custom' ? String(caps.pax) : '');
    var capCls = (paxOver || bagsOver) ? 'ch-veh-cap' : (tag ? 'ch-veh-cap ok' : '');
    parts.push('    <button type="button" class="ch-veh-chip'
      + (st.vehicleType === id ? ' active' : '')
      + (id === sug ? ' suggest' : '')
      + (paxOver ? ' unfit' : (bagsWarn ? ' over' : ''))
      + '" data-action="setVehicle" data-veh="' + id + '"'
      + (seatsBlock ? ' disabled title="Too many passengers for a ' + esc(VEHICLE_LABELS[id]) + ' (seats ' + caps.pax + ')"' : '')
      + '>'
      + esc(VEHICLE_LABELS[id])
      + (tag ? '<i class="' + capCls + '">' + esc(tag) + '</i>' : '')
      + '</button>');
  });
  parts.push('  </div>');
  // Van 14/Custom price from the founder-managed rate card (RATE_CARD.perKmCents) — there is
  // no per-quote $/km override in the tool anymore.
  parts.push('</div>');
  return parts.join('\n');
}

// Quote intent (spec 2026-07-17): what the CUSTOMER asked for. Lives in the trip basics, beside
// the vehicle chips — it's an intake fact recorded with the enquiry, not a pricing-panel choice.
// Distinct from state.service (what we PRICE); never derived from it (I4). Mirrors the vehicle
// chips' head+row layout so the two intake questions read as a pair. The mismatch WARNING lives
// separately, in renderServiceChooser next to the prices.
function renderRequestedService() {
  // Two independent toggles, NOT three single-select buttons: selecting both IS "both"
  // (owner, 2026-07-17) — a third button would just restate a state the toggles already express.
  // The STORED value stays 'private' | 'chauffeur' | 'both' | null (see requestedFrom/derive),
  // so the mismatch signal, the review gate and the I9 upsell default are all unchanged.
  var opts = [['private', 'Point-to-point'], ['chauffeur', 'Chauffeur-guide']];
  var parts = ['<div class="ch-req-choose">'];
  parts.push('  <div class="ch-req-head"><span class="ch-req-lbl">Customer asked for</span></div>');
  parts.push('  <div class="ch-req-row">');
  for (var i = 0; i < opts.length; i++) {
    var rv = opts[i][0];
    parts.push('    <button type="button" class="ch-req-chip' + (requestedIncludes(rv) ? ' active' : '') + '"'
      + ' aria-pressed="' + (requestedIncludes(rv) ? 'true' : 'false') + '"'
      + ' data-action="setRequestedService" data-req="' + rv + '">' + esc(opts[i][1]) + '</button>');
  }
  parts.push('  </div>');
  parts.push('</div>');
  return parts.join('\n');
}

function renderServiceChooser() {
  var svc = (lastEstimate && lastEstimate.services) ? lastEstimate.services : null;
  var p2p = svc ? svc.pointToPoint : null;
  var chauf = svc ? svc.chauffeur : null;

  // Pre-escaped inner HTML for the price element (USD primary + LKR sub) — raw below.
  var p2pPrice = (p2p && p2p.total)
    ? esc(fmtUsd(p2p.total.cents)) + '<span class="ch-svc-sub">' + esc(p2p.total.lkr) + '</span>'
    : '—';

  // Chauffeur disabled reason: server error, or a visual pre-empt when the itinerary
  // has ≤1 distinct leg date (avoids a flash before the server error arrives).
  var chaufErr = (chauf && chauf.error) ? chauf.error : null;
  if (!chaufErr && distinctLegDateCount() <= 1) {
    chaufErr = 'single-day trip — point-to-point only';
  }
  var chaufDisabled = !!chaufErr;
  var chaufPrice = (chauf && chauf.total)
    ? esc(fmtUsd(chauf.total.cents)) + '<span class="ch-svc-sub">' + esc(chauf.total.lkr) + '</span>'
    : '—';

  var p2pActive = (state.service !== 'chauffeur');
  // If chauffeur is selected but became unavailable, still show it active so the
  // operator sees why; the caption/hint explains. (setService is the only path back.)
  var chaufActive = (state.service === 'chauffeur');

  var parts = [];
  parts.push('<div class="ch-svc-head"><span class="ch-svc-caption-lbl">Pricing as</span></div>');
  parts.push('<div class="ch-svc-choose">');
  // Point-to-point box
  parts.push('  <button class="ch-svc-box' + (p2pActive ? ' active' : '') + '" data-action="setService" data-service="private">');
  parts.push('    <span class="ch-svc-lbl">Point-to-point</span>');
  parts.push('    <span class="ch-svc-price">' + p2pPrice + '</span>'); // pre-escaped above
  parts.push('  </button>');
  // Chauffeur-guide box
  parts.push('  <button class="ch-svc-box' + (chaufActive ? ' active' : '') + '"' + (chaufDisabled ? ' disabled' : '') + ' data-action="setService" data-service="chauffeur">');
  parts.push('    <span class="ch-svc-lbl">Chauffeur-guide</span>');
  parts.push('    <span class="ch-svc-price">' + (chaufDisabled ? '—' : chaufPrice) + '</span>'); // pre-escaped above
  if (chaufDisabled) {
    parts.push('    <span class="ch-svc-hint">' + esc(chaufErr) + '</span>');
  }
  parts.push('  </button>');
  parts.push('</div>');

  // Quote intent (spec 2026-07-17). The "Customer asked for" control itself lives up in the trip
  // basics (renderRequestedService) — it's an intake fact, recorded with the customer's name/contact.
  // The MISMATCH stays here, next to the prices: "recorded X but priced Y" only means something once
  // the trip is priced, and this is where the priced service (state.service) is chosen and shown.
  // I8: signal, not a gate.
  var _mm = requestMismatch(state.requestedService, state.service);
  if (_mm) parts.push('<div class="ch-req-mismatch">' + esc(_mm) + '</div>');

  if (chaufActive && !chaufDisabled) {
    parts.push('<div class="ch-svc-caption">Car &amp; driver stay with you — sightseeing/waiting included.</div>');
  }
  return parts.join('');
}

// ── Summary card body (money-pane core) ──────────────────────────────────────
// Composition (top→bottom): km line → cost build-up rows → big serif total →
// due-now chip (chauffeur) → margin. km hero number keeps .ch-km.hero for e2e.
// D1 (design elevation): what still blocks a price, as ONE quiet line — the price panel
// previously stacked "Vehicle not set" + "Check distances" + a bare error, three ways of
// saying "not yet". The business flags card keeps its role; this is only the price's own state.
function priceNeeds() {
  var needs = [];
  if (!state.vehicleType) needs.push('a vehicle');
  // Task 8: an invalid 3+-stop chain must surface here, never silently price as legacy
  // from/to (see legChainDuplicate). Named before the distance count — the duplicate IS
  // why the distance can't resolve.
  if ((state.legs || []).some(legChainDuplicate)) {
    needs.push('two consecutive stops are the same — remove or edit one');
  }
  var undist = 0;
  (state.legs || []).forEach(function(l) {
    if (l.category !== 'stay_day' && !(legKm(l) > 0)) undist++;
  });
  if (undist > 0) needs.push(undist === 1 ? 'one leg distance' : undist + ' leg distances');
  var undated = chauffeurUndatedLegs().length;
  if (undated > 0) needs.push(undated === 1 ? 'a date on the undated leg (chauffeur)' : 'a date on ' + undated + ' legs (chauffeur)');
  return needs;
}

function renderSummaryCardBody() {
  // Unpriceable: keep the total as the calm hero (an em-dash, not a wall of warnings),
  // with a single needs line beneath. Gated-vehicle/server errors keep their precise text.
  if (lastEstimateError || !lastEstimate) {
    var needs = priceNeeds();
    // Message priority: a gated vehicle keeps its precise "no rate" text; otherwise the live
    // needs list wins (lastEstimateError can lag a beat behind a just-fixed state); a server
    // error only surfaces when nothing is visibly missing.
    var msg;
    if (state.vehicleType && GATED_VEHICLES[state.vehicleType] && lastEstimateError) msg = lastEstimateError;
    else if (needs.length) msg = 'To price: ' + needs.join(' &middot; ');
    else msg = lastEstimateError || 'Fill the itinerary to see pricing.';
    return '<div class="ch-total ch-line strong">'
      + '  <span class="ch-total-lbl ch-line-label">Quote total</span>'
      + '  <span class="ch-total-val ch-line-val"><span class="ch-total-usd pending">&mdash;</span></span>'
      + '</div>'
      + '<div class="ch-money-empty ch-needs">' + msg + '</div>';
  }

  var est = lastEstimate;
  var bkm = est.breakdown && est.breakdown.km ? est.breakdown.km : null;
  var lines = [];

  // km line — one text line (keep .ch-km.hero on the billable number for e2e)
  if (bkm) {
    lines.push('<div class="ch-km-line">'
      + esc(String(bkm.distanceKm)) + ' km + ' + esc(String(bkm.bufferKm)) + ' buffer &rarr; '
      + '<span class="ch-km hero"><b>' + esc(String(bkm.billableKm)) + '</b></span> billable km'
      + '</div>');
  }

  // Cost build-up lines (from server, tightened)
  var lineItems = est.lineItems || [];
  lineItems.forEach(function(item) {
    lines.push('<div class="ch-line">');
    lines.push('  <span class="ch-line-label">' + esc(item.label) + '</span>');
    lines.push('  <span class="ch-line-val">' + usdWithLkr(item.amountCents, item.lkr) + '</span>');
    lines.push('</div>');
  });

  // Quote total — the big serif moment (USD large, LKR sub beneath).
  // Keeps .ch-line.strong + .ch-line-val (with LKR) so the e2e total hooks hold.
  lines.push('<div class="ch-total ch-line strong">');
  lines.push('  <span class="ch-total-lbl ch-line-label">Quote total</span>');
  lines.push('  <span class="ch-total-val ch-line-val">'
    + '<span class="ch-total-usd">' + esc(fmtUsd(est.total.cents)) + '</span>'
    + (est.total.lkr ? '<span class="ch-total-lkr ch-val-sub">' + esc(est.total.lkr) + '</span>' : '')
    + '</span>');
  lines.push('</div>');

  // Defect A: when the total covers only the ready legs, say so — the number is real but partial.
  if (lastEstimatePartial > 0) {
    lines.push('<div class="ch-partial-note">Covers the ready legs — '
      + (lastEstimatePartial === 1 ? 'one leg still needs a distance' : lastEstimatePartial + ' legs still need a distance')
      + ' to join the total.</div>');
  }

  // Chauffeur product: full due-now amount as a subtle highlighted chip/row.
  if (est.product === 'chauffeur' && est.amountDueNow) {
    lines.push('<div class="ch-deposit-chip">');
    lines.push('  <span class="dep-lbl">Pay in full to confirm</span>');
    lines.push('  <span class="dep-val">' + esc(fmtUsd(est.amountDueNow.cents)) + '</span>');
    lines.push('</div>');
    lines.push('<div class="ch-deposit-note">' + esc(est.amountDueNow.lkr || '') + ' &middot; no balance due after checkout</div>');
  }

  // Margin — the small teal line. FOUNDER-ONLY: the server strips margin for non-margin:view
  // roles (est.margin is absent), and we gate the render on the capability too (defence in depth).
  if (est.margin && viewerCan('margin:view')) {
    lines.push('<div class="ch-margin">Est. margin ' + esc(fmtUsd(est.margin.cents)) + ' (' + esc(est.margin.lkr) + ')</div>');
  }

  // Engine warnings as a tip
  if (est.warnings && est.warnings.length > 0) {
    est.warnings.forEach(function(w) {
      lines.push('<div class="ch-tip">' + esc(w) + '</div>');
    });
  }

  return lines.join('');
}

// ── Flags computation (client-side) ──────────────────────────────────────────
// Itinerary continuity check (pure, DOM-free — unit-tested in opsUi.test.ts). Returns a warning
// string when a leg doesn't start where the previous one ended, or null when the route connects.
// In the builder a gap almost always means a missed or mis-typed leg (the customer site treats
// the same gap as a deliberate self-arranged stretch — different context, different call). Place
// names are compared loosely — lower-cased, parentheticals dropped, first comma-segment only,
// non-alphanumerics stripped — so Google's ", Sri Lanka" suffix and "(CMB)" tags never raise a
// phantom gap. Advisory only: it flags for a second look, it never blocks submitting or sending.
function itineraryGapDetail(legs) {
  function spotKey(s) {
    return String(s || '').toLowerCase().replace(/\(.*?\)/g, '').split(',')[0].replace(/[^a-z0-9]/g, '');
  }
  // Dual-shape reads (SELF-CONTAINED — opsUi.test.ts extracts this function by source and
  // evals it against legacy-scalar fixture legs): live legs carry the per-segment stop chain
  // (stops[]); fixtures use pickupLocation/dropoffLocation.
  function endOf(leg) { return (leg.stops ? leg.stops[leg.stops.length - 1] : leg.dropoffLocation) || ''; }
  function startOf(leg) { return (leg.stops ? leg.stops[0] : leg.pickupLocation) || ''; }
  // A stay day keeps the traveller put, so its start and end are the same single location
  // (the LAST stop — the old dropoffLocation slot).
  function legStart(leg) { return leg.category === 'stay_day' ? endOf(leg) : startOf(leg); }
  for (var i = 1; i < legs.length; i++) {
    var start = legStart(legs[i]) || '', end = endOf(legs[i - 1]) || '';
    if (!start || !end) continue;                    // half-built leg — don't nag mid-entry
    if (spotKey(start) !== spotKey(end)) {
      return 'Leg ' + (i + 1) + ' starts at ' + start + ', but leg ' + i + ' ends at ' + end +
        ' — add the missing leg, or fix the pick-up/drop-off if the gap is intentional.';
    }
  }
  return null;                                        // route connects end to end (or is too short to gap)
}

function computeFlags() {
  var st = state;
  var flags = [];

  // orange: no vehicle chosen — the quote can't price at all, so the flags pane must never
  // show the "looks clean to send" all-clear in this state.
  if (!st.vehicleType) {
    flags.push({
      level: 'orange',
      title: 'Vehicle not set',
      detail: 'Pick a vehicle at the top of the price panel to price this trip.',
    });
  }

  // red: car luggage limit
  if (st.vehicleType === 'car' && st.luggageCount > 3) {
    flags.push({
      level: 'red',
      title: 'Car luggage limit',
      detail: 'A car fits a maximum of 3 bags — ' + st.luggageCount + ' requested. Confirm with the customer or size up to a van.',
    });
  }

  // red: long drive warning — any leg's total drive time >= 6h (add once)
  var hasLongDrive = st.legs.some(function(leg) { return legDriveHours(leg) >= 6; });
  if (hasLongDrive) {
    flags.push({
      level: 'red',
      title: 'Long drive warning',
      detail: 'A leg is 6+ hours on the road. Confirm the customer understands the travel time and consider a break or an overnight stop.',
    });
  }

  // orange: hectic itinerary — 3+ consecutive driving dates
  var drivingDates = [];
  st.legs.forEach(function(leg) {
    if (DRIVING_CATS[leg.category] && leg.date) {
      drivingDates.push(leg.date);
    }
  });
  if (maxConsecutiveDates(drivingDates) >= 3) {
    flags.push({
      level: 'orange',
      title: 'Hectic itinerary warning',
      detail: 'Customer is moving on 3+ consecutive days. Consider adding a stay day or trimming stops.',
    });
  }

  // orange: dates out of order — a dated leg is earlier than a dated leg above it.
  // ISO 'YYYY-MM-DD' compares lexicographically, so no Date parsing (TZ-safe).
  (function() {
    var prevDate = null;
    for (var oi = 0; oi < st.legs.length; oi++) {
      var d = st.legs[oi].date;
      if (!d) continue;
      if (prevDate !== null && d < prevDate) {
        flags.push({
          level: 'orange',
          title: 'Dates out of order',
          detail: 'Leg ' + (oi + 1) + ' (' + d + ') is dated before the leg above it — reorder the legs or fix the dates.',
        });
        return;
      }
      prevDate = d;
    }
  })();

  // orange: duplicate consecutive stops on a multi-stop ride (Task 8). While a duplicate
  // pair exists the chain can't be sent, so pricing would silently fall back to the legacy
  // first→last mirror — flag it even when a manual km lets that fallback price.
  if (st.legs.some(legChainDuplicate)) {
    flags.push({
      level: 'orange',
      title: 'Duplicate consecutive stops',
      detail: 'A ride has two consecutive stops that are the same — remove or edit one so the multi-stop route can price correctly.',
    });
  }

  // orange: itinerary gap — a leg doesn't start where the previous one ended (see itineraryGapDetail).
  var gapDetail = itineraryGapDetail(st.legs);
  if (gapDetail) {
    flags.push({ level: 'orange', title: 'Legs don’t connect', detail: gapDetail });
  }

  // orange: capacity — server-derived caps; null until rate card loads / for 'custom'
  var vcap = vehicleCaps(st.vehicleType);
  if (vcap) {
    if (st.passengerCount > vcap.pax || st.luggageCount > vcap.bags) {
      var vLabel = VEHICLE_LABELS[st.vehicleType] || st.vehicleType;
      flags.push({
        level: 'orange',
        title: 'Capacity warning',
        detail: st.passengerCount + ' pax + ' + st.luggageCount + ' bags may not fit a ' + vLabel + '. Confirm vehicle type or size up.',
      });
    }
  }

  // Per-leg flags — each type fires at most once
  var flagSeen = {};
  st.legs.forEach(function(leg) {
    // orange: safari waiting add-on flagged (now a per-leg add-on, not a category)
    if (!flagSeen.safari && leg.addSafariWait) {
      flagSeen.safari = true;
      flags.push({
        level: 'orange',
        title: 'Safari waiting flagged',
        detail: 'Review safari waiting time and entry timing separately before sending.',
      });
    }

    // blue: airport timing — scan EVERY stop in the chain, not just the endpoints
    if (!flagSeen.airport && (leg.category === 'airport' || /airport|cmb|katunayake/i.test(leg.stops.join(' ')))) {
      flagSeen.airport = true;
      flags.push({
        level: 'blue',
        title: 'Airport timing reminder',
        detail: 'Confirm flight number, landing/departure time, and buffer time.',
      });
    }

    // blue: check distances — a driving segment with no distance, not auto-matched, not manual
    // (per-segment now). D4: gate on BOTH of the segment's stop endpoints being filled, so a
    // half-built leg doesn't claim it "couldn't be auto-located" before the operator has
    // finished entering it (that reads as a failure when they simply aren't done yet).
    if (!flagSeen.distCheck && DRIVING_CATS[leg.category] && leg.segments.some(function(s, i) {
      var a = (leg.stops[i] || '').trim(), b = (leg.stops[i + 1] || '').trim();
      return a && b && (s.km || 0) <= 0 && !s.autoMatched && !s.manual;
    })) {
      flagSeen.distCheck = true;
      flags.push({
        level: 'blue',
        title: 'Check distances',
        detail: 'One or more legs couldn\'t be auto-located. Enter the distance manually to price them.',
      });
    }
  });

  // blue: van minimum applied
  if (lastEstimate && lastEstimate.breakdown && lastEstimate.breakdown.legs) {
    var hasVanMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'van'; });
    if (hasVanMin) {
      flags.push({
        level: 'blue',
        title: 'Van minimum applied',
        detail: 'Minimum 100 km charge used on one or more legs.',
      });
    }
    var hasCarMin = lastEstimate.breakdown.legs.some(function(bl) { return bl.minApplied === true && bl.cls === 'car'; });
    if (hasCarMin) {
      flags.push({
        level: 'blue',
        title: 'Car minimum applied',
        detail: 'Minimum 50 km charge used on one or more legs.',
      });
    }
  }

  // Merge engine warnings as extra blue flags
  if (lastEstimate && lastEstimate.warnings && lastEstimate.warnings.length > 0) {
    lastEstimate.warnings.forEach(function(w) {
      flags.push({ level: 'blue', title: 'Engine note', detail: w });
    });
  }

  return flags;
}

// Helper: max consecutive calendar dates
function maxConsecutiveDates(dates) {
  if (!dates || dates.length === 0) return 0;
  // Deduplicate and convert to epoch days
  var days = [];
  var seen = {};
  dates.forEach(function(d) {
    if (!d || seen[d]) return;
    seen[d] = true;
    // V6: parse date-only locally so consecutive-day math is TZ-stable.
    days.push(Math.floor(parseISODateLocal(d).getTime() / 86400000));
  });
  days.sort(function(a, b) { return a - b; });
  var maxRun = 1, run = 1;
  for (var i = 1; i < days.length; i++) {
    if (days[i] === days[i - 1] + 1) {
      run++;
      if (run > maxRun) maxRun = run;
    } else {
      run = 1;
    }
  }
  return maxRun;
}

// ── Flags card renderer (⑤) ──────────────────────────────────────────────────
function renderFlagsCardBody() {
  var flags = computeFlags();

  if (flags.length === 0) {
    return '<div class="ch-flags-clear">&#x2713; No warnings. This itinerary looks clean to send.</div>';
  }

  var MARK = { red: '&#x25B2;', orange: '&#x25CF;', blue: '&#x2139;' };

  var parts = ['<div class="ch-flags">'];
  flags.forEach(function(f) {
    parts.push('<div class="ch-flag tone-' + esc(f.level) + '">');
    parts.push('  <span class="ch-flag-mark">' + (MARK[f.level] || '&#x2022;') + '</span>');
    parts.push('  <div>');
    parts.push('    <div class="ch-flag-title">' + esc(f.title) + '</div>');
    parts.push('    <div class="ch-flag-detail">' + esc(f.detail) + '</div>');
    parts.push('  </div>');
    parts.push('</div>');
  });
  parts.push('</div>');
  return parts.join('');
}

// ── Flags badge (count or "All clear") ────────────────────────────────────────
function renderFlagsBadge(flagCount) {
  if (flagCount === 0) {
