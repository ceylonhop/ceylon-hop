  /* ══════════════════════════════════════════════════════════════════════════
     QUOTE COCKPIT — ported verbatim from quote-tool.html, EVERY rule scoped
     under .qv (the #quoteRoot pane) so nothing here can restyle the ops app.
     :root → .qv (tokens), body → .qv (base + opaque cream background).
     The .ch-main (1080px) and .ch-cockpit (960px) viewport breakpoints became
     @container qv queries — the pane is viewport − 254px, so viewport media
     queries would fire at the wrong widths. Containment overrides at the end.
     ══════════════════════════════════════════════════════════════════════════ */

/* Ceylon Hop Ops — base + layout + components CSS */
/* quote design tokens — rehomed from :root to .qv so they scope to the
   quote subtree and never override the ops :root (different --ink/--cream/--line/--paper) */
.qv {
  /* Design unification: the quote view's tokens are aliased to the ops "Control Tower"
     palette so it reads as one console. The quote CSS keeps its own token NAMES (--blue,
     --muted, --serif, …) but their VALUES now point at the ops :root system — one edit
     reskins all ~180 .ch-* components. The quote's cool-grey/blue/Bodoni identity is gone;
     the accent unifies on ops teal, type on Newsreader + Hanken Grotesk. */
  --blue: #0AB9B6;      /* accent → ops teal (was #63BFD6) */
  --blue-d: #08938f;    /* → ops teal-deep */
  --black: #241f1d;     /* → ops ink */
  --cream: #F1EEE4;     /* → ops cream */
  --cream-d: #e4dfd0;   /* → ops cream-deep */
  --orange: #F9A429;    /* == ops saffron (already matched) */
  --red: #EC3A24;       /* == ops tomato (already matched) */
  --teal: #0AB9B6;      /* == ops teal */
  --teal-d: #08938f;    /* → ops teal-deep */

  --paper: #fffdf8;     /* → ops paper (warm, was pure #fff) */
  --ink: #241f1d;       /* → ops ink */
  --muted: #6b645f;     /* → ops ink-soft */
  --muted-2: #a59d92;   /* → ops ink-faint */
  --line: #e8e3d4;      /* → ops line */
  --line-soft: #f0ece1; /* → ops line-soft */

  --surface: #fff;        /* input/chip/card face — themed for dark mode */
  --surface-warm: #fffdf8; /* warm variant (paper-tinted faces) */

  --r-lg: 18px;
  --r-md: 13px;
  --r-sm: 9px;
  --shadow-card: 0 1px 2px rgba(40,33,28,.05), 0 1px 3px rgba(40,33,28,.04); /* → ops --shadow-s (warm ink tint) */
  --shadow-pop: 0 8px 26px -12px rgba(40,33,28,.20);                          /* → ops --shadow */
  --serif: 'Newsreader', Georgia, serif;               /* → ops display */
  --sans: 'Hanken Grotesk', system-ui, sans-serif;     /* → ops body */
}

.qv, .qv * { box-sizing: border-box; }
/* (quote's `html, body { margin: 0 }` dropped — ops already sets it; .qv is a div) */
/* quote body-level rules rehomed onto .qv — the pane, not the page, is the "body".
   Unification: background is TRANSPARENT so the quote view sits on the ops .main surface
   (cream + saffron/teal radials + noise texture) exactly like the Bookings #view does —
   one continuous console surface, not a second reskinned panel. */
.qv {
  font-family: var(--sans);
  color: var(--ink);
  background: transparent;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.45;
}
.qv h1, .qv h2, .qv h3 { margin: 0; font-weight: 600; }
.qv input, .qv select, .qv textarea, .qv button { font-family: inherit; }

/* ---------- App shell ---------- */
.qv .ch-app { min-height: 100vh; padding-bottom: 64px; }
.qv .ch-container { max-width: 1340px; margin: 0 auto; padding: 0 22px; }

/* ---------- Header ---------- */
.qv .ch-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,.82);
  backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--line);
}
.qv .ch-header-in { max-width: 1340px; margin: 0 auto; padding: 12px 22px; display: flex; align-items: center; gap: 14px; }
/* The espresso rail brands the console; the detail header is a back button, the current
   quote's identity, its status pill, and the maker-checker action bar (right-aligned). */
/* Current-quote identity in the detail header: reference + customer name */
.qv .ch-quoteref { line-height: 1.15; min-width: 0; }
.qv .ch-quoteref b { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .3px; color: var(--ink); display: block; }
.qv .ch-quoteref span { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; max-width: 180px; }
.qv .ch-header-spacer { flex: 1; }
.qv .ch-header-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

/* ---------- Back to queue ---------- */
/* D4: quiet saved-state chip beside the status pill — autosave speaks softly. */
.qv .ch-savestate { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--muted-2); white-space: nowrap; }
.qv .ch-savestate-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; transition: background .4s cubic-bezier(.23,.9,.32,1); }
.qv .ch-savestate.saved { color: var(--teal-d); }
.qv .ch-savestate.dirty { color: #b06a00; }
.qv .ch-savestate.saving { color: var(--muted); }
.qv .ch-savestate.saving .ch-savestate-dot { animation: ch-save-pulse 1s ease-in-out infinite; }
.qv .ch-savestate.error { color: var(--red); }
@keyframes ch-save-pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
.qv .ch-back { border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft); border-radius: 9px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.qv .ch-back:hover { border-color: var(--blue); color: var(--blue-d); }
/* ---------- Status pill (read-only) ---------- */
.qv .ch-status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; letter-spacing: .01em; padding: 5px 12px; border-radius: 999px; white-space: nowrap; border: 1px solid transparent; }
.qv .ch-status-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
.qv .ch-status-pill.tone-slate { color: #5b6472; background: #eef1f5; border-color: #e2e7ee; }
.qv .ch-status-pill.tone-amber { color: #9a6410; background: #fdf3e0; border-color: #f6e3c0; }
.qv .ch-status-pill.tone-teal { color: #0a7d78; background: #dff5f3; border-color: #bfe9e5; }
.qv .ch-status-pill.tone-blue { color: #2660c4; background: #e7eefb; border-color: #cfddf6; }
.qv .ch-status-pill.tone-green { color: #1f8a4c; background: #e4f5ea; border-color: #c7ead4; }
.qv .ch-status-pill.tone-red { color: #c0362a; background: #fbe8e6; border-color: #f4cec9; }
.qv .ch-status-pill.tone-muted { color: #8a8378; background: #f1efea; border-color: #e6e2da; }
/* ---------- Review banner ---------- */
.qv .ch-review-banner { display: flex; align-items: baseline; gap: 8px; padding: 7px 12px; border-radius: 999px; margin-bottom: 10px; border: 1px solid transparent; width: fit-content; max-width: 100%; }
.qv .ch-review-banner b { font-size: 12.5px; font-weight: 700; white-space: nowrap; }
.qv .ch-assign { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.qv .ch-assign-lbl { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
.qv .ch-assign-sel { font: inherit; font-size: 13px; padding: 6px 10px; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--paper); color: var(--ink); cursor: pointer; }
.qv .ch-assign-sel:focus-visible { outline: 2px solid var(--teal); outline-offset: 1px; }
.qv .ch-head-assign { max-width: 148px; font-size: 12.5px; font-weight: 600; padding: 7px 9px; color: var(--ink-soft); }
.qv .ch-head-assign.mine { color: #0a7d78; background: #dff5f3; border-color: #bfe9e5; }
.qv .ch-head-assign.none { color: var(--ink-faint); border-style: dashed; border-color: var(--cream-deep); }
.qv .ch-assign-audit { font-size: 11.5px; color: var(--ink-faint); margin-left: auto; }
.qv .ch-review-banner span { font-size: 12px; opacity: .85; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qv .ch-review-banner.tone-amber { background: #fdf3e0; border-color: #f6e3c0; color: #7a4f0c; }
.qv .ch-review-banner.tone-teal { background: #dff5f3; border-color: #bfe9e5; color: #0a6f6a; }
/* ---------- Send-back note composer (founder) ---------- */
.qv .ch-sendback { background: var(--surface-warm); border: 1.5px solid #f0d9a8; border-radius: var(--r-sm); padding: 13px 15px; margin-bottom: 16px; }
.qv .ch-sendback-label { display: block; font-size: 13px; font-weight: 700; color: #7a4f0c; margin-bottom: 7px; }
.qv .ch-sendback-note { width: 100%; }
.qv .ch-sendback-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 9px; }

/* ---------- Layout grid ---------- */
.qv .ch-main { padding-top: 22px; display: grid; grid-template-columns: minmax(0, 1.62fr) minmax(320px, .92fr); gap: 20px; align-items: start; }
.qv .ch-col-l { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.qv .ch-col-r { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 86px; }
.qv .ch-output-wrap { margin-top: 20px; }
@container qv (max-width: 1080px) {
  .qv .ch-main { grid-template-columns: 1fr; }
  .qv .ch-col-r { position: static; }}

/* ---------- Card ---------- */
.qv .ch-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-card); overflow: hidden; }
.qv .ch-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--line-soft); }
.qv .ch-card-head-l { display: flex; align-items: center; gap: 11px; }
.qv .ch-card-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
.qv .ch-card-head-l { min-width: 0; }
.qv .ch-card-icon { width: 26px; height: 26px; border-radius: 8px; background: var(--black); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 600; opacity: .92; }
.qv .ch-card-head-r { display: flex; align-items: center; gap: 10px; }
.qv .ch-chev { font-size: 19px; color: var(--muted); transition: transform .2s; line-height: 1; }
.qv .ch-chev.open { transform: rotate(180deg); }
.qv .ch-card-body { padding: 18px; }
.qv .ch-card-body.nopad { padding: 0; }
.qv .ch-head-tools { display: flex; align-items: center; gap: 8px; }

/* ---------- Fields ---------- */
.qv .ch-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
.qv .ch-row:last-child { margin-bottom: 0; }
.qv .ch-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0; }
.qv .ch-field-label { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: flex; align-items: center; gap: 3px; }
.qv .ch-field-label .req { color: var(--red); font-style: normal; }
.qv .ch-field-label .ch-opt { color: var(--muted); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 9.5px; opacity: .8; }
.qv .ch-field-hint { font-size: 11px; color: var(--red); }
.qv .ch-card-body > .ch-field { margin-top: 14px; }

.qv .ch-input-wrap { display: flex; align-items: center; gap: 0; background: var(--surface); border: 1.5px solid var(--line); border-radius: var(--r-sm); padding: 0 10px; transition: border-color .15s, box-shadow .15s; }
.qv .ch-input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,185,182,.18); }
.qv .ch-input-wrap.invalid { border-color: var(--red); }
.qv .ch-input { width: 100%; border: none; background: none; outline: none; padding: 9px 0; font-size: 14px; color: var(--ink); min-width: 0; }
.qv .ch-input::placeholder { color: var(--muted-2); }
.qv .ch-input-prefix, .qv .ch-input-suffix { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
.qv .ch-input-prefix { padding-right: 6px; }
.qv .ch-input-suffix { padding-left: 6px; }
.qv .ch-textarea { padding: 9px 10px; resize: vertical; border: 1.5px solid var(--line); border-radius: var(--r-sm); line-height: 1.5; }
.qv .ch-textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,185,182,.18); }

/* ---------- Segmented ---------- */
.qv .ch-seg { display: inline-flex; background: var(--cream); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 3px; gap: 3px; width: 100%; }
.qv .ch-seg-btn { flex: 1; border: none; background: none; padding: 7px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.qv .ch-seg-btn.active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }
.qv .ch-seg.sm .ch-seg-btn { padding: 5px 8px; font-size: 12px; }

/* ---------- Toggle ---------- */
.qv .ch-toggle-row { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
.qv .ch-toggle { width: 38px; height: 22px; border-radius: 999px; background: var(--cream-d); position: relative; transition: background .18s; flex: none; border: 1px solid var(--line); }
.qv .ch-toggle.on[data-tone="blue"] { background: var(--blue); border-color: var(--blue); }
.qv .ch-toggle.on[data-tone="teal"] { background: var(--teal); border-color: var(--teal); }
.qv .ch-toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--surface); transition: transform .18s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.qv .ch-toggle.on .ch-toggle-knob { transform: translateX(16px); }
.qv .ch-toggle-label { font-size: 12.5px; font-weight: 600; color: var(--ink); }

/* ---------- Check ---------- */
.qv .ch-check { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--ink); }
.qv .ch-check input { display: none; }
.qv .ch-check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line); display: grid; place-items: center; color: #fff; font-size: 12px; background: var(--surface); transition: all .15s; }
.qv .ch-check input:checked + .ch-check-box { background: var(--blue); border-color: var(--blue); }

/* ---------- Buttons ---------- */
.qv .ch-btn { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.qv .ch-btn:disabled { opacity: .45; cursor: not-allowed; }
.qv .ch-btn-icon { font-size: 13px; line-height: 1; }
.qv .ch-btn-sm { padding: 6px 10px; font-size: 12px; }
.qv .ch-btn-primary { background: var(--blue); color: #fff; box-shadow: 0 2px 0 var(--blue-d); }
.qv .ch-btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
.qv .ch-btn-teal { background: var(--teal); color: #fff; box-shadow: 0 2px 0 var(--teal-d); }
.qv .ch-btn-dark { background: var(--black); color: #fff; }
.qv .ch-btn-dark:hover { filter: brightness(1.2); }
.qv .ch-btn-outline { background: var(--surface); color: var(--ink); border: 1.5px solid var(--line); }
.qv .ch-btn-outline:hover { border-color: var(--blue); color: var(--blue-d); }
.qv .ch-btn-ghost { background: var(--cream); color: var(--ink); }
.qv .ch-btn-ghost:hover { background: var(--cream-d); }
.qv .ch-btn-ghostdanger { background: none; color: var(--muted); padding: 6px 9px; }
.qv .ch-btn-ghostdanger:hover { background: rgba(236,58,36,.1); color: var(--red); }
.qv .ch-btn-dashed { background: var(--surface); color: var(--muted); border: 1.5px dashed var(--line); }
.qv .ch-btn-dashed:hover { border-color: var(--orange); color: var(--orange); background: var(--surface-warm); }

/* ---------- Badge ---------- */
.qv .ch-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.qv .ch-badge.tone-slate { background: var(--cream); color: var(--muted); }
.qv .ch-badge.tone-blue { background: rgba(10,185,182,.16); color: var(--blue-d); }
.qv .ch-badge.tone-teal { background: rgba(10,185,182,.14); color: var(--teal-d); }
.qv .ch-badge.tone-orange { background: rgba(249,164,41,.16); color: #c47d12; }
.qv .ch-badge.tone-red { background: rgba(236,58,36,.13); color: var(--red); }

/* ---------- Rate settings ---------- */
.qv .ch-lock-note { background: var(--cream); border-radius: var(--r-md); padding: 11px 14px; font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
.qv .ch-rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
.qv .ch-rate-grid.disabled { opacity: .55; pointer-events: none; }
.qv .ch-rate-col { display: flex; flex-direction: column; gap: 3px; }
.qv .ch-rate-group-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue-d); margin: 12px 0 4px; }
.qv .ch-rate-col .ch-rate-group-title:first-child { margin-top: 0; }
.qv .ch-rate-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 0; }
.qv .ch-rate-label { font-size: 13px; font-weight: 500; display: flex; flex-direction: column; }
.qv .ch-rate-hint { font-size: 10.5px; color: var(--muted-2); }
.qv .ch-rate-control { width: 132px; flex: none; }
@media (max-width: 620px) { .qv .ch-rate-grid { grid-template-columns: 1fr; gap: 8px; }}

/* ---------- Itinerary (premium timeline) ---------- */
.qv .ch-empty { padding: 48px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.qv .ch-empty-icon { font-size: 34px; }
.qv .ch-empty-title { color: var(--muted); font-size: 14px; }

.qv .ch-timeline-wrap { padding: 22px 24px 8px; }
.qv .ch-timeline { position: relative; }

.qv .ch-tl-item { position: relative; display: grid; grid-template-columns: 30px 1fr; gap: 16px; }
.qv .ch-tl-rail { position: relative; display: flex; justify-content: center; }
/* continuous line down the rail */
.qv .ch-tl-item:not(:last-child) .ch-tl-rail::before { content: ''; position: absolute; top: 6px; bottom: -6px; left: 50%; transform: translateX(-50%); width: 2px; border-left: 2px dotted var(--muted-2); opacity: .55; }
.qv .ch-marker { position: relative; z-index: 1; width: 18px; height: 18px; border-radius: 50%; margin-top: 4px; display: grid; place-items: center; font-size: 9px; color: #fff; box-shadow: 0 0 0 4px var(--paper); flex: none; }
.qv .ch-marker.tone-teal { background: var(--teal); }
.qv .ch-marker.tone-red { background: var(--red); }
.qv .ch-marker.tone-blue { background: var(--blue); }
.qv .ch-marker.ring { background: var(--surface); border: 2.5px solid var(--blue); }
.qv .ch-marker.stay { background: var(--surface); border: 2px dashed var(--muted-2); color: var(--muted); }

.qv .ch-tl-body { min-width: 0; padding-bottom: 8px; }

/* card */
.qv .ch-tl-card { background: var(--paper); border: 1.5px solid var(--line); border-radius: 16px; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; transition: border-color .15s, box-shadow .15s; }
.qv .ch-tl-card:hover { border-color: var(--cream-d); box-shadow: var(--shadow-card); }
.qv .ch-tl-card.tone-teal { border-top: 3px solid var(--teal); }
.qv .ch-tl-card.tone-red { border-top: 3px solid var(--red); }
.qv .ch-tl-card.tone-blue { border-top: 3px solid var(--blue); }

.qv .ch-tl-head { display: flex; align-items: center; gap: 10px; }
.qv .ch-tl-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px; padding: 4px 10px; border-radius: 999px; flex: none; }
.qv .ch-tl-tag.tone-teal { background: rgba(10,185,182,.13); color: var(--teal-d); }
.qv .ch-tl-tag.tone-red { background: rgba(236,58,36,.11); color: var(--red); }
.qv .ch-tl-tag.tone-blue { background: rgba(10,185,182,.16); color: var(--blue-d); }
.qv .ch-tl-cat { width: 175px; }
.qv .ch-tl-cat .ch-input-wrap { padding: 0 10px; }
.qv .ch-tl-cat .ch-input { padding: 6px 0; font-size: 12.5px; font-weight: 500; }
.qv .ch-tl-actions { margin-left: auto; display: flex; gap: 6px; }
.qv .ch-icon-btn { width: 30px; height: 30px; border: 1.5px solid var(--line); background: var(--surface); border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); display: grid; place-items: center; transition: all .15s; }
.qv .ch-icon-btn:hover { border-color: var(--blue); color: var(--blue-d); }
.qv .ch-icon-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(236,58,36,.06); }

.qv .ch-tl-title-field { display: flex; flex-direction: column; gap: 4px; }
.qv .ch-tl-title-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); }
.qv .ch-tl-route { display: flex; align-items: flex-end; gap: 12px; }
.qv .ch-tl-route .ch-tl-title-field { flex: 1 1 0; min-width: 0; }
.qv .ch-route-sep { font-size: 22px; color: var(--muted-2); padding-bottom: 9px; flex: none; }
@media (max-width: 560px) { .qv .ch-tl-route { flex-direction: column; align-items: stretch; gap: 8px; } .qv .ch-route-sep { display: none; }}

/* place autocomplete */
.qv .ch-ac { position: relative; }
.qv .ch-tl-title-field .ch-ac { width: 100%; }
.qv .ch-ac-menu { position: absolute; top: calc(100% + 5px); left: 0; right: 0; min-width: 230px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-pop); padding: 6px; z-index: 60; max-height: 264px; overflow-y: auto; overscroll-behavior: contain; }
.qv .ch-ac-item { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: none; padding: 9px 10px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; color: var(--ink); font-family: var(--sans); }
.qv .ch-ac-item:hover, .qv .ch-ac-item.hi { background: var(--cream); }
.qv .ch-ac-item.loading { cursor: default; color: var(--muted); }
.qv .ch-ac-item.loading:hover { background: none; }
.qv .ch-ac-pin { font-size: 13px; flex: none; opacity: .85; }
.qv .ch-ac-name { font-weight: 400; color: var(--muted); }
.qv .ch-ac-name b { font-weight: 700; color: var(--ink); }
.qv .ch-ac-source { margin-left: auto; flex: none; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; font-weight: 700; color: var(--teal-deep); }
.qv .ch-ac-item.loading .ch-ac-source { color: var(--muted); }
.qv .ch-tl-title { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); border: 1.5px solid var(--line); background: var(--surface); outline: none; padding: 7px 12px; border-radius: 10px; width: 100%; line-height: 1.2; transition: border-color .15s, box-shadow .15s; }
.qv .ch-tl-title:hover { border-color: var(--cream-d); }
.qv .ch-tl-title:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,185,182,.18); }
.qv .ch-tl-title::placeholder { color: var(--muted-2); font-style: italic; font-weight: 600; }

.qv .ch-tl-from { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: -4px; }
.qv .ch-from-lbl { font-size: 12px; color: var(--muted); }
.qv .ch-from-in { border: none; border-bottom: 1.5px solid var(--line); background: none; padding: 2px 2px; font-size: 13.5px; font-weight: 500; color: var(--ink); outline: none; min-width: 80px; max-width: 180px; }
.qv .ch-from-in:focus { border-bottom-color: var(--blue); }
.qv .ch-from-in::placeholder { color: var(--muted-2); font-weight: 400; }

.qv .ch-tl-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.qv .ch-meta-date { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 999px; padding: 5px 12px; font-size: 12.5px; }
.qv .ch-meta-date .ch-meta-ic { font-size: 12px; opacity: .8; }
.qv .ch-meta-date input { border: none; background: none; outline: none; font-family: inherit; font-size: 12.5px; color: var(--ink); font-weight: 500; }
.qv .ch-meta-dist { display: flex; align-items: center; }
.qv .ch-dist-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 500; padding: 5px 12px; border-radius: 999px; background: var(--cream); color: var(--ink); }
.qv .ch-dist-pill.auto { background: rgba(10,185,182,.12); color: var(--blue-d); }
.qv .ch-dist-pill.warn { background: rgba(249,164,41,.13); color: #b9760f; }
/* route choice (2026-07-20): expressway vs local-road picker, rendered inline (never a popover
   — background estimate renders wipe floating DOM) */
.qv .ch-route-pick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.qv .ch-route-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 999px; background: var(--cream); color: var(--ink); border: 1px solid transparent; cursor: pointer; }
.qv .ch-route-pill.is-active { background: rgba(10,185,182,.12); color: var(--blue-d); border-color: rgba(10,185,182,.35); }
.qv .ch-dist-manual { display: flex; align-items: center; gap: 7px; }
.qv .ch-link { border: none; background: none; color: currentColor; font-size: 11px; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; opacity: .75; }
.qv .ch-link:hover { opacity: 1; }
.qv .ch-meta-price { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; flex: none; }
.qv .ch-price-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted-2); white-space: nowrap; }
.qv .ch-price-val { font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--ink); }

/* driver / car stay toggles */
.qv .ch-tl-stays { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--line-soft); }
.qv .ch-stay-toggle { display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid var(--line); background: var(--surface); border-radius: 10px; padding: 7px 12px; cursor: pointer; transition: all .15s; }
.qv .ch-stay-toggle:hover { border-color: var(--muted-2); }
.qv .ch-stay-ic { font-size: 15px; filter: grayscale(.4); opacity: .7; }
.qv .ch-stay-lb { font-size: 13px; font-weight: 600; color: var(--muted); }
.qv .ch-stay-state { font-size: 9px; font-weight: 800; letter-spacing: .6px; color: var(--muted-2); background: var(--cream); border-radius: 5px; padding: 2px 5px; }
.qv .ch-stay-toggle.on { background: var(--surface); }
.qv .ch-stay-toggle.on .ch-stay-ic { filter: none; opacity: 1; }
.qv .ch-stay-toggle.on .ch-stay-lb { color: var(--ink); }
.qv .ch-stay-toggle.on.tone-teal { border-color: var(--teal); background: rgba(10,185,182,.07); }
.qv .ch-stay-toggle.on.tone-teal .ch-stay-state { background: var(--teal); color: #fff; }
.qv .ch-stay-toggle.on.tone-blue { border-color: var(--blue); background: rgba(10,185,182,.08); }
.qv .ch-stay-toggle.on.tone-blue .ch-stay-state { background: var(--blue); color: #fff; }
.qv .ch-stays-note { font-size: 11.5px; color: var(--teal-d); font-weight: 600; }

.qv .ch-tl-fees { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.qv .ch-fee { display: inline-flex; align-items: center; gap: 9px; }
.qv .ch-note-in { border: 1px solid var(--line); background: var(--surface-warm); border-radius: var(--r-sm); padding: 8px 11px; font-size: 12.5px; outline: none; font-family: inherit; color: var(--ink); width: 100%; }
.qv .ch-note-in:focus { border-color: var(--blue); background: var(--surface); }

.qv .ch-timeline-add { display: flex; gap: 10px; padding: 6px 0 4px 46px; flex-wrap: wrap; }
.qv .ch-timeline-hint { padding: 12px 24px 18px 46px; font-size: 12px; color: var(--muted); }
.qv .ch-timeline-hint b { color: var(--ink); font-weight: 600; }

.qv .ch-cur-toggle { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--muted); font-weight: 500; }
.qv .ch-cur-toggle .ch-seg { width: 100px; }

/* ---------- Summary ---------- */
/* .ch-km base kept — the money-pane km line reuses .ch-km.hero (overridden there). */
.qv .ch-km b { font-family: var(--serif); font-weight: 700; line-height: 1; }
.qv .ch-line { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 4px 0; font-size: 13px; }
/* Label may wrap (e.g. the long chauffeur "Distance — … (buffered + idle)" line, or a
   long place-pair leg label) instead of overrunning the row and clipping the amount.
   min-width:0 lets it shrink in the flex row; the amount stays fixed-width and never wraps,
   and align-items:baseline pins it to the label's FIRST line (top-right). */
.qv .ch-line-label { color: var(--muted); min-width: 0; overflow-wrap: anywhere; }
.qv .ch-line-label i { font-style: normal; color: var(--muted-2); font-size: 11.5px; }
.qv .ch-line-val { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; flex: none; }
.qv .ch-line.strong { border-top: 1px solid var(--line); margin-top: 5px; padding-top: 9px; }
.qv .ch-line.strong .ch-line-label { color: var(--ink); font-weight: 600; }
.qv .ch-line.strong .ch-line-val { font-family: var(--serif); font-size: 21px; font-weight: 700; }
/* USD-primary display: small muted LKR reference under a value */
.qv .ch-val-sub { display: block; font-size: 10.5px; font-weight: 400; color: var(--muted-2); font-family: var(--sans); line-height: 1.3; text-align: right; }
.qv .ch-margin { font-size: 11.5px; color: var(--teal-d); text-align: right; margin-top: 3px; font-weight: 600; }
.qv .ch-tip { background: rgba(10,185,182,.1); border-radius: var(--r-md); padding: 11px 13px; font-size: 12.5px; color: var(--black); margin-top: 13px; line-height: 1.5; }
.qv .ch-tip b { color: var(--blue-d); }

/* ---------- Flags ---------- */
.qv .ch-flags-clear { color: var(--teal-d); font-size: 13px; font-weight: 500; padding: 4px 0; }
.qv .ch-flags { display: flex; flex-direction: column; gap: 9px; }
.qv .ch-flag { display: flex; gap: 11px; padding: 11px 13px; border-radius: var(--r-md); }
.qv .ch-flag-mark { font-size: 13px; line-height: 1.4; flex: none; }
.qv .ch-flag.tone-red { background: rgba(236,58,36,.08); }
.qv .ch-flag.tone-red .ch-flag-mark { color: var(--red); }
.qv .ch-flag.tone-orange { background: rgba(249,164,41,.1); }
.qv .ch-flag.tone-orange .ch-flag-mark { color: var(--orange); }
.qv .ch-flag.tone-blue { background: rgba(10,185,182,.1); }
.qv .ch-flag.tone-blue .ch-flag-mark { color: var(--blue-d); }
.qv .ch-flag-title { font-weight: 600; font-size: 13px; }
.qv .ch-flag-detail { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 2px; }

/* ---------- Output ---------- */
.qv .ch-tabs { display: flex; gap: 4px; background: var(--cream); padding: 4px; border-radius: var(--r-md); margin-bottom: 14px; }
.qv .ch-tab { flex: 1; border: none; background: none; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.qv .ch-tab.active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 3px rgba(58,55,57,.12); }
.qv .ch-output-body { min-height: 120px; }
.qv .ch-pre { font-family: var(--sans); font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--cream); border-radius: var(--r-md); padding: 16px 18px; margin: 0; color: var(--ink); }
.qv .ch-pre.mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; }
.qv .ch-output-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.qv .ch-output-hint { font-size: 12px; color: var(--muted); line-height: 1.45; }
.qv .ch-output-editor { width: 100%; min-height: 320px; border: 1px solid var(--line); resize: vertical; }
.qv .ch-output-editor:focus { outline: none; border-color: rgba(10,185,182,.55); box-shadow: 0 0 0 3px rgba(10,185,182,.12); }
.qv .ch-email-subject { font-size: 13px; margin-bottom: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm); }
.qv .ch-email-subject span { font-size: 10.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted-2); margin-right: 8px; }
.qv .ch-internal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.qv .ch-internal-grid > div { background: var(--cream); border-radius: var(--r-sm); padding: 9px 11px; }
.qv .ch-internal-grid span { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted-2); display: block; }
.qv .ch-internal-grid b { font-size: 13.5px; }
.qv .ch-itable { width: 100%; border-collapse: collapse; }
.qv .ch-itable td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--line-soft); }
.qv .ch-itable td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
.qv .ch-itable tr.sec td { color: var(--muted); }
.qv .ch-itable tr.hi td { font-weight: 700; }
.qv .ch-itable tr.hi.blue td:last-child { color: var(--blue-d); }
.qv .ch-itable tr.hi.teal td:last-child { color: var(--teal-d); }
.qv .ch-internal-note { font-size: 11.5px; color: var(--muted-2); margin-top: 12px; font-style: italic; }
@media (max-width: 520px) { .qv .ch-internal-grid { grid-template-columns: repeat(2, 1fr); }}

/* ---------- Toast ---------- */
/* T5: fixed→absolute — .qv is position:relative, so the toast centers in the
   quote pane rather than the full viewport (which includes the ops rail). */
.qv .ch-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: #fff; padding: 12px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-pop); opacity: 0; pointer-events: none; transition: all .25s; z-index: 950; display: flex; align-items: center; gap: 8px; }
.qv .ch-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.qv .ch-toast .tick { color: var(--teal); }

/* ---------- Recent quotes ---------- */
/* ══════════════════════════════════════════════════════════════════════════
   COCKPIT LAYOUT (two-pane) — reuses every brand token above
   ══════════════════════════════════════════════════════════════════════════ */

/* header extras */
.qv .ch-header-tools .ch-btn-sm { padding: 7px 11px; }

/* two-pane grid */
.qv .ch-cockpit { padding-top: 20px; display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 20px; align-items: start; }
.qv .ch-editor { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.qv .ch-money { position: sticky; top: 84px; display: flex; flex-direction: column; gap: 0; }
@container qv (max-width: 960px) {
  .qv .ch-cockpit { grid-template-columns: 1fr; }
  .qv .ch-money { position: static; }}

/* section micro-label (matches the customer-strip label style — no serif floaters) */
.qv .ch-sec { }
.qv .ch-sec-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 6px 0 10px; }
.qv .ch-sec-head h2 { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.qv .ch-sec-head-r { display: flex; align-items: center; gap: 8px; }

/* ---------- Customer strip (one compact row) ---------- */
.qv .ch-cust-strip { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-card); padding: 12px 14px; container-type: inline-size; container-name: custstrip; }
.qv .ch-cust-grid { display: grid; grid-template-columns: minmax(110px, 1fr) minmax(110px, 1fr) minmax(160px, 1.4fr) 84px 84px; gap: 12px; align-items: end; }
.qv .ch-cust-grid .ch-field { gap: 4px; }
.qv .ch-cust-grid .ch-field-label { font-size: 10px; letter-spacing: .5px; }
.qv .ch-cust-grid .ch-input { padding: 7px 0; }
.qv .ch-input-wrap:has(.ch-input.invalid) { border-color: var(--red); box-shadow: 0 0 0 3px rgba(236,58,36,.12); }
.qv .ch-field-err { font-size: 10.5px; color: var(--red); margin-top: 4px; line-height: 1.35; display: none; }
.qv .ch-field:has(.ch-input.invalid) .ch-field-err { display: block; }
/* Wrap to two columns off the STRIP's own width, not the viewport: the editor column is sized by
   the container layout (rail + 360px price pane), so a viewport media query fires at the wrong
   width and lets the 5-col grid overflow — same reason .ch-cockpit uses @container qv (see line ~305). */
@container custstrip (max-width: 620px) { .qv .ch-cust-grid { grid-template-columns: 1fr 1fr; }}
/* Trip basics: vehicle chips sit under the customer grid (no double padding), divider between */
.qv .ch-basics-rule { height: 1px; background: var(--line-soft); margin: 13px 0 3px; }
.qv .ch-cust-strip .ch-veh-chips { padding: 0; }
/* Itinerary locked until a vehicle is chosen */
.qv .ch-itin-locked { text-align: center; padding: 30px 18px; border: 1.5px dashed var(--line); border-radius: var(--r-md); background: var(--surface-warm); }
.qv .ch-itin-locked-icon { font-size: 24px; }
.qv .ch-itin-locked-title { font-weight: 700; font-size: 14px; color: var(--ink); margin-top: 6px; }
.qv .ch-itin-locked-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
/* Foot of the itinerary (2026-07-22): internal notes on the left, a PORTRAIT route map on the
   right. The map went vertical because Sri Lanka is a teardrop (tall, narrow), which frees the
   space on its left for the ops-only notes scratchpad. Wraps to stacked on a narrow pane. */
.qv .ch-itin-aside { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; align-items: stretch; }
/* Notes is now a CARD that mirrors the route-map card beside it (same frame + header bar),
   so the two read as a matched pair instead of a raw textarea next to a finished card. It
   stretches to the map's height when the map is open (no empty void); its own min-height
   keeps it usable when the map is collapsed (the map opts out of stretch — see below). */
.qv .ch-notes-block { flex: 1 1 240px; min-width: 0; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; background: var(--paper); transition: border-color .15s, box-shadow .15s; }
.qv .ch-notes-block:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,185,182,.18); }
.qv .ch-notes-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 15px; border-bottom: 1px solid var(--line); }
.qv .ch-note-label { font-size: 13px; font-weight: 600; color: var(--ink-soft); margin: 0; display: inline-flex; align-items: center; gap: 8px; }
.qv .ch-note-ico { color: var(--teal-d); flex: none; }
.qv .ch-notes-cap { font-size: 11px; color: var(--muted); flex: none; }
.qv .ch-notes-area { flex: 1 1 auto; min-height: 128px; width: 100%; box-sizing: border-box; resize: none; border: 0; border-radius: 0; background: transparent; padding: 12px 15px; font: inherit; font-size: 13px; line-height: 1.5; color: var(--ink); outline: none; }
.qv .ch-notes-area::placeholder { color: var(--muted); }
/* Collapsible PORTRAIT route map — a fixed-width right column (see .ch-itin-aside) */
/* align-self:flex-start opts the map out of the row's stretch — a collapsed map stays its
   own short height (no whitespace under the toggle) while the notes card fills the row. */
.qv .ch-map-block { flex: 0 1 290px; align-self: flex-start; margin-top: 0; border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; background: var(--paper); }
.qv .ch-map-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 15px; background: none; border: 0; cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; color: var(--ink-soft); transition: background .15s, color .15s; }
.qv .ch-map-toggle:hover { background: var(--cream); color: var(--ink); }
.qv .ch-map-toggle-lbl { display: inline-flex; align-items: center; gap: 8px; }
.qv .ch-map-pin { width: 15px; height: 15px; color: var(--teal-d); flex: none; }
.qv .ch-map-chev { display: inline-block; font-size: 15px; color: var(--muted); transition: transform .22s; transform: rotate(180deg); }
.qv .ch-map-block.open .ch-map-toggle { border-bottom: 1px solid var(--line); }
.qv .ch-map-block.open .ch-map-chev { transform: rotate(0deg); color: var(--teal-d); }
.qv .ch-itin-map-slot { animation: chMapIn .26s cubic-bezier(.2,.7,.3,1); }
.qv .ch-itin-map { width: 100%; height: 360px; background: var(--line-soft); display: block; }
.qv .ch-itin-map-note { padding: 22px; text-align: center; color: var(--muted); font-size: 12.5px; }
@keyframes chMapIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

/* ---------- Dense itinerary rows ---------- */
.qv .ch-legs { display: flex; flex-direction: column; gap: 12px; container-type: inline-size; container-name: legs; }
/* .ch-leg also carries .ch-tl-item (e2e hook) whose legacy timeline rule sets
   display:grid — override it back to a plain block so the two rows stack. */
.qv .ch-leg.ch-tl-item { display: block; grid-template-columns: none; gap: 0; }
.qv .ch-leg { position: relative; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-card); overflow: visible; transition: border-color .15s, box-shadow .15s; }
.qv .ch-leg:hover { border-color: var(--cream-d); }
.qv .ch-leg.tone-teal { border-left: 3px solid var(--teal); }
.qv .ch-leg.tone-red { border-left: 3px solid var(--red); }
.qv .ch-leg.tone-blue { border-left: 3px solid var(--blue); }
.qv .ch-leg.tone-stay { border-left: 3px dashed var(--muted-2); }

/* main compact row (~56px) */
.qv .ch-leg-main { display: flex; align-items: center; gap: 10px; padding: 9px 12px; min-height: 56px; }
.qv .ch-leg-reorder { display: flex; flex-direction: column; gap: 2px; flex: none; }
.qv .ch-mini-btn { width: 22px; height: 20px; border: 1px solid var(--line); background: var(--surface); border-radius: 6px; cursor: pointer; font-size: 11px; color: var(--muted); display: grid; place-items: center; line-height: 1; padding: 0; transition: all .15s; }
.qv .ch-mini-btn:hover { border-color: var(--blue); color: var(--blue-d); }
.qv .ch-mini-btn:disabled { opacity: .3; cursor: default; }
.qv .ch-mini-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* numbered leg badge (leg N of the itinerary) — stay legs keep the small dashed dot */
.qv .ch-leg-dot { width: 18px; height: 18px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; line-height: 1; }
.qv .ch-leg-dot.tone-teal { background: var(--teal); }
.qv .ch-leg-dot.tone-red { background: var(--red); }
.qv .ch-leg-dot.tone-blue { background: var(--blue); }
.qv .ch-leg-dot.tone-stay { width: 10px; height: 10px; background: var(--surface); border: 2px dashed var(--muted-2); }

/* route inputs — normal 14px, not the 21px serif */
.qv .ch-leg-route { display: flex; align-items: center; gap: 7px; flex: 1 1 auto; min-width: 0; }
.qv .ch-leg-ac { position: relative; flex: 1 1 0; min-width: 60px; }
.qv .ch-leg-in { width: 100%; border: 1px solid var(--line); background: var(--surface); border-radius: 7px; padding: 7px 9px; font-size: 14px; font-weight: 500; color: var(--ink); outline: none; font-family: var(--sans); transition: border-color .15s, box-shadow .15s; min-width: 0; }
.qv .ch-leg-in:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,185,182,.16); }
.qv .ch-leg-in::placeholder { color: var(--muted-2); }
.qv .ch-leg-arrow { color: var(--muted-2); font-size: 14px; flex: none; }

.qv .ch-leg-date { flex: none; }
.qv .ch-leg-date input { border: 1px solid var(--line); background: var(--cream); border-radius: 7px; padding: 6px 8px; font-size: 12px; font-family: inherit; color: var(--ink); outline: none; }
.qv .ch-leg-date input:focus { border-color: var(--blue); background: var(--surface); }
.qv .ch-leg-date.invalid input { border-color: var(--red); background: rgba(236,58,36,.06); }
.qv .ch-leg-date-hint { display: block; font-size: 10px; font-weight: 600; color: var(--red); margin-top: 3px; text-align: center; }

.qv .ch-leg-dist { flex: none; display: flex; align-items: center; gap: 4px; }
.qv .ch-leg-price { flex: none; font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--ink); min-width: 54px; text-align: right; }
.qv .ch-leg-price.empty { color: var(--muted-2); font-family: var(--sans); font-size: 12px; font-weight: 500; }
.qv .ch-leg-actions { display: flex; gap: 4px; flex: none; }

/* second thin line: add-ons chip row (always present on point-to-point driving legs) */
.qv .ch-leg-addonrow { padding: 0 12px 8px 44px; margin-top: -2px; display: flex; align-items: center; gap: 16px; }
/* empty state: a quiet inline text action, not an orphaned button */
.qv .ch-addon-add { border: none; background: none; color: var(--muted); font-size: 11.5px; font-weight: 500; cursor: pointer; padding: 0; }
.qv .ch-addon-add:hover { color: var(--orange); text-decoration: underline; text-underline-offset: 2px; }
/* active state: a solid pill naming the fees */
.qv .ch-addon-chip.on { display: inline-flex; align-items: center; gap: 4px; border: 1px solid transparent; background: rgba(249,164,41,.13); color: #b9760f; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
.qv .ch-addon-chip.on:hover { border-color: rgba(185,118,15,.4); }
.qv .ch-dist-time { color: var(--muted); font-weight: 400; margin-left: 5px; padding-left: 6px; border-left: 1px solid currentColor; opacity: .55; }

/* second thin line: add-on toggles (only when the popover is open) */
.qv .ch-leg-addons { padding: 8px 12px 10px 44px; border-top: 1px solid var(--line-soft); display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

/* Multi-stop rides (Task 8 + route-rail restyle): a 3+-stop leg renders its stop chain
   as a vertical list in a dedicated block BELOW the main row (.ch-leg-stoplist — the main
   row becomes a tone-tinted header band), connected by a continuous rail line in the
   leg's tone color: one dot per stop (destination ringed), one thin per-segment distance
   row hanging off the rail between consecutive stops. This makes each leg read as ONE
   ride, so consecutive legs stay visually separate even when both are expanded. */
.qv .ch-leg.is-multistop .ch-leg-main { min-height: 46px; border-bottom: 1px solid var(--line-soft); border-radius: calc(var(--r-md) - 2px) calc(var(--r-md) - 2px) 0 0; }
.qv .ch-leg.is-multistop.tone-teal .ch-leg-main { background: rgba(10,185,182,.06); }
.qv .ch-leg.is-multistop.tone-blue .ch-leg-main { background: rgba(10,185,182,.06); }
.qv .ch-leg.is-multistop.tone-red .ch-leg-main { background: rgba(236,58,36,.05); }
.qv .ch-leg-stoplist { padding: 10px 12px 6px 24px; }
.qv .ch-leg-route.ch-stops-multi { position: relative; flex-direction: column; align-items: stretch; gap: 5px; padding-left: 18px; }
.qv .ch-leg-route.ch-stops-multi::before { content: ''; position: absolute; left: 3px; top: 16px; bottom: 16px; width: 2px; border-radius: 2px; }
.qv .tone-teal .ch-stops-multi::before { background: var(--teal); }
.qv .tone-blue .ch-stops-multi::before { background: var(--blue); }
.qv .tone-red .ch-stops-multi::before { background: var(--red); }
.qv .ch-stop-row { position: relative; display: flex; align-items: center; gap: 6px; }
.qv .ch-stop-row .ch-leg-ac { flex: 1 1 auto; }
.qv .ch-stop-dot { position: absolute; left: -18px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; }
.qv .tone-teal .ch-stop-dot { background: var(--teal); }
.qv .tone-blue .ch-stop-dot { background: var(--blue); }
.qv .tone-red .ch-stop-dot { background: var(--red); }
/* destination dot: ringed, paper core (after the tone fills so source order wins) */
.qv .ch-stop-dot.end { width: 4px; height: 4px; border: 2px solid; background: var(--paper); }
.qv .tone-teal .ch-stop-dot.end { border-color: var(--teal); }
.qv .tone-blue .ch-stop-dot.end { border-color: var(--blue); }
.qv .tone-red .ch-stop-dot.end { border-color: var(--red); }
/* stop inputs sit quiet on the card so the card (not each row) is the visual unit;
   they surface back to a normal input on hover/focus */
.qv .ch-stops-multi .ch-leg-in { background: transparent; border-color: var(--line-soft); }
.qv .ch-stops-multi .ch-leg-in:hover { border-color: var(--line); }
.qv .ch-stops-multi .ch-leg-in:focus { background: var(--surface); }
.qv .ch-seg-row { display: flex; align-items: center; gap: 6px; padding-left: 10px; min-height: 20px; }
/* third thin line: stop-list controls (+ stop / and return) on driving legs */
.qv .ch-stop-ctrls { padding: 0 12px 8px 44px; margin-top: -2px; display: flex; gap: 14px; align-items: center; }
.qv .ch-stop-ctrls .ch-link { text-decoration: none; color: var(--muted); font-weight: 600; font-size: 11.5px; }
.qv .ch-stop-ctrls .ch-link:hover { color: var(--blue-d); text-decoration: underline; text-underline-offset: 2px; }

/* dense-row responsive: when the EDITOR PANE (not the viewport) is too narrow to
   keep From→To readable alongside the date/distance/action controls, drop the
   route onto its own full-width line below the controls. Keyed to the container
   so it fires in the two-pane cockpit (editor ~590px) on any monitor size. */
@container legs (max-width: 620px) {
  .qv .ch-leg-main { flex-wrap: wrap; }
  .qv .ch-leg-route { flex: 1 1 100%; order: 5; }}
/* Chauffeur legs carry an extra Travel|Stay segment (~90px), so the row overflows and the
   date input gets clipped in a width band ABOVE the 620px point-to-point threshold (the
   "date shows only /09/" bug). Drop the route to its own line ~100px earlier for them. */
@container legs (max-width: 720px) {
  .qv .ch-leg.is-chauffeur .ch-leg-main { flex-wrap: wrap; }
  .qv .ch-leg.is-chauffeur .ch-leg-route { flex: 1 1 100%; order: 5; }}
/* Fallback for browsers without container queries: key off the viewport. */
@supports not (container-type: inline-size) {
  @media (max-width: 1180px) {
    .qv .ch-leg-main { flex-wrap: wrap; }
    .qv .ch-leg-route { flex: 1 1 100%; order: 5; }}}

.qv .ch-legs-add { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }

/* ══════════════════════════════════════════════════════════════════════════
   Money pane — ONE cohesive card, tight vertical rhythm
   ══════════════════════════════════════════════════════════════════════════ */
.qv .ch-money-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-card); overflow: hidden; }

/* shared hairline divider inside the card */
.qv .ch-money-rule { height: 1px; background: var(--line-soft); margin: 0; }

/* micro-label (matches the customer-strip label style) */
.qv .ch-money-micro { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

/* --- 1. Service chooser = the card head (two price boxes that ARE the chooser) --- */
/* vehicle chips — pricing decision #1, top of the money card */
.qv .ch-veh-chips { padding: 13px 16px 12px; }
.qv .ch-veh-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.qv .ch-veh-lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.qv .ch-veh-hint { font-size: 12px; font-weight: 600; color: #b06a00; }
.qv .ch-veh-row { display: flex; gap: 6px; flex-wrap: wrap; }
.qv .ch-veh-chip { border: 1.5px solid var(--line); background: var(--surface); border-radius: 999px; padding: 6px 11px;
  font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px; transition: border-color .15s, background .15s, box-shadow .15s; }
.qv .ch-veh-chip:hover { border-color: var(--blue); }
.qv .ch-veh-chip.active { border-color: var(--blue); background: rgba(10,185,182,.10); box-shadow: 0 0 0 1px var(--blue) inset; }
.qv .ch-veh-chip .ch-veh-cap { font-style: normal; font-size: 10.5px; font-weight: 600; color: var(--muted-2); }
.qv .ch-veh-chip.over { border-color: #e6b35c; background: #fff8ec; }
.qv .ch-veh-chip.over .ch-veh-cap { color: #b06a00; }
.qv .ch-veh-chips.unset .ch-veh-chip { border-color: #e6b35c; background: #fffdf7; }
/* D3: the suggested fit breathes softly toward teal — a lighting change, not a flash. */
.qv .ch-veh-chip.suggest { border-color: var(--teal); background: rgba(10,185,182,.05); animation: ch-sug-breathe 2.6s cubic-bezier(.45,.05,.55,.95) infinite; }
@keyframes ch-sug-breathe {
  0%, 100% { box-shadow: 0 0 0 0 rgba(10,185,182,0); }
  50% { box-shadow: 0 0 0 4px rgba(10,185,182,.13); }
}
@media (prefers-reduced-motion: reduce) { .qv .ch-veh-chip.suggest { animation: none; } }
/* Seats are a hard limit — a vehicle that can't seat the party is greyed out + disabled.
   (Wins the specificity tie with the .unset rule above via source order.) */
.qv .ch-veh-chips .ch-veh-chip.unfit,
.qv .ch-veh-chips .ch-veh-chip.unfit:hover { border-color: var(--line); background: var(--line-soft); color: var(--muted-2); cursor: not-allowed; box-shadow: none; }
.qv .ch-veh-chip.unfit .ch-veh-cap { color: #b06a00; }
.qv .ch-svc-choose { display: flex; gap: 10px; padding: 14px 16px; }
.qv .ch-svc-box { flex: 1 1 0; min-width: 0; text-align: left; border: 1.5px solid var(--line); background: var(--surface); border-radius: var(--r-md); padding: 10px 12px; cursor: pointer; transition: border-color .15s, background .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 3px; font-family: var(--sans); }
.qv .ch-svc-box:hover:not(:disabled):not(.active) { border-color: var(--muted-2); }
.qv .ch-svc-box.active { border-color: var(--teal); background: rgba(10,185,182,.06); box-shadow: 0 0 0 1px var(--teal) inset; }
.qv .ch-svc-box:disabled { cursor: not-allowed; background: var(--cream); border-color: var(--line); }
.qv .ch-svc-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.qv .ch-svc-box.active .ch-svc-lbl { color: var(--teal-d); }
.qv .ch-svc-price { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.1; }
.qv .ch-svc-box:not(.active) .ch-svc-price { color: var(--muted); }
.qv .ch-svc-box:disabled .ch-svc-price { color: var(--muted-2); }
.qv .ch-svc-sub { display: block; margin-top: 2px; font-size: 10px; font-weight: 400; color: var(--muted-2); font-family: var(--sans); line-height: 1.2; }
.qv .ch-svc-hint { font-size: 10.5px; color: var(--muted); line-height: 1.3; font-weight: 500; }
.qv .ch-svc-box:disabled .ch-svc-hint { color: var(--muted-2); }
/* "Customer asked for" now lives in the trip basics next to the vehicle chips, so it mirrors
   their head+row layout (ch-veh-head/ch-veh-row) — the two intake questions read as a pair. */
.qv .ch-req-choose { padding: 0; }
.qv .ch-req-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.qv .ch-req-lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.qv .ch-req-row { display: flex; gap: 6px; flex-wrap: wrap; }
.qv .ch-req-chip { border: 1.5px solid var(--line); background: var(--surface); border-radius: 999px; padding: 6px 11px; font-size: 12px; font-family: var(--sans); color: var(--muted); cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
.qv .ch-req-chip:hover:not(.active) { border-color: var(--muted-2); }
.qv .ch-req-chip.active { border-color: var(--teal); background: rgba(10,185,182,.06); color: var(--teal-d); font-weight: 600; }
/* Mismatch stays in the price panel under the service chooser (no longer under the chips), so a
   small positive top margin sits it cleanly below the price boxes. */
.qv .ch-req-mismatch { margin: 4px 16px 12px; padding: 7px 10px; border-radius: 8px; background: rgba(214,138,42,.09); border: 1px solid rgba(214,138,42,.28); color: #8a5a12; font-size: 11.5px; line-height: 1.35; font-weight: 500; }
.qv .ch-svc-caption { padding: 0 16px 12px; font-size: 11.5px; color: var(--teal-d); line-height: 1.4; font-weight: 500; margin-top: -4px; }

/* --- 2. km line — one text line, not tiles --- */
.qv .ch-money-body { padding: 14px 16px; }
.qv .ch-km-line { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 10px; line-height: 1.4; }
.qv .ch-km-line .ch-km.hero { font-family: var(--serif); font-weight: 700; font-size: 14px; color: var(--ink); background: none; padding: 0; border-radius: 0; display: inline; }

/* build-up lines (tightened) */
.qv .ch-money-body .ch-line { padding: 4px 0; }

/* quote total — the big serif moment */
.qv .ch-total { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 12px; display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.qv .ch-total-lbl { font-size: 11px; font-weight: 600; color: var(--ink); text-transform: uppercase; letter-spacing: .5px; }
.qv .ch-total-val { text-align: right; line-height: 1.05; }
.qv .ch-total-usd { font-family: var(--serif); font-size: 36px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; font-variant-numeric: lining-nums; transition: color .35s cubic-bezier(.23,.9,.32,1); }
.qv .ch-total-usd.pending { color: var(--muted-2); font-weight: 400; }
.qv .ch-needs { border: 0; padding: 4px 0 0; font-size: 12px; color: var(--muted); }
.qv .ch-svc-head { padding: 12px 16px 0; }
.qv .ch-svc-caption-lbl { font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted-2); }
.qv .ch-total-lkr { display: block; font-size: 12px; color: var(--muted-2); font-weight: 400; margin-top: 1px; }

/* due-now highlighted chip row (chauffeur) */
.qv .ch-deposit-chip { margin-top: 12px; background: rgba(10,185,182,.08); border: 1px solid rgba(10,185,182,.22); border-radius: var(--r-md); padding: 9px 12px; display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.qv .ch-deposit-chip .dep-lbl { font-size: 12px; color: var(--teal-d); font-weight: 600; }
.qv .ch-deposit-chip .dep-val { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--teal-d); font-variant-numeric: tabular-nums; }
.qv .ch-deposit-note { font-size: 10.5px; color: var(--muted); margin-top: 4px; line-height: 1.35; }

/* margin — small teal line */
.qv .ch-money-body .ch-margin { margin-top: 8px; }

/* empty / error state */
.qv .ch-money-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 22px 0; }
.qv .ch-partial-note { margin-top: 8px; font-size: 12px; line-height: 1.4; color: #b9760f; background: rgba(249,164,41,.13); border-radius: 8px; padding: 6px 10px; }

/* --- FLAGS — slim severity rows inside the same card, under a hairline --- */
.qv .ch-flags-mini { padding: 12px 16px; }
.qv .ch-flags-mini .ch-flags { gap: 7px; }
.qv .ch-flags-mini .ch-flag { padding: 8px 11px; }
.qv .ch-flags-mini .ch-flags-clear { padding: 2px 2px; }

/* --- OUTPUT — tab bar + copy at the card foot --- */
.qv .ch-out-collapse { border-top: 1px solid var(--line-soft); }
.qv .ch-out-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 12px 16px; background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.qv .ch-out-toggle:hover { color: var(--ink); }
.qv .ch-out-toggle .ch-chev { font-size: 16px; }
.qv .ch-out-panel { padding: 0 16px 16px; }
.qv .ch-out-panel .ch-tabs { margin-bottom: 12px; }
/* ---------- Copy gate (maker-checker) ---------- */
.qv .ch-copy-btn[disabled] { background: var(--cream); color: var(--muted); box-shadow: none; cursor: not-allowed; }
.qv .ch-copy-lock { text-align: center; padding: 30px 18px; border: 1.5px dashed var(--line); border-radius: var(--r-sm); background: var(--surface-warm); }
.qv .ch-copy-lock-icon { font-size: 22px; }
.qv .ch-copy-lock-title { font-weight: 700; font-size: 14px; margin-top: 6px; color: var(--ink); }
.qv .ch-copy-lock-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.qv .ch-copy-review-note { font-size: 12px; color: #9a6410; background: #fdf3e0; border: 1px solid #f6e3c0; border-radius: 8px; padding: 7px 11px; margin-bottom: 10px; }

/* ---------- Slide-in drawer (Recent) ---------- */
/* Scrim shared by the Rate Settings modal */
.qv .ch-scrim { position: fixed; inset: 0; background: rgba(58,55,57,.32); backdrop-filter: blur(2px); z-index: 90; opacity: 0; transition: opacity .2s; }
.qv .ch-scrim.show { opacity: 1; }
.qv .ch-x-btn { width: 32px; height: 32px; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; cursor: pointer; font-size: 16px; color: var(--muted); display: grid; place-items: center; line-height: 1; }
.qv .ch-x-btn:hover { border-color: var(--red); color: var(--red); }

/* ---------- Modal overlay (Rate Settings) ---------- */
.qv .ch-modal { position: fixed; inset: 0; z-index: 92; display: grid; place-items: center; padding: 24px; }
.qv .ch-modal-card { position: relative; z-index: 93; background: var(--paper); border-radius: var(--r-lg); box-shadow: var(--shadow-pop); width: min(680px, 100%); max-height: 86vh; overflow: hidden; display: flex; flex-direction: column; }
.qv .ch-modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--line); }
.qv .ch-modal-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.qv .ch-modal-body { padding: 18px 20px 22px; overflow-y: auto; }
/* Route-choice modal (2026-07-21): blue = expressway, amber = local road — deliberately NOT the brand teal. */
.qv .ch-rc-body { display: flex; gap: 16px; align-items: stretch; }
.qv .ch-rc-map { flex: 0 0 220px; min-height: 300px; border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; background: var(--surface-warm); }
.qv .ch-rc-map-note { font-size: 12px; color: var(--muted); padding: 16px; text-align: center; }
.qv .ch-rc-cards { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.qv .ch-rc-card { text-align: left; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); padding: 12px 14px; cursor: pointer; font: inherit; color: inherit; }
.qv .ch-rc-card:hover { border-color: var(--line-strong, #cfc8b8); }
.qv .ch-rc-card[data-route="fastest"].is-sel { border-color: #2F6FE0; box-shadow: inset 0 0 0 1px #2F6FE0; }
.qv .ch-rc-card[data-route="local"].is-sel { border-color: #BA7517; box-shadow: inset 0 0 0 1px #BA7517; }
.qv .ch-rc-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 7px; }
.qv .ch-rc-tag { font-size: 11px; font-weight: 400; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 1px 7px; }
.qv .ch-rc-hero-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin: 6px 0 8px; }
.qv .ch-rc-hero { font-size: 20px; font-weight: 700; }
.qv .ch-rc-price { font-size: 20px; font-weight: 700; text-align: right; }
.qv .ch-rc-price .ch-rc-save { display: block; }
.qv .ch-rc-save { font-size: 12px; font-weight: 500; color: #8a5610; }
.qv .ch-rc-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 12px; color: var(--muted); }
.qv .ch-rc-stats b { display: block; color: var(--ink); font-weight: 600; }
.qv .ch-rc-fit { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); }
.qv .ch-rc-swatch-fast { color: #2F6FE0; } .qv .ch-rc-swatch-local { color: #BA7517; }
.qv .ch-route-chip { white-space: nowrap; }

/* ══════════════════════════════════════════════════════════════════════════
   CONTAINMENT — the cockpit above was authored for a full viewport; here it
   lives inside the ops .main pane (viewport − 254px rail). .qv is the pane:
   its own scroll box, positioning context, opaque surface, and the query
   container for the two layout-governing breakpoints converted above.
   ══════════════════════════════════════════════════════════════════════════ */
.qv {
  position: relative;            /* positioning context (T5 re-homes the toast here) */
  height: 100%;                  /* single self-scrolling box — same element as #quoteRoot, */
  overflow-y: auto;              /* so this reconciles with (not nests inside) that rule    */
  /* no left divider: the quote view meets the espresso rail exactly like Bookings #view does */
  container-type: inline-size;   /* .ch-cockpit / .ch-main breakpoints query the PANE width */
  container-name: qv;
}
.qv .ch-app { min-height: 100%; }  /* kill min-height:100vh (overflows .main) but grow with content so padding-bottom holds */

  /* ── D2: command palette ─────────────────────────────────────────────── */
  .kbar[hidden]{display:none} /* the class's display:grid would otherwise beat the hidden attr and swallow every click */
  .kbar{position:fixed;inset:0;z-index:900;display:grid;place-items:start center;padding-top:14vh;
    background:rgba(27,23,20,.35);backdrop-filter:blur(3px) saturate(.9);animation:kbar-in .18s cubic-bezier(.23,.9,.32,1)}
  @keyframes kbar-in{from{opacity:0}to{opacity:1}}
  .kbar-panel{width:min(560px,92vw);background:var(--paper);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow-lg);overflow:hidden;animation:kbar-pop .22s cubic-bezier(.23,.9,.32,1)}
  @keyframes kbar-pop{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
  .kbar-in{width:100%;border:0;outline:0;background:transparent;padding:16px 18px;font-family:var(--body);
    font-size:1rem;color:var(--ink)}
  .kbar-in::placeholder{color:var(--ink-faint)}
  .kbar-list{max-height:300px;overflow-y:auto;border-top:1px solid var(--line-soft);padding:6px}
  .kbar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;
    font-size:.92rem;color:var(--ink)}
  .kbar-item .kbar-hint{margin-left:auto;font-family:var(--mono);font-size:.68rem;color:var(--ink-faint)}
  .kbar-item.sel{background:rgba(10,185,182,.09);color:var(--teal-deep)}
  .kbar-item.sel .kbar-hint{color:var(--teal-deep)}
  .kbar-empty{padding:14px 12px;font-size:.85rem;color:var(--ink-faint)}
  .kbar-foot{display:flex;gap:16px;padding:9px 16px;border-top:1px solid var(--line-soft);
    font-family:var(--mono);font-size:.64rem;color:var(--ink-faint)}

  /* ── D6: dark theme. Same warm-paper instrument, lights down: espresso surfaces, the
     serif price still the brightest thing in the room. Toggle: ⌘K or the rail button;
     persisted in localStorage(ch_ops_theme); defaults to the OS preference. ── */
  :root[data-theme="dark"]{
    --cream:#141313;--cream-deep:#232221;--paper:#1c1b1a;--line:#302e2b;--line-soft:#282624;
    --ink:#eceae5;--ink-soft:#b3afa7;--ink-faint:#807b73;
    --shadow-s:0 1px 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
    --shadow:0 8px 26px -12px rgba(0,0,0,.65);--shadow-lg:0 40px 90px -30px rgba(0,0,0,.85);
    --ok:#4fbf7e;--ok-bg:#132a1c;--wait:#e0a33e;--wait-bg:#2e2410;--go:#2fbfb4;--go-bg:#0e2a27;
    --alert:#ef6a4c;--alert-bg:#331812;--alert-line:#4d2418;--idle:#9a948a;--idle-bg:#262219;
    --wa:#37c96e;--wa-bg:#0f2b1a;--web:#2fbfb4;--web-bg:#0e2a27;
  }
  :root[data-theme="dark"] .qv{
    --black:#eceae5;--cream:#141313;--cream-d:#232221;
    --paper:#1c1b1a;--ink:#eceae5;--muted:#b3afa7;--muted-2:#807b73;
    --line:#302e2b;--line-soft:#282624;
    --surface:#262523;--surface-warm:#292724;
    --shadow-card:0 1px 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
    --shadow-pop:0 8px 26px -12px rgba(0,0,0,.7);
  }
  /* amber-tinted one-offs that hardcode light values */
  :root[data-theme="dark"] .qv .ch-sendback{border-color:#5b4a22}
  :root[data-theme="dark"] .qv .ch-req-mismatch{background:rgba(224,163,62,.12);border-color:rgba(224,163,62,.35);color:#e8b96a}
  :root[data-theme="dark"] .kbar{background:rgba(0,0,0,.55)}
  :root[data-theme="dark"] .topbar{background:rgba(20,19,19,.78)}
  /* stage tones arrive as inline light pastels (STAGE map) — remix them against dark paper */
  :root[data-theme="dark"] .tk.attn{background:linear-gradient(100deg,color-mix(in srgb,var(--c,var(--line)) 13%,var(--paper)),var(--paper) 36%)}
  :root[data-theme="dark"] .pill{background:color-mix(in srgb,var(--cbg,var(--cream-deep)) 20%,var(--paper));color:color-mix(in srgb,var(--c,var(--ink-soft)) 78%,#fff)}
  :root[data-theme="dark"] .sheet-h{background:linear-gradient(162deg,color-mix(in srgb,var(--c,var(--line)) 15%,var(--paper)),var(--paper) 78%)}
  :root[data-theme="dark"] .qv .ch-veh-chips.unset .ch-veh-chip{background:#2a2620;border-color:#5d4c22}
  :root[data-theme="dark"] .qv .ch-veh-chip.over{background:#2e2817;border-color:#5d4c22}
  :root[data-theme="dark"] .qv .ch-review-banner.tone-amber{background:rgba(224,163,62,.12);border-color:rgba(224,163,62,.3);color:#e8b96a}
  :root[data-theme="dark"] .qv .ch-review-banner.tone-teal{background:rgba(47,191,180,.12);border-color:rgba(47,191,180,.3);color:#5fd6cc}
  /* status-pill tones + amber copy-note hardcode light pastels — remix each as a translucent
     tint over dark paper (same treatment as the review banners above) */
  :root[data-theme="dark"] .qv .ch-status-pill.tone-slate{background:rgba(143,160,184,.14);border-color:rgba(143,160,184,.30);color:#aebbcd}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-amber{background:rgba(224,163,62,.14);border-color:rgba(224,163,62,.30);color:#e8b96a}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-teal{background:rgba(47,191,180,.14);border-color:rgba(47,191,180,.30);color:#5fd6cc}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-blue{background:rgba(90,140,230,.16);border-color:rgba(90,140,230,.32);color:#8fb3f0}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-green{background:rgba(79,191,126,.14);border-color:rgba(79,191,126,.30);color:#79d69b}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-red{background:rgba(239,106,76,.14);border-color:rgba(239,106,76,.32);color:#f0937c}
  :root[data-theme="dark"] .qv .ch-status-pill.tone-muted{background:rgba(150,144,134,.14);border-color:rgba(150,144,134,.30);color:#b3afa7}
  :root[data-theme="dark"] .qv .ch-copy-review-note{background:rgba(224,163,62,.12);border-color:rgba(224,163,62,.30);color:#e8b96a}

  /* ── D5: arrival motion — a lighting change, not a flash. The builder rises once on
     mount; the itinerary rises once when the basics unlock it. Guarded by a one-shot
     class so routine re-renders never replay it. ── */
  .qv .ch-app.mount-rise > *{animation:ch-rise .55s cubic-bezier(.23,.9,.32,1) both}
  .qv .ch-app.mount-rise > *:nth-child(2){animation-delay:.06s}
  .qv .ch-app.mount-rise > *:nth-child(3){animation-delay:.12s}
  .qv .ch-app.mount-rise > *:nth-child(4){animation-delay:.18s}

    .qv .ch-app.mount-rise > *,.qv .ch-sec.just-unlocked{animation:none}

<script>
/* ── date helpers (today is computed client-side, per grouping spec) ── */
const _pad=n=>String(n).padStart(2,'0');
const isoOf=d=>`${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
const TODAY=isoOf(new Date());
const addDays=(iso,n)=>{const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return isoOf(d);};
const TOMORROW=addDays(TODAY,1);
const fmtFull=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const fmtDate=d=>d===TODAY?'Today':new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtDateTime=iso=>{const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' · '+_pad(d.getHours())+':'+_pad(d.getMinutes());};
const nowStamp=()=>{const d=new Date();return `${isoOf(d)} ${_pad(d.getHours())}:${_pad(d.getMinutes())}`;};

const DAYGROUPS=['Pending','Today','Tomorrow','Upcoming','Completed'];
const dayGroup=t=>{
  if(t.stage==='completed')return 'Completed';
  if(t.stage==='awaiting_payment'||!t.date)return 'Pending';
  if(t.date===TODAY)return 'Today';
  if(t.date===TOMORROW)return 'Tomorrow';
  return 'Upcoming';
};
const groupNote={Pending:'awaiting payment · undated',Today:()=>fmtFull(TODAY),Tomorrow:()=>fmtFull(TOMORROW),Upcoming:'scheduled ahead',Completed:'done'};

/* ── fulfilment lifecycle — ops only sees bookings that are paid (or, on the manual
   channel, awaiting payment after a link was sent). Quoting/payment-link steps
   live outside ops in WhatsApp/Notion. ── */
const STAGES=['awaiting_payment','paid','vehicle_confirmed','pickup_confirmed','on_trip','completed'];
const STAGE={
  awaiting_payment:{label:'Awaiting payment',short:'Awaiting',c:'#c7841f',cbg:'#fbf0d8'},
  paid:{label:'Paid',short:'Paid',c:'#2f9558',cbg:'#e6f4ec'},
  vehicle_confirmed:{label:'Vehicle confirmed',short:'Vehicle',c:'#6d4fb8',cbg:'#efeafb'},
  pickup_confirmed:{label:'Pickup confirmed',short:'Pickup',c:'#0a8f86',cbg:'#dff3ef'},
  on_trip:{label:'On trip',short:'On trip',c:'#1f6fd0',cbg:'#e6f0fc'},
  completed:{label:'Completed',short:'Done',c:'#7c7a73',cbg:'#eeece4'},
  no_show:{label:'No-show',short:'No-show',c:'#b23214',cbg:'#fbe7e2'},
};
const stVars=s=>`--c:${STAGE[s].c};--cbg:${STAGE[s].cbg}`;
/* NEXT covers only the post-payment machine. awaiting_payment has NO advance button —
   payment arrives via the webhook; ops follows up instead. */
const NEXT={
  paid:{to:'vehicle_confirmed',label:'Confirm vehicle',act:'advance'},
  vehicle_confirmed:{to:'pickup_confirmed',label:'Confirm pickup',act:'advance'},
  pickup_confirmed:{to:'on_trip',label:'Mark on trip',act:'advance'},
  on_trip:{to:'completed',label:'Mark completed',act:'advance'},
  completed:null,
};
const MODE={single:'Transfer',private:'Private',shared:'Shared',trip:'Multi-stop',chauffeur:'Chauffeur'};

/* The only surviving template: the payment-reminder copy an ops agent sends to nudge
   an awaiting-payment customer. Interpolates the first name and the amount. */
const payreminder=t=>`Hi ${t.first} 👋 Just a friendly nudge from Ceylon Hop — your booking for ${t.route} is held pending payment of ${money(t)}.\n\nHere's your secure link again to lock it in 🌴 Reply if you have any questions!`;

/* attention logic — what an ops agent must act on */
const reason=t=>{
  if(t.stage==='awaiting_payment')return 'Payment link sent — follow up';
  if(t.stage==='paid')return 'Vehicle not confirmed yet';
  if(t.stage==='vehicle_confirmed'&&!t.updated)return 'Customer not contacted yet';
  return '';
};
const isAttn=t=>!!reason(t)&&t.stage!=='completed';

const GROUPS=[
  {id:'all',label:'All open',c:'#241f1d'},
  {id:'pay',label:'Awaiting payment',c:'#c7841f'},
  {id:'paid',label:'Needs vehicle',c:'#cf4a2f'},
  {id:'ready',label:'Ready',c:'#0a8f86'},
  {id:'trip',label:'On trip',c:'#1f6fd0'},
  {id:'done',label:'Completed',c:'#7c7a73'},
];
const CLOSED=['completed','no_show'];
const inGroup=(t,g)=>{
  if(g==='all')return !CLOSED.includes(t.stage);
  if(g==='pay')return t.stage==='awaiting_payment';
  if(g==='paid')return t.stage==='paid';
  if(g==='ready')return ['vehicle_confirmed','pickup_confirmed'].includes(t.stage);
  if(g==='trip')return t.stage==='on_trip';
  if(g==='done')return CLOSED.includes(t.stage);
  return true;
};
const ICON={
  wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2z"/></svg>',
  web:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 12 5 5L20 7"/></svg>',
