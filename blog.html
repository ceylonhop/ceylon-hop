<style>
  .hero-banner{position:relative;height:320px;margin-top:-74px;display:grid;place-items:center;color:#fff;text-align:center;overflow:hidden}
  .hero-banner .ph{position:absolute;inset:0}
  .hero-banner::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,40,38,.35),rgba(20,40,38,.6))}
  .hero-banner .inner{position:relative;z-index:2;padding-top:50px}
  .hero-banner h1{color:#fff}
  .feature{display:grid;grid-template-columns:1.2fr 1fr;gap:30px;align-items:center;background:var(--paper);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
  @media(max-width:780px){.feature{grid-template-columns:1fr}}
  .feature .ph{aspect-ratio:16/10;min-height:280px}
  .feature image-slot{display:block;width:100%;height:100%;min-height:280px}
  @media(max-width:780px){.feature .ph{min-height:0;width:100%}.feature image-slot{min-height:0;height:auto;aspect-ratio:16/10}}
  .feature .fbody{padding:30px}
  .feature h2{font-size:1.7rem;margin:.4rem 0 .6rem}
  .bcard{transition:transform .2s}
  .bcard:hover{transform:translateY(-4px)}
  .bcard .ph{aspect-ratio:16/10;border-radius:var(--r)}
  .bcard h3{font-size:1.1rem;margin:14px 0 .3rem;line-height:1.25}
  .bcard .meta{font-size:.76rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
  .bcard p{font-size:.9rem;color:var(--ink-soft)}
  .bcard a.more{color:var(--accent-deep);font-weight:600;font-size:.88rem;display:inline-flex;align-items:center;gap:.3rem}
  .bcard a.more svg,.bcard .more svg{width:16px;height:16px;flex:none}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
</style>
</head>
<body>
<div data-header></div>

<section class="hero-banner" data-screen-label="Blog hero">
  <image-slot id="blog-hero" shape="rect" placeholder="Drop a photo — stilt fishermen at sunset, southern coast"></image-slot>
  <div class="inner">
    <span class="sticker">Travel blog</span>
    <h1 class="display" style="font-size:clamp(2.2rem,5vw,3.6rem);margin-top:12px">Your guide to everywhere</h1>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="crumb" style="font-size:.84rem;color:var(--ink-soft);margin-bottom:20px"><a href="index.html" style="color:var(--accent-deep)">Home</a> · Travel Blog</div>
    <!-- feature -->
    <div class="feature">
      <image-slot id="blog-feature" shape="rect" placeholder="Drop a photo — red bus on a winding tea-country road"></image-slot>
      <div class="fbody">
        <span class="pill pill-saffron">Featured</span>
        <h2>How to use buses in Sri Lanka: the ultimate guide for adventurous travelers</h2>
        <p class="muted">From decoding routes to grabbing the best seat, here&rsquo;s how to get around like a local &mdash; and when to just hop with us instead.</p>
        <a href="#" class="btn btn-primary mt" style="margin-top:16px">Read the guide →</a>
      </div>
    </div>

    <div class="grid cols-3" id="posts" style="margin-top:40px"></div>
  </div>
</section>

<div data-footer></div>

<script src="site.js"></script>
<script src="image-slot.js"></script>
<script>
  initChrome({active:'blog.html', onDark:true});
  const posts=[
    ['Why we started Ceylon Hop','Story · 4 min','The friendship, the road trips, and the messy bus rides that turned into a travel company.'],
    ['The ultimate tuk-tuk guide to Sri Lanka','Guide · 6 min','How to flag one, what to pay, and the apps that make haggling a thing of the past.'],
    ['Best time to visit Sri Lanka: a month-by-month guide','Planning · 8 min','Two monsoons, two coasts — here&rsquo;s how to always be on the sunny side of the island.'],
    ['9 must-visit places in Sri Lanka','List · 5 min','From Sigiriya at sunrise to the surf at Arugam Bay, the stops worth building a trip around.'],
    ['Discover Sri Lanka with Ceylon Hop','Story · 3 min','A first-timer&rsquo;s loop through culture, hills and beaches — exactly how we&rsquo;d do it.'],
    ['What to pack for a hop around the island','Tips · 4 min','Light, breezy and surf-ready — the only packing list you need for Sri Lanka.']
  ];
  document.getElementById('posts').innerHTML=posts.map(([t,m,d],i)=>`
    <a class="bcard" href="#">
      <image-slot id="blog-post-${i}" shape="rounded" radius="16" style="display:block;width:100%;aspect-ratio:16/10" placeholder="Drop a photo — ${t}"></image-slot>
      <div class="meta" style="margin-top:14px">${m}</div>
      <h3>${t}</h3>
      <p>${d}</p>
      <span class="more">Read more ${ICON.arrow}</span>
    </a>`).join('');
</script>
</body>
</html>
